  <script>
    var nodes={
      root:      {label:"Argomento 10 (CLIL)",title:"SSL/TLS",text:"SSL/TLS è il protocollo crittografico che si inserisce tra TCP e l'applicazione (HTTP, FTP, SMTP…). HTTPS = HTTP + TLS su porta 443. Garantisce confidenzialità (cifratura), autenticazione (certificati) e integrità (MAC). Sistema ibrido: asimmetrica per lo scambio chiavi, simmetrica per i dati."},
      versioni:  {label:"Versioni",title:"SSL vs TLS",text:"SSL 2.0 e 3.0: deprecati per vulnerabilità gravi (POODLE, BEAST). TLS 1.0 e 1.1: deprecati dal 2021 (RFC 8996). TLS 1.2: ancora ampiamente in uso. TLS 1.3 (2018): standard attuale — handshake in 1-RTT, PFS obbligatoria, rimosse cipher suite deboli."},
      handshake: {label:"Handshake",title:"L'Handshake SSL/TLS",text:"Il processo di negoziazione che stabilisce la connessione sicura: scambio di parametri (cipher suite), autenticazione del server (certificato), generazione del materiale crittografico (pre-master secret), derivazione delle chiavi di sessione (master secret + 4 chiavi)."},
      segreti:   {label:"Segreti",title:"Pre-master e Master Secret",text:"Pre-master secret: byte casuali generati dal client, cifrati con la chiave pubblica del server. Solo il server può decifrarli. Master secret: calcolato INDIPENDENTEMENTE da entrambi con f(pre-master secret + nonce client + nonce server). Non viene mai trasmesso."},
      chiavi4:   {label:"Le 4 Chiavi",title:"4 Chiavi di Sessione",text:"Dal master secret si derivano 4 chiavi separate: chiave di cifratura Client→Server, chiave di cifratura Server→Client, chiave MAC Client→Server, chiave MAC Server→Client. La separazione per direzione impedisce che la compromissione di una chiave esponga il traffico nell'altra direzione."},
      record:    {label:"Record Layer",title:"SSL Record Layer",text:"Il livello inferiore SSL/TLS gestisce il trasporto effettivo: riceve dati dall'applicazione → frammenta in blocchi → aggiunge MAC (con chiave MAC di sessione) → cifra (con chiave di cifratura di sessione) → aggiunge header SSL Record → invia via TCP."},
      ssl_dep:   {label:"SSL",title:"SSL è Deprecato",text:"SSL 3.0 è vulnerabile all'attacco POODLE (Padding Oracle On Downgraded Legacy Encryption). TLS 1.0 è vulnerabile a BEAST (Browser Exploit Against SSL/TLS). Entrambi disabilitati nei browser moderni. Il termine 'SSL' è spesso usato colloquialmente per indicare TLS."},
      tls12:     {label:"TLS 1.2",title:"TLS 1.2 (2008)",text:"TLS 1.2 è ancora ampiamente supportato e sicuro se configurato correttamente (con cipher suite forti). Supporta SHA-256, AES-GCM, ECDHE. Handshake in 2-RTT (round trip). Supporta Forward Secrecy opzionale."},
      tls13:     {label:"TLS 1.3",title:"TLS 1.3 — Standard Attuale",text:"TLS 1.3 (RFC 8446, 2018): handshake in 1-RTT (più veloce), Perfect Forward Secrecy obbligatoria, rimosse cipher suite deboli (RSA key exchange, RC4, MD5, SHA-1), 0-RTT resumption per sessioni riavviate. Più sicuro e più veloce di TLS 1.2."},
      hello:     {label:"Handshake",title:"Client Hello e Server Hello",text:"Client Hello: il client invia le cipher suite supportate + un nonce (numero casuale) + versioni TLS supportate. Server Hello: il server sceglie la cipher suite + invia il proprio nonce. Questi due nonce sono fondamentali per garantire l'unicità di ogni sessione."},
      cert_hs:   {label:"Handshake",title:"Certificato e Verifica",text:"Il server invia il proprio certificato digitale X.509. Il client esegue i 4 controlli: data valida, CA fidata, firma CA valida, dominio corrispondente. Solo se tutti i controlli passano, il client procede con il resto dell'handshake."},
      cipher:    {label:"Cipher Suite",title:"Cipher Suite",text:"La cipher suite definisce gli algoritmi usati: scambio chiavi (RSA, DHE, ECDHE), cifratura simmetrica (AES-128-GCM, AES-256-GCM, ChaCha20-Poly1305), hash per MAC (SHA-256, SHA-384). Negoziata tra client e server nel Hello."},
      premaster: {label:"Pre-master",title:"Pre-master Secret",text:"Il client genera byte casuali (pre-master secret) e li cifra con la chiave pubblica del server (estratta dal certificato). Solo il server può decifrarli con la propria chiave privata. Questa è la parte 'asimmetrica' del sistema ibrido."},
      master:    {label:"Master Secret",title:"Master Secret",text:"Master secret = PRF(pre-master secret, nonce client, nonce server). Calcolato INDIPENDENTEMENTE da client e server senza trasmetterlo. Dal master secret si derivano le 4 chiavi di sessione tramite una funzione di derivazione delle chiavi (KDF)."},
      k_enc:     {label:"4 Chiavi",title:"Chiavi di Cifratura",text:"Dal master secret si derivano due chiavi di cifratura simmetrica (es. AES-256): una per il traffico Client→Server, una per il traffico Server→Client. Usare chiavi diverse per ogni direzione impedisce attacchi di replay e aumenta la sicurezza complessiva."},
      k_mac:     {label:"4 Chiavi",title:"Chiavi MAC",text:"Due chiavi MAC (una per C→S, una per S→C) per calcolare il codice di autenticazione di ogni blocco dati. Il ricevente ricalcola il MAC con la propria chiave MAC di sessione: se non corrisponde, il dato è stato alterato e la connessione viene chiusa."},
      k_why:     {label:"4 Chiavi",title:"Perché 4 e non 1?",text:"Separazione tra funzioni e direzioni: se un attaccante compromette una chiave di cifratura, non ottiene la chiave MAC. Se compromette la chiave C→S, non può decifrare il traffico S→C. La separazione limita il danno da una singola compromissione."},
      rec_frag:  {label:"Record Layer",title:"Frammentazione e Protezione",text:"Il Record Layer divide i dati in frammenti, aggiunge il MAC (calcolato con la chiave MAC appropriata per la direzione), cifra l'insieme con la chiave di cifratura appropriata, aggiunge un header SSL Record (tipo, versione, lunghezza). Il risultato è un record SSL/TLS cifrato."},
      rec_tcp:   {label:"Record Layer",title:"Trasmissione su TCP",text:"I record SSL/TLS vengono trasmessi via TCP sulla porta 443 (HTTPS). TCP garantisce la consegna e l'ordine dei record. SSL/TLS garantisce la riservatezza e l'integrità del contenuto. I due protocolli si complementano."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
