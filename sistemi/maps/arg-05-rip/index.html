  <script src="../../js/main.js"></script>
  <script>
    var nodes = {
      root:       { label:"Argomento 5", title:"RIP", text:"Routing Information Protocol: protocollo IGP Distance Vector basato su Bellman-Ford. Usa l'hop count come metrica (numero di router attraversati). Adatto a reti di piccole-medie dimensioni con massimo 15 hop." },
      metrica:    { label:"Metrica", title:"Hop Count", text:"RIP misura il percorso in base al numero di router (hop) attraversati. Valore minimo: 1 (rete connessa). Valore massimo: 15. Il valore 16 rappresenta l'infinito — la rete è irraggiungibile." },
      funz:       { label:"Funzionamento", title:"Come funziona RIP", text:"All'avvio ogni router conosce solo le reti direttamente connesse. Ogni 30 secondi invia a tutti i vicini la propria tabella di routing (RIP Update). Il ricevente aggiunge 1 alla metrica di ogni rotta ricevuta e aggiorna se trova un percorso migliore. Dopo alcune iterazioni tutta la rete converge." },
      cti:        { label:"Problema", title:"Count-to-Infinity", text:"Quando un link cade, i router non capiscono subito che la rete è irraggiungibile. Continuano ad annunciarla con metrica crescente (1→2→3…→16). Questo causa convergenza lenta e traffico inutile. È il problema principale di RIP." },
      sol:        { label:"Soluzioni", title:"Soluzioni al Count-to-Infinity", text:"Tre meccanismi riducono l'impatto: Split Horizon, Poisoned Reverse e Triggered Update. Nessuno lo elimina completamente in topologie complesse con molti router." },
      versioni:   { label:"Versioni", title:"RIPv1 vs RIPv2", text:"RIPv1 (classful): non include la subnet mask negli aggiornamenti → incompatibile con VLSM. Usa broadcast 255.255.255.255. RIPv2 (classless): include la subnet mask → supporta VLSM/CIDR. Usa multicast 224.0.0.9. Supporta autenticazione MD5 opzionale." },
      hopmax:     { label:"Metrica", title:"Massimo 15 hop", text:"Il valore 16 rappresenta l'infinito in RIP. Questo limita RIP a reti con diametro massimo di 15 router — adatto a reti piccole, non scalabile per Internet o reti enterprise grandi." },
      aggiornamento: { label:"Timer", title:"Update ogni 30 secondi", text:"RIP invia aggiornamenti periodici (RIP Update) ogni 30 secondi (Update Timer) a tutti i vicini diretti. Questo genera overhead periodico anche in assenza di cambiamenti nella rete." },
      converge:   { label:"Scalabilità", title:"Reti piccole e medie", text:"Per la sua semplicità e i limiti di scalabilità (max 15 hop, convergenza lenta), RIP è adatto solo a reti di piccole e medie dimensioni. Per reti grandi si usa OSPF o EIGRP." },
      vicini:     { label:"Distance Vector", title:"Conosce solo i vicini", text:"A differenza di OSPF (Link-State), RIP è Distance Vector: ogni router conosce solo le distanze verso le destinazioni, non la topologia completa. Scambia queste distanze con i vicini diretti." },
      timer:      { label:"Timer RIP", title:"I 4 Timer di RIP", text:"Update Timer (30s): aggiornamenti periodici. Invalid Timer (180s): rotta marcata invalida (metrica=16) se nessun update. Holddown Timer (180s): attesa prima di accettare nuove info sulla rotta invalida. Flush Timer (240s): rimozione definitiva dalla tabella." },
      cti_desc:   { label:"Count-to-Infinity", title:"La metrica sale lentamente", text:"Quando la rete X cade, il router R1 la rimuove dalla propria tabella. Ma il router R2 (che aveva imparato X da R1) continua ad annunciare X con metrica 2. R1 aggiorna la propria tabella con metrica 3 (da R2), e così via fino a 16." },
      lenta:      { label:"Convergenza", title:"Convergenza lenta", text:"In RIP la convergenza (il tempo perché tutti i router abbiano la stessa visione della rete) può essere molto lenta dopo un guasto — potenzialmente minuti. OSPF converge in secondi perché usa flooding immediato dei LSA." },
      loop:       { label:"Loop", title:"Rischio routing loop", text:"Senza Split Horizon o Poisoned Reverse, RIP può creare routing loop: A invia traffico per X a B, B lo rimanda ad A, e così via all'infinito. I pacchetti circolano finché il TTL non scade." },
      split:      { label:"Soluzione", title:"Split Horizon", text:"Un router non ri-annuncia una rotta verso il router da cui l'ha appresa. Se R1 ha imparato 'rete X via R2', R1 non annuncia X a R2. Questo previene il Count-to-Infinity nei casi semplici (topologie a due nodi)." },
      poison:     { label:"Soluzione", title:"Poisoned Reverse", text:"Variante di Split Horizon: invece di omettere la rotta, la ri-annuncia con metrica 16 (irraggiungibile) verso il router di origine. Più esplicito di Split Horizon, garantisce che R2 sappia immediatamente che X non è raggiungibile via R1." },
      triggered:  { label:"Soluzione", title:"Triggered Update", text:"Al cambiamento di topologia (es. link cade), il router invia immediatamente un aggiornamento senza aspettare i 30 secondi del timer periodico. Accelera notevolmente la convergenza dopo un guasto. Definito in RFC 2091." },
      v1:         { label:"RIPv1", title:"Classful e Broadcast", text:"RIPv1 non include la subnet mask negli aggiornamenti (classful). Non supporta VLSM né CIDR. Invia gli aggiornamenti in broadcast (255.255.255.255) a tutti gli host. Tutti i dispositivi sulla rete ricevono i messaggi RIP." },
      v2:         { label:"RIPv2", title:"Classless e Multicast 224.0.0.9", text:"RIPv2 include la subnet mask negli aggiornamenti (classless). Supporta VLSM e CIDR. Usa multicast 224.0.0.9 — solo i router RIPv2 ricevono gli aggiornamenti. Supporta autenticazione in chiaro o MD5." },
      autosummary:{ label:"Comando Cisco", title:"no auto-summary", text:"Con RIPv2, il comando 'no auto-summary' disabilita la summarizzazione automatica delle rotte alle classi di default. Senza questo comando, RIPv2 tronca le subnet alla classe naturale dell'indirizzo, perdendo le informazioni sulle sottoreti VLSM." }
    };
    function openNode(id) { var n=nodes[id]; if(!n) return; document.getElementById('modal-label').textContent=n.label; document.getElementById('modal-title').textContent=n.title; document.getElementById('modal-text').innerHTML=n.text; document.getElementById('map-overlay').classList.add('show'); }
    function closeModal() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if(e.key==='Escape') closeModal(); });
  </script>
