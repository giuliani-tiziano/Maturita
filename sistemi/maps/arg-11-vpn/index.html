  <script>
    var nodes={
      root:     {label:"Argomento 11",title:"VPN",text:"Una VPN (Virtual Private Network) crea un tunnel crittografato su reti pubbliche (Internet), permettendo comunicazioni private come se si fosse su una rete dedicata. Obiettivi: riservatezza, integrità, autenticazione, accesso remoto sicuro."},
      tunneling:{label:"Tunneling",title:"Cos'è il Tunneling",text:"Il tunneling incapsula il pacchetto originale (con indirizzi IP privati) dentro un nuovo pacchetto con indirizzi IP pubblici. Il pacchetto cifrato viene instradato su Internet fino al gateway VPN di destinazione, che lo de-incapsula e lo decifra."},
      tipologie:{label:"Tipologie",title:"Tipologie di VPN",text:"Remote-Access VPN: un singolo utente (es. lavoratore da casa) si connette alla rete aziendale. Site-to-Site VPN: due sedi aziendali sono collegate permanentemente tramite tunnel. Entrambe usano tunneling e cifratura, ma differiscono nel caso d'uso."},
      protocolli:{label:"Protocolli",title:"Protocolli VPN",text:"IPsec: L3, trasparente alle applicazioni, alta sicurezza — standard per site-to-site. SSL/TLS: L7, funziona via browser, ideale per remote-access. OpenVPN: open source, flessibile, cross-platform. WireGuard: moderno, leggero, alte prestazioni."},
      sicurezza:{label:"Sicurezza",title:"Sicurezza nelle VPN",text:"Una VPN garantisce tre proprietà di sicurezza: Autenticazione (chi può connettersi — PSK o certificati), Integrità (i dati non vengono alterati nel tunnel — HMAC), Riservatezza (i dati sono cifrati — AES)."},
      tun_inc:  {label:"Tunneling",title:"Incapsulamento",text:"Il pacchetto originale (con IP privato sorgente e destinazione) viene cifrato e incapsulato nel payload di un nuovo pacchetto IP con indirizzi pubblici. I router di Internet vedono solo il pacchetto esterno e lo instradano normalmente."},
      tun_cifr: {label:"Tunneling",title:"Cifratura nel Tunnel",text:"I dati nel tunnel sono cifrati con un algoritmo simmetrico (es. AES-256). Anche se un attaccante intercetta il traffico sulla rete pubblica, vede solo dati cifrati incomprensibili. La chiave è negoziata nell'handshake VPN (IPsec IKE o TLS)."},
      tun_gw:   {label:"Tunneling",title:"Gateway VPN",text:"Il gateway VPN (concentratore) all'estremità del tunnel: riceve il pacchetto esterno, de-incapsula, decifra il pacchetto originale e lo consegna alla rete interna. Il client ricevente non sa che i dati hanno viaggiato su Internet cifrati."},
      remote:   {label:"Remote-Access",title:"Remote-Access VPN",text:"Un singolo utente si connette alla rete aziendale da remoto (casa, hotel, aeroporto). Il client VPN (software sul PC/smartphone) stabilisce il tunnel verso il concentratore VPN aziendale. L'utente accede alle risorse come se fosse in ufficio."},
      site:     {label:"Site-to-Site",title:"Site-to-Site VPN",text:"Collega permanentemente due sedi aziendali attraverso Internet. I gateway VPN di entrambe le sedi stabiliscono e mantengono il tunnel. Tutto il traffico inter-sede passa automaticamente nel tunnel, trasparente agli utenti. Sostituisce le costose linee WAN dedicate."},
      ipsec_vpn:{label:"IPsec",title:"IPsec VPN",text:"IPsec opera a Layer 3: protegge qualsiasi comunicazione IP in modo trasparente alle applicazioni. Usa IKE per negoziare le SA, ESP per cifrare il traffico. Standard per VPN site-to-site aziendali. Più complesso da configurare di SSL."},
      ssl_vpn:  {label:"SSL/TLS VPN",title:"SSL/TLS VPN",text:"Opera a Layer 7: può funzionare via browser HTTPS senza richiedere un client VPN dedicato. Attraversa facilmente i firewall (usa porta 443). Ideale per remote-access da qualsiasi dispositivo. Configurazione più semplice di IPsec."},
      openvpn:  {label:"OpenVPN",title:"OpenVPN",text:"VPN open source basata su SSL/TLS. Flessibile: supporta TCP e UDP, qualsiasi porta. Cross-platform (Windows, Linux, macOS, Android, iOS). Usa certificati X.509 o PSK. File di configurazione .ovpn distribuibili agli utenti."},
      wg:       {label:"WireGuard",title:"WireGuard",text:"Protocollo VPN moderno (2020), open source. Codice base minimo (~4000 righe vs 400.000 di OpenVPN). Crittografia moderna: ChaCha20-Poly1305, Curve25519, BLAKE2s. Nativamente nel kernel Linux 5.6+. Alta performance su dispositivi con poca CPU."},
      auth:     {label:"Sicurezza",title:"Autenticazione VPN",text:"Chi può connettersi? Metodi di autenticazione: PSK (Pre-Shared Key) — semplice ma meno scalabile; Certificati X.509 — più sicuro e scalabile; Username+password via RADIUS/LDAP; MFA — combinazione di più fattori. I certificati offrono la massima sicurezza per VPN aziendali."},
      integ:    {label:"Sicurezza",title:"Integrità nel Tunnel",text:"L'integrità garantisce che i dati non siano stati alterati durante il transito nel tunnel. Realizzata con HMAC (Hash-based MAC): ogni pacchetto include un tag calcolato con una chiave MAC condivisa. Se il tag non corrisponde, il pacchetto viene scartato."},
      riserv:   {label:"Sicurezza",title:"Riservatezza dei Dati",text:"La riservatezza garantisce che nessun terzo possa leggere i dati nel tunnel. Realizzata con cifratura simmetrica: AES-256 (standard), ChaCha20 (WireGuard). La chiave di cifratura viene negoziata nell'handshake e cambia periodicamente (rekeying)."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
