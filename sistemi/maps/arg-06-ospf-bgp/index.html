  <script src="../../js/main.js"></script>
  <script>
    var nodes = {
      root:         { label:"Argomento 6", title:"OSPF e BGP", text:"OSPF (Open Shortest Path First) è un protocollo IGP Link-State che usa l'algoritmo di Dijkstra per calcolare i percorsi minimi. BGP (Border Gateway Protocol) è l'EGP Path Vector usato per il routing tra Autonomous System su Internet." },
      lsa:          { label:"OSPF", title:"LSA e LSDB", text:"LSA (Link State Advertisement): ogni router invia ai tutti gli altri informazioni sullo stato dei propri link (vicini, costo, interfacce). LSDB (Link State Database): il database che ogni router OSPF costruisce raccogliendo tutti i LSA — rappresenta la mappa completa della rete." },
      dijkstra:     { label:"OSPF", title:"Dijkstra e Metrica", text:"Ogni router esegue l'algoritmo di Dijkstra sul proprio LSDB per calcolare l'albero dei percorsi minimi (SPT). La metrica di OSPF è il costo: costo = banda di riferimento / banda interfaccia. Interfacce più veloci hanno costo minore." },
      aree:         { label:"OSPF", title:"Struttura Gerarchica con Aree", text:"OSPF usa una struttura ad aree per scalare su reti grandi. L'Area 0 (backbone) è obbligatoria: tutte le altre aree devono connettersi ad essa. Questa gerarchia riduce la dimensione del LSDB e il traffico LSA." },
      bgp:          { label:"BGP", title:"Border Gateway Protocol", text:"BGP è il protocollo di routing di Internet. È un EGP (Exterior Gateway Protocol) di tipo Path Vector: scambia interi percorsi (lista degli AS attraversati). Le decisioni di routing sono basate su policy aziendali e accordi commerciali, non solo sulla metrica tecnica." },
      lsa_desc:     { label:"LSA", title:"Flooding degli LSA", text:"Quando un router OSPF rileva un cambiamento (link down/up), invia immediatamente un LSA a tutti i router della propria area tramite flooding. Ogni router ri-trasmette il LSA su tutte le interfacce tranne quella di ricezione." },
      lsdb_desc:    { label:"LSDB", title:"Mappa Completa della Rete", text:"Tutti i router OSPF nella stessa area hanno un LSDB identico — una mappa completa della topologia. A differenza di RIP (Distance Vector), ogni router 'vede' l'intera rete e calcola autonomamente i percorsi ottimali." },
      aggiornamenti:{ label:"Aggiornamenti", title:"Solo al Cambio Topologico", text:"A differenza di RIP che invia aggiornamenti ogni 30 secondi, OSPF invia aggiornamenti solo quando cambia la topologia (link down, link up, cambio metrica). Questo rende OSPF molto più efficiente in termini di consumo di banda." },
      costo:        { label:"Metrica", title:"Costo Basato sulla Banda", text:"Costo OSPF = banda di riferimento / banda interfaccia. Banda di riferimento default: 100 Mbps. FastEthernet (100 Mbps) → costo 1. Ethernet (10 Mbps) → costo 10. SerialLink (1.544 Mbps) → costo ~64. Il percorso con costo totale minore è il migliore." },
      spt:          { label:"Dijkstra", title:"Shortest Path Tree", text:"L'algoritmo di Dijkstra calcola l'albero dei percorsi minimi (SPT) dalla prospettiva del router locale. Espande iterativamente il nodo con distanza minima, garantendo percorsi ottimali. Complessità O(E log V) con heap." },
      area0:        { label:"Area 0", title:"Backbone OSPF", text:"L'Area 0 è il nucleo obbligatorio di una rete OSPF multi-area. Tutte le altre aree devono essere fisicamente connesse all'Area 0 (direttamente o tramite virtual link). Il traffico tra aree diverse transita sempre per l'Area 0." },
      aree_satellite:{ label:"Aree", title:"Aree Satellite", text:"Le aree satellite (Area 1, Area 2, …) sono connesse all'Area 0. Ogni area mantiene il proprio LSDB ridotto — solo i LSA della propria area. I router di confine area (ABR) scambiano informazioni sintetizzate con l'Area 0, riducendo il traffico." },
      scalabile:    { label:"Scalabilità", title:"OSPF è Scalabile", text:"OSPF può gestire reti molto grandi grazie alla struttura gerarchica ad aree, al supporto nativo di VLSM/CIDR, agli aggiornamenti solo al cambio e alla convergenza rapida (secondi vs minuti di RIP)." },
      bgp_egp:      { label:"BGP", title:"EGP tra AS Diversi", text:"BGP è il protocollo usato tra Autonomous System (AS) diversi. Ogni ISP gestisce uno o più AS con il proprio BGP. I router di frontiera (BGP peers) si scambiano le tabelle di routing degli AS rispettivi tramite sessioni TCP sulla porta 179." },
      bgp_path:     { label:"Path Vector", title:"Lista degli AS Attraversati", text:"BGP usa il Path Vector: ogni annuncio include l'AS_PATH, la lista completa degli AS attraversati. Questo permette di prevenire i loop (se un router vede il proprio ASN nel path, scarta l'annuncio) e di implementare policy di routing." },
      bgp_policy:   { label:"BGP", title:"Routing Basato su Policy", text:"A differenza di IGP che ottimizzano la metrica tecnica, BGP considera accordi commerciali, geopolitica e preferenze degli operatori. Un ISP può preferire un percorso più lungo ma economicamente vantaggioso a uno più corto ma costoso." }
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
