  <script>
    var nodes={
      root:      {label:"Argomento 15",title:"IDS, IPS e Sicurezza Perimetrale",text:"La sicurezza perimetrale non si limita al firewall. IDS e IPS rilevano e prevengono le intrusioni. AAA (con RADIUS e TACACS+) gestisce autenticazione, autorizzazione e registrazione degli accessi. MFA rafforza l'autenticazione con più fattori."},
      ids:       {label:"IDS",title:"IDS — Intrusion Detection System",text:"Sistema PASSIVO di rilevamento intrusioni. Analizza il traffico o i log di sistema, rileva comportamenti sospetti e genera allarmi. NON blocca il traffico — l'intervento umano è necessario. Posizionato fuori dal percorso del traffico (via port mirroring). Nessun impatto sulle prestazioni di rete."},
      ips:       {label:"IPS",title:"IPS — Intrusion Prevention System",text:"Sistema ATTIVO di prevenzione intrusioni. Posizionato INLINE nel percorso del traffico — tutto il traffico passa attraverso l'IPS. Rileva E blocca il traffico malevolo in tempo reale. Azioni: drop pacchetti, TCP reset, blocco IP sorgente. Lieve impatto sulle prestazioni di rete."},
      rilevamento:{label:"Rilevamento",title:"Tecniche di Rilevamento",text:"Anomaly Detection: definisce una baseline del comportamento normale e rileva deviazioni significative. Signature-based (Misuse Detection): confronta il traffico con database di firme di attacchi noti. Ogni tecnica ha vantaggi e svantaggi — spesso usate in combinazione."},
      aaa:       {label:"AAA",title:"Authentication, Authorization, Accounting",text:"Il modello AAA gestisce l'accesso alle risorse di rete in tre fasi: Authentication (chi sei?), Authorization (cosa puoi fare?), Accounting (cosa hai fatto?). Implementato con protocolli come RADIUS o TACACS+. Fondamentale per il controllo degli accessi e la compliance."},
      protocolli:{label:"Protocolli",title:"RADIUS vs TACACS+",text:"RADIUS: standard aperto, UDP 1812/1813, cifra solo la password. Usato per Wi-Fi enterprise (WPA2-Enterprise), VPN, 802.1X. TACACS+: proprietario Cisco, TCP 49, cifra l'intero payload. Separa completamente le 3 funzioni AAA. Usato per accesso amministrativo ai dispositivi Cisco."},
      ids_pass:  {label:"IDS",title:"Passivo: Solo Rileva",text:"L'IDS non è nel percorso del traffico: riceve una copia del traffico via port mirroring (SPAN su switch) o TAP hardware. Non può bloccare nulla — genera solo allarmi che devono essere analizzati da un analista di sicurezza. Falso positivo = allarme indesiderato ma il traffico scorre."},
      hids:      {label:"HIDS",title:"HIDS — Host-Based IDS",text:"Installato come agente su ogni singolo host. Monitora: log di sistema e applicazioni, integrità dei file critici (tripwire), processi in esecuzione, chiamate di sistema, traffico di rete locale già decifrato. Vede attività locali invisibili al NIDS. Scalabilità limitata (un agente per ogni host)."},
      nids:      {label:"NIDS",title:"NIDS — Network-Based IDS",text:"Sensore di rete che analizza il traffico in tempo reale. Connesso via port mirroring (SPAN) sullo switch o TAP ottico/passivo. Visibilità su tutta la rete con un solo sensore. Svantaggio: non vede il traffico cifrato (HTTPS, VPN) senza SSL inspection."},
      ips_inline:{label:"IPS",title:"IPS Inline",text:"L'IPS è inserito fisicamente nel percorso del traffico: tutto il traffico deve passare attraverso l'IPS prima di arrivare a destinazione. Questo permette di bloccare il traffico malevolo in tempo reale, prima che raggiunga il bersaglio."},
      ips_azioni:{label:"IPS",title:"Azioni dell'IPS",text:"Quando rileva un attacco: Drop dei pacchetti malevoli. TCP Reset: invia RST a entrambi gli endpoint per chiudere la connessione. Blocco IP sorgente (temporaneo o permanente). Avviso all'amministratore via email/SNMP. Log per audit. Modifica dei pacchetti (rate limiting)."},
      anomaly:   {label:"Anomaly",title:"Anomaly Detection",text:"Definisce una baseline del comportamento normale della rete (es. traffico medio, protocolli usati, orari di accesso). Rileva deviazioni significative dalla baseline come potenziali intrusioni. Vantaggio: può rilevare attacchi zero-day non ancora catalogati. Svantaggio: molti falsi positivi (comportamenti legittimi inusuali vengono segnalati)."},
      signature: {label:"Signature",title:"Signature-Based (Misuse Detection)",text:"Confronta il traffico con un database di firme di attacchi noti (simile agli antivirus). Vantaggio: alta precisione, pochi falsi positivi, rileva attacchi noti con certezza. Svantaggio: non può rilevare attacchi zero-day (non ancora nel database). Richiede aggiornamento continuo del database delle firme."},
      zerod:     {label:"Zero-Day",title:"Zero-Day vs Accuratezza",text:"Il dilemma del rilevamento: Anomaly Detection può rilevare zero-day ma genera molti falsi positivi (costosi da analizzare). Signature Detection è preciso ma cieco agli zero-day. La soluzione è usare entrambe le tecniche in combinazione, con un SOC (Security Operations Center) che analizza gli allarmi."},
      auth:      {label:"Authentication",title:"Authentication — Chi Sei?",text:"La prima funzione AAA verifica l'identità dell'utente. Metodi: username+password, certificati digitali, smart card, biometria. Il NAS (Network Access Server — es. AP Wi-Fi, switch, VPN concentrator) raccoglie le credenziali e le invia al server AAA (RADIUS/TACACS+) per la verifica."},
      authz:     {label:"Authorization",title:"Authorization — Cosa Puoi Fare?",text:"La seconda funzione AAA definisce i permessi dell'utente autenticato. Esempi: accesso solo a determinate VLAN, limitazione della larghezza di banda, permessi sui comandi del router (TACACS+), accesso a determinate applicazioni. In RADIUS viene comunicata tramite attributi nella risposta Access-Accept."},
      account:   {label:"Accounting",title:"Accounting — Cosa Hai Fatto?",text:"La terza funzione AAA registra tutte le attività dell'utente autenticato: orari di login/logout, durata della sessione, IP assegnato, dati trasferiti, comandi eseguiti (TACACS+), risorse accedute. Fondamentale per compliance, audit, risoluzione dei problemi e rilevamento anomalie."},
      radius:    {label:"RADIUS",title:"RADIUS",text:"Remote Authentication Dial-In User Service. UDP porte 1812 (autenticazione) e 1813 (accounting). Cifra solo la password nella richiesta (il resto del payload è in chiaro). Standard aperto (RFC 2865). Usato per: Wi-Fi WPA2-Enterprise (EAP), VPN, 802.1X port-based access control."},
      tacacs:    {label:"TACACS+",title:"TACACS+",text:"Terminal Access Controller Access-Control System Plus. Proprietario Cisco. TCP porta 49. Cifra l'INTERO payload della comunicazione (più sicuro di RADIUS). Separa completamente Authentication, Authorization e Accounting — ogni funzione è indipendente. Usato per accesso amministrativo SSH ai dispositivi Cisco (router, switch, firewall)."},
      mfa:       {label:"MFA",title:"Multi-Factor Authentication",text:"L'MFA richiede 2+ fattori di categorie diverse: Knowledge (password/PIN), Possession (token hardware/smartphone), Inherence (biometria). TOTP (Google Authenticator): codice a 6 cifre che cambia ogni 30 secondi. U2F/FIDO2 (YubiKey): resistente al phishing. SMS OTP: comodo ma vulnerabile a SIM swapping."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
