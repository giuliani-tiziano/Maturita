  <script src="../../js/main.js"></script>
  <script>
    var nodes = {
      root:        { label:'Argomento 4', title:'Routing: Fondamenti e Algoritmi', text:'Il routing è il processo con cui i router scelgono il percorso migliore per instradare i pacchetti IP verso la destinazione. Può essere statico (configurato manualmente) o dinamico (appreso tramite protocolli). Gli algoritmi fondamentali sono Bellman-Ford (Distance Vector) e Dijkstra (Link-State).' },
      tabella:     { label:'Area 1', title:'Tabella di Routing', text:'La routing table è il database locale del router, consultato per ogni pacchetto in arrivo. Contiene voci con destinazione di rete/maschera, next-hop (prossimo router), metrica (costo del percorso) e interfaccia di uscita. Il router sceglie la voce con il prefisso più lungo (longest prefix match).' },
      statico:     { label:'Area 2', title:'Routing Statico', text:'Le rotte statiche sono inserite manualmente dall\'amministratore con il comando "ip route". Non si aggiornano automaticamente al variare della topologia. Adatte a reti piccole o per definire rotte di default. Il vantaggio è la semplicità e l\'assenza di traffico overhead; lo svantaggio è la mancanza di adattamento ai guasti.' },
      dinamico:    { label:'Area 3', title:'Routing Dinamico', text:'I protocolli di routing dinamico permettono ai router di scambiare informazioni sulla topologia e aggiornare automaticamente le tabelle. Si adattano ai cambiamenti della rete (link down, nuovi router). Generano traffico aggiuntivo (overhead) ma garantiscono convergenza automatica. Esempi: RIP, OSPF, BGP.' },
      bellmanford: { label:'Area 4', title:'Algoritmo Bellman-Ford (Distance Vector)', text:'Ogni router conosce solo i vicini diretti e la distanza verso di loro. Scambia periodicamente il proprio vettore di distanza con i vicini. Ogni router aggiorna la propria tabella basandosi sui vettori ricevuti. Problemi: convergenza lenta, count-to-infinity. Usato da RIP.' },
      dijkstra:    { label:'Area 5', title:'Algoritmo di Dijkstra (Link-State)', text:'Ogni router ha una mappa completa della rete (LSDB) ottenuta tramite flooding degli LSA. Esegue Dijkstra per calcolare lo Shortest Path Tree verso tutte le destinazioni. Convergenza rapida, nessun count-to-infinity. Complessità O(E log V). Usato da OSPF.' },
      destmask:    { label:'Tabella Routing', title:'Destinazione e Maschera', text:'Ogni voce della routing table specifica la rete di destinazione e la sua maschera di sottorete. Il router confronta l\'IP destinazione del pacchetto con le voci della tabella usando il bitwise AND con la maschera. Vince la voce con il prefisso più lungo (longest prefix match — LPM).' },
      nexthop:     { label:'Tabella Routing', title:'Next-Hop', text:'Il next-hop è l\'indirizzo IP del router successivo verso cui inviare il pacchetto. Se la rete di destinazione è direttamente connessa, non c\'è next-hop (consegna diretta). Per le reti remote, il next-hop è il router vicino che ci avvicina alla destinazione.' },
      metrica:     { label:'Tabella Routing', title:'Metrica e Interfaccia di uscita', text:'La metrica quantifica il "costo" del percorso: RIP usa gli hop count, OSPF usa la larghezza di banda, EIGRP usa un composto di banda e ritardo. A parità di destinazione, il router preferisce la voce con metrica minore. L\'interfaccia di uscita indica da quale porta fisica inviare il pacchetto.' },
      manuale:     { label:'Routing Statico', title:'Configurazione manuale', text:'Le rotte statiche si configurano con il comando Cisco "ip route [rete] [maschera] [next-hop o interfaccia]". Esempio: "ip route 192.168.2.0 255.255.255.0 10.0.0.2". La rotta di default è "ip route 0.0.0.0 0.0.0.0 [next-hop]" e indica dove mandare i pacchetti per destinazioni non in tabella.' },
      prostatic:   { label:'Routing Statico', title:'Vantaggi del routing statico', text:'Configurazione semplice e prevedibile. Nessun overhead di traffico per scambio di aggiornamenti. Nessun consumo extra di CPU/RAM per algoritmi di routing. Adatto a piccole reti con topologia stabile, reti stub (con un solo percorso verso l\'esterno), e per definire rotte predefinite (default route).' },
      constatic:   { label:'Routing Statico', title:'Svantaggi del routing statico', text:'Non si adatta automaticamente ai guasti della rete: se un link cade, il traffico continua ad essere inviato verso la rotta configurata anche se non funziona. Richiedere intervento manuale per ogni cambiamento topologico. Non scalabile per reti grandi con molte rotte da gestire.' },
      autoupdate:  { label:'Routing Dinamico', title:'Aggiornamento automatico della topologia', text:'I protocolli di routing dinamico propagano informazioni sulla topologia tra i router. Quando un link cade o una nuova rete è aggiunta, l\'informazione si diffonde automaticamente e i router aggiornano le loro tabelle. Il tempo necessario perché tutti i router abbiano una visione coerente si chiama tempo di convergenza.' },
      prodin:      { label:'Routing Dinamico', title:'Vantaggi del routing dinamico', text:'Adattamento automatico ai guasti: se un percorso diventa indisponibile, i router trovano automaticamente percorsi alternativi. Scalabile: funziona in reti con migliaia di router. Non richiede intervento manuale per ogni cambiamento. Esempi di protocolli: RIPv2, OSPF, EIGRP (IGP), BGP (EGP).' },
      condin:      { label:'Routing Dinamico', title:'Svantaggi del routing dinamico', text:'Genera traffico overhead nella rete per scambiare aggiornamenti di routing. Richiede CPU e RAM per elaborare gli aggiornamenti e eseguire gli algoritmi. La configurazione è più complessa. Può essere vulnerabile ad attacchi se non autenticato. Richiede tempo per convergere dopo un cambio di topologia.' },
      solovicini:  { label:'Bellman-Ford', title:'Conosce solo i vicini diretti', text:'Nei protocolli Distance Vector, ogni router conosce solo le reti direttamente connesse e i costi dei link verso i router vicini. Non ha una mappa completa della rete. La conoscenza globale emerge gradualmente attraverso lo scambio iterativo dei vettori di distanza tra vicini adiacenti.' },
      vettori:     { label:'Bellman-Ford', title:'Scambio di vettori di distanza', text:'Ogni router invia periodicamente ai vicini il proprio vettore di distanza: una lista di tutte le destinazioni con la relativa metrica. I vicini aggiornano la propria tabella applicando la regola di Bellman-Ford: D(x,y) = min sui vicini v di [c(x,v) + D(v,y)]. Il processo converge iterativamente.' },
      ripbf:       { label:'Bellman-Ford', title:'RIP usa Bellman-Ford', text:'RIP (Routing Information Protocol) implementa l\'algoritmo Bellman-Ford con hop count come metrica. La complessità temporale è O(V×E) dove V è il numero di nodi e E il numero di archi. La convergenza può essere lenta in reti grandi e soffre del problema count-to-infinity.' },
      lsdb:        { label:'Dijkstra', title:'LSDB — Link State Database', text:'Nei protocolli Link-State, ogni router diffonde (flooding) i propri LSA (Link State Advertisement) a tutti i router della rete. Dopo il flooding, ogni router ha una mappa completa e identica della topologia nella propria LSDB. Su questa mappa viene poi eseguito l\'algoritmo di Dijkstra.' },
      spt:         { label:'Dijkstra', title:'Shortest Path Tree', text:'Dijkstra calcola l\'albero dei cammini minimi (SPT) dal router sorgente verso tutte le destinazioni. Costruisce iterativamente l\'albero espandendo il nodo non ancora visitato con costo minore. Il risultato è l\'insieme dei percorsi ottimali verso ogni rete della topologia.' },
      ospfdijk:    { label:'Dijkstra', title:'OSPF usa Dijkstra', text:'OSPF (Open Shortest Path First) implementa l\'algoritmo di Dijkstra. La complessità è O(E log V) con heap binario. Ogni volta che la topologia cambia (nuovo LSA ricevuto), OSPF riesegue Dijkstra sulla LSDB aggiornata. La convergenza è molto più rapida di RIP.' }
    };
    function openNode(id) {
      var n = nodes[id]; if (!n) return;
      document.getElementById('modal-label').textContent = n.label;
      document.getElementById('modal-title').textContent = n.title;
      document.getElementById('modal-text').innerHTML = n.text;
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeModal() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
  </script>
