  <script>
    var nodes={
      root:     {label:"Argomento 14",title:"ACL — Access Control List",text:"Le ACL sono liste di regole (ACE — Access Control Entry) applicate alle interfacce del router per filtrare il traffico in ingresso (inbound) o uscita (outbound). Funzioni: sicurezza (limitare accessi), ottimizzazione traffico, filtro per tipo di servizio."},
      funz:     {label:"Funzionamento",title:"Come Funziona una ACL",text:"Le ACE vengono lette dall'alto verso il basso (top-down). La prima regola che corrisponde al pacchetto viene applicata (permit o deny) e il processing si ferma. Se nessuna regola corrisponde, si applica il deny implicito — tutto viene bloccato."},
      tipi:     {label:"Tipi",title:"Tipi di ACL",text:"ACL Standard (1-99, 1300-1999): filtra solo l'indirizzo IP sorgente. Posizionare vicino alla destinazione. ACL Estesa (100-199, 2000-2699): filtra IP sorgente + IP destinazione + protocollo + porta. Posizionare vicino alla sorgente. ACL Nominativa: usa nome stringa."},
      wildcard: {label:"Wildcard",title:"Wildcard Mask",text:"La wildcard mask indica quali bit dell'indirizzo IP devono essere controllati. Bit 0: controlla — il bit dell'indirizzo deve corrispondere. Bit 1: ignora — qualsiasi valore è accettato. Calcolo: 255.255.255.255 - subnet mask."},
      posiz:    {label:"Posizionamento",title:"Dove Posizionare le ACL",text:"ACL Standard vicino alla destinazione: filtra solo sorgente, se messa vicino alla sorgente bloccherebbe anche il traffico verso altre destinazioni. ACL Estesa vicino alla sorgente: blocca il prima possibile, risparmia risorse di rete."},
      topdown:  {label:"Top-Down",title:"Prima Match Vince",text:"Le ACE vengono confrontate in ordine. Appena si trova una corrispondenza (match), si applica l'azione (permit o deny) e il controllo si ferma — le ACE successive non vengono controllate. Le regole più specifiche devono quindi precedere quelle generali."},
      deny_imp: {label:"Deny Implicito ⚠",title:"Il Deny Implicito",text:"Alla fine di ogni ACL Cisco c'è implicitamente un 'deny ip any any'. Se un pacchetto non corrisponde ad alcuna ACE esplicita, viene scartato. Molto importante: se si dimentica di aggiungere 'permit ip any any' alla fine, si blocca tutto il traffico non esplicitamente permesso."},
      ordine:   {label:"Ordine",title:"Ordine delle Regole",text:"Le regole più specifiche devono precedere quelle generali. Esempio: se si vuole bloccare solo 192.168.1.5 e permettere il resto di 192.168.1.0/24, mettere prima 'deny host 192.168.1.5', poi 'permit 192.168.1.0 0.0.0.255'. Se l'ordine fosse invertito, il permit cattura tutto e il deny non viene mai eseguito."},
      standard: {label:"ACL Standard",title:"ACL Standard (1-99)",text:"Filtra solo l'indirizzo IP sorgente. Esempio: 'access-list 10 deny host 192.168.1.100 / access-list 10 permit any'. Numeri: 1-99 e 1300-1999. Posizionare vicino alla destinazione perché non può specificare la destinazione e bloccherebbe tutto il traffico da quell'IP."},
      estesa:   {label:"ACL Estesa",title:"ACL Estesa (100-199)",text:"Filtra su più campi: IP sorgente + IP destinazione + protocollo (tcp, udp, icmp, ip) + porta (eq, gt, lt, range). Esempio: 'access-list 110 deny tcp 10.0.0.0 0.255.255.255 any eq 23' blocca Telnet dalla rete 10.x. Numeri: 100-199 e 2000-2699."},
      wc_calc:  {label:"Wildcard",title:"Calcolo della Wildcard",text:"Wildcard = 255.255.255.255 - subnet mask. Esempi: /24 → SM 255.255.255.0 → WC 0.0.0.255 (ultimi 8 bit liberi = qualsiasi host in quella rete). /16 → SM 255.255.0.0 → WC 0.0.255.255. /8 → WC 0.255.255.255."},
      wc_bit:   {label:"Wildcard",title:"Bit 0 e Bit 1",text:"Bit 0 nella wildcard: controlla — il bit corrispondente dell'indirizzo IP deve essere uguale al bit dell'indirizzo di riferimento. Bit 1 nella wildcard: ignora — il bit corrispondente può essere 0 o 1 (qualsiasi valore). Non è il complemento della subnet mask ma ha una logica diversa."},
      any_host: {label:"Keywords",title:"'any' e 'host'",text:"'any' è la abbreviazione di '0.0.0.0 255.255.255.255' — corrisponde a qualsiasi indirizzo IP. Usato come 'permit ip any any' per permettere tutto il traffico. 'host X.X.X.X' è la abbreviazione di 'X.X.X.X 0.0.0.0' — corrisponde esattamente a quell'IP."},
      std_pos:  {label:"Posizionamento",title:"ACL Standard → Vicino alla Destinazione",text:"Se un'ACL Standard filtra solo la sorgente e viene applicata vicino alla sorgente, blocca il traffico verso TUTTE le destinazioni, non solo quella voluta. Posizionandola vicino alla destinazione, si limita l'effetto solo al traffico verso quella specifica rete."},
      ext_pos:  {label:"Posizionamento",title:"ACL Estesa → Vicino alla Sorgente",text:"Un'ACL Estesa può specificare sia sorgente che destinazione, quindi è sicuro applicarla vicino alla sorgente. Questo permette di bloccare il traffico il prima possibile, senza consumare risorse di rete per pacchetti che verrebbero comunque bloccati all'uscita."},
      dir:      {label:"Direzione",title:"Inbound vs Outbound",text:"Inbound (in): il pacchetto viene filtrato PRIMA del processo di routing — più efficiente perché i pacchetti bloccati non consumano risorse CPU per il routing. Outbound (out): filtrato DOPO il routing. Massimo una ACL per direzione per interfaccia."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
