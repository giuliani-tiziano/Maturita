  <script src="../../js/main.js"></script>
  <script>
    var nodes = {
      root:         { label:'Argomento 2', title:'Subnetting, VLSM e CIDR', text:'Il subnetting divide una rete IP in sottoreti più piccole, migliorando l\'efficienza e la sicurezza. VLSM (Variable Length Subnet Masking) permette maschere di lunghezza variabile per ottimizzare l\'uso degli indirizzi. CIDR (Classless Inter-Domain Routing) supera le classi rigide con la notazione prefisso /n.' },
      subnetting:   { label:'Area 1', title:'Subnetting', text:'Il subnetting prende bit dal campo host per creare il campo sottorete, dividendo una rete in segmenti più piccoli. Ogni sottorete ha il proprio indirizzo di rete, un range di host utilizzabili e un indirizzo broadcast. Riduce il traffico broadcast e permette la separazione logica tra reparti.' },
      formula:      { label:'Area 2', title:'Formula per il calcolo degli host', text:'Il numero di host utilizzabili in una sottorete si calcola con 2^n - 2, dove n è il numero di bit riservati agli host. Si sottraggono 2 per l\'indirizzo di rete (tutti 0) e l\'indirizzo broadcast (tutti 1). Conoscere questa formula è fondamentale per progettare reti efficienti.' },
      vlsm:         { label:'Area 3', title:'VLSM — Variable Length Subnet Masking', text:'VLSM permette di usare maschere di lunghezza diversa per sottoreti diverse all\'interno della stessa rete. Consente di allocare esattamente gli indirizzi necessari a ciascun segmento, eliminando gli sprechi tipici del subnetting classico. Richiede protocolli di routing classless come RIPv2 o OSPF.' },
      cidr:         { label:'Area 4', title:'CIDR — Classless Inter-Domain Routing', text:'CIDR (RFC 1519, 1993) supera le classi A, B e C con la notazione /n che indica il numero di bit di rete. Permette blocchi di indirizzi di qualsiasi dimensione (potenza di 2). Abilita la route aggregation (supernetting) che riduce drasticamente le dimensioni delle tabelle di routing su Internet.' },
      wildcard:     { label:'Area 5', title:'Wildcard Mask', text:'La wildcard mask è il complemento della subnet mask: 255.255.255.255 - subnet mask. I bit a 0 indicano le posizioni controllate (devono corrispondere), i bit a 1 indicano le posizioni ignorate. Usata in ACL Cisco e OSPF per specificare range di indirizzi. "host" equivale a 0.0.0.0, "any" a 255.255.255.255.' },
      dividere:     { label:'Subnetting', title:'Dividere reti in sottoreti', text:'Si prendono bit dal campo host per creare un campo subnet-id. Ogni sottorete è identificata da un indirizzo di rete (bit host tutti a 0) e delimitata da un broadcast (bit host tutti a 1). Il numero di sottoreti create è 2^s dove s è il numero di bit presi per la subnet.' },
      broadcast:    { label:'Subnetting', title:'Riduzione del dominio broadcast', text:'Il broadcast raggiunge tutti gli host della stessa subnet. Reti più piccole significano meno host che ricevono ogni broadcast, riducendo il traffico inutile. Un broadcast storm in una sottorete non si propaga alle altre, migliorando la stabilità complessiva.' },
      separazione:  { label:'Subnetting', title:'Separazione logica', text:'Il subnetting permette di isolare logicamente i reparti aziendali (es. LAN amministrativa vs produzione vs server). I router separano le sottoreti applicando policy di routing e sicurezza. Questa separazione è il fondamento per applicare firewall e ACL tra segmenti di rete.' },
      formula2n:    { label:'Formula Host', title:'Formula 2^n - 2', text:'2^n calcola il numero totale di combinazioni binarie con n bit. Si sottraggono 2 perché l\'indirizzo con tutti i bit host a 0 è l\'indirizzo di rete (identifica la subnet, non assegnabile) e l\'indirizzo con tutti i bit host a 1 è il broadcast (non assegnabile a un host).' },
      bithost:      { label:'Formula Host', title:'n = numero di bit host', text:'Il numero di bit host n si calcola come 32 - prefisso CIDR. Una rete /24 ha n=8 bit host → 2^8 - 2 = 254 host. Una /26 ha n=6 → 2^6 - 2 = 62 host. Una /30 ha n=2 → 2^2 - 2 = 2 host (tipica per collegamenti punto-punto).' },
      esempio26:    { label:'Formula Host', title:'Esempio pratico /26', text:'Una rete con maschera /26 (255.255.255.192) ha 6 bit host. Formula: 2^6 - 2 = 64 - 2 = 62 host utilizzabili. La subnet mask ha i primi 26 bit a 1 in binario. Prendendo 192.168.1.0/26, gli indirizzi host vanno da .1 a .62, il network è .0 e il broadcast è .63.' },
      maschere:     { label:'VLSM', title:'Maschere di lunghezza variabile', text:'Con VLSM, una stessa rete madre può essere suddivisa in sottoreti con prefissi diversi. Ad esempio, da 192.168.1.0/24 si possono ricavare una sottorete /26 (62 host), due /28 (14 host) e una /30 (2 host per un link punto-punto). Ogni sottorete ha la maschera ottimale per le sue esigenze.' },
      ottimizz:     { label:'VLSM', title:'Ottimizzazione degli indirizzi', text:'Senza VLSM si dovrebbe usare una maschera uguale per tutte le sottoreti, sprecando indirizzi. Con VLSM si assegna ogni blocco partendo dalle sottoreti più grandi verso le più piccole, usando lo spazio in modo efficiente. Fondamentale in ambienti con indirizzi IP scarsi.' },
      classless:    { label:'VLSM', title:'Richiede routing classless', text:'I protocolli di routing classful (come RIPv1) non includono la maschera negli aggiornamenti, quindi non supportano VLSM. I protocolli classless (RIPv2, OSPF, EIGRP, BGP4) inviano la maschera insieme a ogni prefisso, rendendo possibile VLSM e CIDR.' },
      notazione:    { label:'CIDR', title:'Notazione prefisso /n', text:'La notazione CIDR /n (slash n) indica il numero di bit impostati a 1 nella subnet mask. /24 corrisponde a 255.255.255.0, /16 a 255.255.0.0, /8 a 255.0.0.0. Può avere qualsiasi valore da /0 a /32, permettendo granularità impossibile con le classi A, B e C.' },
      superaclassi: { label:'CIDR', title:'Superamento delle classi fisse', text:'Con le classi, una rete richiedeva /8, /16 o /24. CIDR permette qualsiasi prefisso, evitando sprechi enormi. Un\'organizzazione che necessita 500 indirizzi non deve prendere una classe B (/16 = 65.534 host): può ricevere un /23 (510 host). CIDR è fondamentale per la gestione moderna degli IP.' },
      aggreg:       { label:'CIDR', title:'Route aggregation (supernetting)', text:'CIDR permette di aggregare più reti contigue in un\'unica voce di routing (supernet). Ad esempio, 192.168.0.0/24 e 192.168.1.0/24 possono essere annunciate come 192.168.0.0/23. Questo riduce drasticamente le dimensioni delle tabelle di routing dei router Internet (da milioni di voci a poche centinaia di migliaia).' },
      wcalcolo:     { label:'Wildcard Mask', title:'Calcolo della wildcard mask', text:'La wildcard mask si ottiene sottraendo la subnet mask da 255.255.255.255. Esempio: subnet mask 255.255.255.0 → wildcard 0.0.0.255. Subnet mask 255.255.255.192 (/26) → wildcard 0.0.0.63. È il complemento bitwise della subnet mask.' },
      wclogica:     { label:'Wildcard Mask', title:'Logica: 0=controlla, 1=ignora', text:'Nei bit della wildcard mask, lo 0 indica che il bit corrispondente dell\'indirizzo IP deve corrispondere esattamente (bit controllato). L\'1 indica che il bit può essere qualsiasi valore (bit ignorato). Questo permette di selezionare range di indirizzi non necessariamente allineati alle subnet mask standard.' },
      wcspeciali:   { label:'Wildcard Mask', title:'Parole chiave "any" e "host"', text:'Cisco IOS offre due abbreviazioni: "host 192.168.1.1" equivale a "192.168.1.1 0.0.0.0" (corrisponde solo a quell\'indirizzo specifico). "any" equivale a "0.0.0.0 255.255.255.255" (corrisponde a qualsiasi indirizzo). Queste parole chiave rendono le ACL più leggibili.' }
    };
    function openNode(id) {
      var n = nodes[id]; if (!n) return;
      document.getElementById('modal-label').textContent = n.label;
      document.getElementById('modal-title').textContent = n.title;
      document.getElementById('modal-text').innerHTML = n.text;
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeModal() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
