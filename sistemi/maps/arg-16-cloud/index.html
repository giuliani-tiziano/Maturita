  <script>
    var nodes={
      root:     {label:"Argomento 16",title:"Cloud, Virtualizzazione e Active Directory",text:"L'infrastruttura IT moderna si basa su cloud computing (scalabilità e flessibilità), virtualizzazione (efficienza e isolamento) e servizi di directory centralizzati (Active Directory per gestione utenti e policy). Questi pilastri permettono agli amministratori di rete di gestire ambienti complessi in modo efficiente."},
      cloud:    {label:"Cloud",title:"Cloud Services",text:"Il cloud computing fornisce risorse IT come servizio. IaaS: infrastruttura virtuale (VM, storage, rete). PaaS: piattaforma di sviluppo gestita. SaaS: applicazioni complete accessibili via browser. Modello pay-as-you-go: si paga solo per ciò che si usa."},
      virt:     {label:"Virtualizzazione",title:"Virtualizzazione",text:"La virtualizzazione permette di eseguire più sistemi operativi su un singolo hardware fisico tramite un hypervisor (VMM). Vantaggi: consolidamento server, risparmio energetico, isolamento, snapshot e backup rapidi, live migration senza downtime, provisioning in minuti."},
      dr:       {label:"Disaster Recovery",title:"Disaster Recovery e Backup",text:"Il disaster recovery definisce come ripristinare i sistemi dopo un disastro. Metriche chiave: RTO e RPO. La regola 3-2-1 garantisce la sopravvivenza dei dati a guasti hardware, disastri fisici e ransomware. I backup devono essere testati regolarmente."},
      cluster:  {label:"Clustering",title:"Clustering ad Alta Disponibilità",text:"Il clustering connette più server fisici (nodi) che appaiono come un'unica unità logica. Garantisce continuità del servizio in caso di guasto hardware. Active-Passive: un nodo attivo + uno standby. Active-Active: tutti attivi + load balancing. Importante: clustering NON è backup."},
      ad:       {label:"Active Directory",title:"Active Directory",text:"Servizio Microsoft per la gestione centralizzata di utenti, computer, gruppi e policy. Il Domain Controller gestisce l'autenticazione (Kerberos/NTLM) e l'autorizzazione. GPO applicano policy automaticamente a tutti i PC del dominio. SSO permette un unico login per tutte le risorse."},
      iaas:     {label:"IaaS",title:"Infrastructure as a Service",text:"Fornisce risorse di infrastruttura virtuale: VM, storage, rete. Il cliente gestisce il sistema operativo, il middleware e le applicazioni. Il provider gestisce l'hardware fisico e l'hypervisor. Esempi: AWS EC2, Azure Virtual Machines, Google Compute Engine."},
      paas:     {label:"PaaS",title:"Platform as a Service",text:"Fornisce una piattaforma di sviluppo gestita: runtime, middleware, database, framework. Il cliente gestisce solo le applicazioni e i dati. Il provider gestisce tutto lo stack sottostante. Esempi: Heroku, Google App Engine, Azure App Service. Ideale per sviluppatori."},
      saas:     {label:"SaaS",title:"Software as a Service",text:"Fornisce applicazioni complete accessibili via browser. Il cliente usa l'applicazione, il provider gestisce tutto. Nessuna installazione, aggiornamenti automatici. Esempi: Microsoft 365 (Exchange, Teams, SharePoint), Gmail, Salesforce, Zoom, Dropbox."},
      hyp1:     {label:"Hypervisor Type 1",title:"Tipo 1 — Bare Metal",text:"L'hypervisor Type 1 (Bare Metal) si installa direttamente sull'hardware fisico, senza sistema operativo host sottostante. Prestazioni ottimali — accesso diretto all'hardware. Usato nei datacenter enterprise. Esempi: VMware ESXi, Microsoft Hyper-V, Proxmox VE, KVM (Linux)."},
      hyp2:     {label:"Hypervisor Type 2",title:"Tipo 2 — Hosted",text:"L'hypervisor Type 2 si installa sopra un sistema operativo host (Windows, Linux, macOS). Meno performante del Type 1 (overhead aggiuntivo). Usato per sviluppo, testing, laboratori. Esempi: Oracle VirtualBox (gratuito), VMware Workstation, Parallels Desktop (macOS)."},
      rto:      {label:"RTO",title:"RTO — Recovery Time Objective",text:"Tempo massimo tollerabile per ripristinare il sistema dopo un disastro. Es. RTO=4h: entro 4 ore dal guasto il sistema deve essere operativo. Un RTO basso richiede investimenti in ridondanza, failover automatico e sistemi di backup veloci."},
      rpo:      {label:"RPO",title:"RPO — Recovery Point Objective",text:"Quantità massima di dati persi accettabile, espressa in tempo. Es. RPO=1h: si può perdere al massimo 1 ora di dati. Con RPO=1h, i backup devono essere eseguiti almeno ogni ora. Un RPO basso richiede backup frequenti o replica continua dei dati."},
      backup321:{label:"Backup",title:"Regola 3-2-1",text:"3 copie totali dei dati. Su 2 tipi di supporto diversi (es. disco locale + NAS oppure disco + cloud). Con 1 copia fuori sede (cloud o datacenter secondario). Protegge da: guasto hardware (3 copie), guasto del tipo di media (2 media diversi), disastro fisico/ransomware (1 copia fuori sede)."},
      ha:       {label:"HA",title:"Active-Passive — Failover",text:"In un cluster Active-Passive: un nodo (primario) è attivo e serve le richieste. Un nodo (secondario) è in standby e monitora il primario. Se il primario cade, il secondario rileva il guasto (heartbeat) e prende automaticamente il controllo (failover). Il downtime è minimo (secondi o minuti)."},
      lb:       {label:"Load Balancing",title:"Active-Active — Load Balancing",text:"In un cluster Active-Active: tutti i nodi sono attivi e servono le richieste contemporaneamente. Il carico viene distribuito tra i nodi (load balancing). Se un nodo cade, gli altri si prendono il suo carico. Offre sia alta disponibilità che migliori prestazioni."},
      no_backup:{label:"Importante ⚠",title:"Clustering NON è Backup",text:"Un cluster distribuisce il servizio su più nodi ma tutti accedono agli stessi dati condivisi. Un ransomware che cifra il filesystem cifra i dati su TUTTI i nodi simultaneamente. Un guasto logico (corruzione del database) colpisce tutti i nodi. Il backup è sempre necessario anche con clustering."},
      dc:       {label:"AD",title:"Domain Controller",text:"Il Domain Controller (DC) è il server che ospita il database Active Directory. Gestisce: autenticazione degli utenti tramite Kerberos (protocollo moderno) o NTLM (legacy), autorizzazione, replica del database AD con altri DC. Ogni dominio deve avere almeno un DC. Per la ridondanza si usano più DC."},
      gpo:      {label:"AD",title:"OU e GPO",text:"OU (Organizational Unit): contenitore logico per organizzare utenti e computer nel dominio (es. per reparto o sede). GPO (Group Policy Object): regole applicate automaticamente a tutti gli oggetti nell'OU: policy password, blocco USB, screensaver, software da installare, configurazione firewall Windows, reindirizzamento cartelle."},
      sso:      {label:"AD",title:"SSO e Azure AD",text:"SSO (Single Sign-On): l'utente si autentica una sola volta e accede a tutte le risorse autorizzate senza re-autenticarsi. Implementato tramite Kerberos ticket in AD. Azure Active Directory: versione cloud-native di AD, usa OAuth 2.0 e SAML invece di Kerberos. Gestisce accesso ad applicazioni cloud (Office 365, Salesforce, ecc.)."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
