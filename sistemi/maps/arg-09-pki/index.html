  <script>
    var nodes={
      root:      {label:"Argomento 9",title:"Certificati Digitali e PKI",text:"Un certificato digitale associa una chiave pubblica all'identità del suo proprietario, firmato da una CA (ente terzo di fiducia). La PKI è l'infrastruttura completa che gestisce emissione, distribuzione e revoca dei certificati."},
      x509:      {label:"Certificato",title:"Standard X.509",text:"X.509 è lo standard ITU-T per i certificati a chiave pubblica. Contiene: identità del titolare (Subject CN/SAN), chiave pubblica del titolare, periodo di validità (Not Before / Not After), identità della CA emittente, firma digitale della CA, numero seriale."},
      ca:        {label:"CA",title:"Certification Authority",text:"Ente terzo di fiducia che emette, firma e revoca certificati digitali. La sua firma sul certificato garantisce: 'questa chiave pubblica appartiene davvero a questa identità'. Gerarchia: Root CA → Intermediate CA → certificati utenti finali."},
      verifica:  {label:"Verifica",title:"4 Controlli del Browser",text:"Il browser verifica ogni certificato HTTPS con 4 controlli: 1) Data valida, 2) CA nel trust store, 3) Firma CA valida, 4) Dominio nel CN/SAN corrisponde all'URL. Se tutti passano → lucchetto verde."},
      revoca:    {label:"Revoca",title:"Revoca dei Certificati",text:"Un certificato può essere revocato prima della scadenza (es. chiave privata compromessa, cambio organizzazione). Meccanismi: CRL (lista periodica scaricabile) o OCSP (query online in tempo reale). Tipi di certificato: DV (Domain), OV (Organization), EV (Extended)."},
      x509_cont: {label:"X.509",title:"Contenuto del Certificato",text:"Un certificato X.509 contiene: Subject (identità titolare: CN, O, OU, C), chiave pubblica e algoritmo, Issuer (identità della CA), periodo validità, numero seriale univoco, Subject Alternative Names (SAN) per domini aggiuntivi, algoritmo della firma."},
      x509_firma:{label:"Firma CA",title:"Firma Digitale della CA",text:"La CA firma il certificato con la propria chiave privata. Chiunque può verificare la firma con la chiave pubblica della CA (disponibile nel certificato della CA stessa). Questa catena di firme costituisce la 'chain of trust' (catena di fiducia)."},
      x509_val:  {label:"Validità",title:"Periodo di Validità",text:"Ogni certificato ha una data di inizio (Not Before) e una data di fine (Not After). I certificati TLS/HTTPS hanno tipicamente validità di 1 anno (dal 2020, massimo 398 giorni per Safari/Chrome). Alla scadenza deve essere rinnovato."},
      rootca:    {label:"Root CA",title:"Root CA Auto-Firmata",text:"La Root CA è al vertice della gerarchia PKI. Il suo certificato è auto-firmato (firmato da sé stessa). È pre-installata nel trust store del sistema operativo e dei browser. Se una Root CA viene compromessa, tutta la PKI da essa dipendente è compromessa."},
      intermca:  {label:"Intermediate CA",title:"CA Intermedie",text:"Le CA intermedie sono firmate dalla Root CA e emettono i certificati agli utenti finali. L'uso di CA intermedie protegge la Root CA (che può essere tenuta offline): se una CA intermedia è compromessa, si revoca solo quella senza intaccare la Root CA."},
      ver_data:  {label:"Controllo 1",title:"Validità della Data",text:"Il browser controlla che la data corrente sia compresa nel periodo di validità del certificato (tra Not Before e Not After). Un certificato scaduto o non ancora valido causa un errore nel browser."},
      ver_ca:    {label:"Controllo 2",title:"CA nel Trust Store",text:"Il browser controlla che la CA firmataria (o una della catena di CA fino alla Root) sia presente nel suo trust store — la lista di CA fidate pre-installata nel browser o nel sistema operativo. Una CA sconosciuta causa un avviso di sicurezza."},
      ver_firma: {label:"Controllo 3",title:"Verifica Firma CA",text:"Il browser decifra la firma digitale della CA usando la chiave pubblica della CA (dal trust store). Confronta il risultato con l'hash del certificato calcolato localmente. Se coincidono, il certificato non è stato alterato e proviene davvero da quella CA."},
      ver_dom:   {label:"Controllo 4",title:"Corrispondenza Dominio",text:"Il browser verifica che il dominio nel URL (es. www.banca.it) corrisponda al Common Name (CN) o a uno dei Subject Alternative Names (SAN) nel certificato. Questo previene gli attacchi man-in-the-middle con certificati validi per altri domini."},
      crl:       {label:"Revoca",title:"CRL (Certificate Revocation List)",text:"Lista pubblicata periodicamente dalla CA di tutti i certificati revocati prima della scadenza. Il client la scarica e consulta localmente. Svantaggio: può essere obsoleta (pubblicata ogni ore/giorni) e di grandi dimensioni per CA molto attive."},
      ocsp:      {label:"Revoca",title:"OCSP (Online Certificate Status Protocol)",text:"Alternativa alla CRL: il browser invia una query al server OCSP della CA per sapere in tempo reale se il certificato è ancora valido. Risposta: Good, Revoked, Unknown. Più aggiornato della CRL ma richiede connessione alla CA."},
      tipi:      {label:"Tipi",title:"DV, OV ed EV",text:"DV (Domain Validation): verifica automatica del controllo del dominio. OV (Organization Validation): verifica dell'identità legale dell'organizzazione. EV (Extended Validation): verifica approfondita, mostra il nome dell'azienda nel browser — usato da banche e siti ad alta sicurezza."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
