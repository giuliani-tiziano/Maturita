  <script>
    var nodes={
      root:      {label:"Argomento 17",title:"Laboratorio Packet Tracer",text:"Packet Tracer è il simulatore di reti Cisco. Permette di configurare router, switch e host in ambiente virtuale. Le competenze di laboratorio completano la teoria: saper configurare, verificare e fare troubleshooting su IOS Cisco è fondamentale per l'esame."},
      modalita:  {label:"IOS",title:"Modalità IOS Cisco",text:"Cisco IOS ha una gerarchia di modalità: User EXEC (>) per comandi base. Privileged EXEC (#) tramite 'enable' per comandi avanzati. Global Configuration (config)# tramite 'configure terminal' per configurare il dispositivo. Interface Config (config-if)# per configurare singole interfacce."},
      conf:      {label:"Configurazione",title:"Configurazione Base",text:"Le operazioni di configurazione più comuni: assegnare indirizzo IP a un'interfaccia (ip address + mask), abilitare l'interfaccia (no shutdown), configurare RIPv2 (router rip, version 2, network, no auto-summary), aggiungere rotte statiche (ip route)."},
      show:      {label:"Show",title:"Comandi Show",text:"I comandi 'show' permettono di verificare la configurazione e lo stato del dispositivo senza modificarlo. Fondamentali per la verifica dopo la configurazione e per il troubleshooting. Eseguibili in modalità Privileged EXEC (#)."},
      verifica:  {label:"Verifica",title:"Verifica e Troubleshooting",text:"Dopo la configurazione, verificare sempre: ping per la connettività, traceroute per il percorso, show ip route per le rotte, show interfaces brief per lo stato delle interfacce. Se qualcosa non funziona, seguire il modello OSI dal basso (L1 cavo) verso l'alto."},
      user:      {label:"User EXEC",title:"User EXEC — >",text:"La modalità di accesso base: prompt Router>. Comandi limitati: ping, traceroute, show di base. Non permette la configurazione. Si accede digitando direttamente nella console. Si sale al Privileged EXEC con il comando 'enable'."},
      priv:      {label:"Privileged EXEC",title:"Privileged EXEC — #",text:"La modalità privilegiata: prompt Router#. Accesso completo a tutti i comandi show e debug. Permette il salvataggio della configurazione (write memory o copy running-config startup-config). Si accede con 'enable'. Si scende con 'disable'."},
      global:    {label:"Config",title:"Global e Interface Config",text:"Global Configuration (config)#: configurazione del dispositivo in generale. Interface Configuration (config-if)#: configurazione di una specifica interfaccia (ip address, shutdown, description). Si entra con 'interface [tipo] [numero]'. Si esce con 'exit' (al livello precedente) o Ctrl+Z (direttamente al Privileged EXEC)."},
      ip_addr:   {label:"Interfaccia",title:"Configurare un'Interfaccia",text:"Sequenza: (config)# interface fastEthernet 0/0 → (config-if)# ip address 192.168.1.1 255.255.255.0 → (config-if)# no shutdown. Importante: le interfacce dei router Cisco sono disabilitate per default — 'no shutdown' è obbligatorio. Verificare con 'show interfaces fa0/0': deve mostrare 'up/up'."},
      rip_cmd:   {label:"RIPv2",title:"Configurare RIPv2",text:"(config)# router rip → (config-router)# version 2 → (config-router)# network 192.168.1.0 [ripetere per ogni rete] → (config-router)# no auto-summary. Fondamentale 'no auto-summary' per VLSM. Verificare con 'show ip rip database' e 'show ip protocols'."},
      static:    {label:"Routing Statico",title:"Rotta Statica",text:"(config)# ip route [rete] [mask] [next-hop]. Esempio: 'ip route 10.0.0.0 255.255.255.0 192.168.1.254'. Default route: 'ip route 0.0.0.0 0.0.0.0 [next-hop]'. Verificare con 'show ip route': rotte statiche mostrate con 'S*'."},
      show_route:{label:"Show",title:"show ip route",text:"Mostra la tabella di routing completa. Codici: C = Connected (direttamente connessa), S = Static (configurata manualmente), R = RIP, O = OSPF, B = BGP, D = EIGRP, * = default route. Ogni riga mostra: protocollo, rete/mask, [distanza/metrica], next-hop, interfaccia."},
      show_proto:{label:"Show",title:"show ip protocols",text:"Mostra i protocolli di routing attivi sul router: protocollo (RIP, OSPF…), reti annunciate, neighbors (vicini), timer, versione. Utile per verificare che RIPv2 sia attivo, le reti configurate siano corrette e i vicini siano stati rilevati."},
      show_acl:  {label:"Show",title:"show ip access-lists",text:"Mostra le ACL configurate con il contatore di match per ogni ACE. Esempio: 'access-list 10, 2 entries / 10 deny host 192.168.1.100 (15 matches) / 20 permit any (243 matches)'. I contatori sono utili per verificare che le ACL funzionino come previsto."},
      ping:      {label:"Ping",title:"Ping — Verifica Connettività",text:"'ping [IP]': verifica la raggiungibilità dell'host. Output: '!' = echo reply ricevuto (successo), '.' = timeout (nessuna risposta), 'U' = destination unreachable (router ha risposto che non sa come raggiungere la destinazione). 5 ping di default, si può estendere con ping esteso in Privileged EXEC."},
      traceroute:{label:"Traceroute",title:"Traceroute — Percorso Hop per Hop",text:"'traceroute [IP]': mostra il percorso dei pacchetti hop per hop, con RTT per ciascun hop. Utile per capire dove si interrompe la connettività. Ogni hop mostra il suo IP. '*' = nessuna risposta da quel hop (timeout). 'tracert' su Windows client in Packet Tracer."},
      debug:     {label:"Show",title:"show interfaces brief",text:"Mostra un riepilogo rapido di tutte le interfacce: nome, IP assegnato, stato (up/down). 'FastEthernet0/0 192.168.1.1 up up' = tutto OK. 'administratively down' = no shutdown non eseguito. 'down/down' = problema fisico (cavo, dispositivo spento). Prima cosa da controllare nel troubleshooting."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
