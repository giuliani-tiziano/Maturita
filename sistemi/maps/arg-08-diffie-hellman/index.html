  <script>
    var nodes = {
      root:      {label:"Argomento 8 (CLIL)",title:"DH, Hash, MAC e Firma Digitale",text:"Quattro meccanismi fondamentali della sicurezza: Diffie-Hellman per scambiare chiavi, Hash per garantire integrità, MAC per autenticare, Firma Digitale per non ripudio. Insieme costituiscono la base di SSL/TLS, IPsec e PKI."},
      dh:        {label:"Diffie-Hellman",title:"Scambio Sicuro di Chiavi",text:"DH permette a due parti di derivare la stessa chiave segreta condivisa su un canale pubblico senza trasmetterla mai. Basato sulla difficoltà del problema del logaritmo discreto. Non è cifratura — è solo scambio di chiavi. Fondamentale in IPsec (IKE) e TLS."},
      hash:      {label:"Hash",title:"Funzioni Hash Crittografiche",text:"Una funzione hash trasforma input di qualsiasi lunghezza in un digest di lunghezza fissa. Proprietà: deterministica, irreversibile (one-way), effetto valanga (1 bit diverso → output completamente diverso), resistenza alle collisioni."},
      mac:       {label:"MAC",title:"Message Authentication Code",text:"Un MAC è un codice calcolato sul messaggio usando una chiave segreta condivisa. Garantisce integrità (il dato non è stato alterato) E autenticazione del mittente (solo chi ha la chiave può produrlo). Diverso dall'hash che non richiede chiave."},
      firma:     {label:"Firma Digitale",title:"Autenticità e Non Ripudio",text:"La firma digitale permette di verificare l'identità del mittente e garantire che il messaggio non sia stato alterato. Solo chi ha la chiave privata può firmare; tutti possono verificare con la chiave pubblica. Garantisce il non ripudio."},
      mfa:       {label:"MFA",title:"Multi-Factor Authentication",text:"L'autenticazione multi-fattore richiede 2+ fattori di categorie diverse: Knowledge (password/PIN), Possession (token/smartphone), Inherence (biometria). Un attaccante deve compromettere più categorie simultaneamente."},
      dh_canale: {label:"DH",title:"Canale Pubblico",text:"Il paradosso di DH: due parti possono concordare una chiave segreta anche se tutte le comunicazioni sono intercettate. Alice e Bob scelgono valori privati, si scambiano valori intermedi pubblicamente, e derivano la stessa chiave senza mai trasmetterla."},
      dh_log:    {label:"DH",title:"Logaritmo Discreto",text:"La sicurezza di DH si basa sulla difficoltà computazionale del problema del logaritmo discreto: dato g^x mod p (facile da calcolare), trovare x è computazionalmente impossibile per numeri grandi. Gruppi DH 14+ (2048 bit) sono raccomandati."},
      dh_uso:    {label:"DH",title:"Dove si usa DH",text:"IPsec: nella Fase 1 di IKE per generare le chiavi ISAKMP. TLS: nelle cipher suite DHE/ECDHE per la Perfect Forward Secrecy. SSH: nella fase di key exchange. In tutti questi contesti DH risolve il problema della distribuzione delle chiavi."},
      hash_prop: {label:"Hash",title:"Proprietà Fondamentali",text:"1. Deterministica: stesso input → stesso output. 2. One-way: impossibile invertire. 3. Effetto valanga: 1 bit diverso → ~50% bit dell'output cambia. 4. Resistenza alle collisioni: impossibile trovare due input con lo stesso hash."},
      sha256:    {label:"SHA-256",title:"Standard Attuale: SHA-256",text:"SHA-256 (SHA-2 family): produce un digest di 256 bit. Standard sicuro attuale. MD5 (128 bit) e SHA-1 (160 bit) sono deprecati per uso crittografico — vulnerabili a collisioni. SHA-512 per applicazioni ad alta sicurezza."},
      hash_uso:  {label:"Hash",title:"Applicazioni degli Hash",text:"Verifica integrità file (checksum). Hashing delle password (con salt: PBKDF2, bcrypt, scrypt). Firma digitale (si firma l'hash del messaggio, non il messaggio intero). Blockchain (ogni blocco include l'hash del precedente). MACs."},
      mac_def:   {label:"MAC",title:"MAC = Hash + Chiave",text:"Un MAC combina il messaggio con una chiave segreta condivisa per produrre un tag di autenticazione. Il ricevente ricalcola il MAC con la stessa chiave e confronta. Se corrispondono: il messaggio è integro E proviene da chi ha la chiave."},
      hmac:      {label:"HMAC",title:"HMAC: Hash-based MAC",text:"HMAC combina una chiave segreta con una funzione hash standard: HMAC(K, msg) = H((K⊕opad) || H((K⊕ipad) || msg)). HMAC-SHA256 è usato in SSL/TLS per ogni blocco di dati trasmesso, in IPsec per AH e in molti protocolli di autenticazione API."},
      firma_priv:{label:"Firma",title:"Firma con Chiave Privata",text:"Processo di firma: 1) Calcola hash(messaggio) con SHA-256. 2) Cifra l'hash con la propria chiave PRIVATA → ottiene la firma. 3) Invia messaggio + firma. Solo chi possiede la chiave privata può creare la firma."},
      firma_ver: {label:"Firma",title:"Verifica con Chiave Pubblica",text:"Processo di verifica: 1) Riceve messaggio + firma. 2) Decifra la firma con la chiave PUBBLICA del mittente → ottiene hash originale. 3) Calcola autonomamente hash(messaggio ricevuto). 4) Confronta: se coincidono → firma valida (autenticità + integrità)."},
      nonrip:    {label:"Non Ripudio",title:"Non Ripudio",text:"Solo chi possiede la chiave privata può creare una firma valida che si verifica con la chiave pubblica corrispondente. Il mittente non può quindi negare di aver inviato il messaggio firmato — la firma è come una prova matematica della sua origine."},
      mfa_cat:   {label:"MFA",title:"3 Categorie di Fattori",text:"Knowledge (qualcosa che SAI): password, PIN, risposta segreta. Possession (qualcosa che HAI): token hardware, smartphone, smart card. Inherence (qualcosa che SEI): impronta digitale, riconoscimento facciale, iride. MFA combina almeno 2 categorie diverse."},
      totp:      {label:"TOTP",title:"Time-based OTP",text:"TOTP (RFC 6238): codice a 6 cifre derivato da chiave segreta + timestamp corrente (a step di 30 secondi). Usato da Google Authenticator, Microsoft Authenticator. Protegge da replay attack (il codice scade dopo 30s). Più sicuro dell'OTP via SMS."},
      u2f:       {label:"U2F/FIDO2",title:"Chiave Hardware",text:"U2F/FIDO2 (es. YubiKey): chiave hardware fisica che firma una challenge del server con la propria chiave privata interna. Resistente al phishing: l'autenticazione è legata crittograficamente al dominio del sito (una YubiKey per google.com non funziona per un sito fake)."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
