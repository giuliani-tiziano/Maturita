  <script>
    var nodes={
      root:    {label:"Argomento 12",title:"IPsec",text:"IPsec è un framework di protocolli a Layer 3 che protegge qualsiasi comunicazione IP in modo trasparente alle applicazioni. Garantisce Riservatezza (cifratura ESP), Integrità (HMAC), Autenticazione (IKE), Anti-Replay (sequence number)."},
      sa:      {label:"SA",title:"Security Association",text:"Una SA è l'insieme di parametri e chiavi per proteggere il traffico in UNA direzione: algoritmo di cifratura e chiave, algoritmo HMAC e chiave, modalità (trasporto/tunnel), lifetime. Identificata univocamente da: SPI + IP destinazione + protocollo (AH o ESP)."},
      ike1:    {label:"IKE Fase 1",title:"IKE Fase 1 — ISAKMP SA",text:"Crea un tunnel di gestione sicuro (ISAKMP SA) per proteggere le negoziazioni successive. Passi: 1) Negoziazione parametri (hash, gruppo DH, cifratura, lifetime). 2) Scambio DH per generare materiale crittografico. 3) Autenticazione reciproca (PSK o certificati RSA)."},
      ike2:    {label:"IKE Fase 2",title:"IKE Fase 2 — Quick Mode",text:"Dentro il tunnel sicuro di Fase 1, negozia le SA per il traffico dati reale. 3 messaggi (Quick Mode). Parametri: protocollo (AH o ESP), modalità (trasporto o tunnel), algoritmi di cifratura/HMAC, lifetime delle SA. Produce una coppia di SA (una per direzione)."},
      ah_esp:  {label:"Protocolli",title:"AH vs ESP",text:"AH (IP 51): autentica l'intero pacchetto incluso l'header IP. NO cifratura. Non compatibile con NAT (NAT modifica l'header IP autenticato). ESP (IP 50): cifra e autentica il payload. Compatibile con NAT tramite NAT-T. ESP è lo standard per le VPN moderne."},
      modalita:{label:"Modalità",title:"Modalità Trasporto vs Tunnel",text:"Modalità Trasporto: protegge solo il payload, l'header IP originale è visibile. Usata per host-to-host. Modalità Tunnel: incapsula tutto il pacchetto originale in un nuovo pacchetto IP. Gli IP originali sono nascosti. Standard per VPN site-to-site tra gateway."},
      sa_def:  {label:"SA",title:"Una SA per Direzione",text:"Una SA protegge il traffico in una sola direzione. Per una comunicazione bidirezionale (A↔B) servono almeno 2 SA: una per A→B e una per B→A. In presenza di AH e ESP insieme servono 4 SA (una per protocollo per direzione)."},
      sa_spi:  {label:"SA",title:"Identificazione della SA",text:"Ogni SA è identificata univocamente dalla terna: SPI (Security Parameter Index — numero a 32 bit) + Indirizzo IP destinazione + Protocollo (AH o ESP). L'SPI è incluso in ogni pacchetto protetto, permettendo al destinatario di trovare la SA corretta nel SAD."},
      sa_2:    {label:"SAD",title:"SAD — Security Association Database",text:"Il SAD (Security Association Database) è il database dove IPsec memorizza tutte le SA attive: parametri, chiavi, algoritmi, SPI, lifetime rimanente. Il kernel lo consulta per ogni pacchetto da proteggere (in uscita) o da verificare (in ingresso)."},
      ike1_neg:{label:"IKE Fase 1",title:"ISAKMP SA",text:"L'ISAKMP SA è il tunnel di gestione creato in IKE Fase 1. È bidirezionale (unica SA per entrambe le direzioni). Protegge le comunicazioni IKE Fase 2. Parametri tipici: AES-256 per la cifratura, SHA-256 per l'HMAC, DH Gruppo 14 (2048 bit) per lo scambio di chiavi."},
      main:    {label:"Main Mode",title:"Main Mode — 6 Messaggi",text:"6 scambi di messaggi: 3 per negoziare i parametri (proposta/risposta), 2 per lo scambio DH (valori pubblici), 1 per l'autenticazione (identità cifrate). L'identità delle parti è protetta dalla cifratura DH. Usato per VPN site-to-site con IP fisso."},
      aggr:    {label:"Aggressive Mode",title:"Aggressive Mode — 3 Messaggi",text:"3 messaggi invece di 6: negoziazione parametri, DH e identità tutto in un solo scambio. Più veloce ma le identità viaggiano in chiaro. Usato per remote-access VPN con IP dinamico (il client non conosce il proprio IP pubblico in anticipo)."},
      quick:   {label:"IKE Fase 2",title:"Quick Mode — 3 Messaggi",text:"La fase di negoziazione delle SA per il traffico dati: 3 messaggi protetti dal tunnel ISAKMP. Negozia: protocollo (AH/ESP), modalità (trasporto/tunnel), algoritmi, lifetime. Con PFS, esegue un nuovo scambio DH per generare chiavi indipendenti dalla Fase 1."},
      sa_dati: {label:"IKE Fase 2",title:"SA per il Traffico Dati",text:"Le SA create in IKE Fase 2 sono quelle che ESP/AH usa per proteggere il traffico dati reale (non le comunicazioni IKE). Hanno una lifetime più breve (es. 1 ora o 4 GB di dati). Alla scadenza, IKE Fase 2 ne negozia automaticamente di nuove."},
      pfs:     {label:"PFS",title:"Perfect Forward Secrecy",text:"Con PFS attivo, IKE Fase 2 esegue un nuovo scambio Diffie-Hellman per ogni set di SA, generando chiavi indipendenti dalla Fase 1. Se un attaccante compromette la chiave di Fase 1, non può decifrare il traffico dati delle sessioni passate o future."},
      ah:      {label:"AH",title:"AH — Authentication Header",text:"Protocollo IP numero 51. Autentica l'intero pacchetto (header IP + payload) ma NON cifra i dati. Problema con NAT: NAT modifica gli indirizzi IP nell'header, invalidando l'autenticazione. Usato raramente nelle VPN moderne per questo motivo."},
      esp:     {label:"ESP",title:"ESP — Encapsulating Security Payload",text:"Protocollo IP numero 50. Cifra il payload e lo autentica (non l'header IP esterno). Compatibile con NAT tramite NAT-T. È il protocollo standard per le VPN IPsec moderne. Combina riservatezza (AES) e integrità (HMAC) in un unico protocollo."},
      trasporto:{label:"Modalità",title:"Modalità Trasporto",text:"L'header IP originale rimane visibile (usato come header esterno). IPsec protegge solo il payload (dati). Overhead minore. Usato tipicamente per connessioni sicure host-to-host all'interno di una rete (es. tra due server nella stessa LAN)."},
      tunnel:  {label:"Modalità",title:"Modalità Tunnel",text:"L'intero pacchetto originale (header IP + payload) viene protetto da IPsec e incapsulato in un nuovo pacchetto IP con nuovi indirizzi. Gli indirizzi IP originali sono nascosti — solo i gateway VPN sono visibili. Standard per VPN site-to-site tra gateway."},
      natt:    {label:"NAT-T",title:"NAT Traversal — UDP 4500",text:"NAT-T permette a IPsec/ESP di funzionare attraverso dispositivi NAT. Incapsula i pacchetti ESP dentro UDP sulla porta 4500. IKE usa normalmente UDP 500, ma passa a UDP 4500 quando rileva NAT. IKEv2 supporta NAT-T nativamente senza configurazione aggiuntiva."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
