  <script>
    var nodes = {
      root:        { label:"Argomento 7 (CLIL)", title:"Crittografia", text:"La crittografia è la scienza di proteggere le informazioni trasformandole in una forma non leggibile senza la chiave. Garantisce confidenzialità, integrità, autenticazione e non ripudio delle comunicazioni digitali." },
      obiettivi:   { label:"Obiettivi", title:"4 Obiettivi della Crittografia", text:"Confidenzialità: solo il destinatario autorizzato può leggere il messaggio. Integrità: il messaggio non è stato alterato. Autenticazione: verifica dell'identità del mittente. Non ripudio: il mittente non può negare di aver inviato il messaggio." },
      simmetrica:  { label:"Simmetrica", title:"Crittografia Simmetrica", text:"Usa la stessa chiave segreta per cifrare e decifrare. Vantaggi: molto veloce, efficiente per grandi quantità di dati (streaming, disco). Svantaggio principale: bisogna scambiarsi la chiave segreta in modo sicuro prima di comunicare." },
      algoritmi_simm:{ label:"Algoritmi", title:"Algoritmi Simmetrici", text:"DES (1977): chiave 56 bit — obsoleto, violabile in ore. 3DES: applica DES 3 volte, più sicuro ma lento — legacy. AES (2001): standard attuale, chiavi 128/192/256 bit — molto sicuro ed efficiente su hardware e software moderni." },
      asimmetrica: { label:"Asimmetrica", title:"Crittografia Asimmetrica", text:"Usa una coppia di chiavi matematicamente correlate: pubblica (distribuita liberamente) e privata (segreta). Ciò che viene cifrato con la chiave pubblica si decifra solo con la privata. Risolve il problema della distribuzione delle chiavi ma è molto più lenta della simmetrica." },
      ibrido:      { label:"Sistema Ibrido", title:"Il Meglio dei Due Mondi", text:"I sistemi moderni combinano i due tipi: la crittografia asimmetrica (lenta) serve solo per scambiare in sicurezza una chiave simmetrica di sessione. Poi la crittografia simmetrica (veloce) cifra tutti i dati effettivi. Usato in SSL/TLS, IPsec, PGP." },
      conf:        { label:"Obiettivo", title:"Confidenzialità", text:"Il messaggio cifrato è incomprensibile per chiunque non possieda la chiave di decifratura. Anche se un attaccante intercetta il traffico, non può leggere il contenuto." },
      integ:       { label:"Obiettivo", title:"Integrità", text:"Garantisce che i dati non siano stati alterati durante il trasporto. Si ottiene con funzioni hash e MAC. Se anche un solo bit cambia, il ricevente lo rileva." },
      nonrip:      { label:"Obiettivo", title:"Autenticazione e Non Ripudio", text:"Autenticazione: verifica che il messaggio provenga davvero da chi dice di averlo inviato. Non ripudio: il mittente non può negare di aver inviato il messaggio — garantito dalla firma digitale con chiave privata." },
      stessa_chiave:{ label:"Simmetrica", title:"Stessa Chiave", text:"Il mittente cifra con la chiave K. Il destinatario decifra con la stessa chiave K. Entrambi devono condividere K in anticipo tramite un canale sicuro — questo è il 'problema della distribuzione delle chiavi'." },
      prob_distr:  { label:"Problema", title:"Distribuzione delle Chiavi", text:"Come comunicare la chiave segreta K a un'altra parte senza che un intercettatore la catturi? Su un canale insicuro è impossibile con la sola crittografia simmetrica — si risolve con la crittografia asimmetrica (RSA) o con Diffie-Hellman." },
      des:         { label:"DES", title:"DES — Obsoleto", text:"Data Encryption Standard (1977): chiave 56 bit, blocchi 64 bit. Violato nel 1999 in 22 ore dal progetto EFF. Con hardware moderno: minuti o secondi. Non utilizzare mai DES per applicazioni di sicurezza." },
      aes:         { label:"AES", title:"AES — Standard Attuale", text:"Advanced Encryption Standard (2001): chiavi 128, 192 o 256 bit, blocchi 128 bit. Adottato da NIST come standard mondiale. Usato in WPA2/WPA3 (Wi-Fi), TLS, IPsec, FileVault (macOS), BitLocker (Windows), e miliardi di altri sistemi." },
      '3des':      { label:"3DES", title:"Triple DES — Legacy", text:"Applica DES tre volte (Cifratura-Decifratura-Cifratura) con tre chiavi diverse (EDE). Chiave effettiva: 112 o 168 bit. Più sicuro di DES ma ~3 volte più lento. Considerato deprecato — usare AES." },
      pubpriv:     { label:"Asimmetrica", title:"Coppia Chiave Pubblica/Privata", text:"La chiave pubblica si distribuisce liberamente: chiunque può cifrare un messaggio per te. Solo la tua chiave privata (segreta, non condivisa mai) può decifrarlo. Matematicamente correlate ma computazionalmente impossibile derivare la privata dalla pubblica." },
      rsa:         { label:"RSA", title:"RSA — Algoritmo Più Diffuso", text:"RSA è basato sulla difficoltà computazionale di fattorizzare il prodotto di due grandi numeri primi. Chiavi tipiche: 2048 o 4096 bit. Lento (~1000x rispetto ad AES). Usato per scambio chiavi, firma digitale e certificati X.509." },
      lenta:       { label:"Limite", title:"Asimmetrica è Lenta", text:"La crittografia asimmetrica è molto più lenta della simmetrica. Non si usa per cifrare grandi quantità di dati (es. l'intero traffico HTTPS). Si usa solo per: scambiare una chiave simmetrica di sessione, verificare l'identità (certificati), firmare digitalmente." },
      fase1:       { label:"Sistema Ibrido", title:"Fase 1: Scambio Chiave (Asimmetrica)", text:"Si usa RSA o Diffie-Hellman per scambiare in sicurezza una chiave simmetrica di sessione (es. 256 bit AES). Questa fase è lenta ma riguarda solo una piccola quantità di dati (la chiave stessa)." },
      fase2:       { label:"Sistema Ibrido", title:"Fase 2: Cifratura Dati (Simmetrica)", text:"Una volta che entrambe le parti hanno la chiave di sessione, tutta la comunicazione viene cifrata con AES. Questa fase è molto veloce e scala bene con qualsiasi quantità di dati." },
      uso:         { label:"Applicazioni", title:"Dove si usa il Sistema Ibrido", text:"SSL/TLS (HTTPS): handshake asimmetrico → sessione simmetrica. IPsec: IKE (fase asimmetrica) → ESP (fase simmetrica). PGP/GPG (email cifrate): RSA per la chiave → AES per il messaggio. SSH: scambio chiavi DH → sessione AES." }
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
