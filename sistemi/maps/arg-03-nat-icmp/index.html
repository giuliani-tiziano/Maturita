  <script src="../../js/main.js"></script>
  <script>
    var nodes = {
      root:       { label:'Argomento 3', title:'NAT, PAT e ICMP', text:'NAT (Network Address Translation) traduce indirizzi IP privati in pubblici permettendo a reti interne di comunicare con Internet usando pochi IP pubblici. PAT (Port Address Translation) è la variante più comune che usa anche le porte per distinguere i flussi. ICMP è il protocollo di diagnostica di rete usato da ping e traceroute.' },
      natstat:    { label:'Area 1', title:'NAT Statico', text:'Il NAT statico crea una mappatura permanente e fissa tra un indirizzo IP privato e uno pubblico. Ogni host interno ha sempre lo stesso IP pubblico. Usato per esporre server interni su Internet (web server, mail server) in modo prevedibile.' },
      natdin:     { label:'Area 2', title:'NAT Dinamico e PAT', text:'Il NAT dinamico usa un pool di IP pubblici assegnati temporaneamente agli host interni. PAT (o NAT overload) mappa molti host interni su un singolo IP pubblico usando le porte per distinguere le sessioni. È la modalità usata in quasi tutti i router domestici e aziendali.' },
      vantaggi:   { label:'Area 3', title:'Vantaggi del NAT', text:'NAT permette di utilizzare indirizzi privati internamente, risparmiando IP pubblici scarsi. Nasconde la topologia e gli indirizzi della rete interna, fornendo un minimo di sicurezza "per oscuramento". Permette di cambiare ISP senza dover rinumerare tutta la rete interna.' },
      svantaggi:  { label:'Area 4', title:'Svantaggi del NAT', text:'NAT rompe il principio end-to-end di Internet: le connessioni non possono essere iniziate dall\'esterno senza port forwarding. Crea problemi con protocolli che incorporano l\'IP nel payload (SIP, FTP attivo). Aggiunge complessità e può essere un punto singolo di guasto.' },
      icmp:       { label:'Area 5', title:'ICMP', text:'ICMP (Internet Control Message Protocol, RFC 792) opera al livello 3 (IP) per inviare messaggi di errore e diagnostica. Non trasporta dati utente ma messaggi di controllo. Esempi: destination unreachable, time exceeded, redirect. Usato da ping e traceroute per diagnosticare la raggiungibilità della rete.' },
      mapp11:     { label:'NAT Statico', title:'Mappatura 1:1 fissa', text:'Ogni indirizzo IP privato interno è associato in modo permanente a un specifico indirizzo IP pubblico. La mappatura è configurata manualmente e non cambia. Esempio: il server web interno 192.168.1.10 è sempre raggiungibile dall\'esterno tramite l\'IP pubblico 203.0.113.10.' },
      serverint:  { label:'NAT Statico', title:'Server interni esposti', text:'NAT statico è il metodo tradizionale per rendere raggiungibili dall\'Internet pubblica i server della rete interna: web server, mail server, server FTP. Per ogni servizio da esporre serve un IP pubblico dedicato, il che limita la scalabilità rispetto al port forwarding con PAT.' },
      privpub:    { label:'NAT Statico', title:'IP privato ↔ IP pubblico', text:'Il router NAT mantiene una tabella di mappatura statica. Quando un pacchetto entra con destinazione l\'IP pubblico, il router modifica l\'header IP sostituendo l\'IP pubblico con il privato corrispondente. In uscita, l\'IP sorgente privato viene sostituito con il pubblico mappato.' },
      pool:       { label:'NAT Dinamico', title:'Pool di IP pubblici', text:'Il NAT dinamico usa un gruppo (pool) di indirizzi IP pubblici. Quando un host interno inizia una connessione, gli viene assegnato temporaneamente un IP dal pool. Al termine della sessione, l\'IP torna disponibile. Il numero di sessioni simultanee è limitato dalla dimensione del pool.' },
      pat:        { label:'NAT Dinamico', title:'PAT: molti host su un IP', text:'PAT (Port Address Translation), detto anche NAT overload, usa un singolo IP pubblico per tutti gli host interni. Distingue le sessioni tramite numeri di porta: ogni connessione interna ha una coppia (IP_pubblico:porta_pubblica) univoca. Permette a centinaia di host di condividere un solo IP pubblico.' },
      tabnat:     { label:'NAT Dinamico', title:'Tabella NAT', text:'Il router mantiene una tabella NAT che registra ogni sessione attiva: IP_interno:porta_interna ↔ IP_pubblico:porta_pubblica. Quando arriva la risposta dall\'Internet, il router consulta la tabella per sapere a quale host interno deve consegnare il pacchetto.' },
      risparmio:  { label:'Vantaggi NAT', title:'Risparmio degli indirizzi IPv4', text:'Grazie al NAT (soprattutto PAT) milioni di dispositivi in tutto il mondo condividono un numero limitato di indirizzi IPv4 pubblici. Senza NAT, l\'esaurimento degli indirizzi IPv4 (avvenuto ufficialmente nel 2011) avrebbe bloccato la crescita di Internet molto prima.' },
      nascosti:   { label:'Vantaggi NAT', title:'IP interni nascosti', text:'Il NAT impedisce all\'esterno di vedere e raggiungere direttamente gli indirizzi IP interni. Un attaccante su Internet non può sapere quanti host ci sono nella rete interna né i loro indirizzi. Questo "security through obscurity" non sostituisce un firewall ma aggiunge un layer di protezione.' },
      indip:      { label:'Vantaggi NAT', title:'Indipendenza dall\'ISP', text:'Con NAT, la rete interna usa indirizzi privati indipendenti dall\'ISP. Se si cambia provider, basta riconfigurare il router NAT con il nuovo IP pubblico, senza dover rinumerare tutti i dispositivi interni. Questo semplifica enormemente la gestione.' },
      endtoend:   { label:'Svantaggi NAT', title:'Violazione del principio end-to-end', text:'Il modello originale di Internet prevedeva comunicazioni dirette tra endpoint. NAT crea un intermediario che modifica i pacchetti, rompendo questo principio. Le connessioni non possono essere iniziate dall\'esterno verso un host interno senza configurare esplicitamente il port forwarding.' },
      sipftp:     { label:'Svantaggi NAT', title:'Problemi con SIP e FTP attivo', text:'Alcuni protocolli incorporano indirizzi IP nel payload dei dati (non solo nell\'header IP). SIP (VoIP) e FTP in modalità attiva sono esempi classici. Il NAT non traduce questi indirizzi nel payload, causando malfunzionamenti. Richiedono ALG (Application Layer Gateway) per funzionare correttamente.' },
      portfwd:    { label:'Svantaggi NAT', title:'Port forwarding', text:'Per permettere connessioni dall\'esterno verso un server interno, bisogna configurare manualmente il port forwarding sul router: ogni richiesta su una porta pubblica specifica viene inoltrata a un host interno e porta determinati. Questa configurazione manuale è complessa e soggetta a errori.' },
      icmpl3:     { label:'ICMP', title:'Protocollo di diagnostica L3', text:'ICMP (RFC 792) è integrato nel livello IP. Trasporta messaggi di errore (destination unreachable, time exceeded, redirect) e di diagnostica (echo request/reply). Non garantisce la consegna ed è connectionless. I pacchetti ICMP hanno header IP con protocollo numero 1.' },
      ping:       { label:'ICMP', title:'Ping — Echo Request/Reply', text:'Ping invia messaggi ICMP Echo Request (tipo 8) alla destinazione, che risponde con Echo Reply (tipo 0). Misura l\'RTT (Round Trip Time) e verifica la raggiungibilità. Un ping che non riceve risposta può indicare: host irraggiungibile, firewall che blocca ICMP, o problema di routing.' },
      traceroute: { label:'ICMP', title:'Traceroute e TTL', text:'Traceroute scopre il percorso di un pacchetto inviando datagrammi con TTL incrementale (1, 2, 3...). Ogni router decrementa il TTL di 1; quando raggiunge 0, restituisce un ICMP Time Exceeded rivelando il proprio IP. Traceroute ripete finché raggiunge la destinazione che risponde con ICMP Port Unreachable.' }
    };
    function openNode(id) {
      var n = nodes[id]; if (!n) return;
      document.getElementById('modal-label').textContent = n.label;
      document.getElementById('modal-title').textContent = n.title;
      document.getElementById('modal-text').innerHTML = n.text;
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeModal() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
  </script>
