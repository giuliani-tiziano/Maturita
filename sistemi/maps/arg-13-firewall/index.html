  <script>
    var nodes={
      root:      {label:"Argomento 13",title:"Firewall e Architetture di Rete",text:"Un firewall controlla il traffico di rete secondo una security policy: decide cosa permettere e cosa bloccare. Non è l'unica difesa ma è la prima linea della difesa perimetrale. Le architetture definiscono come posizionare e organizzare i firewall e le zone di rete."},
      zone:      {label:"Zone",title:"Zone di Sicurezza",text:"Internet: rete esterna non fidata — traffico potenzialmente ostile. DMZ (Demilitarized Zone): zona intermedia con server pubblici (web, mail, DNS) — accessibili ma isolati. LAN interna: rete protetta con risorse riservate agli utenti fidati."},
      tipologie: {label:"Tipologie",title:"Tipologie di Firewall",text:"Packet Filter (L3): analizza header IP/TCP/UDP — veloce ma stateless. SPI (L3-L4): traccia le connessioni attive — molto più sicuro. Proxy L7: analizza il contenuto applicativo — massima sicurezza ma lento. NGFW: combina SPI+DPI+IPS+App-ID."},
      architetture:{label:"Architetture",title:"Architetture di Rete",text:"Screened Subnet (DMZ con 2 FW): Internet → FW esterno → DMZ → FW interno → LAN. Anche se la DMZ è compromessa, il FW interno protegge la LAN. Bastion Host: server rinforzato esposto, con OS hardened, servizi minimi, MFA."},
      policy:    {label:"Policy",title:"Security Policy",text:"Default-Deny (principio del minimo privilegio): tutto il traffico è bloccato per default — si aprono solo i servizi necessari. Più sicuro. Default-Allow: tutto permesso tranne il vietato — più comodo ma pericoloso (nuove minacce non sono automaticamente bloccate)."},
      limiti:    {label:"Limiti",title:"Limiti del Firewall",text:"Non filtra il traffico che non lo attraversa (attacchi interni). Non protegge da insider threat. Non ispeziona traffico HTTPS cifrato senza SSL inspection. Configurazione errata = falso senso di sicurezza. Deve essere complementato da IDS/IPS, antivirus, MFA."},
      internet:  {label:"Zona",title:"Internet — Non Fidata",text:"La rete esterna (Internet) è considerata non fidata per definizione: chiunque può accedervi e potenzialmente tentare attacchi. Il firewall è il confine tra Internet e la rete aziendale."},
      dmz:       {label:"DMZ",title:"DMZ — Demilitarized Zone",text:"La DMZ ospita i server che devono essere accessibili da Internet (web server, mail server, DNS). Sono fisicamente o logicamente separati dalla LAN interna. Se un server DMZ viene compromesso, l'attaccante non ha accesso diretto alla LAN."},
      lan:       {label:"LAN",title:"LAN Interna — Protetta",text:"La LAN interna ospita le risorse riservate: file server, database, Active Directory, ERP, ecc. Accessibile solo dagli utenti autenticati interni. Il firewall interno (in architettura DMZ) la protegge anche dalla DMZ."},
      packet:    {label:"Packet Filter",title:"Packet Filter — L3",text:"Analizza header IP e TCP/UDP: indirizzi IP, porte, protocollo, flag TCP. Velocissimo (lavora a kernel level). Stateless: non distingue se un pacchetto è parte di una connessione legittima. Bypassabile con IP spoofing e pacchetti frammentati."},
      spi:       {label:"SPI",title:"SPI — Stateful Packet Inspection",text:"Mantiene una state table con tutte le connessioni attive: IP/porta sorgente/destinazione, protocollo, stato TCP, sequence number. Un pacchetto che non corrisponde a nessuna connessione aperta viene bloccato. Molto più sicuro del packet filter."},
      proxy:     {label:"Proxy L7",title:"Proxy / Application Gateway",text:"Crea due connessioni separate: client→proxy e proxy→server. Analizza il contenuto applicativo (HTTP, FTP, DNS…), comprende i protocolli, può filtrare per contenuto. Massima sicurezza ma lento. Richiede un proxy diverso per ogni protocollo."},
      screened:  {label:"Architettura",title:"Screened Subnet (DMZ)",text:"Internet → Firewall esterno → DMZ → Firewall interno → LAN. Due livelli di protezione indipendenti. Il FW esterno protegge la DMZ da Internet (permette solo HTTP/HTTPS/SMTP). Il FW interno protegge la LAN dalla DMZ (blocca tutto tranne il necessario)."},
      bastion:   {label:"Bastion Host",title:"Bastion Host",text:"Server esposto rinforzato: OS hardened (servizi minimi, patch aggiornate), MFA obbligatoria per l'accesso, logging completo di tutte le attività, monitoraggio continuo. Usato come jump host per l'accesso SSH amministrativo alla rete interna."},
      ngfw:      {label:"NGFW",title:"Next-Generation Firewall",text:"Combina: SPI + DPI (Deep Packet Inspection, analisi contenuto) + IDS/IPS integrato + App-ID (identifica applicazioni, es. YouTube vs Netflix) + SSL inspection (decifra e analizza HTTPS) + policy per utente (integrazione con Active Directory)."},
      deny:      {label:"Policy",title:"Default-Deny",text:"Tutto il traffico è bloccato per default. Si aprono esplicitamente solo i servizi necessari (es. porta 443 per HTTPS, porta 25 per SMTP). Principio del minimo privilegio. Se si sbaglia e si dimentica di aprire qualcosa, il servizio non funziona — ma non si apre accidentalmente un buco."},
      allow:     {label:"Policy",title:"Default-Allow",text:"Tutto il traffico è permesso per default. Si bloccano esplicitamente solo i servizi pericolosi. Comodo ma pericoloso: una nuova vulnerabilità o un nuovo servizio non bloccato esplicitamente sono automaticamente accessibili dall'esterno."},
      funzioni:  {label:"Funzioni",title:"Funzioni del Firewall",text:"IP Filtering (permetti/blocca per IP/porta), NAT (traduzione indirizzi), blocco traffico non autorizzato, controllo della direzione del traffico (inbound/outbound), logging degli eventi di sicurezza, gestione delle policy di accesso."},
      lim_int:   {label:"Limite",title:"Traffico Interno",text:"Un firewall perimetrale non vede il traffico interno alla LAN. Non protegge da: dipendenti malintenzionati (insider threat), malware già installato che comunica internamente, movimenti laterali di un attaccante già dentro la rete."},
      lim_ssl:   {label:"Limite",title:"HTTPS Cifrato",text:"Un firewall tradizionale non può ispezionare il contenuto del traffico HTTPS cifrato. Vede solo che va alla porta 443 di un certo IP. Senza SSL inspection (decifratura + re-cifratura), il malware può comunicare via HTTPS senza essere rilevato."}
    };
    function openNode(id){var n=nodes[id];if(!n)return;document.getElementById('modal-label').textContent=n.label;document.getElementById('modal-title').textContent=n.title;document.getElementById('modal-text').innerHTML=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeModal(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  </script>
