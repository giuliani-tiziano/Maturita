  <script>
    var NODES = {
      'root':{label:'Modulo 8',title:'Algoritmi e Strutture Dati',text:'Un algoritmo e\' una sequenza finita di istruzioni per risolvere un problema. La struttura dati e\' l\'organizzazione in memoria dei dati. La scelta giusta puo\' fare la differenza tra O(n) e O(n^2) - fattori di milioni per input grandi.'},
      'complessita':{label:'Area 1',title:'Complessita' algoritmica',text:'Big-O descrive come cresce il tempo/spazio al crescere di n. O(1)=costante, O(log n)=logaritmico (binaria), O(n)=lineare, O(n log n)=merge sort, O(n^2)=bubble sort. Si usa quasi sempre il caso peggiore come garanzia di performance.'},
      'strutture':{label:'Area 2',title:'Strutture dati',text:'Array: accesso O(1), inserimento in mezzo O(n). Lista collegata: inserimento O(1) con puntatore, ricerca O(n). Stack LIFO: push/pop O(1). Queue FIFO: enqueue/dequeue O(1). BST: ricerca O(log n) medio, O(n) peggiore.'},
      'ordinamento':{label:'Area 3',title:'Algoritmi di ordinamento',text:'Bubble Sort: O(n^2) sempre, semplice. Selection Sort: O(n^2) sempre, poche scritture. Merge Sort: O(n log n) sempre, stabile, richiede O(n) spazio extra. Quick Sort: O(n log n) medio, O(n^2) peggiore, in-place.'},
      'ricerca':{label:'Area 4',title:'Ricerca',text:'Ricerca lineare: O(n), funziona su qualsiasi array. Ricerca binaria: O(log n), richiede array ordinato. Per 1.000.000 elementi: lineare fino a 1M confronti, binaria solo 20. Per n grandi e dati ordinati, la binaria e\' molto superiore.'},
      'hashing':{label:'Area 5',title:'Tabelle Hash',text:'Funzione hash mappa chiave su indice bucket. Complessita\' media O(1) per inserimento, ricerca, cancellazione. Collisioni inevitabili: chaining (lista per bucket) o open addressing. In PHP gli array sono gia\' hash map native con O(1).'},
      'big-o':{label:'Complessita'',title:'Big-O notation',text:'Limite superiore asintotico - non misura tempi reali ma tendenze di crescita. O(1) < O(log n) < O(n) < O(n log n) < O(n^2) < O(2^n). Si usa il caso peggiore come garanzia di performance.'},
      'casi':{label:'Complessita'',title:'Casi di complessita'',text:'Migliore (Omega): input ideale. Medio (Theta): input casuale. Peggiore (O): input avverso - la garanzia. Esempio ricerca lineare: migliore O(1) (elemento in pos 0), medio O(n/2), peggiore O(n) (non trovato).'},
      'array-lista':{label:'Strutture',title:'Array vs Lista collegata',text:'Array: memoria contigua, accesso O(1) per indice, inserimento in mezzo O(n). Lista: nodi con puntatori, inserimento O(1) con puntatore, accesso O(n). Array preferito se si accede per indice; lista se si inserisce spesso in mezzo.'},
      'stack-queue':{label:'Strutture',title:'Stack (LIFO) e Queue (FIFO)',text:'Stack: Last In First Out - push (cima), pop (cima). Usi: call stack, undo/redo. Queue: First In First Out - enqueue (fondo), dequeue (testa). Usi: coda stampa, richieste HTTP, BFS nei grafi.'},
      'bst':{label:'Strutture',title:'Albero binario di ricerca',text:'Proprieta\' BST: sottoalbero sinistro < nodo < sottoalbero destro. Ricerca O(log n) caso medio. Caso peggiore O(n) se albero degenerato. BST bilanciati (AVL, Red-Black) garantiscono O(log n) sempre.'},
      'bubble':{label:'Ordinamento',title:'Bubble Sort',text:'Confronta coppie adiacenti, scambia se fuori ordine, ripete n volte. Complessita\' O(n^2) caso medio e peggiore. Il piu\' semplice da capire. Con ottimizzazione: O(n) se l\'array e\' gia\' ordinato.'},
      'merge':{label:'Ordinamento',title:'Merge Sort',text:'Divide l\'array a meta\' ricorsivamente fino a n=1, poi fonde in ordine. Sempre O(n log n) - stabile e prevedibile. Svantaggio: richiede O(n) spazio extra per l\'array temporaneo di fusione.'},
      'lineare':{label:'Ricerca',title:'Ricerca lineare',text:'Scorre l\'array dall\'inizio alla fine fino a trovare l\'elemento. Non richiede ordinamento. O(n) nel caso peggiore. Unica opzione per strutture non ordinate o senza accesso random.'},
      'binaria':{label:'Ricerca',title:'Ricerca binaria',text:'RICHIEDE array ordinato! Confronta con il centro: se uguale trovato, se minore cerca a sinistra, se maggiore a destra. O(log n). Per n=1.000.000: max 20 confronti. Inutile fare sort prima di una singola ricerca.'},
      'hash-fn':{label:'Hashing',title:'Funzione hash',text:'Mappa una chiave a un intero (indice bucket). Una buona funzione hash distribuisce uniformemente le chiavi. In PHP gli array associativi sono gia\' hash map: accesso O(1) con $arr[\'chiave\'].'},
      'collisioni':{label:'Hashing',title:'Gestione delle collisioni',text:'Chaining: ogni bucket ha una lista - semplice, performance degrada con liste lunghe. Open addressing: cerca il prossimo slot libero - meno memoria ma richiede load factor basso (< 0.7). Performance media O(1) in entrambi i casi.'},
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
