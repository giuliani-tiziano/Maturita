  <script>
    var NODES = {
      root:         {label:'Modulo 4', title:'SQL — Structured Query Language', text:'SQL è il linguaggio standard per interagire con database relazionali. È dichiarativo: si specifica COSA si vuole, non COME ottenerlo. Si divide in DDL (Data Definition Language) per la struttura e DML (Data Manipulation Language) per i dati. MySQL/MariaDB aggiunge estensioni proprietarie utili.'},
      ddl:          {label:'Area 1', title:'DDL — Data Definition Language', text:'Definisce la struttura del database. CREATE TABLE: crea una tabella con colonne, tipi di dato, vincoli. ALTER TABLE: aggiunge/modifica/rimuove colonne. DROP TABLE: elimina tabella e dati. TRUNCATE: svuota la tabella rapidamente azzerando AUTO_INCREMENT. I vincoli principali: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, DEFAULT.'},
      dml:          {label:'Area 2', title:'DML e SELECT base', text:'INSERT INTO tabella(col1,col2) VALUES(val1,val2): aggiunge righe. UPDATE tabella SET col=val WHERE condizione: modifica righe (ATTENZIONE: senza WHERE aggiorna tutto!). DELETE FROM tabella WHERE condizione: rimuove righe (senza WHERE cancella tutto!). SELECT col FROM tabella WHERE cond ORDER BY col ASC/DESC LIMIT n.'},
      aggr:         {label:'Area 3', title:'GROUP BY, HAVING e funzioni aggregate', text:'GROUP BY col: raggruppa le righe con lo stesso valore. COUNT(*) conta le righe del gruppo. SUM(col) somma. AVG(col) media. MAX/MIN per massimo/minimo. HAVING filtra i GRUPPI dopo il raggruppamento (può usare COUNT/SUM ecc.). WHERE filtra le righe PRIMA del raggruppamento. DISTINCT elimina i duplicati nel risultato.'},
      join:         {label:'Area 4', title:'JOIN e subquery', text:'INNER JOIN: solo le righe con corrispondenza in entrambe le tabelle — i non abbinati spariscono. LEFT JOIN: tutte le righe della tabella sinistra + NULL dove non c\'è corrispondenza a destra. ON specifica la condizione di join. Subquery: SELECT annidata. Non correlata (eseguita una volta). Correlata (eseguita per ogni riga esterna, più lenta).'},
      oggetti:      {label:'Area 5', title:'Oggetti avanzati', text:'VIEW: tabella virtuale definita da una SELECT — non contiene dati fisici, semplifica query complesse. Trigger: procedura automatica BEFORE/AFTER INSERT/UPDATE/DELETE su una tabella — usa NEW/OLD per i valori. Stored Procedure: blocco SQL salvato con CALL nome(params) — migliorano performance e manutenibilità. Indici: velocizzano ricerche ma rallentano INSERT/UPDATE.'},
      create:       {label:'DDL', title:'CREATE TABLE', text:'CREATE TABLE Studenti (id INT PRIMARY KEY AUTO_INCREMENT, nome VARCHAR(50) NOT NULL, cognome VARCHAR(50) NOT NULL, voto INT CHECK(voto BETWEEN 18 AND 30), id_corso INT, FOREIGN KEY(id_corso) REFERENCES Corsi(id) ON DELETE SET NULL). AUTO_INCREMENT genera ID automaticamente. ENGINE=InnoDB obbligatorio per le FOREIGN KEY.'},
      alter:        {label:'DDL', title:'ALTER, DROP e TRUNCATE', text:'ALTER TABLE t ADD COLUMN col INT: aggiunge colonna. ALTER TABLE t MODIFY col VARCHAR(100): modifica tipo. ALTER TABLE t DROP COLUMN col: rimuove colonna. DROP TABLE t: elimina tabella e tutti i dati (irreversibile!). TRUNCATE TABLE t: svuota velocemente, azzera AUTO_INCREMENT, non loggabile riga per riga. DELETE FROM t: più lento, loggabile, può avere WHERE.'},
      'crud-sql':   {label:'DML', title:'INSERT, UPDATE, DELETE', text:'INSERT INTO t(col1,col2) VALUES(v1,v2),(v3,v4): inserisce una o più righe. INSERT IGNORE: ignora errori di chiave duplicata. ON DUPLICATE KEY UPDATE col=val: aggiorna se chiave duplicata (upsert). UPDATE t SET col=val WHERE cond: SEMPRE mettere WHERE! DELETE FROM t WHERE cond: SEMPRE WHERE! Senza WHERE: modifica/cancella tutte le righe.'},
      'select-base':{label:'DML', title:'SELECT con clausole base', text:'Ordine di esecuzione SQL: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT. WHERE: filtra righe (operatori: =, <>, <, >, <=, >=, BETWEEN, IN, LIKE, IS NULL). ORDER BY col ASC (default, crescente) o DESC (decrescente). LIMIT n: prime n righe. LIMIT n OFFSET m: paginazione. DISTINCT: elimina righe duplicate nel risultato.'},
      funzioni:     {label:'DML', title:'Funzioni MySQL', text:'Date: DATE_FORMAT(data, "%d/%m/%Y") → "15/03/2024". NOW() data/ora corrente. DATEDIFF(d1,d2) differenza in giorni. Stringhe: CONCAT(s1,s2), UPPER/LOWER, LENGTH, SUBSTRING, REPLACE. Numeri: ROUND, CEIL, FLOOR, ABS, MOD. Controllo: IF(condizione, se_vero, se_falso). IFNULL(val, default). COALESCE(v1,v2,...) primo non-NULL.'},
      groupby:      {label:'Aggregazioni', title:'GROUP BY e HAVING', text:'GROUP BY col1, col2: crea un gruppo per ogni combinazione unica dei valori. Ogni gruppo → una riga nel risultato. HAVING: filtra i gruppi dopo il raggruppamento — può usare funzioni aggregate (WHERE non può). Esempio: SELECT categoria, COUNT(*) AS totale FROM Prodotti WHERE prezzo>10 GROUP BY categoria HAVING COUNT(*)>5 ORDER BY totale DESC.'},
      'agg-fn':     {label:'Aggregazioni', title:'Funzioni di aggregazione', text:'COUNT(*): conta tutte le righe del gruppo (incluse quelle con NULL). COUNT(col): conta le righe NON NULL della colonna. SUM(col): somma i valori. AVG(col): media. MAX(col): valore massimo. MIN(col): valore minimo. Tutte ignorano i NULL (eccetto COUNT(*)). Si usano solo con SELECT + GROUP BY, o con SELECT senza GROUP BY (aggregano l\'intera tabella).'},
      'inner-left': {label:'JOIN', title:'INNER JOIN vs LEFT JOIN', text:'INNER JOIN: SELECT * FROM A INNER JOIN B ON A.id_b = B.id — restituisce solo le righe con corrispondenza in ENTRAMBE le tabelle. LEFT JOIN: SELECT * FROM A LEFT JOIN B ON A.id_b = B.id — restituisce TUTTE le righe di A, con NULL per le colonne di B dove non c\'è corrispondenza. RIGHT JOIN: speculare a LEFT. Self-join: tabella joinata con se stessa usando alias.'},
      subq:         {label:'JOIN', title:'Subquery', text:'Non correlata: SELECT nome FROM Studenti WHERE voto > (SELECT AVG(voto) FROM Studenti) — eseguita una volta. Correlata: SELECT n FROM S s1 WHERE voto = (SELECT MAX(voto) FROM S s2 WHERE s2.classe = s1.classe) — eseguita per ogni riga esterna. IN: WHERE id IN (SELECT ...). EXISTS: WHERE EXISTS (SELECT 1 FROM ...). ANY/ALL: WHERE voto > ANY/ALL (SELECT ...).'},
      union:        {label:'JOIN', title:'UNION e UNION ALL', text:'UNION combina i risultati di due SELECT eliminando i duplicati (come DISTINCT). UNION ALL combina mantenendo tutti i duplicati (più veloce, utile se non ci sono duplicati o si vogliono mantenere). Le SELECT devono avere lo stesso numero di colonne e tipi compatibili. Le colonne nel risultato prendono il nome dalla prima SELECT. ORDER BY va solo in fondo all\'ultima SELECT.'},
      view:         {label:'Oggetti', title:'VIEW — Tabella virtuale', text:'CREATE VIEW v_nome AS SELECT col1, col2 FROM t1 JOIN t2 ON... WHERE... — la view non memorizza dati fisici. Ogni interrogazione (SELECT * FROM v_nome) esegue la query sottostante. Vantaggi: semplifica query complesse ricorrenti, maschera la struttura interna, limita l\'accesso ai dati sensibili, aumenta la leggibilità del codice PHP. DROP VIEW v_nome per eliminarla.'},
      'trigger-sp': {label:'Oggetti', title:'Trigger e Stored Procedure', text:'Trigger: CREATE TRIGGER nome BEFORE/AFTER INSERT/UPDATE/DELETE ON tabella FOR EACH ROW BEGIN ... END. Usa NEW.colonna (valore dopo) e OLD.colonna (valore prima). Stored Procedure: CREATE PROCEDURE nome(IN p1 INT, OUT risultato VARCHAR(50)) BEGIN ... END; CALL nome(params). Indice: CREATE INDEX nome ON tabella(colonna) — velocizza ricerche, rallenta scritture.'}
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>

</body>
