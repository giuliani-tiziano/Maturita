  <script>
    var NODES = {
      root:      {label:'Modulo 3', title:'JavaScript lato Client', text:'JavaScript è il linguaggio di programmazione del browser: esegue nel client senza comunicare con il server. Può manipolare il DOM (struttura HTML della pagina), reagire agli eventi utente, validare form e fare richieste asincrone al server via AJAX — tutto senza ricaricare la pagina.'},
      dom:       {label:'Area 1', title:'Document Object Model', text:'Il DOM è la rappresentazione ad albero della pagina HTML creata dal browser in memoria. Ogni elemento HTML è un nodo. JS può selezionare nodi (getElementById, querySelector), creare nuovi elementi (createElement), modificarli (textContent, innerHTML), aggiungerli al DOM (appendChild), rimuoverli (remove). Ogni modifica si riflette istantaneamente nella pagina.'},
      eventi:    {label:'Area 2', title:'Gestione degli eventi', text:'Gli eventi sono azioni che accadono nella pagina: click, submit, keydown, DOMContentLoaded. addEventListener("evento", funzione) registra un handler senza sovrascrivere quelli esistenti. Event bubbling: l\'evento risale dal nodo colpito fino a document. stopPropagation() ferma la propagazione. preventDefault() blocca il comportamento default del browser.'},
      manip:     {label:'Area 3', title:'Manipolazione dinamica', text:'Modificare il DOM: textContent (testo puro, sicuro contro XSS), innerHTML (HTML, usare solo con dati controllati), setAttribute(nome, valore), classList.add/remove/toggle/contains. Creare elementi: createElement("div") poi appendChild() o insertBefore(). Rimuovere: element.remove() o parent.removeChild(figlio). Stili inline: element.style.color = "red".'},
      ajax:      {label:'Area 4', title:'AJAX e JSON', text:'AJAX (Asynchronous JavaScript And XML): aggiorna parti della pagina senza ricaricarla. Flusso: creare XHR → open(metodo, url, true) → onreadystatechange → send(). Quando readyState===4 && status===200: risposta ricevuta → JSON.parse(xhr.responseText) → aggiornare DOM. Per POST: setRequestHeader("Content-Type","application/x-www-form-urlencoded") + send("k=v").'},
      debug:     {label:'Area 5', title:'Debugging e DevTools', text:'Chrome DevTools (F12): strumento fondamentale. Console: console.log (stampa), console.error (errore), console.table (array/oggetti). Sources: aprire un file JS → cliccare numero di riga per aggiungere breakpoint → F8 resume, F10 step over. Network: tutte le richieste HTTP/AJAX con payload e risposta. Elements: DOM live, modificabile direttamente.'},
      selezione: {label:'DOM', title:'Selezione di nodi DOM', text:'document.getElementById("id"): seleziona l\'elemento con quell\'ID (restituisce un singolo elemento). document.querySelector("selettore CSS"): primo elemento che corrisponde al selettore. document.querySelectorAll("selettore"): NodeList di tutti gli elementi. document.getElementsByClassName("classe"): HTMLCollection per classe. document.getElementsByTagName("tag"): per tipo di tag.'},
      creazione: {label:'DOM', title:'Creazione e rimozione nodi', text:'Creare: const el = document.createElement("div") → imposta textContent/innerHTML/attributi → parent.appendChild(el). Oppure parent.insertBefore(el, riferimento) per posizione precisa. Rimuovere: el.remove() (moderno) o parent.removeChild(el) (classico). Clonare: el.cloneNode(true) (con figli) o false (solo il nodo). Frammento: DocumentFragment per batch insert.'},
      addevent:  {label:'Eventi', title:'addEventListener', text:'Sintassi: element.addEventListener("evento", funzione, useCapture). useCapture=false (default) = fase di bubble. true = fase di cattura. Si possono registrare più handler per lo stesso evento sullo stesso elemento. Rimuovere: removeEventListener("evento", stessaFunzione). Delegazione: registrare il handler sul genitore e usare event.target per identificare il figlio cliccato.'},
      bubbling:  {label:'Eventi', title:'Event bubbling e propagazione', text:'Quando un evento si verifica su un elemento, prima si gestisce su quell\'elemento (fase di target), poi risale verso i genitori fino a document (bubbling). Utile per delegazione: invece di registrare click su 100 elementi figli, registrare un solo handler sul genitore. event.stopPropagation() ferma il bubbling. event.stopImmediatePropagation() ferma anche gli altri handler sull\'elemento.'},
      prevent:   {label:'Eventi', title:'preventDefault', text:'Blocca il comportamento predefinito del browser per quell\'evento. Esempi: form submit → preventDefault() per gestire con AJAX invece del reload. Link click → preventDefault() per navigazione custom. event.preventDefault() si chiama dentro il handler. Nota: non ferma il bubbling (per quello serve stopPropagation). DOMContentLoaded: DOM pronto (senza immagini). window.onload: tutto caricato.'},
      contenuto: {label:'Manipolazione', title:'Modifica contenuto e attributi', text:'textContent: legge/imposta il testo dell\'elemento (sicuro, non interpreta HTML). innerHTML: legge/imposta HTML interno (interpreta tag — rischio XSS con input utente!). setAttribute("nome","val"): imposta attributo. getAttribute("nome"): legge attributo. removeAttribute("nome"): rimuove. classList.add("classe"), remove(), toggle(), contains() per gestire le classi CSS. style.property per stili inline.'},
      tabelle:   {label:'Manipolazione', title:'Costruzione tabelle dinamiche', text:'Struttura: table > thead/tbody > tr > th/td. Esempio: const tbody = document.getElementById("corpo"); dati.forEach(riga => { const tr = document.createElement("tr"); Object.values(riga).forEach(v => { const td = document.createElement("td"); td.textContent = v; tr.appendChild(td); }); tbody.appendChild(tr); }). Per aggiornare: tbody.innerHTML = "" per svuotare, poi ripopolarlo. Evitare innerHTML con dati utente.'},
      xhr:       {label:'AJAX', title:'XMLHttpRequest', text:'const xhr = new XMLHttpRequest(); xhr.open("GET","api.php?id=1",true); xhr.onreadystatechange = function(){ if(xhr.readyState===4 && xhr.status===200){ var data = JSON.parse(xhr.responseText); aggiornaDom(data); }}; xhr.send(); Per POST: xhr.open("POST","api.php",true); xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded"); xhr.send("id=1&nome=Mario"); readyState: 0=UNSENT, 1=OPENED, 2=HEADERS_RECEIVED, 3=LOADING, 4=DONE.'},
      'json-js': {label:'AJAX', title:'JSON in JavaScript', text:'JSON.parse(stringa): converte una stringa JSON in un oggetto/array JavaScript. Lancia SyntaxError se la stringa non è JSON valido — wrappare in try/catch. JSON.stringify(oggetto): converte un oggetto/array JS in una stringa JSON. Opzioni: JSON.stringify(obj, null, 2) per formattazione leggibile. Limitazioni: JSON non supporta undefined, funzioni, Date native (diventano stringhe).'},
      valform:   {label:'AJAX', title:'Validazione form lato client', text:'Controllo dei campi PRIMA dell\'invio al server: campi obbligatori, formato email (regex), lunghezza minima/massima, conferma password. HTML5: required, type="email", minlength, pattern. JS: intercettare submit → preventDefault() → validare → se ok, inviare via AJAX. IMPORTANTE: la validazione client-side migliora l\'UX ma NON garantisce sicurezza — serve sempre validazione server-side.'},
      console:   {label:'Debugging', title:'Console e strumenti di log', text:'console.log(valore): stampa in console. console.error(msg): stampa in rosso con stack trace. console.warn(msg): avviso in giallo. console.table(array): visualizza array/oggetti in tabella. console.group()/groupEnd(): raggruppa output. console.time("nome")/timeEnd("nome"): misura il tempo di esecuzione. debugger: keyword che sospende l\'esecuzione come un breakpoint — funziona solo con DevTools aperto.'},
      devtools:  {label:'Debugging', title:'Chrome DevTools (F12)', text:'Elements: DOM live — modificabile. Stili CSS ispezionabili e modificabili in tempo reale. Console: errori JS, log, esecuzione di codice interattivo. Sources: codice sorgente, breakpoints (clic sul numero di riga), F8 resume, F10 step over, F11 step into. Network: ogni richiesta HTTP con metodo, URL, status, payload, risposta. Application: localStorage, sessionStorage, cookie, Service Workers.'}
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
