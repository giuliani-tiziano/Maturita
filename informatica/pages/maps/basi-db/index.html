  <script>
    const NODES = {
      root:       { label:'Modulo 1', title:'Basi di Dati e Modello Relazionale', text:'Il modello relazionale organizza i dati in tabelle (relazioni) composte da righe (tuple) e colonne (attributi). Ogni relazione ha uno schema fisso e un\'istanza variabile. Il DBMS è il software che gestisce il ciclo di vita dei dati garantendo integrità, sicurezza e accesso concorrente.' },
      dbms:       { label:'Area 1', title:'DBMS', text:'Database Management System: sistema software che crea, organizza e interroga basi di dati. Fornisce: DDL per definire strutture, DML per manipolare dati, controllo accessi, garanzia dei vincoli di integrità, gestione delle transazioni (ACID), recupero da guasti.' },
      architettura:{ label:'Area 2', title:'Architettura ANSI/SPARC', text:'Separa la gestione dei dati in tre livelli indipendenti: esterno (le viste che ogni utente vede), logico (lo schema globale del database), fisico (come i dati sono scritti su disco). I due strati di indipendenza permettono di modificare la struttura fisica senza toccare le applicazioni.' },
      relazioni:  { label:'Area 3', title:'Struttura delle relazioni', text:'Una relazione ha schema fisso (nome + attributi + domini) e istanza variabile (le tuple attuali). Il grado è il numero di colonne. La cardinalità è il numero di righe. Le chiavi identificano univocamente ogni tupla: superchiave → candidata (minimale) → primaria (NOT NULL) → esterna (FK).' },
      vincoli:    { label:'Area 4', title:'Vincoli di integrità', text:'I vincoli garantiscono la correttezza dei dati. Intra-relazionali: dominio (tipo + CHECK), unicità (PRIMARY KEY, UNIQUE), NOT NULL. Inter-relazionali: integrità referenziale (FK deve puntare a PK esistente). Regole su violazione FK: CASCADE, RESTRICT, SET NULL, SET DEFAULT.' },
      algebra:    { label:'Area 5', title:'Algebra Relazionale', text:'Linguaggio formale procedurale alla base di SQL. Due categorie: operatori insiemistici (∪ ∩ − ×, richiedono schemi compatibili) e operatori relazionali (σ selezione, π proiezione, ⋈ join, ρ ridenominazione). L\'algebra è procedurale (specifica come); SQL è dichiarativo (specifica cosa).' },
      'sist-info':{ label:'DBMS', title:'Sistema informatico vs informativo', text:'Sistema informativo: insieme di risorse umane, organizzative e tecnologiche per raccogliere, elaborare e distribuire informazioni in un\'organizzazione. Sistema informatico: la sola componente tecnologica (hardware + software). Il sistema informatico è un sottoinsieme del sistema informativo.' },
      'funzioni-dbms':{ label:'DBMS', title:'Funzioni principali del DBMS', text:'DDL (Data Definition Language): definisce la struttura. DML (Data Manipulation Language): inserisce, modifica, elimina, interroga i dati. Gestione accessi e sicurezza. Garanzia dei vincoli di integrità. Transazioni ACID (Atomicità, Consistenza, Isolamento, Durabilità). Recupero da guasti.' },
      ansi:       { label:'Architettura', title:'Architettura ANSI/SPARC — 3 livelli', text:'Livello esterno: le viste specifiche di ogni utente/applicazione — ognuno vede solo i dati di sua pertinenza. Livello logico/concettuale: lo schema globale del DB, indipendente dall\'implementazione fisica. Livello fisico/interno: come i dati sono fisicamente memorizzati su disco.' },
      indipendenza:{ label:'Architettura', title:'Indipendenza dei dati', text:'Indipendenza logica: le applicazioni al livello esterno non dipendono dalla struttura del livello logico — posso aggiungere colonne senza toccare le applicazioni. Indipendenza fisica: lo schema logico non dipende da come i dati sono fisicamente organizzati su disco — posso cambiare l\'archiviazione senza toccare lo schema.' },
      phpma:      { label:'Architettura', title:'phpMyAdmin', text:'Interfaccia web grafica per amministrare database MySQL/MariaDB. Permette di creare/modificare tabelle, eseguire query SQL, importare ed esportare dati, gestire utenti e permessi — tutto senza usare la riga di comando. Strumento fondamentale in ambiente di sviluppo PHP+MySQL.' },
      struttura:  { label:'Relazioni', title:'Schema e istanza di una relazione', text:'Schema (statico): nome della relazione + lista degli attributi + domini — la struttura, relativamente stabile nel tempo. Istanza (dinamica): l\'insieme delle tuple presenti in un dato momento — cambia ad ogni INSERT, UPDATE, DELETE. Grado = numero di attributi (colonne). Cardinalità = numero di tuple (righe).' },
      chiavi:     { label:'Relazioni', title:'Gerarchia delle chiavi', text:'Superchiave: uno o più attributi che identificano univocamente ogni tupla. Chiave candidata: superchiave minimale — non si può togliere nessun attributo senza perdere l\'univocità. Chiave primaria: la candidata scelta come identificatore principale, non può essere NULL. Chiave esterna: attributo che referenzia la PK di un\'altra relazione.' },
      vdominio:   { label:'Vincoli', title:'Vincoli di dominio e colonna', text:'Dominio: specifica i valori ammissibili per un attributo — tipo di dato (INT, VARCHAR, DATE), range (CHECK voto BETWEEN 18 AND 30), valori fissi (ENUM). NOT NULL: l\'attributo deve avere sempre un valore. UNIQUE: i valori devono essere distinti nella colonna. DEFAULT: valore predefinito se non specificato.' },
      vref:       { label:'Vincoli', title:'Integrità referenziale e regole FK', text:'La chiave esterna deve puntare a un valore che esiste come PK nella tabella referenziata, oppure essere NULL (se permesso). Regole su violazione: CASCADE — la modifica/cancellazione si propaga ai figli. RESTRICT (NO ACTION) — blocca l\'operazione. SET NULL — la FK diventa NULL. SET DEFAULT — la FK prende il valore di default.' },
      null:       { label:'Vincoli', title:'Il valore NULL', text:'NULL indica assenza di informazione o valore sconosciuto. NON è zero, non è stringa vuota, non è false. Non si può confrontare con = (NULL = NULL è FALSE!): si usa IS NULL e IS NOT NULL. Effetti nelle query: funzioni aggregate ignorano i NULL, i JOIN li escludono, ORDER BY li posiziona all\'inizio o alla fine.' },
      'alg-ins':  { label:'Algebra', title:'Operatori insiemistici', text:'Richiedono relazioni con lo stesso schema (stesso numero e tipo di attributi). Unione (∪): tutte le tuple di A e di B, senza duplicati → UNION. Intersezione (∩): solo tuple presenti in entrambe → INTERSECT. Differenza (−): tuple di A non presenti in B → EXCEPT / NOT IN. Prodotto cartesiano (×): tutte le combinazioni possibili → FROM A, B.' },
      'alg-rel':  { label:'Algebra', title:'Operatori relazionali', text:'Selezione (σ condizione(R)): filtra le righe secondo una condizione — riduzione orizzontale → WHERE. Proiezione (π attributi(R)): seleziona colonne, elimina duplicati — riduzione verticale → SELECT. Join (R ⋈ condizione S): combina righe di due relazioni secondo una condizione → JOIN...ON. Ridenominazione (ρ): rinomina attributi o relazioni → AS.' }
    };

    function showNode(key) {
      var n = NODES[key]; if (!n) return;
      document.getElementById('tip-label').textContent = n.label || '';
      document.getElementById('tip-title').textContent = n.title || '';
      document.getElementById('tip-text').textContent  = n.text  || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeTip(); });
  </script>
  <script src="../../../js/main.js"></script>
</body>
</html>
