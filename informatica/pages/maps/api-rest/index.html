  <script>
    var NODES = {
      'root':{label:'Modulo 9',title:'API REST',text:'REST (Representational State Transfer) e\' uno stile architetturale per API web formulato da Roy Fielding nel 2000. Usa HTTP come protocollo e JSON come formato dati. E\' stateless, con URL per identificare risorse e metodi HTTP per le azioni.'},
      'principi':{label:'Area 1',title:'Principi REST',text:'6 vincoli: Stateless (ogni richiesta contiene tutto), Client-Server (responsabilita\' separate), Uniform Interface (URL + metodi HTTP standardizzati), Cacheable, Layered System, Code on Demand (opzionale). Stateless e Uniform Interface sono i piu\' importanti.'},
      'metodi':{label:'Area 2',title:'Metodi HTTP',text:'GET: legge (sicuro, idempotente). POST: crea (201 Created). PUT: sostituisce intera risorsa (idempotente). PATCH: aggiorna parzialmente. DELETE: elimina (204 No Content). Idempotente = ripetere N volte = stesso effetto.'},
      'json':{label:'Area 3',title:'JSON - scambio dati',text:'JavaScript Object Notation: formato testuale leggero. Oggetti {chiave:valore}, array [elem]. Tipi: string, number, boolean, null. PHP: json_encode/decode. JS: JSON.stringify/parse. Standard de facto per REST API moderno.'},
      'auth':{label:'Area 4',title:'Autenticazione API',text:'API Key: stringa segreta nell\'header X-API-Key. Semplice ma richiede lookup DB. JWT: token firmato (Header.Payload.Signature). Il server verifica la firma senza DB - stateless. Bearer token nell\'header Authorization.'},
      'client':{label:'Area 5',title:'Consumare API',text:'PHP cURL: curl_init, setopt(URL, RETURNTRANSFER, HTTPHEADER), curl_exec, curl_close, json_decode. JavaScript fetch(): fetch(url, {method, headers, body}) con Promise. Entrambi gestiscono GET, POST, header di autenticazione, body JSON.'},
      'stateless':{label:'Principi',title:'Stateless',text:'Il server non mantiene stato del client tra richieste. Ogni richiesta deve contenere TUTTE le informazioni (incluso token di autenticazione). Vantaggio: scalabilita\' orizzontale - qualsiasi server puo\' rispondere a qualsiasi richiesta.'},
      'uniform':{label:'Principi',title:'Uniform Interface',text:'URL identifica la risorsa: /api/utenti/42 e\' sempre l\'utente 42. Metodo HTTP definisce l\'azione: GET legge, POST crea, DELETE elimina. Interfaccia standardizzata - il client non deve conoscere l\'implementazione interna del server.'},
      'get-post-put':{label:'HTTP',title:'GET, POST, PUT',text:'GET: lettura sicura, idempotente, senza body -> 200. POST: crea risorsa, non idempotente, con body JSON -> 201 Created. PUT: sostituisce l\'intera risorsa, idempotente, richiede tutti i campi -> 200 o 204.'},
      'patch-del':{label:'HTTP',title:'PATCH e DELETE',text:'PATCH: aggiornamento parziale - invia solo i campi da modificare. DELETE: elimina la risorsa -> 204 No Content (nessun body). Entrambi idempotenti. Ripetere DELETE restituisce 404 (gia\' eliminata), non un errore critico.'},
      'status':{label:'HTTP',title:'Status codes',text:'2xx successo: 200 OK, 201 Created, 204 No Content. 4xx errore client: 400 Bad Request, 401 Unauthorized (non autenticato), 403 Forbidden (non autorizzato), 404 Not Found, 429 Too Many Requests. 5xx: 500 Internal Server Error.'},
      'json-struct':{label:'JSON',title:'Struttura JSON',text:'Oggetto: {"nome":"Mario","eta":25}. Array: [1,"due",true,null]. Tipi: string (virgolette), number, boolean, null, object, array. Nessuna funzione, nessuna data nativa (usare ISO 8601 come stringa), nessun commento.'},
      'json-conv':{label:'JSON',title:'Conversione JSON',text:'PHP: json_encode($array) -> stringa JSON. json_decode($str, true) -> array associativo. JS: JSON.stringify(obj) -> stringa. JSON.parse(str) -> oggetto. Errori: PHP restituisce null, JS lancia SyntaxError. Usare try/catch per gestirli.'},
      'apikey':{label:'Auth',title:'API Key',text:'Stringa segreta unica per client. Inviata nell\'header X-API-Key (non nell\'URL - verrebbe loggata). Il server la verifica nel DB. Pro: semplice. Contro: se rubata, accesso completo. Adatta per uso machine-to-machine.'},
      'jwt':{label:'Auth',title:'JSON Web Token',text:'Struttura: Header.Payload.Signature (Base64URL, separati da punti). Payload: sub (user id), iat (issued at), exp (expiration), ruolo. Il server verifica la firma con chiave segreta senza DB - stateless. Scadenza automatica tramite exp.'},
      'curl':{label:'Client',title:'cURL in PHP',text:'$ch = curl_init(); curl_setopt_array($ch, [CURLOPT_URL=>url, CURLOPT_RETURNTRANSFER=>true, CURLOPT_HTTPHEADER=>[\'Authorization: Bearer token\']]); $resp = curl_exec($ch); curl_close($ch); $data = json_decode($resp, true).'},
      'fetch':{label:'Client',title:'fetch() in JavaScript',text:'fetch(url, {method:\'POST\', headers:{\'Content-Type\':\'application/json\', \'Authorization\':\'Bearer \'+token}, body:JSON.stringify(data)}).then(r => {if(!r.ok)throw Error(r.status); return r.json();}).then(data => aggiornaUI(data)).'},
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
