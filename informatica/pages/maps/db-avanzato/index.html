  <script>
    var NODES = {
      'root':{label:'Modulo 10',title:'Gestione avanzata dei database',text:'Transazioni per garantire consistenza, indici per le performance, backup per l\'affidabilita\', NoSQL come alternativa per certi casi d\'uso, ORM per lo sviluppo rapido, scalabilita\' per i grandi volumi. InnoDB in MySQL supporta tutto questo.'},
      'transazioni':{label:'Area 1',title:'Transazioni ACID',text:'Una transazione e\' un gruppo di operazioni che devono essere eseguite tutte o nessuna. ACID: Atomicita\' (tutto o niente), Consistenza (stato valido), Isolamento (no interferenze), Durabilita\' (persiste dopo crash). InnoDB supporta ACID nativamente.'},
      'isolamento':{label:'Area 2',title:'Isolamento e concorrenza',text:'Gestisce accessi concorrenti al DB. Livelli: READ UNCOMMITTED (dirty reads), READ COMMITTED (no dirty), REPEATABLE READ (default MySQL), SERIALIZABLE (massimo). Deadlock: due transazioni si bloccano. MySQL fa ROLLBACK del victim automaticamente.'},
      'indici':{label:'Area 3',title:'Indici e ottimizzazione',text:'B-tree index: accesso rapido a range e eguaglianza. EXPLAIN mostra il piano: type=ALL e\' full scan pericoloso, key=NULL significa nessun indice usato. Aggiungere indici su colonne in WHERE/JOIN frequenti con alta cardinalita\'.'},
      'nosql':{label:'Area 4',title:'NoSQL e MongoDB',text:'NoSQL per certi casi d\'uso: schema flessibile (schemaless), scalabilita\' orizzontale. MongoDB: documenti JSON/BSON, Collections invece di tabelle. SQL: schema fisso, ACID, JOIN. Non uno e\' superiore - diversi casi d\'uso.'},
      'architetture':{label:'Area 5',title:'Backup, ORM e scalabilita'',text:'mysqldump per backup SQL. ORM astrae SQL in oggetti (Eloquent, Hibernate). Scalabilita\' verticale: piu\' CPU/RAM. Orizzontale: piu\' server. Replicazione master-slave per alta disponibilita\'.'},
      'acid':{label:'Transazioni',title:'Proprieta' ACID',text:'Atomicita\': tutto o niente, ROLLBACK se errore. Consistenza: stato valido to stato valido, rispetta vincoli. Isolamento: transazioni concorrenti non si interferiscono. Durabilita\': dopo COMMIT i dati persistono anche dopo crash (transaction log).'},
      'bcr':{label:'Transazioni',title:'BEGIN / COMMIT / ROLLBACK',text:'START TRANSACTION (BEGIN): avvia. COMMIT: conferma tutte le modifiche permanentemente. ROLLBACK: annulla tutto dall\'ultimo BEGIN. In PHP: $conn->begin_transaction(); try{...commit();}catch{rollback();}. Con SAVEPOINT per ripristini parziali.'},
      'deadlock':{label:'Isolamento',title:'Deadlock',text:'T1 attende T2 e T2 attende T1 - ciclo. MySQL rileva automaticamente e fa ROLLBACK del victim (transazione piu\' giovane). Prevenzione: accedere alle risorse sempre nello stesso ordine, transazioni brevi, evitare SELECT FOR UPDATE non necessari.'},
      'isolation':{label:'Isolamento',title:'Livelli di isolamento',text:'READ UNCOMMITTED: dirty reads possibili. READ COMMITTED: vede solo committed. REPEATABLE READ: default MySQL InnoDB, stessa riga stabile nella transazione. SERIALIZABLE: massimo isolamento, minima concorrenza - come esecuzione seriale.'},
      'savepoint':{label:'Isolamento',title:'SAVEPOINT',text:'Punto di ripristino parziale dentro una transazione: SAVEPOINT sp1; ... ROLLBACK TO sp1 (torna a sp1 senza annullare tutto); RELEASE SAVEPOINT sp1 (rimuove il punto). Utile per transazioni complesse con parti recuperabili in caso di errore.'},
      'btree':{label:'Indici',title:'B-tree index',text:'Struttura ad albero bilanciato default di InnoDB. Supporta: eguaglianza (=), range (<,>,BETWEEN), LIKE \'prefix%\', ORDER BY. NON supporta LIKE \'%suffix\'. Creato automaticamente su PK e FK. CREATE INDEX nome ON tabella(colonna) per aggiungerne.'},
      'explain':{label:'Indici',title:'EXPLAIN',text:'EXPLAIN SELECT ... mostra: type (ALL=full scan pericoloso, ref/const=usa indice), key (quale indice, NULL se nessuno!), rows (stima righe - meno e\' meglio), Extra (Using filesort=lento, Using index=ottimale). Sintomo tipico: type=ALL con rows alto.'},
      'nosql-sql':{label:'NoSQL',title:'SQL vs NoSQL',text:'SQL: schema fisso, ACID, JOIN, ottimale per dati strutturati e relazioni. NoSQL: schema flessibile, scalabilita\' orizzontale, ottimale per big data e schemi variabili. Non e\' una questione di quale sia migliore - scegliere in base al caso d\'uso specifico.'},
      'mongo':{label:'NoSQL',title:'MongoDB',text:'Database to Collections to Documents (BSON/JSON). db.collection.find({campo:valore}) per query, insertOne, updateOne, deleteOne. Documenti nella stessa collection possono avere campi diversi - schema flessibile. _id generato automaticamente (ObjectId).'},
      'backup':{label:'Architetture',title:'Backup con mysqldump',text:'mysqldump -u root -p nomeDB > backup.sql: export SQL con CREATE TABLE e INSERT. mysql -u root -p nomeDB < backup.sql: ripristino. Aggiungere | gzip per comprimere. --all-databases per backup completo. Pianificare con cron e testare regolarmente il ripristino!'},
      'orm':{label:'Architetture',title:'ORM',text:'Mappa oggetti del linguaggio a tabelle DB astrandso SQL. Eloquent (Laravel PHP), SQLAlchemy (Python), Hibernate (Java). Pro: sviluppo rapido, meno codice SQL, portabilita\' tra DB. Contro: query generate possono essere inefficienti (N+1 problem).'},
      'scala':{label:'Architetture',title:'Scalabilita' e replicazione',text:'Verticale: piu\' CPU/RAM allo stesso server - semplice ma limite fisico. Orizzontale: piu\' server in parallelo - NoSQL ottimizzato per questo. Replicazione master-slave: master gestisce scritture, slave letture. Alta disponibilita\' con failover automatico.'},
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
