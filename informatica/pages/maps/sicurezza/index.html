  <script>
    var NODES = {
      root:      {label:'Modulo 7',title:'Sicurezza delle applicazioni web',text:'La sicurezza web riguarda la protezione delle applicazioni da attacchi che sfruttano errori di programmazione. I tre pilastri sono la CIA Triad. Le vulnerabilità più comuni (OWASP Top 10) includono SQL Injection, XSS, CSRF e autenticazione insicura.'},
      cia:       {label:'Area 1',title:'CIA Triad',text:'I tre pilastri della sicurezza informatica: Confidenzialità (solo autorizzati accedono), Integrità (dati non alterati non autorizzatamente), Disponibilità (servizi accessibili quando servono). Ogni controllo di sicurezza protegge uno o più di questi pilastri.'},
      injection: {label:'Area 2',title:'SQL Injection e difese',text:'SQL Injection: input malevolo viene inserito in query SQL modificandone la logica. Difesa OBBLIGATORIA: prepared statements con bind_param(). MAI concatenare input utente in SQL. Validazione server-side sempre necessaria.'},
      'xss-csrf':{label:'Area 3',title:'XSS e CSRF',text:'XSS inietta JavaScript nell\'HTML della pagina. Difesa: htmlspecialchars() in PHP, textContent in JS. CSRF forza il browser a inviare richieste non volute. Difesa: token CSRF nel form + SameSite=Strict nei cookie.'},
      password:  {label:'Area 4',title:'Password e sessioni',text:'Password: MAI md5/sha1. Usare password_hash($pwd, PASSWORD_BCRYPT) per il salvataggio, password_verify() per la verifica. Sessioni: HttpOnly e Secure sui cookie, session_regenerate_id(true) dopo login, timeout breve.'},
      https:     {label:'Area 5',title:'HTTPS e security headers',text:'HTTPS usa TLS per crittografare il traffico (confidenzialità, integrità, autenticazione server). Security headers: HSTS (forza HTTPS), CSP (limita fonti script, previene XSS), X-Frame-Options (previene clickjacking).'},
      confidenz: {label:'CIA',title:'Confidenzialità',text:'Solo gli utenti autorizzati possono leggere i dati. Strumenti: autenticazione (login), autorizzazione (permessi), cifratura (HTTPS), controllo accessi. Violazione: un attaccante legge i dati di altri utenti.'},
      integrita: {label:'CIA',title:'Integrità e Disponibilità',text:'Integrità: i dati non vengono modificati non autorizzatamente (checksum, vincoli DB, log). Disponibilità: i servizi sono accessibili (prevenzione DDoS, backup, ridondanza). Entrambi fanno parte della CIA Triad.'},
      sqli:      {label:'Injection',title:'SQL Injection — dettaglio',text:'Esempio: form login con input \' OR \'1\'=\'1 → la query diventa "WHERE email=\'\' OR \'1\'=\'1\'" che è sempre vera. Un attaccante può leggere tutti i dati, modificarli o cancellare tabelle. Con prepared statements il parametro è trattato come dato, non come SQL.'},
      prepared:  {label:'Injection',title:'Prepared Statements',text:'$stmt = $conn->prepare("SELECT * FROM u WHERE email=?"); $stmt->bind_param("s", $email); $stmt->execute(); — Il ? è il segnaposto. bind_param specifica il tipo (s=string, i=int, d=double). Il driver MySQL tratta il parametro come puro dato, non può mai diventare codice SQL.'},
      validate:  {label:'Injection',title:'Validazione input',text:'Client-side (JavaScript): migliora UX, feedback immediato. FACILMENTE aggirabile — non è sicurezza. Server-side (PHP): obbligatoria per la sicurezza. Whitelist: accettare solo valori consentiti (es. per nomi colonne in ORDER BY dinamico).'},
      xss:       {label:'XSS/CSRF',title:'Cross-Site Scripting (XSS)',text:'Tipi: Reflected (URL → pagina), Stored (nel DB poi mostrato ad altri), DOM-based (manipolazione client-side). Difesa PHP: htmlspecialchars($input, ENT_QUOTES, \'UTF-8\') su tutto l\'output utente. Difesa JS: usare textContent invece di innerHTML. CSP header come difesa aggiuntiva.'},
      csrf:      {label:'XSS/CSRF',title:'Cross-Site Request Forgery',text:'Un sito evil.com può inviare richieste autenticate a banca.com se la vittima è loggata. Difesa: token CSRF nel form (bin2hex(random_bytes(32))), verificato server-side. Cookie SameSite=Strict impedisce l\'invio cross-site. Double Submit Cookie è un\'alternativa senza sessione.'},
      hash:      {label:'Password',title:'Hashing bcrypt',text:'password_hash() usa bcrypt con salt casuale automatico. Il risultato include salt+hash in una stringa ($2y$...). password_verify($input, $stored) confronta in modo sicuro (constant-time). MAI usare md5/sha1: troppo veloci, attaccabili con GPU, vulnerabili a rainbow table attack.'},
      session:   {label:'Password',title:'Sessioni sicure',text:'session_start() prima di qualsiasi output. session_regenerate_id(true) dopo login (previene session fixation). Cookie: HttpOnly (JS non legge), Secure (solo HTTPS), SameSite=Strict (previene CSRF). Timeout: verificare il tempo trascorso e session_destroy() se scaduta.'},
      depth:     {label:'Password',title:'Defense in depth',text:'Nessun singolo controllo è sufficiente — applicare più strati: validazione input + prepared statements + htmlspecialchars + HTTPS + password_hash + sessioni sicure + security headers + backup. Se un livello fallisce, gli altri proteggono.'},
      tls:       {label:'HTTPS',title:'HTTPS e TLS',text:'TLS (Transport Layer Security) è il successore di SSL. Garantisce: confidenzialità (cifratura), integrità (MAC), autenticazione server (certificato X.509). TLS 1.3 è la versione più moderna. Let\'s Encrypt offre certificati gratuiti per siti pubblici.'},
      headers:   {label:'HTTPS',title:'Security Headers',text:'HSTS: Strict-Transport-Security: max-age=31536000; includeSubDomains → forza HTTPS. CSP: Content-Security-Policy: default-src \'self\' → limita fonti script (mitiga XSS). X-Frame-Options: DENY → previene clickjacking. X-Content-Type-Options: nosniff → previene MIME sniffing.'}
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
