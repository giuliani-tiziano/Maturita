  <script>
    var NODES = {
      root:       {label:'Modulo 6', title:'Le 3 fasi della progettazione DB', text:'Concettuale: analisi dei requisiti → diagramma E/R — indipendente da qualsiasi DBMS. Logica: traduzione E/R → schema relazionale (tabelle + PK + FK) + normalizzazione fino a 3NF — ancora indipendente dal DBMS. Fisica: implementazione concreta in MySQL con tipi di dato, vincoli SQL, indici e motore storage.'},
      er:         {label:'Area 1', title:'Fase concettuale — E/R', text:'Il diagramma Entità/Relazione rappresenta visivamente la struttura dei dati. Entità (rettangolo): oggetto con esistenza autonoma (Studente, Corso). Attributo (ellisse): proprietà di un\'entità. Chiave (ellisse sottolineata): identifica univocamente le istanze. Associazione (rombo): relazione tra entità. Cardinalità: quante istanze partecipano (1:1, 1:N, N:N). Linea doppia = partecipazione obbligatoria.'},
      'er-avanzato':{label:'Area 2', title:'E/R avanzato', text:'Entità debole: no chiave autonoma, dipende da entità forte (doppio rettangolo nel diagramma). Gerarchia ISA: figlia "è un tipo di" padre — eredita attributi. Tipi: totale (ogni padre ha una figlia) vs parziale. Esclusiva (in una sola figlia) vs sovrapposta. Associazione con attributi: l\'associazione N:N può avere propri attributi (es. data_iscrizione tra Studente e Corso). Associazioni unarie (ricorsive) e ternarie.'},
      logica:     {label:'Area 3', title:'Fase logica — Schema relazionale', text:'Traduzione delle regole E/R in tabelle relazionali. Ogni entità forte → tabella con PK. Associazione 1:N → FK nel lato molti. Associazione N:N → tabella ponte con PK composta {FK_A, FK_B} + eventuali attributi. Entità debole → tabella con PK = discriminante + FK entità forte. ISA → 3 strategie: tabella unica (con attributo tipo), padre+figlie, solo figlie.'},
      normaliz:   {label:'Area 4', title:'Normalizzazione', text:'Processo per eliminare ridondanze e anomalie nelle relazioni. 1NF: attributi atomici (valori indivisibili), PK definita. 2NF: soddisfa 1NF + ogni attributo non-chiave dipende dall\'INTERA PK composta (no dipendenze parziali). 3NF: soddisfa 2NF + nessuna dipendenza transitiva tra non-chiave (A→B→C dove B non è chiave → anomalia). La normalizzazione risolve anomalie di inserimento, cancellazione e aggiornamento.'},
      fisica:     {label:'Area 5', title:'Fase fisica — MySQL', text:'Implementazione concreta dello schema logico in MySQL. Scelta tipi di dato. Definizione vincoli SQL (NOT NULL, UNIQUE, CHECK, DEFAULT, AUTO_INCREMENT). Definizione delle FOREIGN KEY con ON DELETE/UPDATE. ENGINE=InnoDB (obbligatorio per FK). Indici: CREATE INDEX per colonne usate frequentemente in WHERE e ORDER BY. Strumenti: phpMyAdmin, HeidiSQL.'},
      'er-notaz': {label:'Concettuale', title:'Notazione E/R', text:'Entità: rettangolo con nome al singolare. Attributo: ellisse collegata all\'entità — se sottolineato è chiave. Associazione: rombo con nome al centro, linee alle entità. Cardinalità: si indica sulla linea (0,1), (1,1), (0,N), (1,N). Doppio rettangolo = entità debole. Doppio rombo = relazione identificante per entità debole. Doppia ellisse = attributo multivalore. Ellisse divisa = attributo composto.'},
      cardinalita:{label:'Concettuale', title:'Cardinalità delle associazioni', text:'1:1 (uno a uno): ogni istanza di A è associata a una sola di B e viceversa. Rara. Esempio: Persona — Passaporto. 1:N (uno a molti): un\'istanza di A è associata a molte di B. Esempio: Dipartimento — Dipendente. N:N (molti a molti): molte A a molte B. Esempio: Studente — Corso. Partecipazione obbligatoria (linea doppia): ogni istanza DEVE partecipare. Opzionale: può non partecipare.'},
      entdeb:     {label:'E/R Avanzato', title:'Entità deboli', text:'Un\'entità è debole quando non ha attributi sufficienti per identificarsi da sola. Ha una chiave parziale (discriminante) che, combinata con la PK dell\'entità forte, forma la sua chiave completa. Nel diagramma E/R: doppio rettangolo (entità debole) collegato da doppio rombo (relazione identificante) all\'entità forte. Esempio: VoceOrdine (debole) → Ordine (forte). La PK di VoceOrdine = {id_ordine, num_riga}.'},
      isa:        {label:'E/R Avanzato', title:'Gerarchie ISA', text:'ISA (Is-A): l\'entità figlia "è un tipo di" entità padre. Le figlie ereditano tutti gli attributi del padre. Tipi: Copertura totale (ogni istanza padre è in almeno una figlia) vs parziale (subset: può non essere in nessuna figlia). Copertura esclusiva (ogni istanza è in al massimo una figlia) vs sovrapposta. Esempio: Persona ISA Studente/Professore (esclusiva parziale). Ristrutturazione: eliminare ISA prima della traduzione logica.'},
      'assoc-attr':{label:'E/R Avanzato', title:'Associazioni con attributi', text:'Un\'associazione N:N può avere propri attributi che non appartengono né all\'entità A né alla B, ma alla relazione tra le due. Esempio: l\'associazione FREQUENTA tra Studente (N) e Corso (N) ha attributo data_iscrizione e voto_finale — non appartengono a Studente né a Corso, ma alla frequenza specifica. In fase logica: questi attributi diventano colonne nella tabella ponte.'},
      '1n':       {label:'Logica', title:'Traduzione cardinalità 1:N', text:'Regola: la PK dell\'entità "uno" diventa FK nell\'entità "molti". Non si crea tabella aggiuntiva. Esempio: Dipartimento(id_dip PK, nome) 1:N Dipendente(id_dip PK, nome, id_dipartimento FK). Partecipazione obbligatoria del lato "molti": FK NOT NULL. Partecipazione opzionale: FK ammette NULL. Se entrambi i lati sono 1:1 obbligatorio, si può fondere in un\'unica tabella.'},
      nn:         {label:'Logica', title:'Traduzione cardinalità N:N', text:'Regola: si crea una tabella ponte (junction table) con: FK verso entità A, FK verso entità B, eventuali attributi dell\'associazione, PK composta = {FK_A, FK_B}. Esempio: Studente(id_stud) N:N Corso(id_corso) → Iscrizione(id_stud FK, id_corso FK, data_iscr, voto) PK(id_stud, id_corso). Le due FK referenziano le PK delle rispettive entità con ON DELETE appropriato.'},
      '1nf':      {label:'Normalizzazione', title:'1NF e 2NF', text:'1NF (Prima Forma Normale): ogni attributo deve essere atomico (valore singolo, non array o set), la tabella ha una PK definita, non ci sono gruppi ripetuti. Contro-esempio 1NF: Telefoni="333-1,339-2" viola la 1NF. 2NF (Seconda Forma Normale): soddisfa 1NF + ogni attributo non-chiave dipende DALL\'INTERA PK composta. Si applica solo quando la PK è composta. Contro-esempio 2NF: PK=(id_ordine, id_prodotto), ma nome_prodotto dipende solo da id_prodotto (dipendenza parziale).'},
      '3nf':      {label:'Normalizzazione', title:'3NF e anomalie', text:'3NF (Terza Forma Normale): soddisfa 2NF + nessuna dipendenza transitiva tra non-chiave. A→B, B→C dove B non è chiave → anomalia transitiva. Contro-esempio 3NF: Dipendente(id, id_reparto, nome_reparto) — nome_reparto dipende da id_reparto (non dalla PK id). Anomalie: inserimento (impossibile inserire un reparto senza dipendenti), cancellazione (eliminando l\'ultimo dipendente si perde il nome del reparto), aggiornamento (cambiare nome reparto richiede aggiornare tutte le righe).'},
      dipfunz:    {label:'Normalizzazione', title:'Dipendenze funzionali', text:'A → B: il valore di A determina univocamente il valore di B. Dato A, esiste uno e un solo B. A è il determinante, B è il dipendente. La PK determina tutti gli altri attributi. Dipendenza parziale: attributo non-chiave dipende da PARTE della PK composta (viola 2NF). Dipendenza transitiva: A→B e B→C dove B non è chiave (viola 3NF). Identificare le dipendenze è il primo passo per la normalizzazione.'},
      tipi:       {label:'Fisica', title:'Tipi di dato MySQL', text:'INT/BIGINT: numeri interi (id, quantità). VARCHAR(n): testo a lunghezza variabile (nome, email). TEXT: testo lungo (descrizioni). DATE: data YYYY-MM-DD. DATETIME/TIMESTAMP: data e ora. DECIMAL(p,s): numeri decimali precisi — usare per importi monetari (MAI FLOAT/DOUBLE per i soldi!). TINYINT(1): booleano. ENUM("val1","val2"): lista di valori fissi. AUTO_INCREMENT: incremento automatico per gli ID.'},
      'create-table':{label:'Fisica', title:'CREATE TABLE e ottimizzazione', text:'CREATE TABLE Studenti (id INT PRIMARY KEY AUTO_INCREMENT, nome VARCHAR(50) NOT NULL, email VARCHAR(100) UNIQUE NOT NULL, id_corso INT, FOREIGN KEY(id_corso) REFERENCES Corsi(id) ON DELETE SET NULL ON UPDATE CASCADE, data_iscrizione DATE DEFAULT CURRENT_DATE) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4. Indici: CREATE INDEX idx_nome ON Studenti(cognome) — velocizza WHERE e ORDER BY sulla colonna indicizzata.'}
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
