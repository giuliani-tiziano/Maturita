  <script>
    var NODES = {
      root:      {label:'Modulo 2', title:'PHP lato Server', text:'PHP è un linguaggio server-side: il codice viene eseguito sul server (Apache/Nginx) che elabora la richiesta HTTP, accede al database MySQL, genera HTML dinamico e lo restituisce al browser. Il codice sorgente PHP non è mai visibile al client — solo l\'output HTML.'},
      archi:     {label:'Area 1', title:'Architettura Client/Server', text:'Il browser invia richieste HTTP al server web. PHP le riceve, esegue la logica di business, interroga MySQL, produce HTML e lo restituisce. Il flusso completo: browser → GET/POST → PHP → MySQL → array PHP → HTML → browser. La separazione client/server garantisce sicurezza e scalabilità.'},
      sintassi:  {label:'Area 2', title:'Sintassi PHP', text:'Variabili: nomi con $ (case-sensitive). Tipi: int, float, string, bool, array, null. Costanti: define("NOME", valore) o const NOME = valore. Operatori aritmetici + . (concatenazione). Strutture: if/elseif/else, switch/case, operatore ternario. Cicli: for, while, do-while, foreach.'},
      form:      {label:'Area 3', title:'Gestione Form e HTTP', text:'GET: dati nell\'URL (visibili, max ~2KB, idempotente, bookmark) — per ricerche. POST: dati nel body HTTP (invisibili, nessun limite, non idempotente) — per login e dati sensibili. Sempre validare e sanitizzare l\'input: htmlspecialchars() per prevenire XSS, prepared statements per prevenire SQL injection.'},
      sessioni:  {label:'Area 4', title:'Sessioni e Autenticazione', text:'Cookie: file sul client (max ~4KB), persistenti. Sessioni: dati sul server, al client solo session_id nel cookie PHPSESSID. Avviare con session_start() prima di qualsiasi output. Autenticazione: password_hash($pwd, PASSWORD_BCRYPT) genera hash sicuro con salt. password_verify($input, $hash) confronta senza timing attack.'},
      database:  {label:'Area 5', title:'MySQLi e JSON', text:'MySQLi: new mysqli($host,$user,$pwd,$db) → prepare("SELECT ? WHERE...") → bind_param("s",$val) → execute() → get_result() → fetch_assoc(). SEMPRE prepared statements per prevenire SQL injection. JSON: header("Content-Type:application/json") + echo json_encode($array) per risposta AJAX. json_decode($str,true) per ricevere JSON.'},
      cs:        {label:'Architettura', title:'Ciclo richiesta/risposta', text:'1. Utente clicca/invia form nel browser. 2. Browser invia richiesta HTTP (GET o POST) al server. 3. Server web (Apache) passa la richiesta a PHP. 4. PHP esegue il codice: legge $_GET/$_POST, interroga MySQL, costruisce output. 5. PHP genera HTML. 6. Server restituisce HTML al browser. 7. Browser renderizza la pagina.'},
      scope:     {label:'Architettura', title:'Scope e variabili superglobali', text:'Le variabili PHP hanno scope locale per default (dentro le funzioni). Per usare variabili globali dentro una funzione: global $var oppure $GLOBALS["var"]. Superglobali (accessibili ovunque senza global): $_GET (URL params), $_POST (form POST), $_SESSION (sessione server), $_COOKIE, $_FILES (upload), $_SERVER (info server), $_REQUEST.'},
      variabili: {label:'Sintassi', title:'Variabili e tipi di dato', text:'Variabili: iniziano con $, senza dichiarazione di tipo (tipizzazione dinamica). Tipi scalari: int (numeri interi), float (decimali), string (testo, con apici o virgolette), bool (true/false). Tipi composti: array (indicizzato o associativo), object. Tipo speciale: null. Casting: (int)$var, (string)$var, intval(), strval().'},
      strutture: {label:'Sintassi', title:'Strutture di controllo', text:'Selezione: if ($cond) {...} elseif {...} else {...}. switch ($var) { case valore: ... break; default: ...}. Ternario: $x = ($cond) ? $a : $b. Cicli: for ($i=0; $i<10; $i++) {...}. while ($cond) {...}. do {...} while ($cond). foreach ($arr as $k => $v) {...} — ideale per array.'},
      array:     {label:'Sintassi', title:'Array e funzioni', text:'Array indicizzati: $a = [10,20,30]; $a[0] = 10. Array associativi: $u = ["nome"=>"Mario","eta"=>20]. Funzioni utili: count() (dimensione), sort()/ksort() (ordinamento), array_push/pop (stack), in_array() (ricerca), array_merge() (fusione), array_map/filter() (trasformazione). Funzioni personalizzate: function nome($param) { return $val; }.'},
      getpost:   {label:'Form', title:'GET vs POST', text:'GET: dati aggiunti all\'URL come ?chiave=valore. Visibili, salvati nella cronologia, max ~2KB. Idempotente (ripetibile). Usare per ricerche, filtri, navigazione — mai per dati sensibili. POST: dati nel body HTTP, non visibili nell\'URL, nessun limite pratico di dimensione. Usare per login, registrazione, upload, operazioni che modificano dati.'},
      xss:       {label:'Form', title:'Sicurezza form e XSS', text:'Cross-Site Scripting: attacco che inietta JavaScript malevolo nell\'HTML. Prevenzione: htmlspecialchars($input, ENT_QUOTES, "UTF-8") converte < in &lt;, > in &gt;, " in &quot; ecc. SEMPRE applicarlo prima di stampare input utente nell\'HTML. Per SQL: MAI concatenare input in query — usare prepared statements con bind_param().'},
      cookie:    {label:'Sessioni', title:'Cookie e sessioni', text:'Cookie: setcookie("nome", "valore", time()+3600) invia cookie al browser (scadenza 1 ora). Si leggono con $_COOKIE["nome"]. Max ~4KB, visibili all\'utente. Sessioni: session_start() (PRIMA di qualsiasi output!) avvia/riprende sessione. Dati in $_SESSION["chiave"] = valore. Sono sul server. session_destroy() al logout.'},
      auth:      {label:'Sessioni', title:'Autenticazione e hashing', text:'Registrazione: ricevere pwd da form → password_hash($pwd, PASSWORD_BCRYPT) → salva hash nel DB (MAI la password in chiaro!). Login: recupera hash dal DB per l\'email → password_verify($inputPwd, $hashDB) → se true, session_start() → $_SESSION["userId"] = $id → redirect. Logout: session_destroy(). session_regenerate_id(true) dopo login.'},
      file:      {label:'Sessioni', title:'Gestione file', text:'fopen($percorso, $modalità): r (lettura), w (scrittura, tronca), a (append), r+ (lettura+scrittura). fgets($handle) legge riga per riga. fread($handle, $bytes) legge n byte. fwrite($handle, $stringa) scrive. fclose($handle) chiude. Scorciatoie: file_get_contents($path) legge tutto il file in stringa. file_put_contents($path, $data) scrive/sovrascrive intero file.'},
      mysqli:    {label:'Database', title:'MySQLi e prepared statements', text:'$conn = new mysqli($host,$user,$pwd,$db); if($conn->connect_error) die(...). Prepared statement (OBBLIGATORIO con input utente): $stmt = $conn->prepare("SELECT * FROM t WHERE id=?"); $stmt->bind_param("i", $id); $stmt->execute(); $result = $stmt->get_result(); while($row = $result->fetch_assoc()) {...}. Tipi bind_param: i=int, s=string, d=double, b=blob.'},
      json:      {label:'Database', title:'JSON in PHP', text:'json_encode($array): converte array/oggetto PHP → stringa JSON. Opzioni utili: JSON_PRETTY_PRINT (formattazione leggibile), JSON_UNESCAPED_UNICODE (mantieni caratteri speciali). json_decode($str, true): converte JSON → array associativo PHP (true) o oggetto stdClass (false/omesso). Workflow AJAX: php fa query → array → json_encode → echo con Content-Type: application/json.'}
    };
    function showNode(k){var n=NODES[k];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeTip();});
  </script>
  <script src="../../../js/main.js"></script>
</body>
</html>
