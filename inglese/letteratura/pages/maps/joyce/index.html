<script>
  const NODES = {
    root: { label: 'Author', title: 'James Joyce', text: 'Born in Dublin, 2 February 1882. Educated by Jesuits at Clongowes Wood and Belvedere College, then University College Dublin. Left Ireland in 1904 with Nora Barnacle — he called her "my portable Ireland." Lived in Trieste, Zurich and Paris. Wrote Dubliners, A Portrait of the Artist, Ulysses and Finnegans Wake. Died in Zurich, 13 January 1941.' },
    life: { label: 'Category', title: 'Life', text: '1882: Born Dublin. Jesuit education — rigorous, intellectual, guilt-ridden. 1902: Meets Nora Barnacle. 1904: Leaves Ireland for Trieste. 1907: Chamber Music (poems). 1914: Dubliners published (after 9 years of publisher refusals). 1916: A Portrait of the Artist as a Young Man. 1920: Moves to Paris. 1922: Ulysses published by Sylvia Beach at Shakespeare and Company. 1939: Finnegans Wake. 1941: Dies of a perforated ulcer in Zurich.' },
    exile: { label: 'Category', title: 'Exile & Ireland', text: 'Joyce left Ireland voluntarily in 1904 but never stopped writing about Dublin. Ireland was his creative obsession and his prison. The Catholic Church, Irish nationalism, and the colonial relationship with England were the three "nets" he said were "flung at the soul" — language, nationality, religion. Stephen Dedalus in Portrait declares his programme: "I will not serve" — exile, silence, cunning.' },
    technique: { label: 'Category', title: 'Technique', text: 'Joyce\'s technical innovations define literary modernism. Stream of consciousness: the direct transcription of thought without authorial mediation. In Ulysses it becomes increasingly radical — Chapter 18 (Molly Bloom\'s monologue) has no punctuation whatsoever. The mythical method (T.S. Eliot\'s term): using Homer\'s Odyssey as a structural parallel for one day in modern Dublin. Language experimentation: portmanteau words, multilingual puns, imitation of all literary styles.' },
    works: { label: 'Category', title: 'Major Works', text: 'Dubliners (1914): 15 short stories of Dublin life — each anatomises a form of paralysis, ending with The Dead. A Portrait of the Artist as a Young Man (1916): bildungsroman of Stephen Dedalus, the artist rejecting family, church and nation. Ulysses (1922): one day (16 June 1904) in Dublin, structured on Homer\'s Odyssey. Finnegans Wake (1939): almost entirely written in portmanteau language — the most experimental novel in English.' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Paralysis: Dublin and Ireland are paralysed by the Church, by nationalism, by colonial subjection. The artist must escape ("fly by these nets"). Epiphany: sudden moments of revelation that illuminate the ordinary. Exile: the artist must leave to see clearly. Ireland is both beloved and imprisoning. The mythical method: modern life parallels ancient myth — Bloom as Ulysses, Stephen as Telemachus, Molly as Penelope.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Woolf: both use stream of consciousness, but Joyce is more radical (Molly\'s unpunctuated monologue). Joyce focuses on the body and sexuality; Woolf on perception and gender. vs Ibsen: Joyce admired Ibsen and wrote him a letter at 18. Both examine social paralysis and the artist\'s need to escape convention. vs Homer: Ulysses explicitly parallels the Odyssey — Bloom/Ulysses, Stephen/Telemachus, Molly/Penelope, the Cyclops/Citizen.' },
    'life-dublin': { label: 'Life', title: 'Dublin Origins', text: 'John Stanislaus Joyce (father): failed singer, wit, heavy drinker — source of the comedy and the charm in Joyce\'s fiction. Jesuit education: Clongowes Wood College (like Stephen in Portrait), then Belvedere College Dublin, then University College Dublin. The Jesuit training gave Joyce his rigour, his capacity for guilt, his love of structure, and his need to break free. He learned Italian, French, Norwegian (to read Ibsen).' },
    'life-exile': { label: 'Life', title: 'Self-exile (1904)', text: '16 June 1904: the day Joyce first walked out with Nora Barnacle — Bloomsday, the day of Ulysses. They left for Trieste (then Austria-Hungary) the same year. Joyce taught English at the Berlitz school. He would only return to Ireland twice, briefly, in 1909 and 1912 — never again after that. Paris (from 1920): Sylvia Beach (Shakespeare and Company bookshop) became his publisher and patron. He wrote Ulysses in Paris during WWI.' },
    'exile-paralysis': { label: 'Exile & Ireland', title: 'Paralysis of Dublin', text: '"It is not my fault that the odour of ashpits and old weeds and offal hangs round my stories. I seriously believe that you will retard the course of civilisation in Ireland by preventing the Irish people from having one good look at themselves in my nicely polished looking-glass." (Letter to the publisher refusing Dubliners). Paralysis: physical, moral and spiritual. Each story in Dubliners ends in stasis — no movement, no escape. The final story (The Dead) reaches the furthest into paralysis but also the deepest into beauty.' },
    'exile-epiphany': { label: 'Exile & Ireland', title: 'Epiphany', text: 'Joyce\'s concept of epiphany (from Greek: manifestation). In Stephen Hero (early draft of Portrait) he defines it: "a sudden spiritual manifestation, whether in the vulgarity of speech or of gesture or in a memorable phase of the mind itself." A moment when the ordinary suddenly reveals its hidden significance. Not always beautiful — can be squalid or embarrassing. The revelation is in the attention, not the object. Each story in Dubliners ends with an epiphanic moment.' },
    'exile-nat': { label: 'Exile & Ireland', title: 'Irish Nationalism', text: 'Joyce was ambivalent about Irish nationalism. He hated British colonialism but also rejected Irish nationalism as another form of parochialism and oppression. "I will not serve that in which I no longer believe, whether it call itself my home, my fatherland, or my church." The three nets: language (English, coloniser\'s tongue), nationality (Irish, a trap), religion (Catholicism, the Church\'s grip). The artist must fly by these nets — not fight them but evade them.' },
    'tech-soc': { label: 'Technique', title: 'Stream of Consciousness', text: 'Joyce\'s stream of consciousness is more radical than Woolf\'s. In Ulysses, the technique varies by chapter: some chapters use third-person narration, some interior monologue, some dramatic dialogue (the Circe chapter is a play), some newspaper headlines (Aeolus). The Penelope chapter (Molly Bloom\'s monologue, the last chapter of Ulysses) is 8 sentences, no punctuation, 36 pages — the most famous example of unpunctuated interior monologue in literature.' },
    'tech-myth': { label: 'Technique', title: 'Mythical Method', text: 'T.S. Eliot described Joyce\'s use of Homer as a "mythical method": "Instead of narrative method, we may now use the mythical method." Ulysses is set on 16 June 1904 in Dublin. Its 18 episodes correspond to episodes in Homer\'s Odyssey: Leopold Bloom = Ulysses (everyman wandering through Dublin). Stephen Dedalus = Telemachus (the son seeking his father). Molly Bloom = Penelope (faithful and unfaithful). The mythical parallel gives a cosmic significance to the ordinary day.' },
    'tech-lang': { label: 'Technique', title: 'Language Experiment', text: 'Finnegans Wake (1939) is the extreme of Joyce\'s linguistic experimentation: almost entirely written in portmanteau words that blend multiple languages. "Riverrun, past Eve and Adam\'s, from swerve of shore to bend of bay..." The book is about a dream — it uses a dream logic of condensation and displacement. Multiple languages at once: English, French, Italian, German, Latin, Irish. Ulysses is less extreme but already experiments with parody of all literary styles (the Oxen of the Sun chapter imitates every period of English prose from Anglo-Saxon to the 1900s).' },
    'works-dubliners': { label: 'Works', title: 'Dubliners (1914)', text: '15 short stories, each an epiphany of Dublin life. Arranged by age: childhood (The Sisters, Araby), adolescence, maturity, public life. The collection is unified by the theme of paralysis — each protagonist fails to escape Dublin. The Dead (the final story): Gabriel Conroy attends a party, discovers his wife Gretta was moved by the memory of a dead boy who loved her. The snow falls over Ireland at the end — one of the most beautiful endings in English literature.' },
    'works-portrait': { label: 'Works', title: 'A Portrait of the Artist as a Young Man (1916)', text: 'Bildungsroman of Stephen Dedalus from infant consciousness to young adult. Written in free indirect style that mimics Stephen\'s own developing intelligence — from baby language to complex aesthetic theory. Key scene: the hell sermon — Stephen\'s terror of damnation drives him to confession and temporary piety before he rejects the Church entirely. Final declaration: "I will not serve. I will try to express myself in some mode of life or art as freely as I can, using for my defence the only arms I allow myself to use — silence, exile, and cunning."' },
    'works-ulysses': { label: 'Works', title: 'Ulysses (1922)', text: 'Set on 16 June 1904 (Bloomsday, now celebrated annually). Leopold Bloom, Jewish advertising agent, wanders through Dublin while his wife Molly has an affair with her concert manager Blazes Boylan. Stephen Dedalus wanders separately; the two meet briefly at a brothel and later at Bloom\'s house. 18 episodes, each with a different style, organ of the body, colour and Homeric correspondence. Published in Paris by Sylvia Beach\'s Shakespeare and Company. Banned in the US until 1933.' },
    'themes-paralysis': { label: 'Themes', title: 'Paralysis & Escape', text: 'Dublin is spiritually paralysed: the Church controls thought, nationalism controls politics, the colonial relationship with England controls economics. Characters in Dubliners long for escape but never escape. Stephen Dedalus does escape — but at the cost of complete isolation. The paradox: to write about Dublin Joyce had to leave it; to understand Ireland he had to become an exile. Bloom in Ulysses is paralysed in his marriage but achieves a kind of quiet heroism in his simple humanity.' },
    'themes-art': { label: 'Themes', title: 'The Artist\'s Role', text: 'Stephen Dedalus defines the artist\'s method: "silence, exile, and cunning." Silence: do not explain or justify your work. Exile: leave, physically and spiritually. Cunning: survive by intelligence, not force. The artist is like Daedalus (Stephen\'s mythological namesake) — the craftsman who made wings and flew free. But Icarus (Stephen as young man) may fly too close to the sun. Joyce, unlike Stephen, actually made it: the exile who wrote the definitive book about the city he left.' },
    'themes-ireland': { label: 'Themes', title: 'Ireland & Identity', text: 'Ireland is the centre of Joyce\'s work even in exile. But Ireland for Joyce is not the romantic nationalist\'s Ireland — it is a specific place: the Dublin streets, the pubs, the politics, the Catholicism. He memorised the street plan of Dublin before leaving so he could write Ulysses from Trieste and Paris. The colonial condition: English is the coloniser\'s language — Stephen feels alienated even within his own language. "The language in which we are speaking is his before it is mine."' },
    'comp-woolf': { label: 'Comparisons', title: 'Joyce vs. Woolf', text: 'Similarities: both pioneer stream of consciousness; both write about ordinary days (Bloomsday, Clarissa\'s day); both are modernist. Differences: Joyce focuses on the body (Bloom\'s bodily functions, sexuality); Woolf on perception and gender. Joyce is more radical linguistically (Molly\'s unpunctuated monologue); Woolf is more lyrical and controlled. Woolf read Ulysses in 1922 and called it "underbred" and "merely the scratching of pimples on the body of the bootboy." Joyce in turn dismissed Woolf\'s work.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Joyce', text: '① Paralysis — Dublin and Ireland are morally and spiritually paralysed. ② Epiphany — sudden moments of revelation that illuminate the ordinary. ③ Stream of consciousness — direct transcription of inner thought. ④ Mythical method — Ulysses as Homer\'s Odyssey in modern Dublin. ⑤ Silence, exile, cunning — the artist\'s tools for escaping the nets of family, church and nation.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
