<script>
  const NODES = {
    root: { label: 'Author', title: 'Charles Dickens', text: 'Born 7 February 1812 in Portsmouth. The second of eight children. Father John Dickens was sent to Marshalsea debtors\' prison in 1824; the 12-year-old Charles was sent to work at Warren\'s blacking factory (shoe polish). This experience of childhood poverty and humiliation shaped all his fiction. Self-educated, he became a parliamentary reporter then the most famous novelist in the English-speaking world. Died 9 June 1870 of a stroke, leaving Edwin Drood unfinished.' },
    life: { label: 'Category', title: 'Life', text: '1812: Born Portsmouth. 1824: Father imprisoned at Marshalsea; Charles works at blacking factory. 1827: Becomes lawyer\'s clerk, then parliamentary reporter. 1836: The Pickwick Papers (serial) — immediate success. 1837-39: Oliver Twist. 1843: A Christmas Carol. 1850: David Copperfield. 1851: Wife Catherine has tenth child. 1858: Separates from Catherine; begins relationship with actress Ellen Ternan. 1861: Great Expectations. 1870: Dies of stroke, Rochester.' },
    context: { label: 'Category', title: 'Victorian Context', text: 'Dickens wrote during the high Victorian period (Queen Victoria reigned 1837-1901). The Industrial Revolution created massive wealth and massive poverty simultaneously. Child labour was legal. The New Poor Law (1834) created workhouses that deliberately made conditions worse than the worst employment. Dickens\'s novels are the most powerful literary indictment of this system — and they worked: his fiction contributed to real legislative change.' },
    style: { label: 'Category', title: 'Style', text: 'Dickens\'s style is immediately recognisable: vivid caricature (characters defined by a single exaggerated trait), dark comedy alternating with melodrama and pathos, dense plots of coincidence and revelation, and a journalist\'s eye for social detail. His novels were published in monthly serial parts — each instalment must end with a cliffhanger or emotional peak. This serial format shaped his plotting: sensational, episodic, designed to bring readers back.' },
    works: { label: 'Category', title: 'Major Works', text: 'Oliver Twist (1837-39): the workhouse child. Nicholas Nickleby (1838-39): schoolboys. The Old Curiosity Shop (1840-41): Little Nell. Martin Chuzzlewit (1843-44): selfishness. A Christmas Carol (1843): Scrooge and redemption. Dombey and Son (1846-48). David Copperfield (1849-50): autobiographical. Bleak House (1852-53): the law. Hard Times (1854). A Tale of Two Cities (1859): French Revolution. Great Expectations (1860-61): Pip. Our Mutual Friend (1864-65). Edwin Drood (1870, unfinished).' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Poverty and injustice: Dickens exposed the workhouse, the debtors\' prison, child labour. Childhood and innocence: children are the moral centre of his novels — their suffering indicts adult society. Money and class: wealth corrupts (Miss Havisham, Pip\'s obsession with class); the good characters are often poor. The law as oppressor: Bleak House, the Court of Chancery. Redemption: characters can change — Scrooge is the paradigm.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Thackeray (Vanity Fair, 1848): Thackeray is more satirical and cynical — Becky Sharp has no sentimentality. Dickens is more moralistic and emotional. vs Hardy (Tess, 1891): both expose social injustice, but Hardy is darker (Tess is destroyed without redemption). vs Zola (French naturalism): both are social novelists, but Zola is more scientific and deterministic. vs Orwell: Orwell admired Dickens hugely — wrote a famous essay saying Dickens is "generously angry" rather than politically programmatic.' },
    'life-childhood': { label: 'Life', title: 'Childhood & the Blacking Factory', text: 'In 1824, when Dickens was 12, his father John was imprisoned in Marshalsea debtors\' prison. Charles was sent to work at Warren\'s Blacking Factory — pasting labels on shoe polish jars for 10 hours a day — while his family lived in the prison. He was sent to a cheap boarding house, largely unsupervised. This experience of abandonment and class humiliation never left him. He told no one about it for decades; it surfaces in David Copperfield (the factory scenes), Oliver Twist, and almost every novel.' },
    'life-serial': { label: 'Life', title: 'Serial Publication', text: 'Dickens\'s novels were published in monthly or weekly serial parts — small pamphlets of 32 pages sold for a shilling. The Pickwick Papers (1836-37) was the first great success. Serialisation reached a mass audience who could not afford whole books. It also meant plots that built month by month, with cliffhangers; characters that became famous long before the novel ended; and reader feedback (when Little Nell died in The Old Curiosity Shop, thousands wrote to beg Dickens to spare her). The format shaped his dense, episodic plotting.' },
    'context-industry': { label: 'Context', title: 'Industrial Revolution', text: 'The Industrial Revolution (c.1760-1850) transformed Britain: the population urbanised rapidly, factory work replaced farm work, child labour was standard (children as small as 5 worked in mines and mills). Dickens had experienced this personally. His novels expose the human cost: Hard Times (the factory town of Coketown), Oliver Twist (the London underworld), Dombey and Son (the railway age). His response is moral, not political — he wants readers to feel the suffering, not follow an ideological programme.' },
    'context-poor': { label: 'Context', title: 'Poor Law 1834', text: 'The Poor Law Amendment Act 1834 was based on Malthusian principles: the poor were poor through their own fault; making conditions worse than "the lowest form of independent labour" would force people off relief. This created workhouses — deliberately degrading institutions where the destitute were separated from families, forced to work, and fed starvation rations. Oliver Twist (1837-39) directly attacks this system: "Please, sir, I want some more" — Oliver asking for more gruel — became the symbol of Victorian inhumanity to the poor.' },
    'context-class': { label: 'Context', title: 'Class & Social Mobility', text: 'Victorian England was rigidly class-stratified, but also newly uncertain — the Industrial Revolution had created new wealth that didn\'t fit old categories. Great Expectations is Dickens\'s most sustained exploration: Pip the blacksmith\'s apprentice is given "great expectations" (money from a secret benefactor) and tries to become a gentleman. He learns that: his benefactor is an escaped convict (Magwitch); his beloved Estella was raised to break men\'s hearts; and "gentlemanliness" is a moral quality, not a social one.' },
    'style-caricature': { label: 'Style', title: 'Caricature & Character', text: 'Dickens\'s characters are caricatures in the best sense: each is defined by one or two exaggerated traits that are immediately memorable. Uriah Heep (David Copperfield): the "umble" schemer always emphasising his humility. Mr Micawber: eternally optimistic, forever waiting for something to "turn up." Mr Gradgrind (Hard Times): "Facts, facts, facts!" Miss Havisham: stopped all the clocks at the moment she was jilted, still wearing her wedding dress decades later. These characters are so powerful they have become cultural archetypes.' },
    'style-humour': { label: 'Style', title: 'Humour & Pathos', text: 'Dickens could move from comedy to tragedy in a paragraph. His humour is broad, theatrical and inclusive — he wants everyone to laugh. His pathos is intense, even sentimental: the death of Little Nell caused readers to weep openly; Oscar Wilde said "one must have a heart of stone to read the death of little Nell without laughing" — but even this mockery acknowledges the power. The combination of comedy and deep feeling is Dickens\'s unique gift — it is why his novels work simultaneously as entertainment and as social protest.' },
    'style-social': { label: 'Style', title: 'Social Reform Novel', text: 'Dickens believed fiction could change the world — and it did. His novels contributed to actual legislative change: Oliver Twist (1837-39) attacked the Poor Law; Nicholas Nickleby (1838-39) exposed brutal private schools (Yorkshire schools); Bleak House (1852-53) attacked the Court of Chancery (the system of legal delays it satirised was eventually reformed). He used his fame and his magazines (Household Words, All the Year Round) as platforms for social causes — sanitation, education, prison reform.' },
    'works-oliver': { label: 'Works', title: 'Oliver Twist (1837-39)', text: 'Oliver is born in a workhouse to a dying mother. He is exploited as a parish apprentice, runs away to London, is taken in by the Artful Dodger and Fagin\'s gang of pickpockets. He is saved by the gentleman Mr Brownlow. Fagin (often seen as an anti-Semitic caricature) is the master criminal; Bill Sikes the brutal murderer; Nancy the prostitute with a good heart. "Please, sir, I want some more." A direct attack on the 1834 Poor Law and the treatment of orphans.' },
    'works-expectations': { label: 'Works', title: 'Great Expectations (1861)', text: 'Pip, a young blacksmith\'s apprentice in Kent, meets the escaped convict Magwitch and the reclusive, jilted Miss Havisham and her adopted daughter Estella. He is given "great expectations" — money from a mysterious benefactor — and moves to London to become a gentleman. The benefactor turns out to be Magwitch. Estella was trained to break men\'s hearts. Pip must learn that true gentlemanliness is not class but character. One of the greatest English novels — and one of Dickens\'s most autobiographical.' },
    'works-tale': { label: 'Works', title: 'A Tale of Two Cities (1859)', text: 'Set during the French Revolution, in London and Paris. Sidney Carton, a dissipated English lawyer who loves Lucy Manette, sacrifices himself for her happiness — he takes the place of her husband Charles Darnay at the guillotine. "It is a far, far better thing that I do, than I have ever done; it is a far, far better rest that I go to than I have ever known." Opened with the most famous first sentence in English: "It was the best of times, it was the worst of times..."' },
    'themes-poverty': { label: 'Themes', title: 'Poverty & Injustice', text: 'Dickens experienced poverty directly as a child — this gave him both the material and the anger for his social novels. His approach is: show suffering in human, individual, memorable terms, so that readers cannot dismiss it as abstract statistics. He never presented a political solution — he was not a socialist or a Chartist — but he made the suffering of the poor visible to middle-class readers who might otherwise never encounter it. His journalism and novels together make him the greatest social reformer in Victorian literature.' },
    'themes-childhood': { label: 'Themes', title: 'Childhood & Innocence', text: 'Children in Dickens are the moral barometers of society. Their innocence condemns adult corruption: Oliver Twist\'s goodness condemns the Poor Law system; Little Nell\'s death condemns the greed of her grandfather. Dickens was one of the first novelists to make children protagonists and to take their inner lives seriously. His own traumatic childhood (the blacking factory) made him acutely sensitive to the vulnerability of children — and to the ways institutions and adults betray them.' },
    'themes-money': { label: 'Themes', title: 'Money & Class', text: 'Money is almost always morally ambiguous in Dickens. Wealth corrupts: Miss Havisham\'s wealth enables her obsession; Pip\'s "expectations" make him ashamed of his honest origins; Dombey\'s wealth isolates him from his children. The genuinely good characters are often poor or of humble origin: Joe the blacksmith in Great Expectations is the moral centre despite his illiteracy. The true "gentleman" is Pip when he discovers that character, not class or money, is what matters.' },
    'comp-thackeray': { label: 'Comparisons', title: 'Dickens vs Victorian peers', text: 'vs Thackeray (Vanity Fair, 1847-48): Thackeray is more cynical and satirical. His Becky Sharp is a social climber without moral redemption — Thackeray doesn\'t believe in Dickensian sentimentality. vs Thomas Hardy (Tess of the d\'Urbervilles, 1891): both expose social injustice, but Hardy\'s universe is deterministic and tragic — Tess is destroyed without hope. Dickens always offers redemption (Scrooge, Pip) and comedy. vs Orwell: Orwell\'s famous 1939 essay argues Dickens is fundamentally a moralist, not a political radical — "generous anger" without a programme.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Dickens', text: '① Social reform novel — fiction as journalism and agent of change. ② Caricature — characters defined by exaggerated, memorable traits. ③ Serial publication — monthly parts shaping plot, building suspense. ④ Childhood as moral barometer — children\'s suffering condemns adult society. ⑤ Redemption — individuals (Scrooge, Pip) can change; society can be reformed.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
