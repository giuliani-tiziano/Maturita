<script>
  const NODES = {
    root: { label: 'Author', title: 'J.R.R. Tolkien', text: 'John Ronald Reuel Tolkien. Born 3 January 1892 in Bloemfontein, South Africa. Moved to England as a child after his father died. Raised in Birmingham by his Catholic mother Mabel. Educated at King Edward\'s School Birmingham and Exeter College, Oxford. Professor of Old English (1925-45) then English Language and Literature (1945-59) at Oxford. Died 2 September 1973, Bournemouth.' },
    life: { label: 'Category', title: 'Life', text: '1892: Born Bloemfontein, South Africa. 1896: Father dies; mother brings children to Birmingham. 1904: Mother Mabel dies of diabetes, leaving Ronald and Hilary in the care of a Catholic priest, Fr. Francis Morgan. 1908: Meets Edith Bratt (later Lúthien). 1911: Exeter College, Oxford. 1916: Battle of the Somme — loses most of his TCBS friends. 1917: Writes "The Fall of Gondolin" during shell-shock recovery. 1925: Appointed Professor of Old English, Oxford. 1937: The Hobbit. 1954-55: Lord of the Rings. 1973: Dies in Bournemouth.' },
    scholarship: { label: 'Category', title: 'Scholarship', text: 'Tolkien was a professional scholar of Old and Middle English. He edited and translated Sir Gawain and the Green Knight, Pearl, and Sir Orfeo. His 1936 lecture "Beowulf: The Monsters and the Critics" transformed Old English studies — arguing the monsters ARE the point, not historical curiosities. His invented languages (Quenya, Sindarin) were based on real linguistic principles (Finnish, Welsh). His fiction grew from his scholarship: Middle-earth was a secondary world with the depth of archaeological reality.' },
    poetics: { label: 'Category', title: 'Poetics & Theory', text: 'Tolkien\'s essay On Fairy-Stories (1947) is his artistic manifesto. He argues that the fantasy genre is not escapism but the highest form of art. Sub-creation: the human artist, made in the image of God the Creator, can and should create secondary worlds. Eucatastrophe: the sudden joyous turn at the end of fairy stories — Tolkien identifies this as the deepest truth of the genre. Recovery, Escape, Consolation: the three gifts of fantasy.' },
    works: { label: 'Category', title: 'Major Works', text: 'The Hobbit (1937): Bilbo Baggins accompanies 13 dwarves to reclaim their dragon-guarded treasure. The Lord of the Rings (1954-55): Frodo Baggins must destroy the One Ring in the fires of Mount Doom. The Silmarillion (1977, posthumous): the creation myth and ancient history of Middle-earth. Unfinished Tales (1980), The Children of Húrin (2007), and 12 volumes of The History of Middle-earth edited by his son Christopher.' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Power and corruption: the One Ring corrupts everyone who touches it — Boromir, Gollum, Saruman, Denethor. Even the righteous cannot wield it. The ordinary hero: Hobbits are the least heroic people — but Frodo and Sam accomplish what the great cannot. Death and immortality: Men die (the Gift of Ilúvatar), Elves are immortal but doomed to watch the world change. Industrialisation vs. nature: Saruman\'s Orthanc, the destruction of the Shire.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs C.S. Lewis: fellow Inkling, close friend. Lewis\'s Narnia is allegorical (Aslan = Christ); Tolkien explicitly disliked allegory — The Lord of the Rings is not an allegory. vs Orwell: both write about the seduction of power and the corruption it brings (the Ring = totalitarianism? Tolkien denied it). vs Anglo-Saxon literature (Beowulf): Tolkien is in direct conversation with the tradition he studied — the world of barrows, monsters, courage in defeat.' },
    'life-bio': { label: 'Life', title: 'Biography', text: 'Father Arthur Tolkien died in South Africa in 1896 (Ronald was 4). Mother Mabel converted to Catholicism in 1900 — alienating her family who cut off financial support. She died of diabetes in 1904, aged 34. Tolkien\'s Catholicism (deepened by his mother\'s death) is fundamental to his work. Raised in Sarehole, a rural village near Birmingham that became the model for the Shire. Fell in love with Edith Bratt; his guardian Fr. Francis Morgan forbade contact until he was 21.' },
    'life-war': { label: 'Life', title: 'WWI & Loss', text: 'Tolkien served as a signals officer at the Battle of the Somme (1916). The Somme cost Britain 57,000 casualties on the first day alone. Of Tolkien\'s close group of friends (TCBS — Tea Club and Barrovian Society), two died in the war. He contracted trench fever and was invalided back to England. During his recovery he began writing "The Fall of Gondolin" — the first story of what became The Silmarillion. The LotR is haunted by WWI: the Dead Marshes, the fields of corpses, the fellowship diminishing one by one.' },
    'sch-languages': { label: 'Scholarship', title: 'Philology & Languages', text: 'Tolkien\'s first love was languages — not just studying them but inventing them. As a schoolboy he invented "Nevbosh" and "Naffarin"; at Oxford he began constructing the Elvish languages Quenya (based on Finnish) and Sindarin (based on Welsh). These languages are fully formed: they have grammar, phonology, history and evolution over millennia. Tolkien\'s invented languages are themselves a scholarship — and they drove the creation of Middle-earth: "The invention of languages is the foundation. The mythos is constructed to provide a world for the languages."' },
    'sch-beowulf': { label: 'Scholarship', title: 'Beowulf: The Monsters and the Critics (1936)', text: 'Tolkien\'s 1936 British Academy lecture transformed the study of Beowulf. Previous scholars had used the poem as a historical document while dismissing its monsters as primitive. Tolkien argued the opposite: the monsters are the point. Beowulf is a tragedy about a man who faces monsters — and eventually loses — and this is its deepest truth. The lecture is now considered the most important 20th-century essay on Old English. It also shows how Tolkien\'s scholarship and fiction are the same project: Middle-earth is his attempt to write a mythology as good as Beowulf.' },
    'sch-inklings': { label: 'Scholarship', title: 'The Inklings', text: 'The Inklings were an informal literary group at Oxford, meeting in the 1930s-40s. Core members: J.R.R. Tolkien, C.S. Lewis, Charles Williams, Owen Barfield. They met at The Eagle and Child pub (nicknamed "The Bird and Baby") on Tuesday mornings and in Lewis\'s rooms at Magdalen on Thursday evenings. Members read their work aloud for critique. Lewis encouraged Tolkien to complete and publish The Lord of the Rings. Tolkien read Beowulf and early drafts of The Silmarillion to the group.' },
    'poetics-sub': { label: 'Poetics', title: 'Sub-creation', text: 'In On Fairy-Stories (1947), Tolkien argues that humans, created in the image of God, have the ability and the duty to create: "Sub-creation is the highest function of Art." A Secondary World is a world with its own internal consistency — when you are inside it, you believe in it. The author becomes a "sub-creator." God is the primary Creator; the human artist is a secondary creator, making worlds within the world. This is why Middle-earth has languages, history, calendars, genealogies — it has the consistency of a real world.' },
    'poetics-eucatastrophe': { label: 'Poetics', title: 'Eucatastrophe', text: 'Tolkien coined the word "eucatastrophe" (from Greek: eu = good + catastrophe = reversal). It is the sudden joyous turn at the end of fairy stories — the moment when catastrophe is averted in an unexpected way. Examples: Sam and Frodo reach Mount Doom but Frodo cannot destroy the Ring — then Gollum, fighting for the Ring, falls in. Eucatastrophe is not a happy ending but a glimpse of a deeper truth: that the universe is ultimately not tragic. Tolkien identifies the Resurrection as the greatest eucatastrophe in history.' },
    'poetics-myth': { label: 'Poetics', title: 'Mythology for England', text: 'Tolkien\'s stated ambition: to create for England a mythology comparable to those of Finland (Kalevala), Norse (Eddas), and Greece — since the Norman Conquest had displaced the native English tradition. "I was from early days grieved by the poverty of my own beloved country... it had no stories of its own... of the quality that I sought." Middle-earth began as a frame for his invented languages and grew into a complete cosmology. The Silmarillion is his Book of Genesis: the Music of the Ainur creating the world.' },
    'works-hobbit': { label: 'Works', title: 'The Hobbit (1937)', text: 'Bilbo Baggins, a comfortable homebody hobbit, is recruited by the wizard Gandalf and 13 dwarves led by Thorin Oakenshield to reclaim their ancestral home (the Lonely Mountain) from the dragon Smaug. Key scenes: the Unexpected Party, the Riddle Game with Gollum in the dark (where Bilbo finds the One Ring), the Barrel Escape, Bilbo\'s conversation with Smaug, the Battle of Five Armies. Written for Tolkien\'s children. Published 1937 by George Allen & Unwin.' },
    'works-lotr': { label: 'Works', title: 'The Lord of the Rings (1954-55)', text: 'Frodo Baggins inherits the One Ring from Bilbo. The wizard Gandalf reveals it is the master ring of the Dark Lord Sauron — and must be destroyed in the fires of Mount Doom in Mordor where it was forged. The Fellowship of the Ring (nine companions) sets out but is broken. Frodo and Sam complete the quest alone; the others fight a war of distraction. Key scenes: the Mines of Moria, the Mirror of Galadriel, Shelob\'s Lair, Sam at Mount Doom, the Scouring of the Shire.' },
    'works-silm': { label: 'Works', title: 'The Silmarillion (1977)', text: 'Published posthumously, edited by Christopher Tolkien from his father\'s manuscripts. The mythological history of Middle-earth: the creation of the world (Ainulindalë, the Music of the Ainur), the history of the Elves and Men in the First Age, the story of the Silmarils (three jewels containing the light of the Two Trees, stolen by Morgoth). The prose style is deliberately archaic and biblical. Without The Silmarillion, The Lord of the Rings is a story; with it, it becomes a mythology.' },
    'themes-power': { label: 'Themes', title: 'Power & Corruption', text: 'The One Ring is the supreme symbol of corrupting power. It cannot be used for good — even by the virtuous. Gandalf refuses to take it: "Don\'t tempt me! I dare not take it." Galadriel refuses: she would start with good intentions and become terrible. Even Frodo, the Ringbearer, cannot cast it into the fire at the last moment — he claims it for himself. Only Gollum\'s obsession saves the day. The message: absolute power corrupts absolutely. It echoes Orwell\'s 1984 — but where Orwell is political, Tolkien is moral and theological.' },
    'themes-ordinary': { label: 'Themes', title: 'The Ordinary Hero', text: 'Hobbits are not heroic: they are small, comfort-loving, unadventurous. They like six meals a day, fireworks and pipe-weed. But precisely this smallness makes them able to resist the Ring\'s temptation — they have no desire for power. "Even the smallest person can change the course of the future." Frodo is not a warrior but an ordinary person carrying an unbearable burden. Sam Gamgee — loyal gardener — is arguably the true hero of LotR: it is his devotion, not Frodo\'s strength, that brings the quest to completion.' },
    'themes-death': { label: 'Themes', title: 'Death & Immortality', text: 'Death is "the Gift of Ilúvatar to Men" — mortality is not a punishment but a gift. Tolkien\'s Catholicism: death is the doorway to something better. Elves are immortal — but this means they must watch everything they love fade and die. Men die and pass beyond the world. This is why Aragorn and Arwen\'s love is so poignant: he must die; she, having chosen mortality, must die too. The Ring offers immortality (Gollum has lived for centuries) — but what kind of life? A prolonged, attenuated, joyless existence.' },
    'comp-lewis': { label: 'Comparisons', title: 'Tolkien vs Lewis & Orwell', text: 'vs C.S. Lewis: closest friend and fellow Inkling. Lewis converted to Christianity partly through conversations with Tolkien. Narnia (1950-56) is explicitly allegorical (Aslan = Christ, Edmund = Judas). Tolkien disagreed: "I dislike allegory. I think allegory of all kinds ought to be avoided." LotR is not an allegory — the Ring is not the atom bomb, Sauron is not Hitler. vs Orwell: both explore power\'s corruption. Orwell is atheist and political; Tolkien is Catholic and moral. Both write with the experience of WWI in their bones.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Tolkien', text: '① Sub-creation — humans make secondary worlds as God made the primary world. ② Eucatastrophe — the sudden joyous turn that reveals the world is not ultimately tragic. ③ The One Ring — symbol of absolute power that corrupts absolutely. ④ The ordinary hero — the smallest and least heroic person can change the world. ⑤ Mythology for England — Middle-earth as a complete mythology filling a cultural gap.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
