<script>
  const NODES = {
    root: { label: 'Author', title: 'George Orwell', text: 'Born Eric Arthur Blair in 1903 in Motihari, India. Educated at Eton. Served in the Imperial Police in Burma (1922-27), which gave him a deep antipathy to imperialism. Fought in the Spanish Civil War (1936-37) with the POUM anarchist militia. Wounded in the throat by a sniper. Worked as journalist and essayist. Died of tuberculosis in 1950, aged 46.' },
    life: { label: 'Category', title: 'Life', text: '1903: Born in Bengal, India. 1922-27: Indian Imperial Police, Burma. 1928-34: Paris and London — poverty, tramping, documented in Down and Out. 1936-37: Spanish Civil War, wounded. 1941-43: BBC talks producer. 1943-45: Literary editor of Tribune. 1945: Animal Farm published. 1949: Nineteen Eighty-Four published. 1950: dies of tuberculosis in London.' },
    context: { label: 'Category', title: 'Historical Context', text: 'Orwell wrote in the shadow of three totalitarian systems: Soviet Stalinism, Nazi fascism, and Spanish Francoism. Animal Farm (1945) responds to the Soviet betrayal of socialist ideals. 1984 (1949) responds to Cold War paranoia and the atomic bomb. Orwell saw totalitarianism as the great threat of the 20th century — from both left and right.' },
    poetics: { label: 'Category', title: 'Style & Poetics', text: 'Orwell valued clarity above all. His essay Politics and the English Language (1946) argues that political language is designed to make lies sound respectable. He uses plain prose, concrete detail, and familiar analogies. His satirical allegory (Animal Farm) uses simplicity as a weapon. His journalism and essays combine personal observation with political argument.' },
    works: { label: 'Category', title: 'Major Works', text: 'Major works: Animal Farm (1945) — allegorical fable of the Russian Revolution. Nineteen Eighty-Four (1949) — dystopian warning against totalitarianism. Homage to Catalonia (1938) — memoir of the Spanish Civil War. Essays: Why I Write (1946), Politics and the English Language (1946).' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Power and corruption: "Power tends to corrupt; absolute power corrupts absolutely" (Lord Acton — Orwell illustrates this). Language and truth: totalitarian states control thought by controlling language (Newspeak). The individual vs. the state: Winston Smith is the last individual, crushed by the collective. Betrayal of revolution: Animal Farm traces how ideals are corrupted.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Huxley (Brave New World): Huxley controls through pleasure and conditioning; Orwell through fear and violence. vs Kafka (The Trial): both create oppressive systems where the individual is powerless, but Kafka is existentialist, Orwell political. vs Swift (Gulliver\'s Travels): both use satirical allegory — Orwell explicitly followed Swift\'s tradition.' },
    'life-bio': { label: 'Life', title: 'Biography', text: 'Born Eric Arthur Blair, 1903, Motihari, Bengal. Educated at St Cyprian\'s and Eton (on scholarship). Did not go to university — joined Imperial Police in Burma instead. Lived in poverty in Paris (1928-29) and London (1929-33), documented in Down and Out in Paris and London (1933). Fought in Spain with POUM (1936-37). Shot through the throat by a Fascist sniper. War correspondent and BBC producer during WWII.' },
    'life-politics': { label: 'Life', title: 'Political Stance', text: 'Orwell called himself a "democratic socialist" but was fiercely anti-Stalinist. He saw the Soviet Union not as socialism but as oligarchical collectivism — a new form of tyranny. Unlike many left-wing intellectuals of the 1930s, he refused to excuse Stalin\'s show trials or the Moscow Pact. This made him controversial: denounced by Communists, suspected by Conservatives. "Every line of serious work I have written since 1936 has been written, directly or indirectly, against totalitarianism."' },
    'context-totalit': { label: 'Context', title: 'Rise of Totalitarianism', text: 'Orwell witnessed the three great totalitarianisms: Stalin\'s USSR (show trials, purges, gulag), Hitler\'s Germany, and Franco\'s Spain. These systems shared key features: cult of the leader, propaganda, surveillance, elimination of opposition. Animal Farm allegorises the Soviet betrayal of the 1917 revolution. 1984 synthesises all three into one universal warning.' },
    'context-spain': { label: 'Context', title: 'Spanish Civil War (1936-37)', text: 'Orwell went to Spain to fight Franco. He joined the POUM (Partido Obrero de Unificación Marxista) — a Trotskyist militia distrusted by Moscow. He was shot through the throat in May 1937. Back in Barcelona he witnessed the Stalinist suppression of the POUM — allies turned enemies overnight. This experience is the direct source of the totalitarian world of 1984 — especially the way history is rewritten.' },
    'context-cold': { label: 'Context', title: 'Cold War Context', text: '1984 was written 1947-48 on the Isle of Jura, while Orwell was dying of tuberculosis. The Cold War was beginning: the USSR had the atom bomb (1949), the Iron Curtain had descended across Europe (Churchill\'s phrase, 1946), and the world seemed permanently divided into two hostile superpowers. Orwell projected these conditions into a permanent future — the three superstates of Oceania, Eurasia and Eastasia.' },
    'poetics-plain': { label: 'Poetics', title: 'Plain Prose Style', text: '"Good prose is like a windowpane" (Why I Write, 1946). Orwell valued clarity, directness and concrete language. His six rules for good writing (Politics and the English Language): never use a long word where a short one will do; if it\'s possible to cut a word, cut it; never use a foreign phrase, jargon or technical vocabulary; never use a passive where you can use an active; break any of these rules sooner than say anything outright barbarous.' },
    'poetics-allegory': { label: 'Poetics', title: 'Allegory & Satire', text: 'Animal Farm is a political fable in the tradition of Aesop and Swift. Each animal represents a real historical figure or group: Napoleon = Stalin, Snowball = Trotsky, Old Major = Marx/Lenin, the pigs = the Communist Party elite, the sheep = the unthinking masses. The simplicity of the fable form is the point: it shows how simple propaganda can manipulate simple minds.' },
    'poetics-dystopia': { label: 'Poetics', title: 'Dystopian Fiction', text: '1984 creates a totalitarian world that is recognisable but exaggerated to reveal the truth of real totalitarian systems. Key dystopian techniques: an appendix on Newspeak written in past tense (implying the regime eventually fell), the appendix itself is a linguistic analysis (showing the linguistic basis of power), the use of invented words (doublethink, thoughtcrime, unperson) that reveal the mechanism of control.' },
    'works-af': { label: 'Works', title: 'Animal Farm (1945)', text: 'A political fable set on Manor Farm (Russia). The animals revolt against Farmer Jones (Tsar Nicholas II) and establish a republic. Under the pigs\' leadership, the ideals of Animalism (Communism) are gradually corrupted. Napoleon (Stalin) eliminates Snowball (Trotsky) through false accusations. The commandments are rewritten: "All animals are equal, but some animals are more equal than others." The pigs finally walk on two legs, indistinguishable from humans (capitalists).' },
    'works-1984': { label: 'Works', title: 'Nineteen Eighty-Four (1949)', text: 'Set in Oceania, a totalitarian state ruled by the Party and its figurehead Big Brother. Winston Smith, a low-ranking Party member, secretly rebels — keeping a diary, having an affair with Julia. He contacts O\'Brien, believing him to be a rebel — but O\'Brien is a loyal Party torturer. Winston is arrested, tortured in the Ministry of Love, and broken in Room 101 (his worst fear: rats). Final line: "He loved Big Brother." The most important dystopian novel ever written.' },
    'works-others': { label: 'Works', title: 'Essays & Journalism', text: 'Key essays: Politics and the English Language (1946) — on how bad writing enables political manipulation. Why I Write (1946) — autobiographical account of his four motivations: political purpose, historical impulse, aesthetic enthusiasm, sheer egoism. Shooting an Elephant (1936) — on imperialism and the pressure to conform. Homage to Catalonia (1938) — best first-person account of the Spanish Civil War.' },
    'themes-power': { label: 'Themes', title: 'Power & Corruption', text: 'Both Animal Farm and 1984 show power corrupting those who hold it. In Animal Farm, the pigs begin as liberators and end as oppressors. In 1984, the Party seeks power as an end in itself — not for any ideology or goal, but purely for the sake of power: "Power is not a means, it is an end." O\'Brien explains to Winston that the Party tortures not to extract confessions but to demonstrate that it can make 2+2=5 — that power overrides reality.' },
    'themes-truth': { label: 'Themes', title: 'Language & Truth', text: 'Language is the key theme of 1984. Newspeak is the official language, designed to eliminate thoughtcrime by eliminating words. If you cannot say "the Party is wrong," you cannot think it. Doublethink = holding two contradictory beliefs simultaneously. Winston\'s job at the Ministry of Truth is to rewrite old newspaper articles to match the Party\'s current version of history — the ultimate falsification. "Who controls the past controls the future."' },
    'themes-individual': { label: 'Themes', title: 'Individual vs. State', text: 'Winston Smith is the last individual — the only person in Oceania who can think for himself. His rebellion is ultimately crushed: he is broken not by force but by psychological manipulation — O\'Brien makes him betray Julia, the one person he loved. The Party does not just want obedience but genuine love: "We do not merely destroy our enemies; we change them." This is the ultimate horror: not death but the erasure of the self.' },
    'comp-huxley': { label: 'Comparisons', title: 'Orwell vs. Huxley', text: 'Two visions of the totalitarian future. Huxley\'s Brave New World (1932): control through pleasure — conditioning, soma (a happiness drug), sex. No one wants to rebel because everyone is satisfied. Orwell\'s 1984 (1949): control through fear — surveillance, pain, the Thought Police. Neil Postman (Amusing Ourselves to Death): "Orwell feared those who would deprive us of information. Huxley feared those who would give us so much that we would be reduced to passivity."' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Orwell', text: '① Doublethink — holding two contradictory beliefs simultaneously. ② Newspeak — language designed to prevent thought. ③ Big Brother — the omnipresent symbol of surveillance and power. ④ Unperson — someone erased from existence by the Party. ⑤ Thoughtcrime — thinking anything the Party disapproves of. All five concepts are now part of everyday political vocabulary — Orwell\'s lasting contribution.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
