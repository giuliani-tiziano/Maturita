<script>
  const NODES = {
    root: { label: 'Author', title: 'Oscar Wilde', text: 'Born in Dublin, 1854. Son of a famous surgeon and a nationalist poet. Studied at Trinity College Dublin then Magdalen College Oxford, where he won the Newdigate Prize for poetry. Became the leading aesthete of London, famous for his wit and flamboyant style. Tried and convicted of "gross indecency" (homosexuality) in 1895; sentenced to two years\' hard labour at Reading Gaol. Released 1897, lived in Paris as Sebastian Melmoth. Died 1900, aged 46.' },
    life: { label: 'Category', title: 'Life', text: '1854: Born Dublin. 1871-74: Trinity College Dublin (classics). 1874-78: Magdalen College, Oxford — studies under Ruskin and Pater; wins Newdigate Prize. 1884: Marries Constance Lloyd; two sons. 1890: Dorian Gray published. 1891: Essays, Salomé written. 1895: The Importance of Being Earnest opens February; arrested May. 1895: Convicted of gross indecency — two years\' hard labour. 1898: The Ballad of Reading Gaol. 1900: Dies in Paris of cerebral meningitis.' },
    aestheticism: { label: 'Category', title: 'Aestheticism', text: 'Aestheticism is the late 19th-century movement that held art as the highest human value, independent of moral or social utility. Key principle: "Art for art\'s sake" (l\'art pour l\'art). Influenced by Walter Pater (Studies in the History of the Renaissance, 1873) who urged living with intensity, "burning with a hard gem-like flame." Wilde was the leading English aesthete — he turned aestheticism into a way of life and a public performance.' },
    poetics: { label: 'Category', title: 'Style', text: 'Wilde\'s style is inseparable from his content. Wit and epigram: "I can resist everything except temptation." Paradox and inversion: the unexpected, counter-intuitive formulation that reveals a hidden truth. Social satire: Victorian society is exposed through comedy. Dandy dialogue: characters speak in polished, artificial language that is more beautiful than natural. Wilde believed style IS meaning — how you say something is what you say.' },
    works: { label: 'Category', title: 'Major Works', text: 'Fiction: The Picture of Dorian Gray (1890, 1891 revised). Plays: Lady Windermere\'s Fan (1892), A Woman of No Importance (1893), An Ideal Husband (1895), The Importance of Being Earnest (1895). Poems: The Ballad of Reading Gaol (1898). Essays: The Decay of Lying (1889), The Critic as Artist (1890), The Soul of Man Under Socialism (1891). Prison: De Profundis (1905, posthumous).' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Beauty vs. morality: "There is no such thing as a moral or an immoral book" (Preface to Dorian Gray). Art has no moral purpose — it is either well or badly written. Mask and identity: all characters in Wilde play roles — the double life (Dorian, Bunbury, Wilde himself). Faustian bargain: Dorian sells his soul for eternal beauty. Victorian hypocrisy: The Importance of Being Earnest exposes the gap between Victorian appearance and reality.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Dickens: Dickens uses fiction to reform society (moral purpose); Wilde explicitly rejects this. vs Ruskin: Ruskin believed art should express moral truth; Wilde inverted this — beauty is its own truth. vs Baudelaire: both are Decadents who cultivate sensation and beauty, but Baudelaire\'s style is dark and anguished while Wilde\'s is witty. vs Dorian Gray\'s Huysmans: À Rebours is the "poisonous yellow book" that corrupts Dorian — the Decadent bible.' },
    'life-dublin': { label: 'Life', title: 'Dublin & Oxford', text: 'Born October 1854, Dublin. Father Sir William Wilde — famous surgeon. Mother Jane Francesca (\'Speranza\') — Irish nationalist poet. Educated at Portora Royal School, then Trinity College Dublin (1871-74) where he won a classical scholarship. At Magdalen College Oxford (1874-78) he came under the influence of Ruskin (who believed art should express moral values) and Pater (who believed in art for art\'s sake). He assimilated both and went further. Won the Newdigate Prize for poetry, 1878.' },
    'life-trial': { label: 'Life', title: 'Trial & Imprisonment (1895)', text: 'Wilde had a long relationship with Lord Alfred Douglas ("Bosie"). Douglas\'s father, the Marquess of Queensberry, left a card at Wilde\'s club calling him a "posing sodomite." Wilde sued for criminal libel — a fatal mistake that allowed his own actions to be examined. Queensberry\'s lawyers gathered evidence of Wilde\'s liaisons with male prostitutes. Wilde withdrew the libel case; he was then prosecuted himself. Found guilty of "gross indecency" under Section 11 of the Criminal Law Amendment Act 1885. Sentenced to two years\' hard labour at Reading Gaol.' },
    'aes-artforart': { label: 'Aestheticism', title: 'Art for Art\'s Sake', text: '"There is only one thing in the world worse than being talked about, and that is not being talked about." Wilde believed art exists for its own sake, not to teach morals or serve society. This is explicitly stated in the Preface to Dorian Gray: "There is no such thing as a moral or an immoral book. Books are well written, or badly written. That is all." The artist\'s only obligation is to create beauty. Everything else is irrelevant.' },
    'aes-dandy': { label: 'Aestheticism', title: 'The Dandy', text: 'The dandy is an aristocratic aesthete who values wit, elegance and style above all social conventions. He treats life as a work of art. Lord Henry Wotton in Dorian Gray is the perfect dandy. Wilde himself was the supreme dandy: his famous green carnation, velvet suits, long hair, peacock feather, lily. "To define is to limit" — the dandy refuses definition, conventional roles, and bourgeois earnestness. Algernon in Earnest: "The truth is rarely pure and never simple."' },
    'aes-decad': { label: 'Aestheticism', title: 'Decadentism', text: 'Decadentism (French: décadentisme) is the late 19th-century movement that celebrated artistic excess, sensation, and the cultivation of beauty even in decay and corruption. Huysmans\'s À Rebours (1884) is its bible: the protagonist des Esseintes withdraws from reality into an artificial paradise of art and sensation. In Dorian Gray, Lord Henry gives Dorian a "poisonous yellow book" — widely understood as À Rebours. Wilde\'s aestheticism overlaps with Decadentism in his celebration of beauty as the only value.' },
    'style-wit': { label: 'Style', title: 'Wit & Epigram', text: 'Wilde\'s most distinctive technique is the epigram: a short, witty statement that sounds paradoxical but contains a truth. Examples: "I can resist everything except temptation." "The only way to get rid of a temptation is to yield to it." "Experience is simply the name we give our mistakes." "To lose one parent may be regarded as a misfortune; to lose both looks like carelessness." These work by inverting normal expectations — morality, wisdom and common sense are stood on their heads.' },
    'style-satire': { label: 'Style', title: 'Social Satire', text: 'Wilde uses comedy to expose Victorian hypocrisy. Victorian society presented a face of respectability, propriety and moral earnestness — but beneath it lay double lives, exploitation, and rigid class prejudice. Wilde\'s plays show aristocrats who are frauds, mothers who are hypocrites, respectable men with secret identities. The satire is gentle — Wilde is too much in love with this society to destroy it — but his comedies expose its absurdity.' },
    'style-comedy': { label: 'Style', title: 'Comedy of Manners', text: 'The comedy of manners focuses on the social behaviour of a specific class — its rituals, conventions and hypocrisies. Wilde\'s plays are the finest English examples after Sheridan. The Importance of Being Earnest satirises Victorian earnestness through the invention of "Bunburying" — creating a fictional invalid friend to escape social obligations. Both Jack and Algernon have double identities (both are "Ernest" in the city). Lady Bracknell is the supreme comic embodiment of upper-class prejudice: "A handbag?"' },
    'works-dorian': { label: 'Works', title: 'The Picture of Dorian Gray (1890)', text: 'Dorian Gray is a beautiful young man who wishes his portrait would age in his place. His wish is granted. Under the influence of the aesthete Lord Henry Wotton, Dorian pursues pleasure and sensation without restraint. The portrait records every sin — becoming increasingly hideous. Dorian murders Basil Hallward, who has seen the portrait. Finally, in a rage, Dorian stabs the portrait — and falls dead, old and withered. The novel is Wilde\'s Faustian meditation on beauty, corruption and the soul.' },
    'works-earnest': { label: 'Works', title: 'The Importance of Being Earnest (1895)', text: 'The greatest of Wilde\'s comedies. Jack Worthing has invented "Ernest" as an alter ego for his trips to London; Algernon Moncrieff has invented "Bunbury" — a sick friend he visits to escape obligations. Both wish to marry women who insist their name must be Ernest. The play satirises Victorian earnestness, social convention, and the bourgeois obsession with propriety. Lady Bracknell\'s interview of Jack is one of the funniest scenes in English drama: "A handbag?"' },
    'works-prison': { label: 'Works', title: 'De Profundis & The Ballad of Reading Gaol', text: 'De Profundis (1905, posthumous): a long letter written in Reading Gaol to Lord Alfred Douglas, blaming him for the disaster while also expressing love. A work of extraordinary self-analysis and suffering. The Ballad of Reading Gaol (1898): poem written after release, about a soldier who murdered his wife and was hanged in the prison. "Yet each man kills the thing he loves." — Wilde\'s meditation on guilt, punishment and the destruction of beauty.' },
    'themes-beauty': { label: 'Themes', title: 'Beauty vs. Morality', text: '"All art is quite useless" (Preface, Dorian Gray). Wilde explicitly rejected the idea that art should teach moral lessons. Beauty is its own justification. The Preface declares: "The books that the world calls immoral are books that show the world its own shame." Art reveals truth through beauty, not through moral instruction. This was a direct challenge to the Victorian utilitarian view of art (e.g., Dickens using novels to reform the Poor Laws).' },
    'themes-mask': { label: 'Themes', title: 'Mask & Identity', text: 'Wilde was obsessed with the gap between appearance and reality, the public mask and the private face. He lived a double life — publicly married with children, privately conducting relationships with men. All his heroes have double identities: Dorian (beautiful face / corrupt soul), Jack/Ernest, Algernon/Ernest and Bunbury. The mask is not simply hypocrisy — it is a creative act. Wilde argued that the mask can reveal more truth than the face: "Man is least himself when he talks in his own person. Give him a mask and he will tell you the truth."' },
    'themes-faust': { label: 'Themes', title: 'Faustian Bargain', text: 'Dorian Gray\'s wish — that the portrait would age in his place — is an implicit Faustian pact. Like Faust (Marlowe, Goethe), Dorian sells his soul for something eternal: youth. The portrait is his soul made visible, recording every sin. Unlike Faust who explicitly makes a deal with Mephistopheles, Dorian\'s pact is never explained — it simply happens, as if the universe grants his desire. The Faustian theme is central to Victorian Gothic: the desire for knowledge/beauty/youth that destroys the seeker.' },
    'comp-pater': { label: 'Comparisons', title: 'vs Pater & Ruskin', text: 'Walter Pater (1839-1894): his Conclusion to Studies in the History of the Renaissance (1873) urges "burning with a hard gem-like flame" — making the most of each moment. Wilde took this aesthetic hedonism and pushed it to its social and artistic extreme. John Ruskin (1819-1900): believed art should express moral truth and serve society. Wilde took Ruskin\'s seriousness about art but removed the moral dimension entirely. Both were his Oxford teachers — he synthesised them into something new.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Wilde', text: '① Art for art\'s sake — beauty is its own justification, art has no moral purpose. ② The dandy — the aesthete who treats life as a work of art. ③ Bunburying — having a double life; escaping social obligations through fiction. ④ Faustian bargain — trading the soul for eternal youth (Dorian Gray). ⑤ Victorian hypocrisy — the gap between respectable appearance and corrupt reality.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
