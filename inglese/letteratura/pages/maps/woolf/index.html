<script>
  const NODES = {
    root: { label: 'Author', title: 'Virginia Woolf', text: 'Born Adeline Virginia Stephen in 1882, London. Daughter of Victorian man of letters Leslie Stephen. Lost her mother at 13 and suffered the first of several breakdowns. Self-educated at home (not allowed to attend university — the injustice that inspired A Room of One\'s Own). Married Leonard Woolf in 1912. Founded the Hogarth Press in 1917. Died 28 March 1941 by drowning in the River Ouse, leaving a note to Leonard.' },
    life: { label: 'Category', title: 'Life', text: '1882: Born in London. 1895: mother Julia dies — first breakdown. 1904: father Leslie Stephen dies. 1912: Marries Leonard Woolf. 1913: Mrs Dalloway begun (The Hours). 1915: The Voyage Out published. 1917: Hogarth Press founded. 1922: Jacob\'s Room. 1925: Mrs Dalloway. 1927: To the Lighthouse. 1929: A Room of One\'s Own. 1931: The Waves. 1941: Drowns in the River Ouse, Lewes.' },
    bloomsbury: { label: 'Category', title: 'Bloomsbury Group', text: 'The Bloomsbury Group was an informal association of writers, artists and intellectuals who met in the Bloomsbury district of London from c.1905. Key members: Virginia Woolf, Leonard Woolf, E.M. Forster, Lytton Strachey, John Maynard Keynes (economist), Roger Fry (art critic), Clive Bell, Duncan Grant. Anti-Victorian: they rejected conventional morality, embraced pacifism, supported women\'s rights, and celebrated friendship and art above social convention.' },
    technique: { label: 'Category', title: 'Technique', text: 'Woolf pioneered the modernist novel\'s turn inward. Stream of consciousness: the continuous, unbroken flow of a character\'s thoughts, perceptions and memories as they actually occur — not selected or arranged into logical order. Subjective time: clock time (a day in London) contains years of memory and feeling. Moments of being: sudden instants of heightened perception that give life its meaning. Third-person limited omniscient narration that dips into multiple characters\' minds.' },
    works: { label: 'Category', title: 'Major Works', text: 'Mrs Dalloway (1925): one day in post-WWI London, Clarissa Dalloway prepares a party while Septimus Smith moves toward suicide. To the Lighthouse (1927): the Ramsay family on a Scottish island — Part I (afternoon), Part II (10 years of war and death compressed into lyrical prose), Part III (return). The Waves (1931): six voices, pure consciousness. A Room of One\'s Own (1929): feminist essay-novel. Orlando (1928): fantasy spanning 400 years.' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Time and memory: the past is never past — it lives in the present moment. Gender and society: women have been excluded from education, writing and public life. A Room of One\'s Own: "A woman must have money and a room of her own if she is to write fiction." Life and death: Septimus\'s suicide in Mrs Dalloway illuminates Clarissa\'s own relationship to life. The androgynous mind: great artists transcend gender — Shakespeare had an androgynous mind.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Joyce: both use stream of consciousness, but Woolf\'s is more lyrical and poetic; Joyce\'s is more radical and linguistic. vs Forster: both are Bloomsbury members and modernists, but Forster\'s novels have more conventional plot. vs Bergson: Woolf\'s concept of subjective time (duration) is directly influenced by Bergson\'s philosophy of time as lived experience rather than clock measurement.' },
    'life-bio': { label: 'Life', title: 'Biography', text: 'Virginia Stephen grew up at 22 Hyde Park Gate, London, surrounded by Victorian literary culture (her father was a major critic and friend of Tennyson, Hardy). She was not allowed to attend university (Cambridge was for her brothers). Her mother Julia died in 1895; her half-sister Stella died two years later; her father in 1904. These deaths triggered breakdowns — she heard voices, became suicidal. Leonard Woolf (journalist, publisher) provided stability. Together they founded the Hogarth Press from their home.' },
    'life-mental': { label: 'Life', title: 'Mental Health', text: 'Woolf suffered from what was then called "neurasthenia" — likely bipolar disorder. She experienced several major breakdowns: 1895, 1913, 1915, 1941. Her mental states deeply informed her writing: the intensity of perception, the moments of dissolution, the fear of madness. Septimus Warren Smith in Mrs Dalloway — a WWI veteran suffering shell shock — reflects Woolf\'s own experience of psychiatric treatment. In March 1941, fearing another breakdown as German bombs fell on London, she drowned herself in the Ouse.' },
    'bloom-group': { label: 'Bloomsbury', title: 'The Bloomsbury Group', text: 'The Bloomsbury Group met at the Stephen siblings\' house at 46 Gordon Square, Bloomsbury. They rejected Victorian earnestness and repression, embracing open discussion of art, sex and philosophy. Key principle (from G.E. Moore\'s Principia Ethica): the greatest goods are the pleasures of friendship and of beautiful objects. Members included: Lytton Strachey (biographer), Roger Fry (Post-Impressionism champion), John Maynard Keynes (economist). They were progressive, anti-war and pro-women — unusual for their class and time.' },
    'bloom-press': { label: 'Bloomsbury', title: 'Hogarth Press', text: 'Founded 1917 by Virginia and Leonard Woolf using a hand press in their dining room. Named after Hogarth House, Richmond. First publication: Two Stories by Leonard and Virginia (printed by hand). Went on to publish: T.S. Eliot\'s The Waste Land (1923), Katherine Mansfield, John Maynard Keynes, and Sigmund Freud\'s collected works (translated). The Press gave Woolf complete creative independence — she answered to no commercial publisher.' },
    'bloom-feminist': { label: 'Bloomsbury', title: 'Feminism', text: '"A woman must have money and a room of her own if she is to write fiction." (A Room of One\'s Own, 1929). Woolf argues that women have been systematically excluded from literary culture by economic dependence and lack of private space. She imagines "Judith Shakespeare" — as talented as her brother, who ended as a prostitute and died obscure. Three Guineas (1938): on the connections between fascism, patriarchy and war. Woolf is one of the founding figures of modern feminist literary criticism.' },
    'tech-soc': { label: 'Technique', title: 'Stream of Consciousness', text: 'The term "stream of consciousness" was coined by psychologist William James (1890) to describe the continuous, fluid flow of mental experience. Woolf uses this as a narrative technique: instead of an omniscient narrator telling us what characters think, we experience their thoughts directly as they occur — associative, non-linear, including sense impressions, memories and feelings. Woolf described it as trying to capture "the dark places of psychology" and "luminous halo" of experience.' },
    'tech-time': { label: 'Technique', title: 'Subjective Time', text: 'Henri Bergson\'s concept of durée (duration) holds that time as we actually experience it is not the clock\'s equal intervals but a flow in which past and present are fused. Woolf translates this into fiction: a character hears Big Ben strike and her mind drifts through 30 years of memory. In To the Lighthouse, the middle section "Time Passes" compresses 10 years (including WWI and several deaths) into lyrical, non-narrative prose, while Part I and III are single afternoons experienced in minute detail.' },
    'tech-moment': { label: 'Technique', title: 'Moments of Being', text: 'Woolf\'s concept (developed in her memoir Moments of Being, posthumous) describes sudden instants of heightened perception that illuminate the usually opaque surface of daily life. Related to Joyce\'s "epiphany" but more sensory and less sudden — a quality of luminous attention rather than a revelation. Example: Clarissa Dalloway at the window watching the old woman across the street, or the final illumination on Mrs Ramsay in To the Lighthouse.' },
    'works-dalloway': { label: 'Works', title: 'Mrs Dalloway (1925)', text: 'June 1923, London. Clarissa Dalloway (middle-aged, upper-class) prepares a party; Septimus Warren Smith (young WWI veteran, shell-shocked) moves through the same city toward suicide. The two characters never meet, but Clarissa\'s reaction to news of Septimus\'s death at the party provides the novel\'s climax. Both escape from the world in different ways — Clarissa through social ritual, Septimus through death. Woolf uses stream of consciousness to weave their minds together.' },
    'works-lighthouse': { label: 'Works', title: 'To the Lighthouse (1927)', text: 'The Ramsay family on a Scottish island. Mr Ramsay (a philosopher, modelled on Woolf\'s father) plans to go to the lighthouse tomorrow; young James wants to go; Mrs Ramsay (the emotional centre) weaves the family together. Part I: The Window — a long afternoon. Part II: Time Passes — 10 years pass in lyrical, impersonal prose; Mrs Ramsay, Andrew and Prue die in parentheses. Part III: The Lighthouse — the family finally reaches the lighthouse; Lily Briscoe completes her painting.' },
    'works-room': { label: 'Works', title: 'A Room of One\'s Own (1929)', text: 'An extended essay-novel based on two lectures given to women\'s colleges at Cambridge (1928). Woolf argues: women have been excluded from literary culture because they lack economic independence (money) and physical space (a room of their own). She imagines Judith Shakespeare — as gifted as her brother William, but denied education, forced into marriage, dying obscure and pregnant. The essay is now a foundational text of feminist literary criticism.' },
    'themes-time': { label: 'Themes', title: 'Time & Memory', text: 'For Woolf, the present moment always contains the past. Characters\' minds are not bounded by the present but range freely through memory. This is both a technical feature (stream of consciousness moves freely in time) and a philosophical stance: identity is constituted by memory and relationship, not by the body in the present. The lighthouse in To the Lighthouse is reached after 10 years — but it is the same moment, just finally arrived at.' },
    'themes-gender': { label: 'Themes', title: 'Gender & Society', text: 'Woolf\'s feminism is deeply integrated into her fiction. She was acutely aware of the restrictions placed on women — in Mrs Dalloway, Clarissa gave up the intellectual Peter Walsh for the safe, dull Richard Dalloway. In A Room of One\'s Own she argues that the greatest art requires an "androgynous mind" — neither purely masculine (aggressive, assertive) nor purely feminine (emotional, decorative) but a synthesis. She cites Shakespeare as the supreme example.' },
    'themes-death': { label: 'Themes', title: 'Life & Death', text: 'Death is not the opposite of life in Woolf but its companion and reflection. Septimus Warren Smith\'s suicide in Mrs Dalloway is not simply tragedy but illumination: his death forces Clarissa to confront her own relationship to life and death. "She felt somehow very like him." The vision of life she achieves through his death is the novel\'s emotional climax. Death is also the measure of what life is worth: Mrs Ramsay\'s death in parentheses in To the Lighthouse is devastating precisely because it is underplayed.' },
    'comp-joyce': { label: 'Comparisons', title: 'Woolf vs Joyce', text: 'Both use stream of consciousness. Differences: Woolf\'s prose is more lyrical, poetic and controlled — she selects and shapes the stream. Joyce\'s is more radical and unfiltered — Molly Bloom\'s monologue has no punctuation. Woolf\'s politics are feminist (gender exclusion). Joyce\'s are national (Irish independence). Woolf read Ulysses in 1922: she admired it but criticised it as "underbred" — she disliked its explicitness and what she saw as masculine self-display. Both are the supreme modernist novelists in English.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Woolf', text: '① Stream of consciousness — the continuous, unbroken inner flow of thought. ② Moments of being — instants of heightened perception that give life meaning. ③ Subjective time — clock time and durée (lived time) are different things. ④ The androgynous mind — great art transcends gender. ⑤ A room of one\'s own — women need economic independence and physical space to create.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
