<script>
  const NODES = {
    root: { label: 'Author', title: 'Mary Shelley', text: 'Born Mary Wollstonecraft Godwin in 1797. Daughter of two giants: William Godwin (anarchist philosopher) and Mary Wollstonecraft (feminist author of A Vindication of the Rights of Woman). Eloped with Percy Bysshe Shelley at 16. Wrote Frankenstein at 18, published at 20 (1818). Widowed when Percy drowned in 1822. Died 1851.' },
    life: { label: 'Category', title: 'Life', text: '1797: Born in London. Mother Mary Wollstonecraft dies 11 days after her birth. 1814: Elopes with Percy Shelley (he was already married). 1815: First child dies. 1816: Villa Diodati ghost story competition — Frankenstein conceived. 1818: Frankenstein published anonymously. 1822: Percy drowns near Livorno. 1826: The Last Man published. 1851: Dies in London.' },
    context: { label: 'Category', title: 'Historical Context', text: 'Frankenstein stands at the intersection of three great intellectual currents: Romanticism (imagination, sublime, Gothic fiction), the Scientific Revolution (galvanism, anatomy, the possibility of reanimating dead tissue), and the Industrial Revolution (anxiety about technology). The "Year Without a Summer" (1816, caused by the Tambora volcanic eruption) created the dark, stormy conditions at Villa Diodati that inspired the novel.' },
    poetics: { label: 'Category', title: 'Style & Poetics', text: 'Frankenstein uses a Chinese box or nested narrative structure: Captain Walton\'s letters frame Victor\'s confession which frames the Creature\'s autobiography. This gives each narrator partial reliability and forces the reader to judge between competing perspectives. Gothic elements (isolated settings, storms, night, horror) combine with Romantic themes (the sublime, creative ambition). The novel is simultaneously Gothic, Romantic and proto-science fiction.' },
    works: { label: 'Category', title: 'Major Works', text: 'Frankenstein; or, The Modern Prometheus (1818, revised 1831) — her masterwork. The Last Man (1826) — post-apocalyptic novel set in the 21st century, featuring a plague that destroys civilisation. Mathilda (1820, published posthumously) — semi-autobiographical, deals with incestuous love. Valperga (1823) — historical novel. Numerous short stories and travel writing.' },
    themes: { label: 'Category', title: 'Key Themes', text: 'Creation and responsibility: Victor creates the Creature then abandons him — the central moral failure. The Outsider: the Creature is good by nature but made monstrous by society\'s rejection (Rousseau\'s noble savage). Scientific hubris: the Frankenstein Syndrome — creators destroyed by their own creations. Family and parenthood: the novel obsessively revisits abandonment (Mary\'s mother died at her birth, Wollstonecraft herself was abandoned). Gender: Victor\'s desire to create life without a woman challenges natural order.' },
    comparisons: { label: 'Category', title: 'Comparisons', text: 'vs Byron (The Vampyre lineage): both at Villa Diodati, both exploring death and transgression. vs Rousseau: the Creature\'s eloquence and gradual corruption by society directly echoes Rousseau\'s noble savage. vs Milton (Paradise Lost): the Creature reads Paradise Lost and identifies with Satan ("I, the miserable and the abandoned, am an abortion"). Victor = God who abandons his creation; the Creature = Adam/Satan.' },
    'life-family': { label: 'Life', title: 'Family & Origins', text: 'Father William Godwin: anarchist philosopher, author of Political Justice (1793). Mother Mary Wollstonecraft: feminist author of A Vindication of the Rights of Woman (1792) — died 11 days after Mary\'s birth. Mary grew up surrounded by radical thinkers. At 16, fell in love with Percy Bysshe Shelley (already married to Harriet Westbrook). They eloped to the Continent, facing scandal and financial difficulties.' },
    'life-diodati': { label: 'Life', title: 'Villa Diodati, 1816', text: 'Summer 1816, Lake Geneva. The group: Lord Byron, Percy Shelley, Mary (18 years old), Claire Clairmont (Mary\'s stepsister), Dr John Polidori. The volcanic eruption of Mount Tambora had caused crop failures and dark skies across Europe (the "Year Without a Summer"). Confined indoors, Byron proposed a ghost story competition. Polidori wrote The Vampyre. Mary Shelley had the dream that became Frankenstein.' },
    'context-science': { label: 'Context', title: 'Science & Galvanism', text: 'Luigi Galvani (1737-1798) discovered that electrical current could make a frog\'s leg twitch — suggesting electricity as the principle of life. His nephew Giovanni Aldini performed public experiments in London (1803), electrifying the corpse of a hanged criminal to make it appear to move. Erasmus Darwin (Charles\'s grandfather) wrote speculatively about spontaneous generation. These real scientific debates are the direct source of Frankenstein\'s premise.' },
    'context-romantic': { label: 'Context', title: 'Romanticism', text: 'Frankenstein is fundamentally a Romantic text. The Sublime: the Arctic setting and the Alpine scenery are sublime landscapes that overwhelm human reason. Imagination: Victor\'s creative drive is the Romantic imagination taken to its logical extreme. Gothic tradition: Horace Walpole (The Castle of Otranto, 1764) and Ann Radcliffe (The Mysteries of Udolpho, 1794) established Gothic as a genre — Mary Shelley transformed it.' },
    'context-industry': { label: 'Context', title: 'Industrial Revolution', text: 'Britain in 1818 was being transformed by industrialisation. Machines were replacing human labour; the Luddites had smashed factory machines (1811-16). The Frankenstein Syndrome — technology exceeding human control and turning against its creator — reflects this anxiety. The novel does not condemn science but insists on the responsibility of creators for what they create. Victor\'s real crime is not creation but abandonment.' },
    'poetics-frame': { label: 'Poetics', title: 'Nested Narrative Structure', text: 'The Chinese box structure: Walton\'s letters to his sister frame Victor\'s story. Victor\'s confession frames the Creature\'s autobiography. Each narrator is unreliable: Walton admires Victor uncritically; Victor blames the Creature; the Creature is eloquent and self-aware. The reader must navigate between these competing perspectives. The structure also means we always hear the Creature\'s story secondhand — mediated through Victor\'s guilt.' },
    'poetics-gothic': { label: 'Poetics', title: 'Gothic Elements', text: 'Setting: the Arctic ice (extreme, sublime, inhospitable), the Alps, Victor\'s laboratory at night. Atmosphere: storms, lightning, dark, isolated. Horror: the animation scene ("It was on a dreary night in November"); the Creature\'s appearance at Victor\'s bedside. Gothic villains vs. Gothic victims: Victor is both creator (active) and victim (passive). The Gothic in Frankenstein is not escapist but a vehicle for philosophical questions.' },
    'poetics-prometheus': { label: 'Poetics', title: 'The Modern Prometheus', text: 'Prometheus stole fire from the gods to give to humanity — and was punished eternally (chained to a rock, his liver eaten by an eagle every day). The parallel with Victor: both steal the power of the gods (life/fire), both are punished for it. Two versions: Aeschylus\'s Prometheus who suffers for humanity\'s benefit; Ovid\'s Prometheus who created man from clay. Victor echoes both: he creates life and destroys it.' },
    'works-frank': { label: 'Works', title: 'Frankenstein; or, The Modern Prometheus (1818)', text: 'Victor Frankenstein, a Swiss scientist obsessed with the secret of life, creates a living being from dead body parts. The Creature — never named — is abandoned immediately, educated himself by reading (Milton, Goethe, Plutarch), and becomes violent only after experiencing repeated human rejection. He demands Victor create a female companion; Victor refuses; the Creature kills Victor\'s loved ones. Both pursue each other to the Arctic, where Victor dies. The Creature disappears into the darkness.' },
    'works-other': { label: 'Works', title: 'The Last Man (1826)', text: 'Set in the late 21st century, The Last Man imagines a plague that gradually destroys all of humanity. The last survivor is Lionel Verney. The novel has been read as Mary Shelley\'s elegy for Percy and Byron (both depicted in the main characters). Often considered the first post-apocalyptic novel. Long neglected, now recognised as a major work of speculative fiction.' },
    'works-1831': { label: 'Works', title: '1831 Revised Edition', text: 'Mary Shelley substantially revised Frankenstein for the 1831 Standard Novels edition. Key changes: the new Preface (now famous) tells the full story of the Villa Diodati competition. Victor\'s character is made more passive and guilt-ridden; the Creature\'s goodness is emphasised. Some scholars prefer the 1818 text as more radical and politically sharp. The 1831 edition is the version most commonly read today.' },
    'themes-creation': { label: 'Themes', title: 'Creation & Responsibility', text: 'Victor\'s crime is not creating life but abandoning his creation. He is horrified by what he has made and flees immediately. The Creature is "born" without love, name, or education — but he is curious and good-natured. Only after experiencing human rejection (especially the De Lacey family\'s terror) does he turn violent. The novel insists: creators are responsible for their creations. The theme is intensely relevant to artificial intelligence debates today.' },
    'themes-outsider': { label: 'Themes', title: 'The Outsider', text: 'The Creature is the quintessential literary outsider. He is physically monstrous but emotionally sensitive. He reads Paradise Lost and Plutarch; he feels love, gratitude, despair. His eloquence contrasts with the world\'s terror of his appearance. The Creature follows Rousseau\'s noble savage: naturally good, corrupted by society. "Everywhere I see bliss, from which I alone am irrevocably excluded." His exclusion is based purely on appearance — a critique of prejudice.' },
    'themes-hubris': { label: 'Themes', title: 'Scientific Hubris', text: 'The Frankenstein Syndrome: the creation that destroys its creator. Victor wants to "penetrate the secrets of nature" and "banish disease from the human frame." His ambition is Promethean. The novel does not say science is wrong but that scientists cannot escape moral responsibility. This theme is strikingly modern: genetic engineering, AI, nuclear weapons — all raise Frankensteinian questions about what we create and what responsibility we bear for it.' },
    'comp-byron': { label: 'Comparisons', title: 'vs Romantic Poets', text: 'Byron: the Byronic hero (proud, isolated, suffering) is echoed in both Victor and the Creature. Percy Shelley: his Prometheus Unbound (1820) rewrites the myth positively (Prometheus is freed) while Mary\'s version is tragic. Keats: both explore the tension between beauty and death, the human desire to transcend mortality. Coleridge: The Ancient Mariner (a mariner who commits a crime against nature and is punished) is directly referenced in Walton\'s frame narrative.' },
    'comp-keywords': { label: 'Summary', title: '5 Key Concepts of Frankenstein', text: '① Frankenstein Syndrome — creators destroyed by their creations. ② Nested narrative — Chinese box structure (Walton → Victor → Creature). ③ Noble savage — the Creature as naturally good, made monstrous by rejection. ④ The Modern Prometheus — hubris and punishment for playing God. ⑤ First science fiction novel — scientific principles + ethical consequences = new genre.' }
  };

  function showNode(key) {
    const n = NODES[key];
    if (!n) return;
    document.getElementById('tip-label').textContent = n.label;
    document.getElementById('tip-title').textContent = n.title;
    document.getElementById('tip-text').textContent = n.text;
    document.getElementById('map-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeTip() {
    document.getElementById('map-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
</script>
