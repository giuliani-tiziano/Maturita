  <script>
    const NODES = {
      root: {
        label: 'D\'Annunzio · Panoramica',
        title: 'Gabriele D\'Annunzio (1863–1938)',
        text: 'Pescara, 12 marzo 1863 — Vittoriale, 1° marzo 1938. Massimo rappresentante del Decadentismo italiano. Attraversa fasi successive: estetismo, poetica della bontà, superomismo, fase finale del Notturno. «Bisogna fare la propria vita come si fa un\'opera d\'arte.»'
      },
      vita: {
        label: '01 · Vita',
        title: 'La vita di D\'Annunzio',
        text: 'Pescara → Roma (estetismo mondano, 1881–1891) → Napoli (poetica della bontà, 1891–1894) → La Capponcina con Eleonora Duse (Laudi, 1895–1910) → Esilio in Francia (1910–1915) → Interventismo e guerra (1915–1919) → Fiume (1919–1920) → Il Vittoriale (1921–1938). Una vita come performance totale.'
      },
      'vita-estetismo': {
        label: 'Vita · Roma e l\'estetismo',
        title: 'Roma — il dandy (1881–1891)',
        text: 'A Roma conduce una vita mondana da dandy, frequenta i salotti aristocratici, collabora con «Cronaca Bizantina» e «La Tribuna». Nel 1883 sposa la duchessa Maria Hardouin di Gallese. Nel 1889 pubblica Il piacere: l\'estetismo si esprime nella volontà di «fare la propria vita come si fa un\'opera d\'arte». Il protagonista Andrea Sperelli è l\'alter ego letterario di questo periodo.'
      },
      'vita-capponcina': {
        label: 'Vita · Duse e La Capponcina',
        title: 'Eleonora Duse e La Capponcina (1895–1910)',
        text: 'Nel 1895 incontra l\'attrice Eleonora Duse: inizia la storia d\'amore più famosa della sua vita. Si trasferisce con lei nella villa «La Capponcina» a Settignano (Firenze), dove porta l\'estetismo agli estremi. Compone le Laudi (1903) e La figlia di Iorio (1904). Nel 1897 è eletto parlamentare. Travolto dai debiti, nel 1910 si rifugia in Francia.'
      },
      'vita-vittoriale': {
        label: 'Vita · Il Vittoriale',
        title: 'Il Vittoriale degli Italiani (1921–1938)',
        text: 'Si ritira a Gardone Riviera (lago di Garda) nella villa-museo del Vittoriale, costruita come monumento vivente al proprio «vivere inimitabile» e donata all\'Italia nel 1923. Ogni oggetto è scelto per il suo valore simbolico. Nel 1924 è nominato principe di Montenevoso. Muore al Vittoriale il 1° marzo 1938.'
      },
      poetica: {
        label: '02 · Poetica',
        title: 'La poetica di D\'Annunzio',
        text: 'Cinque fasi: (1) Giovanile — Carducci e Verga; (2) Estetismo — culto della bellezza, vita come opera d\'arte; (3) Poetica della bontà — Dostoevskij, temi intimistici; (4) Superuomo — Nietzsche, volontà di potenza, vate; (5) Notturno — prosa frammentata, influenza freudiana.'
      },
      'poetica-panismo': {
        label: 'Poetica · Panismo',
        title: 'Il panismo — la fusione con la natura',
        text: 'Dal nome di Pan, dio dei boschi. L\'io lirico si dissolve nella natura attraverso tre tappe: (1) contiguità metonímica, (2) similitudine, (3) vera metamorfosi. Due movimenti simultanei: umanizzazione della natura (la Sera ha un viso di perla) e naturalizzazione dell\'uomo (Ermione «quasi fatta virente»). Testo chiave: La pioggia nel pineto.'
      },
      'poetica-superuomo': {
        label: 'Poetica · Superuomo',
        title: 'Il superuomo — Nietzsche e il vate',
        text: 'Dall\'incontro con Nietzsche (1892): individuo forte che si oppone alla decadenza, volontà di potenza, rifiuto della democrazia. D\'Annunzio trasforma il Übermensch filosofico nel vate-poeta, guida spirituale e politica della nazione. Non descrive la realtà: la plasma con la parola. Romanzi chiave: Le vergini delle rocce, Il fuoco.'
      },
      'poetica-stile': {
        label: 'Poetica · Stile',
        title: 'Lo stile imaginifico',
        text: 'Lessico aulico e arcaico (aulente, ignude, stromenti). Sintassi paratattica, periodi nominali, catene di analogie. Verso libero fino al trisillabo (Pioggia nel pineto). Figure dominanti: analogia, allitterazione, anafora, sinestesia, onomatopea. «Imaginifico»: le parole sono scelte per il valore fonico ed evocativo prima ancora che semantico.'
      },
      opere: {
        label: '03 · Opere',
        title: 'Le opere principali',
        text: 'Poesia: Canto novo (1882), Poema paradisiaco (1893), Laudi (1903–1934) — il capolavoro è Alcyone. Romanzi: Il piacere (1889), Trionfo della morte (1894), Le vergini delle rocce (1895), Il fuoco (1900), Il Notturno (1921). Teatro: La figlia di Iorio (1904).'
      },
      'opere-alcyone': {

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
    document.querySelectorAll('.node').forEach(n => {
      n.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); n.click(); } });
    });
