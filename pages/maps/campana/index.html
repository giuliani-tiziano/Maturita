  <script>
    var NODES = {
      root: { label: "Autore", title: "Dino Campana", text: "Dino Campana (1885-1932) nasce a Marradi (Firenze). Pubblica nel 1914 i Canti orfici, unica opera della sua vita. Poliglotta autodidatta, legge Baudelaire e Rimbaud in francese, Nietzsche in tedesco, Whitman in inglese. Dal 1918 internato nel manicomio di Castel Pulci, dove muore nel 1932. E' il piu grande poeta visionario italiano del primo Novecento." },
      vita: { label: "Categoria", title: "Vita", text: "Nasce a Marradi nel 1885. Primo ricovero psichiatrico nel 1906. Segue anni di vagabondaggio: Svizzera, Francia, Uruguay, Argentina, Ucraina. Nel 1913 consegna il manoscritto a Soffici e Papini che lo perdono. Riscrive tutto a memoria e pubblica i Canti orfici nel 1914. Relazione con Sibilla Aleramo (1916-17). Internamento definitivo a Castel Pulci nel 1918." },
      poetica: { label: "Categoria", title: "Poetica", text: "La poesia come atto orfico: discesa agli Inferi, rivelazione, parola magica. Fonde Simbolismo francese (Baudelaire, Rimbaud) con Espressionismo. Influenze: Nietzsche (letto in tedesco, non tramite D'Annunzio), Whitman (verso lungo), Dante e Stilnovo (in chiave mistica). Musicalita ossessiva, simbolismo cromatico, visione onirica." },
      opera: { label: "Categoria", title: "Canti orfici", text: "L'unica opera (1914). Prosimetro diviso in quattro sezioni: La Notte, Notturni, La Verna, Varie e frammenti. Sottotitolo in tedesco: Die Tragodie des letzten Germanen in Italien. Apparentemente frammentario, e' in realta' un poema unitario retto da corrispondenze interne." },
      testi: { label: "Categoria", title: "Testi", text: "L'invetriata e' il testo emblematico: la sera estiva si trasforma in visione angosciosa; la piaga rossa languente e' il simbolo centrale (ripetuta due volte). Le interrogative senza risposta, le ripetizioni ossessive, il simbolismo cromatico mostrano in azione tutti gli strumenti stilistici di Campana." },
      confronti: { label: "Categoria", title: "Confronti", text: "Vs D'Annunzio: stessa fonte nietzscheana, esiti opposti (superuomo mondano vs visione abissale). Vs Pascoli: stesso paesaggio toscano, opposta direzione (nido vs vagabondaggio). Vs Ungaretti: stessa rivelazione poetica, ma Campana usa visione prolungata, Ungaretti il lampo istantaneo." },
      "vita-marradi": { label: "Vita", title: "Marradi e il vagabondaggio", text: "Marradi (Firenze), sul fiume Lamone, e' il paesaggio originario di Campana. Dopo il primo ricovero (1906) inizia il vagabondaggio: Svizzera, Francia, poi transoceanico (Uruguay, Argentina, dove lavora come pianista da bordello) e poi Ucraina. Non e' fuga casuale: e' ricerca poetica esistenziale." },
      "vita-manicomio": { label: "Vita", title: "Castel Pulci 1918-1932", text: "Nel 1918 Campana viene internato nell'ospedale psichiatrico di Castel Pulci (Firenze). Non uscira' mai piu'. Muore il 1 marzo 1932. L'internamento non e' frutto di ignoranza altrui: la schizofrenia e' reale. Ma non esaurisce chi e' Campana: intellettuale coltissimo, poliglotta, capace di lettere lucidissime anche durante il ricovero." },
      "poetica-orfica": { label: "Poetica", title: "Poesia orfica", text: "La poesia non comunica: rivela. Come Orfeo scende nell'Ade per recuperare Euridice, il poeta penetra nelle zone oscure del reale per riportarne una verita' intraducibile in linguaggio razionale. Il titolo Canti orfici e' il manifesto di questa concezione totale del fare poetico." },
      "poetica-simbolismo": { label: "Poetica", title: "Simbolismo + Espressionismo", text: "Campana e' l'unico poeta italiano del primo Novecento a leggere Baudelaire e Rimbaud in originale e a farne uso strutturale (non ornamentale). Dal Simbolismo prende la corrispondenza tra sensi; dall'Espressionismo la deformazione della realta'. Nietzsche letto in tedesco: vitalismo come sfida abissale, non trionfo mondano come in D'Annunzio." },
      "poetica-musicalita": { label: "Poetica", title: "Musicalita ossessiva", text: "Uso sistematico della ripetizione e della reiterazione: la stessa parola o immagine ritorna variata fino a diventare un'incantazione. Simbolismo cromatico: rosso = ferita/passione, viola = sera/mistero, oro/madreperla = estasi. Non cerca armonia: costruisce ossessione e allucinazione." },
      "opera-struttura": { label: "Canti orfici", title: "Prosimetro in 4 sezioni", text: "La Notte: atmosfere urbane allucinate, figure femminili mitiche. Notturni: paesaggi notturni, il viaggio come stato d'animo. La Verna: pellegrinaggio spirituale al santuario francescano. Varie e frammenti: poesie e prose varie, include L'invetriata. Il tutto forma un poema unitario nonostante l'apparente frammentarieta'." },
      "opera-manoscritto": { label: "Canti orfici", title: "Il piu lungo giorno perduto", text: "Nel 1913 Campana consegna a Soffici e Papini il manoscritto originale (Il piu lungo giorno). Loro lo perdono. Campana lo riscrive a memoria — gesto quasi leggendario. Nel 1971 il manoscritto originale verra' ritrovato negli archivi di Soffici: il confronto mostra differenze significative, la riscrittura non e' semplice riproduzione." },
      "testi-invetriata": { label: "Testi", title: "L'invetriata", text: "Il testo piu' analizzato dei Canti orfici. Struttura in tre momenti: tramonto (vv. 1-3), sera (vv. 4-9), notte (vv. 10-11). La piaga rossa languente e' ripetuta due volte (vv. 7 e 11): il dolore del poeta invade prima la stanza, poi il cuore della sera stessa. Le interrogative senza risposta amplificano il senso di smarrimento." },
      "testi-temi": { label: "Testi", title: "Notte, Donna, Viaggio", text: "La Notte: luogo del sogno e dell'incubo dove passato e presente si fondono. La Donna/Chimera: figura femminile ambivalente, estasi e trauma, irraggiungibile per definizione. Il Viaggio: fisico (Montevideo) e spirituale (La Verna), l'occhio del viaggiatore registra il mondo come una fuga musicale." },
      "testi-stile": { label: "Testi", title: "Figure retoriche principali", text: "Enjambement forti che frammentano il discorso. Interrogative senza risposta. Personificazione della sera. Ripetizione ossessiva. Iperbato e anastrofe. Analogia pura. Verso lungo libero di respiro whitmaniano. Simbolismo cromatico sistematico." },
      "conf-dannunzio": { label: "Confronti", title: "Campana vs D'Annunzio", text: "Entrambi leggono Nietzsche ma con esiti opposti: D'Annunzio costruisce il superuomo estetizzante e mondano; Campana legge Nietzsche come sfida esistenziale abissale. D'Annunzio e' al centro della scena pubblica; Campana e' ai margini. Sono gli antipodi della stessa fonte." },
      "conf-ungaretti": { label: "Confronti", title: "Campana vs Ungaretti", text: "Campana (1914) precede Ungaretti (L'Allegria, 1919) e ne anticipa alcuni temi. Entrambi usano la parola come rivelazione. Ma Campana ha visione prolungata e ossessiva, verso lungo whitmaniano; Ungaretti ha l'illuminazione istantanea, il verso-parola, il silenzio bianco." }
    };

    function showNode(key) {
      var node = NODES[key];
      if (!node) return;
      document.getElementById("tip-label").textContent = node.label || "";
      document.getElementById("tip-title").textContent = node.title || "";
      document.getElementById("tip-text").textContent = node.text || "";
      document.getElementById("map-overlay").classList.add("show");
    }
    function closeTip() { document.getElementById("map-overlay").classList.remove("show"); }
    document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeTip(); });
  </script>
