  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Giuseppe Ungaretti', text: 'Nasce l\'8 febbraio 1888 ad Alessandria d\'Egitto da genitori lucchesi. Il padre muore quando è piccolo. Studia alla Sorbona di Parigi (1912). Si arruola volontario nel 1915 e combatte sul Carso. L\'intera produzione è raccolta in Vita d\'un uomo (Mondadori 1969). Muore a Milano il 1° giugno 1970.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'La biografia di Ungaretti è segnata da tre traumi fondativi: l\'esilio originario (Egitto), la trincea (1915-18, da cui nasce il primo stile), la morte del figlio Antonietto (1939, che ispira Il dolore). L\'identità è sempre «nomade»: Egitto, Toscana, Parigi, Carso.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'La parola poetica non descrive: è un lampo che fa apparire la verità nascosta. Da Rimbaud (Illuminations). Il porto sepolto è metafora del fare poetico: il poeta si immerge nell\'abisso, raggiunge la verità, riemerge con i canti. L\'analogia è la figura retorica preferita.' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Tre fasi stilistiche nette: L\'Allegria (1931, poesia della guerra e della parola pura), Sentimento del tempo (1933, ritorno ai classici, ermetismo), Il dolore (1947, duplice lutto privato e storico). L\'insieme si intitola Vita d\'un uomo (1969).' },
      testi: { label: 'Categoria', title: 'Testi', text: '7 testi del programma: Veglia, Fratelli, Il porto sepolto, Soldati, I fiumi, Mattina (tutti dall\'Allegria) e Non gridate più (da Il dolore). Le prime sei mostrano il primo stile; l\'ultima mostra il terzo stile elegiaco.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'vs Saba: entrambi autobiografici, ma Saba cerca l\'onestà; Ungaretti cerca l\'illuminazione. vs Montale: Ungaretti ha epifanie di senso; Montale ha scacco permanente. vs Ermetici: Sentimento del tempo diventa il loro modello diretto. vs Simbolismo: eredita la parola pura di Mallarmé.' },
      'vita-traumi': { label: 'Vita', title: '3 traumi fondativi', text: '① Esilio originario: nasce in Egitto da italiani, sempre nomade, sempre «altrove». ② La trincea (1915-18): evento centrale — da qui nasce tutto il primo stile. ③ Morte del figlio Antonietto (1939): lutto privato che ispira Il dolore. Morte del fratello Costantino (1937): dolore storico.' },
      'vita-alessandria': { label: 'Vita', title: 'Alessandria + Parigi', text: 'Alessandria d\'Egitto: città cosmopolita (arabo, francese, italiano, greco). Il porto, il deserto, il Nilo. «Lutto costante» per il padre morto. Leggenda del porto sepolto sotto le acque. Sorbona 1912: Bergson, simbolisti (Baudelaire, Mallarmé, Rimbaud), Apollinaire.' },
      'vita-carso': { label: 'Vita', title: 'Trincea sul Carso', text: 'Si arruola volontario 1915. Combatte sul Carso. Scrive su pezzettini di carta e cartine di sigarette. L\'ufficiale Ettore Serra le pubblica: Il porto sepolto (1916, 80 copie). La guerra obbliga a una poesia ridotta all\'osso: niente fronzoli, solo l\'essenziale.' },
      'poetica-parola': { label: 'Poetica', title: 'Parola come illuminazione', text: 'La parola poetica non descrive: è un lampo che fa apparire la verità nascosta. Come un lampo in una stanza buia illumina tutto per un istante. Da Rimbaud (Illuminations). Per questo le poesie sono brevissime: non si può prolungare il lampo.' },
      'poetica-porto': { label: 'Poetica', title: 'Porto sepolto', text: 'Leggenda di Alessandria: porto antico sepolto sotto le acque del Nilo. Metafora del fare poetico: il poeta si immerge nell\'abisso interiore, raggiunge la verità nascosta, riemerge con i canti. Ma resta sempre un «inesauribile segreto».' },
      'poetica-analogia': { label: 'Poetica', title: 'Analogia', text: 'La figura preferita di Ungaretti. Metafora ancora più ardita: accosta due immagini lontanissime senza legame logico evidente. Il lettore deve «saltare» da una all\'altra. Es: «bocca digrignata / volta al plenilunio» (bocca di un cadavere = luna piena).' },
      'opere-allegria': { label: 'Opere', title: 'L\'Allegria (1931)', text: 'Nasce come Il porto sepolto (1916). Poi Allegria di naufragi (1919) — ossimoro: la gioia del naufrago sopravvissuto. Edizione definitiva 1931: L\'Allegria. 5 sezioni. Stile: versi brevissimi, spazi bianchi, niente punteggiatura, analogie, luogo+data sotto ogni poesia.' },
      'opere-sentimento': { label: 'Opere', title: 'Sentimento del tempo (1933)', text: 'Tutto cambia rispetto all\'Allegria: versi lunghi, punteggiatura torna, lessico aulico, modelli = Petrarca/Leopardi/Dante/Góngora. Temi: tempo, mito, caducità, Dio. Ispirerà l\'Ermetismo (Quasimodo, Luzi, Gatto).' },
      'opere-dolore': { label: 'Opere', title: 'Il dolore (1947)', text: 'Due dolori fusi: privato (morte di Antonietto 1939, fratello Costantino 1937) e storico (Seconda guerra mondiale). Stile: tono elegiaco, meditativo, sintassi rigorosa. «Fu la cosa più tremenda della mia vita.» Contiene Non gridate più.' },
      'testi-mattina': { label: 'Testi', title: 'Mattina', text: '«M\'illumino / d\'immenso.» Due versi-parola. Immenso = in-mensus = ciò che non si può misurare = l\'infinito. Il poeta si fonde con l\'assoluto in un istante di grazia mistica laica. Titolo originario: «Cielo e mare».' },
      'testi-soldati': { label: 'Testi', title: 'Soldati', text: '«Si sta come / d\'autunno / sugli alberi / le foglie.» Similitudine inversa (soggetto implicito). «Si sta» impersonale = unanimismo: vale per tutta l\'umanità. La precarietà universale: tutti siamo foglie pronte a cadere.' },
      'testi-fiumi': { label: 'Testi', title: 'I fiumi', text: '4 fiumi = 4 identità: Isonzo (trincea, italiano per scelta), Serchio (radici toscane), Nilo (infanzia egiziana), Senna (maturità parigina). «Docile fibra dell\'universo.» La vita = «corolla di tenebre» = ossimoro. Ricerca d\'identità attraverso la memoria.' },
      'confronti-posizione': { label: 'Confronti', title: 'Posizione nel Novecento', text: 'vs Saba: entrambi autobiografici, ma Saba cerca l\'onestà; Ungaretti cerca l\'illuminazione. vs Montale: Ungaretti ha epifanie di senso; Montale ha scacco permanente. vs Ermetici: Sentimento del tempo diventa il loro modello diretto.' },
      'confronti-chiave': { label: 'Sintesi', title: '5 parole-chiave di Ungaretti', text: '① Porto sepolto — la verità nascosta in fondo all\'animo. ② Illuminazione — la parola come lampo. ③ Unanimismo — il poeta parla per tutti. ④ Analogia — figura retorica preferita. ⑤ Verso-parola — la parola isolata nello spazio bianco.' }
    };

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
</body>
</html>
