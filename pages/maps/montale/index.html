  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Eugenio Montale', text: 'Nasce a Genova nel 1896, ultimo di 5 figli. Formazione autodidatta. Estati a Monterosso al mare (Cinque Terre): il paesaggio ligure entra nella poesia come correlativo oggettivo. Direttore del Gabinetto Vieusseux (Firenze) 1929-38. Senatore a vita 1967. Nobel per la letteratura 1975. Muore a Milano 1981.' },
      vita: { label: 'Categoria', title: 'Vita', text: '1925: Ossi di seppia (Gobetti). 1929-38: Direttore Vieusseux a Firenze. 1933: incontra Irma Brandeis (Clizia). 1938: licenziato per rifiuto PNF; Clizia torna in USA. 1943-45: protegge ebrei a Firenze, attivo nel CLN. 1948: Milano, Corriere della Sera. 1975: Nobel.' },
      figure: { label: 'Categoria', title: 'Figure femminili', text: 'Non sono solo donne amate: sono allegorie di esigenze interiori che cambiano di raccolta in raccolta. Clizia (Irma Brandeis): donna-angelo-Beatrice. Mosca (Drusilla Tanzi): guida pratica quotidiana. Volpe (Maria Luisa Spaziani): vitalità e eros. Arletta (Anna degli Uberti): memoria.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Il correlativo oggettivo (da T.S. Eliot): l\'oggetto fisico «contiene» l\'emozione senza nominarla. Il male di vivere: l\'esistenza come prigione invalicabile. Il varco: ricerca ossessiva — quasi sempre fallita — di una via di fuga. La divina Indifferenza: la natura non partecipa al dolore umano.' },
      opere: { label: 'Categoria', title: 'Opere', text: '4 raccolte: Ossi di seppia (1925), Le occasioni (1939), La bufera e altro (1956), Satura (1971). Evoluzione: dal muro al diario. 15 anni di silenzio tra Bufera e Satura — sbloccato dalla morte di Mosca (1963). L\'insieme mostra una trasformazione radicale dello stile.' },
      testi: { label: 'Categoria', title: 'Testi', text: '6 testi del programma: Non chiederci la parola, Spesso il male di vivere, Meriggiare pallido e assorto, Cigola la carrucola nel pozzo, Non recidere forbice quel volto, Ho sceso dandoti il braccio. 4 da Ossi, 1 da Occasioni, 1 da Satura.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'vs Ungaretti: Ungaretti ha epifanie (illuminazione); Montale ha scacco permanente. vs Saba: Saba accetta la vita pienamente; Montale diagnostica il male come irrisolvibile. vs D\'Annunzio: anti-vate radicale. vs Leopardi: stesso pessimismo cosmico, ma Montale non canta nemmeno la speranza vana.' },
      'vita-tappe': { label: 'Vita', title: 'Tappe fondamentali', text: '1925: Ossi di seppia (Gobetti, antifascista assassinato dai fascisti). 1929-38: Direttore del Gabinetto Vieusseux a Firenze. 1933: incontra Irma Brandeis. 1938: licenziato. 1943-45: protegge ebrei, attivo nel CLN. 1948: critico del Corriere della Sera. 1967: Senatore a vita. 1975: Nobel.' },
      'vita-antifascismo': { label: 'Vita', title: 'Antifascismo', text: '1925: firma Manifesto antifascista Croce. Pubblica con Gobetti (editore ucciso dai fascisti). 1938: licenziato dal Vieusseux per rifiuto di iscriversi al PNF. 1943-45: ospita Saba e altri ebrei a Firenze, attivo nel Comitato di Liberazione Nazionale.' },
      'figure-clizia': { label: 'Figure femminili', title: 'Clizia — Irma Brandeis', text: 'Studiosa americana di Dante, ebrea, conosciuta a Firenze 1933. Torna in USA per leggi razziali 1938. Nelle Occasioni: donna-angelo sul modello di Beatrice dantesca. Nella Bufera: messaggera cosmica quasi cristologica (girasole che si sacrifica).' },
      'figure-mosca': { label: 'Figure femminili', title: 'Mosca — Drusilla Tanzi', text: 'Convivente dal 1939, moglie dal 1962. Soprannome per la miopia forte (occhiali spessi = occhi di mosca). Guida pratica e quotidiana: «radar spirituale» infallibile. Morta nel 1963 → sblocca gli Xenia (Satura). Rovescia l\'immagine di Clizia: non sublime ma domestica.' },
      'figure-volpe': { label: 'Figure femminili', title: 'Volpe — M.L. Spaziani', text: 'Poetessa, incontrata negli anni 50. Incarna l\'eros e la vitalità: anti-Clizia. Nella Bufera e altri: sensualità contro spiritualità. «La volpe» = astuzia e istinto. Breve ma intensa presenza nella raccolta.' },
      'poetica-correlativo': { label: 'Poetica', title: 'Correlativo oggettivo', text: 'Da T.S. Eliot (La terra desolata, 1922). Oggetto fisico concreto che «contiene» l\'emozione senza nominarla. Es: rivo strozzato + foglia riarsa + cavallo stramazzato = male di vivere. Differenza: in Pascoli l\'oggetto è proiezione soggettiva; in Montale mantiene la sua densità fisica.' },
      'poetica-male': { label: 'Poetica', title: 'Male di vivere', text: 'Tema centrale di tutta l\'opera. L\'esistenza è una prigione: il muro invalicabile (Meriggiare). La natura è indifferente al dolore umano. Nessuna ideologia o fede può liberare l\'uomo. Non nasce dagli eventi storici: è «connaturato all\'esistenza».' },
      'poetica-varco': { label: 'Poetica', title: 'Il varco', text: 'Ricerca ossessiva — quasi sempre fallita — di una via di fuga o di senso. Es: profumo dei limoni (I limoni), carrucola nel pozzo (memoria), Clizia (Non recidere). Il varco è sempre precario e si richiude. Lo «scacco» è la condizione normale dell\'uomo.' },
      'opere-ossi': { label: 'Opere', title: 'Ossi di seppia (1925)', text: 'Residui calcarei di molluschi = uomo spogliato di illusioni. Doppia valenza: galleggia (armonia) o è arenato (esilio, aridità). Stile: aspra musicalità, lessico basso e tecnico, «storta sillaba e secca come un ramo». Paesaggio ligure come correlativo del male di vivere.' },
      'opere-occasioni': { label: 'Opere', title: 'Le occasioni (1939)', text: '«Occasioni» = lampi di vita vissuta, flash improvvisi che aprono un varco. Sezione centrale: i Mottetti (20 brevi poesie per Clizia assente). Lingua più oscura e aristocratica; vicino all\'ermetismo.' },
      'opere-satura': { label: 'Opere', title: 'Satura (1971)', text: '3 significati: satura lanx (varietà) + satira (tono ironico) + sazietà. Rottura totale con l\'allegorismo: stile prosastico, colloquiale, diaristico. Contiene gli Xenia (28 poesie per Mosca morta).' },
      'testi-non-chiederci': { label: 'Testi', title: 'Non chiederci la parola', text: 'Manifesto poetico. «Ciò che non siamo, ciò che non vogliamo» = definizione per esclusione. La poesia non illumina, non salva. «Storta sillaba e secca come un ramo» = metafora negativa della parola. Contro il poeta-vate di D\'Annunzio.' },
      'testi-male': { label: 'Testi', title: 'Spesso il male di vivere', text: 'Struttura simmetrica: 3 correlativi del male (rivo strozzato, foglia riarsa, cavallo stramazzato) + 3 correlativi della divina Indifferenza (statua, nuvola, falco). Rovesciamento della pathetic fallacy romantica.' },
      'testi-ho-sceso': { label: 'Testi', title: 'Ho sceso, dandoti il braccio', text: 'Dagli Xenia (Satura). Per Mosca morta. Paradosso: lei miope vedeva meglio di lui. «Le sole vere pupille, sebbene tanto offuscate, erano le tue.» Stile totalmente prosastico. Rovescia l\'immagine di Clizia: grandezza nella prosaicità.' },
      'confronti-posizione': { label: 'Confronti', title: 'Posizione nel Novecento', text: 'vs Ungaretti: Ungaretti ha epifanie (illuminazione); Montale ha scacco permanente. vs Saba: Saba accetta pienamente la vita; Montale diagnostica il male come irrisolvibile. vs D\'Annunzio: Anti-Vate radicale. vs Leopardi: stesso pessimismo cosmico, ma Montale non canta nemmeno la speranza vana.' },
      'confronti-chiave': { label: 'Sintesi', title: '5 parole-chiave di Montale', text: '① Correlativo oggettivo — oggetto che contiene l\'emozione. ② Male di vivere — condizione irrisolvibile. ③ Varco — tentativo (quasi sempre fallito) di fuga. ④ Divina Indifferenza — natura estranea al dolore. ⑤ Anti-Vate — rifiuto del poeta-profeta.' }
    };

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
</body>
</html>
