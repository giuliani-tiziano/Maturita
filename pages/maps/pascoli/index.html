  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Giovanni Pascoli', text: 'Giovanni Pascoli (1855–1912) nasce a San Mauro di Romagna e trasforma il trauma dell\'assassinio del padre in una poetica del nido, della memoria e della piccola cosa. È il poeta del fanciullino, del fonosimbolismo e del simbolismo dimesso: un Decadentismo italiano intimo e domestico, opposto al vate dannunziano.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'L\'evento fondativo è il trauma del 10 agosto 1867. La vita procede fra studi a Bologna con Carducci, arresto politico del 1879, insegnamento in varie città e ritorno al nido di Castelvecchio con la sorella Maria. Il 1911 segna la svolta pubblica con La grande proletaria si è mossa.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Il fanciullino vede le cose come per la prima volta e crea poesia per intuizione. Pascoli cerca i segni minimi del reale, usa fonosimbolismo, stile franto e musicalità. La poesia per lui è conoscenza non scientifica, immagine, analogia e meraviglia.' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Myricae è la raccolta delle piccole cose; Canti di Castelvecchio custodisce il nido e la madre; Poemetti allarga lo sguardo alla vita contadina; Poemi Conviviali e Poemi Cristiani recuperano il mito e la storia; Odi e Inni, Poemi Italici e Poemi del Risorgimento mostrano la fase civile.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'X Agosto è il testo del trauma; Temporale e Il lampo sono paesaggi impressionistici; Novembre è la falsa primavera che si rovescia nel gelo; Lavandare mette in scena l\'abbandono; Il gelsomino notturno intreccia eros e fecondazione; Italy racconta l\'emigrazione.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Pascoli è il polo opposto di D\'Annunzio: fanciullino contro vate, nido contro superuomo. Con Leopardi condivide il dolore e la memoria, ma non la stessa idea di natura. Con Saba si avvicina per il privato, con Ungaretti per la parola rivelativa, con Montale per la poetica del simbolo.' },
      'vita-trauma': { label: 'Vita', title: 'Trauma del padre', text: 'Il 10 agosto 1867 Ruggero Pascoli viene assassinato mentre torna a casa. Il delitto resta senza colpevole e diventa il centro emotivo e simbolico della poesia pascoliana: perdita, ingiustizia e male storico.' },
      'vita-castelvecchio': { label: 'Vita', title: 'Castelvecchio', text: 'Dopo il 1895 Pascoli vive con Maria a Castelvecchio di Barga. La casa diventa il nido poetico e affettivo, luogo di protezione ma anche di chiusura. Da qui nascono molte poesie di Canti di Castelvecchio.' },
      'poetica-fanciullino': { label: 'Poetica', title: 'Il fanciullino', text: 'Il fanciullino è la voce interna che non ragiona in modo scientifico ma intuisce. Vede le cose con stupore, dà loro nome come Adamo e svela corrispondenze segrete. È il fondamento teorico della poesia pascoliana.' },
      'poetica-fonosimbolismo': { label: 'Poetica', title: 'Fonosimbolismo', text: 'Il suono delle parole vale quanto il loro significato. Onomatopee, allitterazioni, ritmi spezzati e timbri vocalici riproducono la natura e la paura. La poesia diventa eco, vibrazione, ascolto.' },
      'poetica-nido': { label: 'Poetica', title: 'Il nido', text: 'Il nido è il simbolo della casa e della famiglia come rifugio dal male esterno. È un luogo affettivo ma anche fragile, sempre minacciato dalla perdita, dalla storia e dalla morte.' },
      'opere-myricae': { label: 'Opere', title: 'Myricae', text: 'La raccolta inaugurale e più famosa: piccole cose, paesaggi, natura, morte, memoria. Il titolo richiama le tamerici virgiliane, cioè una poesia umile e bassa. Le edizioni successive allargano il numero dei testi fino a 156.' },
      'opere-castelvecchio': { label: 'Opere', title: 'Canti di Castelvecchio', text: 'Raccolta matura dedicata alla madre. Ricorrono stagioni, campagna, nido, sogno, ritorno dell\'infanzia e suoni naturali. È il libro più vicino alla casa di Castelvecchio e alla sua atmosfera familiare.' },
      'opere-poemetti': { label: 'Opere', title: 'Poemetti', text: 'I Poemetti ampliano il respiro narrativo: la vita dei contadini, Rosa e Rigo, la Garfagnana, il lavoro, i cicli stagionali. Qui Pascoli sperimenta anche il plurilinguismo e la terzina dantesca.' },
      'testi-xagosto': { label: 'Testi', title: 'X Agosto', text: 'Testo simbolo del trauma: la rondine e il padre tornano al nido e vengono uccisi. Il cielo resta lontano, la Terra è un atomo opaco del Male. Il privato diventa cosmico.' },
      'testi-gelsomino': { label: 'Testi', title: 'Il gelsomino notturno', text: 'Testo analogico che mette in parallelo la fioritura notturna del gelsomino e la notte di nozze. L\'eros naturale e l\'eros umano si corrispondono in una scena di fecondazione e segreto.' },
      'confronti-dannunzio': { label: 'Confronti', title: 'Pascoli vs D\'Annunzio', text: 'D\'Annunzio è il poeta-vate, del superuomo e dell\'estetismo; Pascoli è il poeta-fanciullino, del nido, delle piccole cose e della voce infantile. Sono i due poli del Decadentismo italiano.' },
      'confronti-leopardi': { label: 'Confronti', title: 'Pascoli e Leopardi', text: 'Entrambi leggono il dolore e il rapporto con la natura, ma Leopardi tende alla natura matrigna e alla memoria del passato felice; Pascoli alla natura simbolica e alla memoria dei legami familiari.' }
    };

    let currentKey = 'root';
    function showNode(key) {
      currentKey = key;
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') closeTip();
    });
  </script>
