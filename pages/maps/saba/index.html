  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Umberto Saba', text: 'Vero nome Umberto Poli. Pseudonimo dal 1910: dal cognome della balia (Sabaz) o da «saba» = pane in ebraico. Nasce a Trieste (Impero austro-ungarico) nel 1883. La vita è segnata da tre figure materne contrapposte e dalla scissione interiore che ne deriva. Poeta antinovecentista: rifiuta l\'ermetismo e sceglie la tradizione. Muore a Gorizia nel 1957.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'La biografia di Saba è il materiale diretto della sua poesia. I traumi dell\'infanzia, Trieste come città-specchio, la psicanalisi con Weiss dal 1929, le leggi razziali del 1938 che lo costringono alla fuga: tutto entra nel Canzoniere senza filtri estetici. «O mio cuore, dal nascere in due scisso.»' },
      poetica: { label: 'Categoria', title: 'Poetica e stile', text: 'Dal saggio «Quello che resta da fare ai poeti» (1911): la poesia deve dire la verità senza mascherarla. Contro D\'Annunzio (preziosismo), gli Ermetici (oscurità), i Vociani (frammento). Per: Petrarca, Leopardi, Foscolo. «Moderno in modo quasi sconcertante pur restando nella tradizione» (Solmi).' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Il Canzoniere (1900–1954) è il centro di tutto: Saba lo definisce «romanzo psicologico in versi». Tre volumi, 25 sezioni. Historia e cronistoria (1948, sotto pseudonimo Carimandrei) è il raro caso di un poeta che commenta il proprio lavoro. Ernesto (postumo 1975) è il romanzo di formazione incompiuto.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'I testi del programma vengono quasi tutti dal Canzoniere: Amai, La capra, Trieste, A mia moglie, Città vecchia, Mio padre è stato per me l\'assassino. Più un brano da Ernesto (La vera causa). Tutti ruotano attorno alla scissione, al dolore universale, all\'identità triestina.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'vs Ungaretti: entrambi autobiografici, ma Ungaretti cerca l\'illuminazione; Saba cerca l\'onestà. vs Montale: entrambi nel segno del dolore, ma Saba accetta la vita pienamente; Montale diagnostica il male senza riscatto. vs Ermetici: rifiuta l\'oscurità. vs Vociani: rifiuta il frammento aperto.' },
      'vita-traumi': { label: 'Vita', title: 'I traumi fondativi', text: 'Padre (Ugo Poli) abbandona la famiglia prima della nascita. Madre ebrea severa e opprimente. Balia slovena Peppa Gabrovich: la «madre lieta». Questa triplice ferita genera le nevrosi che alimentano tutta la poesia. Contini lo definisce «psicanalitico prima della psicanalisi».' },
      'vita-scissione': { label: 'Vita', title: 'Scissione dell\'io', text: 'Il cuore scisso: da una parte la balia (madre di gioia), dall\'altra la madre biologica (madre mesta). Questa frattura è la radice della nevrosi e attraversa tutto il Canzoniere. Dal 1929 terapia con Edoardo Weiss (allievo di Freud) a Trieste. «O mio cuore, dal nascere in due scisso.»' },
      'poetica-onesta': { label: 'Poetica', title: 'Poesia onesta', text: 'Dal saggio «Quello che resta da fare ai poeti» (1911). La poesia deve dire la verità senza mascherarla. Il poeta è ricercatore di verità, non letterato di professione. Contro il preziosismo di D\'Annunzio. «Amai la verità che giace al fondo» (Amai). La rima fiore/amore, banale per il Novecento, è per Saba «la più antica difficile del mondo».' },
      'poetica-scandaglio': { label: 'Poetica', title: 'Scandaglio', text: 'Strumento che si cala in mare per misurare la profondità. Metafora della poesia: scende nell\'interiorità, sonda l\'inconscio. «Amai la verità che giace al fondo» (Amai). Il fondo è ciò che lo scandaglio raggiunge. Il metodo è perfettamente sovrapponibile a quello freudiano.' },
      'poetica-anti': { label: 'Poetica', title: 'Anti-novecentismo', text: 'Contro: ermetismo (oscurità), vocianesimo (frammento), futurismo (avanguardia). Verso: Petrarca, Leopardi, Foscolo. «Amai trite parole che non uno osava.» Usare parole comuni (amore, fiore, vita) è un atto di coraggio. «Moderno in modo quasi sconcertante» (Solmi).' },
      'opere-canzoniere': { label: 'Opere', title: 'Il Canzoniere', text: 'Raccolta di tutta la produzione (1900–1954). Saba lo definisce «romanzo psicologico in versi». Tre volumi per 25 sezioni. Prima edizione 1921 (accolta con indifferenza); definitiva 1961. Il titolo dichiara fedeltà a Petrarca. È una delle grandi opere del Novecento italiano.' },
      'opere-ernesto': { label: 'Opere', title: 'Ernesto', text: 'Romanzo incompiuto (scritto 1953, pubblicato postumo 1975). Protagonista Ernesto, 16 anni, Trieste fine Ottocento. Iniziazione sentimentale e sessuale. Tema: assenza del padre, rapporto con la madre, ricerca di affetto. Stile narrativo diretto, quasi autobiografico.' },
      'testi-amai': { label: 'Testi', title: 'Amai', text: 'Dichiarazione di poetica: «Amai trite parole che non uno osava. M\'incantò la rima fiore / amore». Tre anafore (Amai · Amai · Amo). La «buona carta» = l\'eredità poetica lasciata al lettore. La «verità al fondo» = scandaglio. Da Mediterranee.' },
      'testi-capra': { label: 'Testi', title: 'La capra', text: '«Il dolore è eterno, ha una voce e non varia.» Il belato uguale della capra = dolore universale. «Viso semita» = identificazione ebraica. Eco leopardiana: pessimismo cosmico e solidarietà tra le creature. La capra lamentosa e il poeta si riconoscono fratelli nel dolore.' },
      'testi-trieste': { label: 'Testi', title: 'Trieste', text: '«Scontrosa grazia» = ossimoro. La città come specchio dell\'anima: riservata ma piena di vita. Il cantuccio = spazio di solitudine e appartenenza. «La mia città che in ogni parte è viva / ha il cantuccio a me fatto.» Da Trieste e una donna.' },
      'confronti-posizione': { label: 'Confronti', title: 'Posizione nel Novecento', text: 'vs Ungaretti: entrambi autobiografici, ma Ungaretti cerca l\'illuminazione; Saba cerca l\'onestà. vs Montale: entrambi nel segno del dolore, ma Saba accetta la vita; Montale diagnostica il male come irrisolvibile. vs Ermetici: rifiuta l\'oscurità. vs Vociani: rifiuta il frammento.' },
      'confronti-chiave': { label: 'Sintesi', title: '5 parole-chiave di Saba', text: '① Poesia onesta — la verità senza maschere. ② Scandaglio — immersione nell\'interiorità. ③ Scissione — il cuore diviso in due. ④ Canzoniere — romanzo psicologico in versi. ⑤ Trieste — scontrosa grazia, specchio dell\'anima.' }
    };

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
