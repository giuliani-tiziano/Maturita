  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Italo Svevo', text: 'Vero nome Ettore Schmitz. Nasce a Trieste nel 1861 da padre tedesco e madre italiana. Borghese di successo (direttore Veneziani & Co.) e scrittore fallito. Tre romanzi, tutti ignorati in vita. Amicizia con James Joyce dal 1907. Riconosciuto nel 1925 grazie a Larbaud e Crémieux. Muore nel 1928 in un incidente automobilistico.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Trieste città di confine: italiana, tedesca, ebraica. La doppia identità — imprenditore di giorno, scrittore di notte — nutre il tema dell\'inetto. Amicizia con Joyce dal 1907. Il successo di Zeno in Francia (1926) precede quello italiano. Muore nel 1928.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'L\'inetto: personaggio che fallisce per impossibilità psicologica, non per mancanza di talento. L\'inettitudine è lucidità travestita da debolezza. Monologo interiore: il narratore è inattendibile — racconta non come le cose sono andate, ma come le interpreta la propria coscienza.' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Tre romanzi: Una vita (1892, Alfonso Nitti), Senilità (1898, Emilio Brentani), La coscienza di Zeno (1923). I primi due ignorati; Zeno riconosciuto solo nel 1925-26. Le 25 anni di silenzio tra Senilità e Zeno sono fondamentali per la maturazione dello stile.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'I testi del programma vengono quasi tutti da La coscienza di Zeno: Prefazione/Preambolo (narratore inattendibile), Il fumo (l\'ultima sigaretta), La morte del padre (lo schiaffo), Psico-analisi e Il finale (la profezia della bomba atomica).' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'vs Pirandello: Svevo decostruisce l\'identità dall\'interno (psicologia, coscienza); Pirandello la decostruisce dall\'esterno (società, maschere). vs Proust: entrambi usano la memoria, ma Svevo è ironico dove Proust è lirico. vs Joyce: flusso di coscienza condiviso, ma ironia vs epifania.' },
      'vita-trieste': { label: 'Vita', title: 'Trieste borghese', text: 'Trieste austro-ungarica: città di confine (italiana, tedesca, ebraica). Svevo è borghese di successo (direttore della Veneziani & Co.), letterato fallito, ebreo laico. Il nome d\'arte «Italo Svevo» unifica le due anime: italiano + svevo (tedesco). La doppia identità è il nutrimento dell\'inettitudine.' },
      'vita-joyce': { label: 'Vita', title: 'Amicizia con Joyce', text: 'Joyce insegna inglese a Svevo dal 1907. Leggendo Senilità, lo definisce «un maestro». Svevo gli mostra il dattiloscritto di Zeno. Joyce lo segnala agli intellettuali parigini (Larbaud, Crémieux). Il successo di Zeno in Francia (1926) precede quello italiano.' },
      'vita-tardivo': { label: 'Vita', title: 'Tardivo riconoscimento', text: 'Fino al 1925 Svevo è sconosciuto in Italia. Una vita (1892) e Senilità (1898): critiche tiepide. Solo con La coscienza di Zeno (1923) e la mediazione francese (1925-26) arriva il riconoscimento. 25 anni di silenzio letterario. Muore nel 1928 prima di raccogliere i frutti.' },
      'poetica-inetto': { label: 'Poetica', title: 'L\'inetto', text: 'Personaggio che fallisce per impossibilità psicologica, non per mancanza di talento. Alfonso Nitti (Una vita), Emilio Brentani (Senilità), Zeno Cosini (La coscienza). L\'inettitudine è lucidità travestita da debolezza: l\'inetto vede la vanità del mondo e non riesce ad adeguarsi.' },
      'poetica-monologo': { label: 'Poetica', title: 'Monologo interiore', text: 'Anticipazione del flusso di coscienza. Il narratore di Zeno è inattendibile: racconta non come le cose sono andate, ma come le interpreta la propria coscienza. La struttura non è cronologica ma psicologica (capitoli tematici: il fumo, il padre, la moglie, l\'amante, gli affari).' },
      'poetica-ironia': { label: 'Poetica', title: 'Ironia e inattendibilità', text: 'Svevo usa un\'ironia che si rivolge prima di tutto al narratore stesso. Zeno si giustifica, si assolve, si contraddice. Il lettore vede ciò che Zeno non vuole vedere. L\'ironia sveviana non è satirica ma conoscitiva: svela l\'autoingannamento come struttura della coscienza.' },
      'opere-uvita': { label: 'Opere', title: 'Una vita (1892)', text: 'Protagonista: Alfonso Nitti, impiegato di banca che fallisce nell\'amore e nella letteratura. Primo tentativo del tipo inetto. Influenza di Schopenhauer. Accolta con indifferenza dalla critica: Svevo la autopubblica a spese sue. Il titolo è già una condanna ironica.' },
      'opere-senilita': { label: 'Opere', title: 'Senilità (1898)', text: 'Emilio Brentani, letterato mediocre che costruisce un\'illusione d\'amore su Angiolina. «Senilità» = incapacità di vivere pienamente, non vecchiaia anagrafica. Altro flop critico. Svevo smette di scrivere narrativa per 25 anni.' },
      'opere-zeno': { label: 'Opere', title: 'La coscienza di Zeno (1923)', text: 'Struttura: memorie fittizie scritte su consiglio del dottore-psicanalista. Capitoli tematici, non cronologici. Zeno racconta la propria vita (il fumo, la morte del padre, il matrimonio, l\'amante, il commercio) con ironia che svela l\'autoingannamento. Finale profetico: la bomba atomica.' },
      'testi-fumo': { label: 'Testi', title: 'Il fumo', text: 'Zeno è dipendente dal fumo e si prefigge continuamente l\'ultima sigaretta senza smettere mai. «L\'ultima sigaretta» = metafora del voler cambiare senza mai farlo. Ogni sigaretta porta la data dell\'ultima: l\'intenzione permanente di cambiare che non cambia mai.' },
      'testi-padre': { label: 'Testi', title: 'La morte del padre', text: 'Zeno racconta la morte del padre: momento cruciale ma narrato con distorsioni (lo schiaffo — involontario? intenzionale?). L\'ambiguità è irrisolvibile: il narratore inattendibile non può stabilire la propria innocenza. Freud in filigrana: senso di colpa, rimozione, elaborazione del lutto.' },
      'testi-finale': { label: 'Testi', title: 'Psico-analisi / Il finale', text: 'Zeno smette la psicanalisi e scopre di stare bene senza. Nel finale, profezia apocalittica: un uomo costruirà una bomba e distruggerà la terra. La malattia dell\'uomo è incurabile. L\'ironia diventa nichilismo cosmico: l\'inettitudine è non più individuale ma universale.' },
      'confronti-pirandello': { label: 'Confronti', title: 'vs Pirandello', text: 'Svevo: l\'inetto — consapevole della vanità del mondo, si rifiuta di adeguarsi; il problema è interiore (coscienza, psicologia). Pirandello: la maschera — l\'identità è imposta dall\'esterno; il problema è sociale (gli altri, la forma). Entrambi decostruiscono la fiducia positivista nell\'identità stabile.' },
      'confronti-chiave': { label: 'Sintesi', title: '5 parole-chiave di Svevo', text: '① Inetto — fallimento come lucidità. ② Inattendibilità — il narratore mente a se stesso. ③ Coscienza — titolo e tema centrale: la malattia della coscienza. ④ Ironia — stile e visione del mondo. ⑤ Trieste — città di confine che genera l\'identità doppia.' }
    };

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
</body>
</html>
