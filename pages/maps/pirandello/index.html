  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Luigi Pirandello', text: 'Nasce il 28 giugno 1867 in una contrada di nome Caos, presso Agrigento. Si laurea a Bonn con una tesi sul dialetto girgentino. Insegna al Magistero femminile di Roma. Moglie internata definitivamente nel 1919. Nobel per la letteratura 1934. Muore a Roma il 10 dicembre 1936 lasciando incompiuti I giganti della montagna.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'La biografia di Pirandello è il laboratorio del suo pensiero. La nascita a Caos (metafora dell\'esistenza caotica), la convivenza con la moglie paranoica (dimostrazione vivente del relativismo), il Nobel (riconoscimento del valore dell\'inquietudine moderna).' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Il nucleo: Vita = flusso continuo; Forma = etichette sociali imposte. Paradosso: non puoi fare a meno di una Forma, ma accettarla significa tradire la tua natura mobile. L\'umorismo (1908): avvertimento del contrario (comicità) vs sentimento del contrario (comprensione empatica). Relativismo: nessuna verità assoluta.' },
      opere: { label: 'Categoria', title: 'Opere', text: '4 fasi: Verismo siciliano (L\'esclusa, Il turno), Crisi dell\'io (Il fu Mattia Pascal 1904, L\'Umorismo 1908), Teatro della crisi (Sei personaggi 1921, Enrico IV 1922), Teatro dei miti (I giganti della montagna, incompiuto). Il fu Mattia Pascal e Uno, nessuno e centomila sono i romanzi fondamentali.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'Novelle: Il treno ha fischiato (follia come lucidità), Ciaula scopre la luna (epifania esistenziale), La patente (il grottesco). Romanzi: Il fu Mattia Pascal (identità come gabbia necessaria). Teatro: Enrico IV, Sei personaggi in cerca d\'autore.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'vs Svevo: Pirandello decostruisce l\'identità dall\'esterno (gli altri, la maschera sociale); Svevo dall\'interno (la coscienza, la psicologia). vs Freud: entrambi dell\'inconscio, ma Pirandello lo socializza (gli altri ci vedono diversi). vs Verismo: Pirandello parte da lì ma lo trascende.' },
      'vita-caos': { label: 'Vita', title: 'Nascita a Caos', text: 'Nasce in una contrada di nome Caos presso Agrigento il 28 giugno 1867. Si autodefinisce «figlio del Caos»: allude sia alla nascita sia alla natura caotica dell\'esistenza umana. Padre Stefano gestisce una zolfara. Contatto con Capuana che lo orienta verso la narrativa. Laurea a Bonn.' },
      'vita-moglie': { label: 'Vita', title: 'Moglie paranoica', text: 'Antonietta Portolano: matrimonio combinato 1894. Dal 1897 sviluppa paranoia ossessiva: vede tradimenti inesistenti, costruisce una realtà parallela. Pirandello vive per anni con lei, rifiutandosi di internarla. Internamento definitivo 1919. Questa convivenza è la dimostrazione vivente che non esiste una verità univoca.' },
      'poetica-vitaforma': { label: 'Poetica', title: 'Vita e Forma', text: 'Vita = flusso continuo e mobile dell\'esistenza: pensieri, emozioni, desideri che non stanno mai fermi. Forma = tutto ciò che cerca di fermare questo flusso: nome, mestiere, ruolo in famiglia, aspettative altrui. Paradosso: senza Forma non si esiste per la società, ma accettarla tradisce la propria natura.' },
      'poetica-umorismo': { label: 'Poetica', title: 'L\'umorismo (1908)', text: 'Avvertimento del contrario: la reazione istintiva all\'incongruità — ridiamo della vecchia imbellettata. Sentimento del contrario: la riflessione che subentra — capiamo la storia di dolore nascosta dietro l\'apparenza comica. Il riso si mescola con la pietà e la comprensione empatica.' },
      'poetica-relativismo': { label: 'Poetica', title: 'Relativismo conoscitivo', text: 'Non esiste un punto di vista neutro e assoluto. Ogni verità è «la tua» o «la mia», mai semplicemente «la verità». Il titolo Così è (se vi pare) lo dichiara. Influenze: Alfred Binet (molteplicità della personalità), Nietzsche, Schopenhauer, contatto con la cultura tedesca.' },
      'opere-mattia': { label: 'Opere', title: 'Il fu Mattia Pascal (1904)', text: 'Protagonista finge la propria morte e assume un\'identità nuova (Adriano Meis). Scopre di non poter vivere senza identità sociale: non può sposarsi, denunciare, avere diritti. Alla fine torna, «fu» Mattia Pascal: non più vivo, ma nemmeno morto. Il tema: l\'identità è una gabbia necessaria.' },
      'opere-sei': { label: 'Opere', title: 'Sei personaggi (1921)', text: 'Capolavoro metateatrale. 6 personaggi irrompono in una prova teatrale cercando un autore. Il teatro si denuda: la «quarta parete» scompare, mostra i propri meccanismi. I personaggi sono più reali degli attori perché fissi nella loro essenza. Scandalo alla prima romana; trionfo internazionale.' },
      'testi-treno': { label: 'Testi', title: 'Il treno ha fischiato', text: 'Belluca, impiegato modello martirizzato dalla famiglia, impazzisce. Ha «sentito il fischio del treno» e capisce che esiste un mondo là fuori. La «follia» è in realtà un recupero di consapevolezza: la maschera sociale che soffoca fino alla rottura diventa il tema centrale.' },
      'testi-ciaula': { label: 'Testi', title: 'Ciaula scopre la luna', text: 'Minatore siciliano (caruso) che ha paura del buio. La prima volta che vede la luna, piange. La luna è l\'illuminazione di chi vive nell\'oscurità assoluta. Pirandello usa il verismo siciliano come sfondo per un momento di epifania esistenziale: anche il più emarginato è capace di stupore.' },
      'testi-mattia': { label: 'Testi', title: 'Il fu Mattia Pascal', text: 'I temi centrali del testo: l\'identità come finzione necessaria, l\'impossibilità di esistere fuori dalla Forma, la doppia trappola (nessuno è Adriano Meis, ma Mattia Pascal è «fu»). La società non accetta chi esce dai suoi schemi: il «fu» davanti al nome è una condanna definitiva.' },
      'confronti-svevo': { label: 'Confronti', title: 'vs Svevo', text: 'Pirandello: la maschera — l\'identità è imposta dall\'esterno; il problema è sociologico (gli altri). Svevo: l\'inetto — la coscienza che si auto-sabota; il problema è psicologico (il sé). Entrambi decostruiscono la fiducia positivista nell\'identità stabile, ma da angolature opposte.' },
      'confronti-chiave': { label: 'Sintesi', title: '5 parole-chiave di Pirandello', text: '① Vita/Forma — il paradosso fondamentale. ② Maschera — l\'identità imposta dall\'esterno. ③ Umorismo — sentimento del contrario: riso misto a pietà. ④ Relativismo — nessuna verità assoluta. ⑤ Teatro nel teatro — la quarta parete che cade.' }
    };

    function showNode(key) {
      const n = NODES[key];
      if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
</body>
</html>
