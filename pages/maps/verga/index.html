  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Giovanni Verga', text: 'Giovanni Verga (1840–1922) nasce a Catania da una famiglia di proprietari terrieri. Dopo una fase mondana e romantica a Firenze e Milano, approda al Verismo nel 1878 con Rosso Malpelo. Il Ciclo dei Vinti (Malavoglia, 1881; Mastro-don Gesualdo, 1889) è la sua opera maggiore. Dal 1893 vive a Catania e smette di scrivere.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce a Catania nel 1840 da proprietari terrieri. Dopo i romanzi mondani a Firenze e Milano (1865-1878), la svolta verista con Rosso Malpelo (1878). I Malavoglia (1881) e Mastro-don Gesualdo (1889) completano il Ciclo dei Vinti. Dal 1893 ritorno definitivo a Catania e silenzio letterario totale.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Tre pilastri: impersonalità (la mano dell\'autore deve essere assolutamente invisibile), regressione del narratore (si immerge nella mentalità dei personaggi), pessimismo (la realtà non è modificabile). Il metodo non è scientifico come in Zola: è la conseguenza filosofica del pessimismo.' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Vita dei campi (1880) è la prima raccolta verista. Novelle rusticane (1883) sviluppa il tema della roba. Il Ciclo dei Vinti comprende I Malavoglia (1881) e Mastro-don Gesualdo (1889). Gli altri tre romanzi del ciclo restano incompiuti o mai scritti.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'Rosso Malpelo è il testo dello straniamento e del narratore collettivo. La fiumana del progresso (prefazione ai Malavoglia) è il manifesto del Ciclo dei Vinti. L\'addio di \'Ntoni chiude il romanzo con l\'ideale dell\'ostrica rovesciato. La roba mostra l\'ossessione per i beni materiali.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Verga vs Zola: stessa impersonalità, ragioni opposte (pessimismo vs metodo scientifico). Verga vs Manzoni: stesso interesse per le classi umili, nessuna Provvidenza. Verga vs D\'Annunzio: l\'io cancellato vs l\'io esaltato. Verga vs Pascoli: il nido come sopravvivenza biologica vs il nido come rifugio affettivo.' },
      'vita-catania': { label: 'Vita', title: 'Catania e proprietà terriera', text: 'Verga nasce il 2 settembre 1840 a Catania da una famiglia di proprietari terrieri della piccola borghesia agraria siciliana. Questa radice sociale — il galantuomo del Sud, conservatore, legato alla terra — condiziona tutta la sua visione del mondo: il fatalismo, l\'immobilità, il pessimismo.' },
      'vita-svolta': { label: 'Vita', title: 'La svolta verista del 1878', text: 'Dopo i romanzi mondani (Eva, 1873; Eros, 1875; Tigre reale, 1875), la pubblicazione di Rosso Malpelo nel 1878 segna la svolta definitiva verso il Verismo. Dal 1893, dopo Mastro-don Gesualdo (1889), ritorno a Catania e silenzio letterario totale durato quasi trent\'anni.' },
      'poetica-impersonalita': { label: 'Poetica', title: 'Impersonalità', text: 'Lo scrittore si eclissa dall\'opera: il testo sembra essersi fatto da sé. La mano dell\'autore deve essere assolutamente invisibile. Non è obiettività scientifica come in Zola: è la conseguenza filosofica del pessimismo verghiano. Poiché non si può modificare il reale, il giudizio morale è vuoto.' },
      'poetica-regressione': { label: 'Poetica', title: 'Regressione del narratore', text: 'L\'autore non descrive i personaggi dall\'alto: si immerge nella loro mentalità, nel loro linguaggio, nella loro logica — anche quando è circolare, superstiziosa, primitiva. Questo produce il discorso indiretto libero (DIL): pensieri e parole senza virgolette né verba dicendi.' },
      'poetica-ostrica': { label: 'Poetica', title: 'Ideale dell\'ostrica', text: 'Da Fantasticheria (1880): l\'unica strategia di sopravvivenza per i deboli è restare attaccati al proprio ambiente natale come l\'ostrica allo scoglio. Chi si stacca viene divorato dal pesce vorace (la borghesia, il progresso). Non è esaltazione della povertà: è una legge biologica della sopravvivenza.' },
      'opere-malavoglia': { label: 'Opere', title: 'I Malavoglia', text: 'Primo romanzo del Ciclo dei Vinti (1881). Ambientato ad Aci Trezza. La famiglia Toscano (soprannominata Malavoglia) perde la casa del nespolo dopo il naufragio della Provvidenza. Chi resta (Alessi) sopravvive; chi parte (\'Ntoni, Lia) si perde. L\'ideale dell\'ostrica applicato narrativamente.' },
      'opere-gesualdo': { label: 'Opere', title: 'Mastro-don Gesualdo', text: 'Secondo romanzo del Ciclo dei Vinti (1889). Gesualdo Motta, ex manovale arricchito, sposa Bianca Trao (nobile decaduta) per scalare la gerarchia. Muore solo e trattato come un servo. Il titolo rivela la tragedia: Mastro (plebeo) + Don (notabile) = due identità incompatibili.' },
      'testi-malpelo': { label: 'Testi', title: 'Rosso Malpelo', text: 'Da Vita dei campi (1880). Il testo che inaugura il Verismo di Verga. La prima riga è già un esempio perfetto di narratore regredito: logica circolare (capelli rossi → cattivo → capelli rossi), narratore collettivo, straniamento. Malpelo è l\'escluso assoluto — per nascita, non per colpa.' },
      'testi-fiumana': { label: 'Testi', title: 'La fiumana del progresso', text: 'Prefazione ai Malavoglia (1881), manifesto del Ciclo dei Vinti. Il progresso è come una fiumana: grandioso da lontano, devastante da vicino. I vinti sono i detriti lasciati sulla riva. Lo scrittore non ha il diritto di giudicare: può solo descrivere senza passione.' },
      'testi-ntoni': { label: 'Testi', title: 'L\'addio di \'Ntoni', text: 'Finale dei Malavoglia, cap. XV. \'Ntoni torna di notte, il cane non lo riconosce. La casa è diventata veleno. «Ora che so ogni cosa devo andarmene»: la conoscenza del mondo è una condanna. Il mare «senza paese» è l\'unico elemento che capisce \'Ntoni — anch\'esso senza radici.' },
      'confronti-zola': { label: 'Confronti', title: 'Verga vs Zola', text: 'Entrambi cercano l\'impersonalità, ma per ragioni diverse: Zola per metodo scientifico (il médecin devant son malade), Verga per conseguenza filosofica del pessimismo. Zola crede nel progresso e nella riforma sociale; Verga è radicalmente pessimista. La Francia industriale vs la Sicilia agraria.' },
      'confronti-dannunzio': { label: 'Confronti', title: 'Verga vs D\'Annunzio', text: 'Sono opposti assoluti: D\'Annunzio mette l\'io al centro di ogni opera; Verga lo cancella. D\'Annunzio canta la forza e il trionfo; Verga descrive la miseria e la sconfitta. D\'Annunzio è ottimista pagano; Verga è pessimista laico. Entrambi siciliani d\'origine, ma con visioni della Sicilia diametralmente opposte.' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>
