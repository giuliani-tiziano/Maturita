  <script>
    const NODES={
      root:{label:'Autore',title:'Cesare Pavese',text:'Cesare Pavese (1908–1950) nasce nelle Langhe e ne fa il mito assoluto della sua opera. Traduttore della letteratura americana, antifascista confinato, figura centrale di Einaudi. La sua poetica ruota attorno al mito dell\'infanzia, al ritorno impossibile e alla solitudine. Si suicida nel 1950 all\'apice del successo.'},
      vita:{label:'Categoria',title:'Vita',text:'Nasce a Santo Stefano Belbo nel 1908. Perde il padre a sei anni. Si laurea su Whitman, traduce la letteratura americana, è confinato a Brancaleone (1935) per antifascismo. Nel dopoguerra è una figura centrale di Einaudi. Vince lo Strega nel 1950 e si suicida a Torino il 27 agosto dello stesso anno.'},
      mito:{label:'Categoria',title:'Il mito',text:'Il mito è la categoria fondante: i luoghi dell\'infanzia diventano archetipi eterni e sacri (Vico, Jung). Il ritorno ai luoghi dell\'origine è ossessivo ma impossibile: il passato è irrecuperabile. La luna (ciclo cosmico) e i falò (rito contadino) sono i simboli del mito perduto.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Il verso-frase di Lavorare stanca (1936) è lungo, narrativo, prosastico: l\'opposto dell\'Ermetismo. La solitudine è la condizione esistenziale dei personaggi, incapaci di amare e comunicare. L\'influenza della letteratura americana (Whitman, Melville) è decisiva.'},
      opere:{label:'Categoria',title:'Opere',text:'Lavorare stanca (1936, poesia), Paesi tuoi (1941), La casa in collina (1949), La luna e i falò (1950, capolavoro). Il diario Il mestiere di vivere (postumo 1952). I Dialoghi con Leucò (1947) sviluppano la teoria del mito.'},
      testi:{label:'Categoria',title:'Testi',text:'L\'incipit de La luna e i falò (il ritorno del trovatello Anguilla) e la poesia Verrà la morte e avrà i tuoi occhi (la fusione di amore e morte, scritta pochi mesi prima del suicidio) sono i testi chiave.'},
      confronti:{label:'Categoria',title:'Confronti',text:'Pavese vs Verga: il Sud/le Langhe come mito (Pavese) o come realtà sociologica (Verga). Pavese vs Svevo: l\'inetto solitario e tragico vs l\'inetto ironico. Pavese e il Neorealismo: dentro e oltre, perché aggiunge alla realtà il mito.'},
      'vita-langhe':{label:'Vita',title:'Santo Stefano Belbo e le Langhe',text:'Pavese nasce nel 1908 a Santo Stefano Belbo, nelle Langhe cuneesi. Le colline del Belbo, le vigne, i falò sono il paesaggio mitico assoluto della sua opera. Perde il padre a sei anni e la famiglia si trasferisce a Torino: la distanza dalle Langhe genererà il mito.'},
      'vita-confino':{label:'Vita',title:'Confino, Einaudi, suicidio',text:'Arrestato per antifascismo, è confinato a Brancaleone Calabro nel 1935. Al ritorno comincia il diario Il mestiere di vivere. Nel dopoguerra è una figura centrale della casa editrice Einaudi. Vince il Premio Strega nel 1950 e si suicida in una camera dell\'albergo Roma di Torino il 27 agosto.'},
      'mito-infanzia':{label:'Il mito',title:'Mito dell\'infanzia',text:'Per Pavese il mito è la forma in cui l\'uomo conosce il mondo prima della ragione. Le cose viste per la prima volta nell\'infanzia diventano archetipi eterni e sacri. Le fonti teoriche sono Vico (l\'età «poetica» dell\'umanità) e Jung (gli archetipi dell\'inconscio collettivo). Solo da bambini si conoscono le cose; da adulti si possono solo riconoscere.'},
      'mito-ritorno':{label:'Il mito',title:'Il ritorno impossibile',text:'Si torna sempre ai luoghi dell\'origine, ma non si trova quello che si cerca: il passato è irrecuperabile. «Bisogna aver lasciato un paese per capire quanto ci si lega»: il legame nasce dalla distanza. Il ritorno conferma la perdita invece di annullarla.'},
      'poet-versofrase':{label:'Poetica',title:'Verso-frase',text:'In Lavorare stanca (1936) Pavese inventa il verso-frase: lungo, disteso, prosastico, che racconta invece di cantare. È l\'opposto del verso breve ed essenziale dell\'Ermetismo. Il modello è la poesia narrativa americana (Whitman, Edgar Lee Masters). Ogni poesia narra una storia, descrive un personaggio.'},
      'poet-solitudine':{label:'Poetica',title:'Solitudine e America',text:'La solitudine è la condizione esistenziale dei personaggi pavesiani: incapacità di contatti autentici, fallimento dell\'amore, impossibilità di comunicare. Pavese, con Vittorini, è il principale traduttore della letteratura americana in Italia: Whitman (tesi), Melville, Dos Passos, Steinbeck. L\'America è il mito della libertà contro il provincialismo fascista.'},
      'opere-luna':{label:'Opere',title:'La luna e i falò',text:'Ultimo romanzo (1950), capolavoro-testamento. Anguilla, trovatello cresciuto nelle Langhe ed emigrato in America, torna al paese e trova solo morte e distruzione: Santa è stata fucilata dai partigiani e bruciata in un falò. La luna (ciclo eterno) e i falò (rito contadino) sono i simboli del mito perduto.'},
      'opere-casa':{label:'Opere',title:'La casa in collina',text:'Romanzo (1949). La guerra partigiana vista da Corrado, intellettuale che si rifugia sulle colline e non riesce a schierarsi. Di fronte ai morti di entrambe le parti, capisce che «ogni guerra è una guerra civile». È un testo-chiave del Neorealismo problematico, non eroico.'},
      'testi-incipit':{label:'Testi',title:'Incipit de La luna e i falò',text:'Anguilla spiega perché è tornato proprio in questo paese: non ci è nato (è un trovatello), non sa dove sia nato, non ha radici fisiche. Ma «bisogna aver lasciato un paese per capire quanto ci si lega». Il ritorno non è sentimentalismo ma necessità di verifica: «si vuol vedere com\'è, si vuol toccare».'},
      'testi-verra':{label:'Testi',title:'Verrà la morte e avrà i tuoi occhi',text:'Poesia del 22 marzo 1950. La morte avrà gli occhi della donna amata: amore e morte si fondono in un\'unica figura. «Un vizio assurdo» che accompagna l\'esistenza dal mattino alla sera. Scritta pochi mesi prima del suicidio, è quasi una profezia autobiografica.'},
      'conf-verga':{label:'Confronti',title:'Pavese vs Verga',text:'Entrambi fanno della terra d\'origine il centro dell\'opera, ma con sguardo opposto: Verga osserva il Sud come realtà sociale immutabile (impersonalità, documentazione); Pavese trasfigura le Langhe in mito personale e cosmico, archetipo sacro e interiore.'},
      'conf-neoreal':{label:'Confronti',title:'Pavese e il Neorealismo',text:'Pavese è dentro e oltre il Neorealismo: usa i temi (guerra, campagna, popolo, Resistenza) ma li trasfigura nel mito. La luna e i falò è realismo e mito insieme: la storia (le fucilazioni partigiane) entra nel paesaggio sacro delle Langhe e lo profana. La realtà da sola non basta.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
