  <script>
    const NODES={
      root:{label:'Corrente',title:'Decadentismo',text:'Il Decadentismo è la grande corrente europea di fine Ottocento che rovescia il Positivismo: al posto della scienza mette il simbolo; alla logica sostituisce l\'analogia; alla razionalità oppone l\'irrazionale e l\'inconscio. Nasce in Francia con Baudelaire e si ramifica in Simbolismo (Francia) e Estetismo (Inghilterra). In Italia filtra attraverso D\'Annunzio e Pascoli.'},
      origini:{label:'Categoria',title:'Origini',text:'Il Decadentismo nasce dalla crisi del Positivismo di fine Ottocento. Schopenhauer (la volontà cieca, il velo di Maya) e Nietzsche (la morte di Dio, il superuomo) forniscono il fondamento filosofico. La borghesia industriale è rifiutata. Il poeta si oppone alla modernità con l\'arte, la bellezza e il vizio.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Il simbolo non descrive: evoca. L\'analogia sostituisce la logica. La sinestesia (fusione dei sensi: «profumi come carni di bambino») crea corrispondenze tra piani diversi della realtà. L\'arte è la sola verità assoluta: non serve a niente ma vale tutto. Il poeta è veggente, non testimone.'},
      baudelaire:{label:'Categoria',title:'Baudelaire',text:'Charles Baudelaire (1821–1867) è il fondatore della modernità poetica. I fiori del male (1857) inaugura la poesia del male, dello spleen, del disagio urbano. Corrispondenze è il testo programmatico: la natura è un «tempio di vivi pilastri» che emette «confuse parole». Il poeta traduce queste corrispondenze segrete.'},
      simbolismo:{label:'Categoria',title:'Simbolismo francese',text:'Verlaine: «musica prima di tutto». Rimbaud: il poeta è un veggente che accede all\'ignoto attraverso il «sregolamento di tutti i sensi». Mallarmé: oscurità come scelta estetica — la poesia suggerisce senza spiegare. Il Manifesto simbolista di Moréas (1886) codifica il movimento.'},
      estetismo:{label:'Categoria',title:'Estetismo inglese',text:'Walter Pater (Il Rinascimento, 1873) teorizza che l\'arte sia la sola esperienza piena: vivere come se ogni momento fosse un\'opera d\'arte. Oscar Wilde radicalizza: arte senza scopo, vita come gioco estetico, il dandy come figura suprema. Huysmans (Controcorrente) porta l\'estetismo all\'estremo del decadentismo.'},
      italia:{label:'Categoria',title:'In Italia',text:'Il Decadentismo italiano non ha un programma organizzato. D\'Annunzio lo declina in senso estetistico e vitalista (superuomo, panismo, vita come opera d\'arte). Pascoli lo filtra in senso simbolista domestico (fanciullino, corrispondenze, fonosimbolismo). I due poli opposti coprono l\'intero arco del Decadentismo italiano.'},
      'origini-crisi':{label:'Origini',title:'Crisi del Positivismo',text:'Nella seconda metà dell\'Ottocento il modello positivista (scienza = verità) entra in crisi. Schopenhauer: la realtà è una volontà cieca e irrazionale; il velo di Maya nasconde la verità. Nietzsche: la morte di Dio lascia l\'uomo senza fondamenti. Bergson: il tempo vissuto è irriducibile al tempo misurato. Da qui la svolta verso l\'irrazionale.'},
      'origini-france':{label:'Origini',title:'Poètes maudits',text:'I «poeti maledetti» (Verlaine conia il termine nel 1884) sono gli esclusi dalla società borghese: Baudelaire, Verlaine, Rimbaud, Corbière, Mallarmé. Vivono ai margini, spesso nell\'alcol e nella malattia. L\'esclusione sociale è anche una scelta: il poeta è incompreso perché vede più in là della folla.'},
      'poetica-simbolo':{label:'Poetica',title:'Simbolo e analogia',text:'Il simbolo non illustra un concetto: evoca stati d\'animo irriducibili alla logica. L\'analogia accosta elementi distanti per creare cortocircuiti di senso. «La luna abbia quella faccia di vecchio ebete» (Campana): la luna come non l\'hai mai vista, ma subito la riconosci. Il simbolo rivela, non descrive.'},
      'poetica-sinestesia':{label:'Poetica',title:'Sinestesia',text:'Fusione di sensazioni di sensi diversi: «profumi come carni di bambino, dolci come gli oboi, verdi come le praterie» (Baudelaire, Corrispondenze). La realtà ha una trama segreta di corrispondenze che il poeta sa leggere. La sinestesia è la tecnica che le rende visibili.'},
      'baud-fiori':{label:'Baudelaire',title:'I fiori del male',text:'Raccolta pubblicata nel 1857, subito processata per oscenità. La poesia scende negli inferi dell\'animo moderno: spleen (noia esistenziale), ennui (vuoto), bellezza del male, eros e morte, la città come inferno laico. «I fiori» sono la poesia che nasce dal fango: la bellezza è inseparabile dalla corruzione.'},
      'baud-modernita':{label:'Baudelaire',title:'Modernità poetica',text:'Baudelaire inventa il soggetto lirico moderno: urbano, alienato, diviso tra ideale e spleen. La città moderna (Parigi) entra per la prima volta nella poesia come tema centrale. Il «dandy» è la prima figura del poeta moderno: elegante, distaccato, osservatore impietoso della modernità.'},
      'simb-verlaine':{label:'Simbolismo',title:'Verlaine e Rimbaud',text:'Verlaine (Arte poetica 1874): «musica prima di tutto, e per questo preferisci il verso dispari». La poesia è suono più che significato. Rimbaud (Lettera del veggente 1871): il poeta accede all\'ignoto attraverso il «lungo, immenso e ragionato sregolamento di tutti i sensi». La sofferenza è strumento conoscitivo.'},
      'simb-mallarme':{label:'Simbolismo',title:'Mallarmé',text:'Stéphane Mallarmé porta l\'oscurità al massimo grado: la difficoltà è una scelta estetica, non un difetto. «Nominare un oggetto sopprime tre quarti del piacere della poesia». Un colpo di dadi jamais n\'abolira le hasard (1897) è il primo esperimento di poesia visiva. La pagina bianca vale quanto le parole.'},
      'est-wilde':{label:'Estetismo',title:'Oscar Wilde',text:'Wilde (1854–1900) incarna l\'estetismo: il dandy che fa dell\'eleganza una filosofia. Il ritratto di Dorian Gray (1890): la bellezza fisica preservata mentre il ritratto marcisce — l\'arte fissa ciò che il tempo corrode. De Profundis (scritto in prigione) è il capovolgimento: la sofferenza come forma suprema di conoscenza.'},
      'est-pater':{label:'Estetismo',title:'Walter Pater',text:'Walter Pater (1839–1894) nel saggio Il Rinascimento (1873) scrive: «Bruciare sempre di questa dura gemma-fiamma, mantenere questo estatico senso — è il successo nella vita». L\'esperienza estetica intensa è il fine dell\'esistenza. Pater è il fondatore teorico dell\'estetismo inglese.'},
      'italia-dann':{label:'In Italia',title:'D\'Annunzio',text:'D\'Annunzio declina il Decadentismo in senso estetistico e vitalista: non il poeta maledetto ma il superuomo (da Nietzsche), non la rinuncia alla vita ma il suo massimo godimento. Il panismo (fusione con la natura) di Alcyone è la forma italiana del Simbolismo. La vita come opera d\'arte: D\'Annunzio incarna il personaggio che ha creato.'},
      'italia-pascoli':{label:'In Italia',title:'Pascoli',text:'Pascoli è il polo opposto di D\'Annunzio nel Decadentismo italiano: non il superuomo ma il fanciullino; non l\'estetismo sfrenato ma il simbolismo dimesso. Le «corrispondenze» pascoliane sono tra natura e memoria intima. Il fonosimbolismo rivela la trama segreta del reale senza uscire dal quotidiano.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
