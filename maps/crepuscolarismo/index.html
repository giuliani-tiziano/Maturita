  <script>
    const NODES={
      root:{label:'Corrente',title:'Crepuscolarismo',text:'Il Crepuscolarismo è un fenomeno letterario italiano dei primi del Novecento (1900–1915 ca.) che reagisce all\'estetismo dannunziano con il tono dimesso, il quotidiano, l\'autoironia. Il termine viene coniato da Borgese nel 1910. Non è un movimento organizzato ma una tendenza diffusa. Gozzano e Corazzini sono i massimi esponenti.'},
      origini:{label:'Categoria',title:'Origini',text:'Non è un movimento organizzato con manifesti. Il termine «crepuscolare» viene coniato da Giuseppe Antonio Borgese nel 1910 per indicare una poesia del tramonto: dopo il sole dannunziano, il crepuscolo. La reazione è contro il sublime, l\'eroismo, la vitalità esibita di D\'Annunzio. Nasce in Piemonte, Liguria e Toscana.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Il tono è dimesso, anti-eroico, malinconico. Il soggetto è il piccolo, il marginale, il quotidiano: le buone cose di pessimo gusto, la provincia, la casa, il salotto. L\'autoironia è lo strumento di difesa contro il sublime. Lo stile è prosastico, colloquiale, spesso catalogo di oggetti che evocano memoria e nostalgia.'},
      gozzano:{label:'Categoria',title:'Guido Gozzano',text:'Guido Gozzano (1883–1916) è il massimo esponente del Crepuscolarismo. I colloqui (1911) contiene La signorina Felicita e L\'amica di nonna Speranza. Le «buone cose di pessimo gusto» — oggetti kitsch del passato — diventano simboli di una nostalgia ironica. Muore di tubercolosi a 32 anni.'},
      corazzini:{label:'Categoria',title:'Sergio Corazzini',text:'Sergio Corazzini (1886–1907) è il polo opposto di Gozzano: dove Gozzano è ironico e distaccato, Corazzini è sentimentale e patetico. Piccolo libro inutile (1906) e la sua raccolta maggiore. Muore a 21 anni di tubercolosi. La sua poesia è un lungo addio alla vita.'},
      altri:{label:'Categoria',title:'Altri autori',text:'Marino Moretti (Poesie scritte col lapis, 1910) porta il tono diaristico all\'estremo. Aldo Palazzeschi ha una fase crepuscolare (I cavalli bianchi) prima di avvicinarsi al Futurismo con una poesia più ironica e giocosa. Carlo Chiaves, Fausto Maria Martini completano il panorama.'},
      temi:{label:'Categoria',title:'Temi',text:'La provincia italiana (non la metropoli), la casa borghese, il salotto, gli oggetti del passato. La malattia (la tubercolosi è quasi un tema obbligato), l\'infanzia perduta, la morte come liberazione. La mediocrità non è condannata ma accettata con malinconica ironia: è la condizione normale dell\'esistenza.'},
      'orig-termine':{label:'Origini',title:'Il termine',text:'«Crepuscolare» è il termine coniato dal critico Giuseppe Antonio Borgese nel 1910 per indicare una poesia del tramonto: dopo il sole abbagliante di D\'Annunzio, questo è il crepuscolo, la luce fioca. Non è un insulto ma una definizione che cattura il tono di rinuncia e malinconia che accomuna autori non organizzati in movimento.'},
      'orig-reazione':{label:'Origini',title:'Reazione anti-D\'Annunzio',text:'D\'Annunzio è il nemico-modello: troppo sublime, troppo eroico, troppo esibito. I crepuscolari reagiscono abbassando tutto: la voce, le ambizioni, i temi. Non il superuomo ma il «povero poeta sentimentale» (Corazzini). Non la vita come opera d\'arte ma la vita come piccola routine quotidiana.'},
      'poet-quotidiano':{label:'Poetica',title:'Quotidiano e piccolo',text:'Il soggetto privilegiato è il marginale: non l\'impresa eroica ma la passeggiata in provincia; non la donna fatale ma la signorina di buona famiglia; non i musei ma «le buone cose di pessimo gusto» (statuine, cineserie, album di fotografie, francobolli). Il quotidiano entra nella poesia con la stessa dignità del sublime.'},
      'poet-stile':{label:'Poetica',title:'Stile prosastico',text:'La lingua è colloquiale, quotidiana, quasi prosaica. Il verso è spesso lungo, piano, vicino alla prosa. L\'autoironia impedisce il patetico: il poeta ride di sé stesso prima che gli altri possano farlo. Il catalogo di oggetti (Gozzano è maestro) crea un\'atmosfera di memoria e nostalgia senza lirismo esplicito.'},
      'gozz-colloqui':{label:'Gozzano',title:'I colloqui',text:'Raccolta del 1911, opera maggiore di Gozzano. La signorina Felicita ovvero la felicità è il testo più famoso: il poeta in convalescenza in una villa di campagna si innamora di una ragazza comune e riconosce in lei la felicità impossibile per chi è «troppo moderno». L\'amica di nonna Speranza è una lunga elegia degli oggetti del passato.'},
      'gozz-buone':{label:'Gozzano',title:'Buone cose di pessimo gusto',text:'L\'espressione — tratta dalla poesia L\'amica di nonna Speranza — indica gli oggetti kitsch della casa borghese di fine Ottocento: statuine di gesso, cineserie, album fotografici, cartoline, soprammobili. Sono «cattivi» esteticamente ma «buoni» sentimentalmente: evocano affetti e memorie. Gozzano li ama con ironia consapevole.'},
      'coraz-piccolo':{label:'Corazzini',title:'Piccolo libro inutile',text:'Raccolta (1906). Corazzini ha 20 anni e sa di morire. La malattia (tubercolosi) è presenza costante. La poesia è «inutile» — non serve a niente, non salva, non cambia il mondo. Ma questo è il suo valore: la purezza del gesto gratuito. Il titolo dichiara la poetica crepuscolare al massimo grado.'},
      'coraz-desolazione':{label:'Corazzini',title:'Desolazione del povero poeta sentimentale',text:'«Perché tu mi dici: poeta? Io non sono un poeta. Io non sono che un piccolo fanciullo che piange.» La dichiarazione di non-poeticità è il gesto poetico per eccellenza. Corazzini rinuncia all\'identità di poeta per trovare una verità più profonda: la desolazione, il pianto, la fragilità.'},
      'altri-moretti':{label:'Altri autori',title:'Moretti e Palazzeschi',text:'Marino Moretti (Poesie scritte col lapis): il titolo — scritte col lapis, non con la penna — indica la provvisorietà, la cancellabilità, il tono diaristico. Aldo Palazzeschi ha una fase crepuscolare (I cavalli bianchi) ma poi passa al Futurismo portando la sua vena ironica e giocosa.'},
      'altri-influenze':{label:'Altri autori',title:'Influenze',text:'Pascoli (i piccoli temi, la quotidianità) è il modello italiano del Crepuscolarismo. Verlaine (il tono dimesso, la malinconia) è il modello francese. Il Simbolismo filtrato attraverso l\'ironia e il crepuscolo italiano diventa qualcosa di originale: meno visionario e più quotidiano, meno ermetico e più leggibile.'},
      'temi-provincia':{label:'Temi',title:'Provincia e casa',text:'La provincia italiana — non Milano, non Roma, ma le piccole città di provincia, le ville di campagna, i salotti borghesi — è il paesaggio privilegiato. La casa non è il nido pascoliano (rifugio dall\'esterno) ma uno spazio di noia e malinconia dove gli oggetti accumulano memoria. La malattia — spesso la tubercolosi — è presenza costante.'},
      'temi-oggetti':{label:'Temi',title:'Oggetti del passato',text:'I crepuscolari sono i primi poeti degli oggetti quotidiani: non gli oggetti-simbolo dei simbolisti, non i correlativi oggettivi di Eliot, ma gli oggetti banali della casa borghese. Cineserie, albums, ritratti di famiglia, vecchi giornali. La nostalgia si cristallizza in oggetti concreti: la memoria è sempre materiale.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
