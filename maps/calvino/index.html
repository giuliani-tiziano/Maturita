  <script>
    const NODES={
      root:{label:'Autore',title:'Italo Calvino',text:'Italo Calvino (1923–1985) attraversa tutta la letteratura del Novecento: dal Neorealismo della Resistenza alla fiaba filosofica, dalla fantascienza ironica al postmoderno. Il suo valore-chiave è la leggerezza; la sua legge è il combinatorio. Le Lezioni americane sono il suo testamento poetico.'},
      vita:{label:'Categoria',title:'Vita',text:'Nasce a Cuba nel 1923 da genitori italiani, cresce a Sanremo. Partigiano nelle Brigate Garibaldi, lavora per Einaudi tutta la vita. Vive a Parigi dal 1967 al 1980, in contatto con l\'Oulipo. Muore a Siena nel 1985 mentre prepara le Lezioni americane per Harvard.'},
      poetica:{label:'Categoria',title:'Poetica',text:'La leggerezza (sollevarsi dal peso del reale senza negarlo, come Perseo con Medusa), la fiaba come strumento filosofico, il combinatorio come legge della letteratura (Oulipo). Le sei proposte delle Lezioni americane: leggerezza, rapidità, esattezza, visibilità, molteplicità, coerenza.'},
      fasi:{label:'Categoria',title:'Le fasi',text:'Calvino si reinventa continuamente: il Neorealismo (Il sentiero dei nidi di ragno), la fiaba filosofica (la trilogia degli antenati), la fantascienza ironica (le cosmicomiche), il combinatorio e il postmoderno (Le città invisibili, Se una notte d\'inverno).'},
      opere:{label:'Categoria',title:'Opere',text:'Il sentiero dei nidi di ragno (1947), la trilogia I nostri antenati (1952–59), Le cosmicomiche (1965), Le città invisibili (1972), Se una notte d\'inverno un viaggiatore (1979), Lezioni americane (postumo 1988).'},
      testi:{label:'Categoria',title:'Testi',text:'Il ritratto della città di Diomira da Le città invisibili (la città come domanda, non come meraviglia) e il saggio sulla Leggerezza dalle Lezioni americane (Perseo e Medusa, planare sulle cose) sono i testi chiave.'},
      confronti:{label:'Categoria',title:'Confronti',text:'Calvino vs Pirandello: interrogano entrambi identità e realtà, ma Calvino con leggerezza giocosa, Pirandello con angoscia. Calvino vs Pavese: amici all\'Einaudi, lavorano col mito, ma il mito di Calvino è giocoso, quello di Pavese tragico.'},
      'vita-cuba':{label:'Vita',title:'Cuba, Sanremo, Resistenza',text:'Calvino nasce a Santiago de Las Vegas (Cuba) nel 1923 da genitori scienziati, e cresce a Sanremo. Partecipa alla Resistenza nelle Brigate Garibaldi (1943–45): l\'esperienza sarà la materia del primo romanzo. Lavora per la casa editrice Einaudi per tutta la vita.'},
      'vita-parigi':{label:'Vita',title:'Parigi e le Lezioni americane',text:'Dal 1967 al 1980 vive a Parigi, dove entra in contatto con l\'Oulipo di Queneau e Perec. Pubblica Le città invisibili (1972) e Se una notte d\'inverno (1979). Muore a Siena il 19 settembre 1985 per un ictus, mentre prepara le Lezioni americane per Harvard, che escono postume.'},
      'poet-leggerezza':{label:'Poetica',title:'La leggerezza',text:'Il valore-chiave di Calvino e la prima delle Lezioni americane. Non superficialità, ma capacità di sollevarsi dal peso della realtà senza negarla. L\'emblema è Perseo che taglia la testa di Medusa guardandola riflessa nello scudo: guardare il mondo indirettamente, «planare sulle cose dall\'alto».'},
      'poet-combinatorio':{label:'Poetica',title:'Combinatorio e Oulipo',text:'A Parigi Calvino entra nell\'Oulipo (Queneau, Perec): la letteratura come gioco basato su vincoli formali. La struttura non limita la creatività, la genera. Le città invisibili (55 città in 11 categorie secondo uno schema matematico) e Se una notte d\'inverno (dieci incipit) sono macchine narrative combinatorie.'},
      'fasi-neorealismo':{label:'Le fasi',title:'Neorealismo',text:'Il sentiero dei nidi di ragno (1947) è neorealismo, ma la Resistenza è vista con gli occhi di Pin, un bambino. Questo sguardo straniato smonta la retorica eroica ed è già una distanza critica dal realismo fotografico. La struttura fiabesca segna la strada verso l\'allegoria.'},
      'fasi-fiaba':{label:'Le fasi',title:'Fiaba filosofica e postmoderno',text:'Dalla trilogia degli antenati (fiaba come filosofia) alle cosmicomiche (scienza e mito ironici) fino al postmoderno di Se una notte d\'inverno (il romanzo che parla di sé stesso). Calvino reinventa continuamente il modo di raccontare, sempre con leggerezza.'},
      'opere-trilogia':{label:'Opere',title:'Trilogia degli antenati',text:'I nostri antenati: Il visconte dimezzato (1952, l\'identità divisa tra bene e male), Il barone rampante (1957, Cosimo che vive sugli alberi: la libertà come distanza scelta), Il cavaliere inesistente (1959, Agilulfo, armatura vuota: l\'esistenza ridotta a funzione). La fiaba come strumento filosofico.'},
      'opere-citta':{label:'Opere',title:'Le città invisibili',text:'Romanzo-cornice (1972): Marco Polo descrive a Kublai Khan 55 città immaginarie, organizzate in 11 categorie. Ogni città interroga un\'esperienza umana (memoria, desiderio, tempo, morte). Le città sono fatte di linguaggio più che di pietra: ricordi, paure, desideri.'},
      'testi-diomira':{label:'Testi',title:'Diomira',text:'La prima città de Le città invisibili. Diomira ha meraviglie architettoniche, ma il suo «carattere» non sono loro: è un sentimento, l\'invidia per chi ha già vissuto una sera come quella e ne è stato felice. Non è la città a essere straordinaria, ma la sensazione che provoca. La leggerezza calviniana.'},
      'testi-leggerezza':{label:'Testi',title:'La leggerezza (saggio)',text:'Prima delle sei Lezioni americane. Perseo affronta la Medusa (la realtà che pietrifica) guardandola riflessa nello scudo: sostenendosi sulle cose leggere, i venti e le nubi. «Leggerezza non è superficialità, ma planare sulle cose dall\'alto.» È la chiave di tutta l\'opera di Calvino.'},
      'conf-pirandello':{label:'Confronti',title:'Calvino vs Pirandello',text:'Entrambi mettono in crisi l\'identità e la realtà oggettiva, ma con tonalità opposte: Pirandello con l\'angoscia del relativismo tragico (la maschera, l\'uomo che non sa chi è); Calvino con la leggerezza del gioco combinatorio e dell\'allegoria (il visconte dimezzato, il cavaliere inesistente).'},
      'conf-pavese':{label:'Confronti',title:'Calvino vs Pavese',text:'Colleghi all\'Einaudi e amici, entrambi lavorano con il mito — ma in modi opposti. Per Pavese il mito è tragico: le Langhe come archetipo sacro e perduto, il ritorno impossibile, la solitudine che porta al suicidio. Per Calvino il mito è giocoso: Qfwfq racconta la nascita dell\'universo con ironia.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
