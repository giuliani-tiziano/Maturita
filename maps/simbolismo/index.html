  <script>
    const NODES={
      root:{label:'Corrente',title:'Simbolismo',text:'Il Simbolismo è il movimento letterario francese fondato da Baudelaire e codificato da Moréas nel 1886. Il simbolo non descrive: evoca stati d\'animo indicibili. La musicalità del verso conta quanto il significato. L\'oscurità è una scelta estetica. Influenza profondamente tutta la poesia europea del Novecento.'},
      manifesto:{label:'Categoria',title:'Manifesto',text:'Jean Moréas pubblica il Manifesto simbolista su Le Figaro il 18 settembre 1886. Reagisce contro il Naturalismo (troppo descrittivo) e il Romanticismo (troppo sentimentale). Il simbolo deve vestire l\'Idea: la poesia è rivelazione, non descrizione.'},
      baudelaire:{label:'Categoria',title:'Baudelaire',text:'Charles Baudelaire (1821–1867) è il padre del Simbolismo. I fiori del male (1857) inaugura la modernità poetica: spleen, città, eros e morte, bellezza del male. Corrispondenze è il testo manifesto: la natura è un sistema di rimandi segreti che il poeta sa decifrare.'},
      verlaine:{label:'Categoria',title:'Verlaine',text:'Paul Verlaine (1844–1896) spinge la poesia verso la musica pura. Arte poetica (1874): «musica prima di tutto». Il verso dispari porta alla suggestione irraggiungibile dalla logica. Feste galanti e Romanze senza parole sono i libri più musicali della tradizione francese.'},
      rimbaud:{label:'Categoria',title:'Rimbaud',text:'Arthur Rimbaud (1854–1891) porta il Simbolismo alle estreme conseguenze. La Lettera del veggente (1871) teorizza il poeta come veggente. Una stagione all\'inferno e Illuminazioni sono opere di straordinaria potenza. A 19 anni smette di scrivere per sempre: il silenzio come ultima opera.'},
      mallarme:{label:'Categoria',title:'Mallarmé',text:'Stéphane Mallarmé (1842–1898) porta l\'oscurità al massimo grado. «Nominare un oggetto sopprime tre quarti del piacere della poesia». Un colpo di dadi (1897) è il primo esperimento di poesia visiva moderna. I salons di Mallarmé formano l\'intera avanguardia europea.'},
      eredita:{label:'Categoria',title:'Eredità',text:'Il Simbolismo è la matrice della poesia del Novecento. In Italia: Pascoli (corrispondenze, fonosimbolismo), D\'Annunzio (panismo, sinestesia), Campana (orfismo). In Europa: Ermetismo italiano, Surrealismo francese, Modernismo angloamericano (Eliot, Yeats, Pound).'},
      'mf-moreas':{label:'Manifesto',title:'Jean Moréas 1886',text:'Il Manifesto simbolista (Le Figaro, 1886) codifica il movimento. Contro il Naturalismo: la letteratura non documenta il reale ma rivela l\'Idea attraverso il simbolo. La poesia deve vestire l\'Idea di una forma sensibile — non spiegarla, evocarla.'},
      'mf-poetica':{label:'Manifesto',title:'Poetica simbolista',text:'I principi: il simbolo evoca senza spiegare; la suggestione vale più della descrizione; la musicalità del verso è centrale; l\'oscurità è scelta estetica, non difetto. Il verso libero libera la poesia dalla metrica tradizionale. La poesia è conoscenza, non intrattenimento.'},
      'baud-corr':{label:'Baudelaire',title:'Corrispondenze',text:'Sonetto chiave de I fiori del male. La natura è «un tempio di vivi pilastri». I profumi, i colori e i suoni si rispondono (sinestesia). Il poeta legge questa trama segreta. È il testo programmatico del Simbolismo: tutto comunica con tutto attraverso corrispondenze nascoste.'},
      'baud-spleen':{label:'Baudelaire',title:'Spleen e modernità',text:'Lo spleen è la noia esistenziale, il peso del tempo, il vuoto che nessuna bellezza colma. Baudelaire inventa il soggetto lirico moderno: urbano, diviso, alienato. La città — Parigi — entra per la prima volta nella grande poesia come tema centrale.'},
      'verl-arte':{label:'Verlaine',title:'Arte poetica',text:'«Musica prima di tutto / e per questo preferisci il verso dispari / più vago e più solubile nell\'aria.» Il verso dispari è ambiguo e suggestivo. La logica cede alla risonanza. Il significato conta meno del timbro.'},
      'verl-opere':{label:'Verlaine',title:'Romanze senza parole',text:'Raccolta (1874) che porta la musicalità del verso al limite. Il titolo — Romanze senza parole — dichiara il programma: poesia che funziona come la musica, senza significato referenziale preciso. Feste galanti riprende il mondo rococò di Watteau in chiave malinconica.'},
      'rimb-vegg':{label:'Rimbaud',title:'Lettera del veggente',text:'Due lettere (maggio 1871). Il poeta deve diventare veggente attraverso il «lungo, immenso e ragionato sregolamento di tutti i sensi». Non è follia casuale: è metodo. «Je est un autre»: l\'io è un altro — il soggetto si dissolve nel processo conoscitivo.'},
      'rimb-opere':{label:'Rimbaud',title:'Stagione all\'inferno',text:'Una stagione all\'inferno (1873): autobiografia spirituale e regolamento di conti con il Simbolismo. Illuminazioni (1886, postumo): prose poetiche di potenza visionaria assoluta. A 19 anni Rimbaud smette di scrivere e diventa commerciante in Africa. Il silenzio come scelta definitiva.'},
      'mall-oscurita':{label:'Mallarmé',title:'Oscurità come valore',text:'«Nominare un oggetto sopprime tre quarti del piacere della poesia». La poesia deve suggerire, non nominare. L\'oscurità non è difetto ma scelta: la difficoltà obbliga il lettore a un lavoro interpretativo attivo. La poesia è un\'esperienza, non una trasmissione di contenuti.'},
      'mall-colpo':{label:'Mallarmé',title:'Un colpo di dadi',text:'Poema (1897), prima opera di poesia visiva moderna. Le parole sono sparse sulla pagina con diversi caratteri e posizioni. Il bianco della pagina è parte del testo: i silenzi valgono quanto le parole. «Un colpo di dadi non abolirà mai il caso»: la poesia non può vincere l\'esistenza, ma può darle forma.'},
      'ereditа-italia':{label:'Eredità',title:'In Italia',text:'Il Simbolismo entra in Italia attraverso filtri diversi. Pascoli: corrispondenze tra natura e memoria, fonosimbolismo. D\'Annunzio: sinestesia, panismo, la natura come testo da decifrare. Campana: orfismo, visione, la poesia come transe. L\'Ermetismo degli anni Trenta è il diretto erede.'},
      'ereditа-europa':{label:'Eredità',title:'Eredità europea',text:'Il Simbolismo è la matrice della modernità poetica. In Francia porta al Surrealismo. In Inghilterra al Modernismo di Yeats e Eliot (La terra desolata). In Germania a Rilke. In Italia all\'Ermetismo (Ungaretti, Montale, Quasimodo). È il movimento che trasforma la poesia da arte del sentimento ad arte della conoscenza.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
