  <script>
    const NODES={
      root:{label:'Corrente',title:'Futurismo',text:'Il Futurismo è la prima avanguardia italiana, fondata da Marinetti nel 1909. Esalta la velocità, la macchina, il dinamismo e la rottura totale con la tradizione passatista. Le parole in libertà sopprimono punteggiatura e sintassi. La politica è aggressiva: nazionalismo, interventismo, poi fascismo. Il Futurismo influenza tutte le avanguardie europee del Novecento.'},
      fondazione:{label:'Categoria',title:'Fondazione',text:'Filippo Tommaso Marinetti pubblica il Manifesto del Futurismo su Le Figaro il 20 febbraio 1909: prima avanguardia italiana e uno dei manifesti artistici più influenti della storia. Nasce dall\'urgenza di modernizzare l\'Italia culturalmente arretrata. «Noi vogliamo cantare l\'amor del pericolo, l\'abitudine all\'energia e alla temerarietà.»'},
      manifesti:{label:'Categoria',title:'Manifesti',text:'Il Futurismo è la corrente dei manifesti: ogni aspetto dell\'arte e della vita riceve il suo. Manifesto del Futurismo (1909), Manifesto tecnico della letteratura futurista (1912), Manifesti dei pittori futuristi (1910). Il manifesto è insieme testo teorico, dichiarazione di guerra e performance pubblica.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Velocità, macchina, elettricità, dinamismo: la modernità industriale è bellissima. «Un automobile ruggente che sembra correre sulla mitraglia è più bello della Vittoria di Samotracia.» Rottura totale con il passatismo (musei, biblioteche, tradizione). Simultaneità: più azioni, più sensazioni, più piani contemporaneamente.'},
      stile:{label:'Categoria',title:'Stile',text:'Le parole in libertà sopprimono la sintassi tradizionale. Le tavole parolibere dispongono le parole visivamente sulla pagina. I verbi all\'infinito eliminano il soggetto (impersonalità dinamica). Onomatopee e analogie folgoranti. Soppressione di punteggiatura, aggettivi, avverbi. Il testo deve essere veloce come la macchina.'},
      arti:{label:'Categoria',title:'Arti futuriste',text:'Il Futurismo non è solo letteratura: investe pittura (Boccioni, Carrà, Russolo, Balla, Severini), scultura (Forme uniche della continuità nello spazio di Boccioni), architettura (Sant\'Elia), musica (intonarumori di Russolo), teatro e cinema (sintesi futuriste). È il primo movimento artistico totale del Novecento.'},
      politica:{label:'Categoria',title:'Politica ed eredità',text:'Il Futurismo è politicamente aggressivo: nazionalismo, misoginia, glorificazione della guerra («igiene del mondo»), interventismo nel 1915. Molti futuristi aderiscono poi al fascismo. Ma la sua eredità artistica è vastissima: Dadaismo, Costruttivismo, Poesia visiva, Arte concettuale. Palazzeschi e Govoni ne escono verso il Crepuscolarismo.'},
      'fond-marinetti':{label:'Fondazione',title:'Marinetti',text:'Filippo Tommaso Marinetti (1876–1944) nasce ad Alessandria d\'Egitto da padre milanese. Fonda il Futurismo dopo un incidente in automobile (1908) che lo colpisce come rivelazione estetica. Il manifesto su Le Figaro il 20 febbraio 1909 è il testo inaugurale. Marinetti rimarrà il leader e il promotore infaticabile del movimento per tutta la vita.'},
      'fond-prima':{label:'Fondazione',title:'Prima avanguardia italiana',text:'Il Futurismo è la prima avanguardia italiana in senso moderno: un gruppo organizzato, con manifesti programmatici, performance pubbliche (serate futuriste), una rete editoriale. Prima di Marinetti non esisteva nulla di simile in Italia. L\'obiettivo era trascinare l\'Italia nell\'era moderna rompendo con il peso opprimente della tradizione classica.'},
      'manif-1909':{label:'Manifesti',title:'Manifesto del Futurismo 1909',text:'11 punti. I più famosi: «Noi vogliamo cantare l\'amor del pericolo»; «La letteratura ha fino ad oggi magnificato l\'immobilità pensosa, l\'estasi e il sonno. Noi vogliamo esaltare il movimento aggressivo, l\'insonnia febbrile, il passo di corsa, il salto mortale»; «Noi vogliamo demolire i musei, le biblioteche, le accademie.»'},
      'manif-tecnico':{label:'Manifesti',title:'Manifesto tecnico 1912',text:'Manifesto tecnico della letteratura futurista (1912). Teorizza le parole in libertà: soppressione della sintassi, verbi all\'infinito, soppressione dell\'avverbio e dell\'aggettivo, analogia folgorante senza «come». «L\'analogia non è altro che l\'amore profondo che unisce cose distanti, apparentemente diverse e ostili.»'},
      'poet-velocita':{label:'Poetica',title:'Velocità e macchina',text:'«Un automobile ruggente che sembra correre sulla mitraglia è più bello della Vittoria di Samotracia.» La macchina è il nuovo simbolo della bellezza: non la statua greca, non la cattedrale medievale. Velocità, rumore, energia meccanica, elettricità. Il paesaggio industriale sostituisce la natura come soggetto estetico privilegiato.'},
      'poet-rottura':{label:'Poetica',title:'Rottura col passato',text:'«Bruciate i musei!» Non è solo provocazione: è un programma serio. La tradizione italiana — il peso di Dante, Michelangelo, il Rinascimento — è un museo che soffoca la modernità. Il Futurismo vuole azzerare tutto e ricominciare da zero. Il «passatismo» è il nemico: chi guarda indietro invece di proiettarsi nel futuro.'},
      'stile-parolelibere':{label:'Stile',title:'Parole in libertà',text:'Le parole in libertà sopprimono la sintassi tradizionale: niente soggetto-predicato-complemento. Le parole sono oggetti che si scontrano sulla pagina. Le tavole parolibere dispongono visivamente le parole con caratteri diversi, dimensioni diverse, orientamenti diversi. Zang Tumb Tumb (1914) di Marinetti è l\'esempio maggiore.'},
      'stile-soppressione':{label:'Stile',title:'Soppressione della punteggiatura',text:'Via la punteggiatura (rallenta la velocità del testo). Via gli aggettivi e gli avverbi (qualificano invece di dinamizzare). I verbi all\'infinito eliminano il soggetto: l\'azione non appartiene a nessuno, è pura dinamica. L\'analogia sostituisce il «come»: non «la macchina è veloce come il fulmine» ma «macchina fulmine».'},
      'arti-pittura':{label:'Arti',title:'Pittura futurista',text:'Umberto Boccioni, Carlo Carrà, Luigi Russolo, Giacomo Balla, Gino Severini. Il Manifesto dei pittori futuristi (1910) rifiuta il naturalismo e l\'impressionismo. La pittura deve rendere il dinamismo visivo: le forme si moltiplicano, si sovrappongono, si frammentano. Gli stati d\'animo del 1911 di Boccioni è il capolavoro.'},
      'arti-totale':{label:'Arti',title:'Arte totale',text:'Il Futurismo è il primo movimento artistico totale: letteratura, pittura, scultura, architettura (Antonio Sant\'Elia: la città futurista), musica (Luigi Russolo: intonarumori che imitano i rumori urbani), teatro (sintesi futuriste: spettacoli brevissimi e provocatori), cinema. Ogni forma d\'arte deve diventare futurista.'},
      'pol-nazionalismo':{label:'Politica',title:'Nazionalismo e guerra',text:'Il Futurismo è politicamente aggressivo: nazionalismo espansionista, misoginia programmatica (il manifesto glorifica il disprezzo per la donna), glorificazione della guerra come «sola igiene del mondo». I futuristi sono interventisti nel 1915. Molti aderiscono poi al fascismo (Marinetti è tra i fondatori dei Fasci di combattimento nel 1919), ma si distaccano.'},
      'pol-eredita':{label:'Politica',title:'Eredità',text:'L\'eredità artistica del Futurismo è enorme. Influence diretta su: Dadaismo (Zurigo 1916), Costruttivismo russo, De Stijl olandese, Vorticismo inglese. In Italia: poesia visiva del secondo Novecento, concretismo, neoavanguardie degli anni Sessanta. Palazzeschi ed Enrico Cavacchioli escono verso il Crepuscolarismo con toni più ironici.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
