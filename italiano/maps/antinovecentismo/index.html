  <script>
    const NODES={
      root:{label:'Corrente',title:'Linea antinovecentista',text:'La linea antinovecentista non è un movimento organizzato ma una tendenza che resiste alle avanguardie e all\'Ermetismo: privilegia la chiarezza espressiva, il legame con la tradizione metrica, la lingua media. Umberto Saba è il principale esponente. Giorgio Caproni e Cesare Pavese ne continuano la tradizione.'},
      definizione:{label:'Categoria',title:'Definizione',text:'Il termine «antinovecentismo» è usato retrospettivamente per indicare i poeti che resistono alle due tendenze dominanti del Novecento italiano: il Futurismo (avanguardia rumorosa) e l\'Ermetismo (oscurità elitaria). La «difficile semplicità» è la formula: sembrare semplici ma contenere tutta la complessità dell\'esperienza.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Chiarezza espressiva: le parole «trite» (Saba) sono le più difficili perché le più cariche di significato umano. Lingua media sorvegliata: non il dialetto verista né l\'oscurità ermetica. Accessibilità non vuol dire banalità: è la sfida di dire cose profonde in modo che tutti possano capire. La tradizione metrica è rinnovata dall\'interno.'},
      saba:{label:'Categoria',title:'Umberto Saba',text:'Umberto Saba (1883–1957) è il massimo esponente della linea antinovecentista. Il Canzoniere è l\'opera di una vita: raccoglie poesie dal 1900 al 1954. Trieste, città di confine tra culture diverse, è il paesaggio interiore. La psicanalisi (si psicanalizza con il dottor Weiss) alimenta la sua scrittura autobiografica.'},
      'testi-saba':{label:'Categoria',title:'Testi di Saba',text:'Amai (parole trite: la formula della poetica). A mia moglie (le donne-animali: colomba, giovenca, cagna). La capra (la sofferenza condivisa con l\'animale). Trieste e una donna. Città vecchia. Mio padre è stato per me l\'assassino. Questi testi mostrano le ossessioni di Saba: il padre assente, la madre ebrea, Trieste, la scissione interiore.'},
      altri:{label:'Categoria',title:'Caproni e Pavese',text:'Giorgio Caproni (1912–1990) porta il metro tradizionale alla massima tensione lirica. Il passaggio d\'Enea (1956) e Il conte di Kevenhüller (1986) sono i libri maggiori. Cesare Pavese (1908–1950) in Lavorare stanca (1936) usa il «verso-frase»: il verso lungo, piano, narrativo, che racconta il paesaggio del Sud come mito personale.'},
      confronto:{label:'Categoria',title:'Vs Ermetismo',text:'Ermetismo: parola assoluta, oscurità, analogia, verso brevissimo. Antinovecentismo: parola comune, chiarezza, racconto, verso tradizionale. Sono i due poli della poesia italiana del Novecento. Non si escludono: Montale (spesso categorizzato come ermetico) ha anche una linea di chiarezza ironica. Quasimodo dopo la guerra si sposta verso la poesia civile.'},
      'def-resistenza':{label:'Definizione',title:'Resistenza alle avanguardie',text:'Contro il Futurismo: non la rottura totale ma il legame critico con la tradizione. Contro l\'Ermetismo: non l\'oscurità elitaria ma la difficile chiarezza. I poeti antinovecentisti non rifiutano la modernità: la attraversano senza perdere il filo con la tradizione italiana. Saba usa il sonetto, l\'elegia, la canzone — ma rinnovati dall\'interno.'},
      'def-tradizione':{label:'Definizione',title:'Legame con la tradizione',text:'Non è nostalgia conservatrice: è una scelta consapevole. Il Canzoniere di Saba richiama il Canzoniere di Petrarca nel titolo ma è radicalmente moderno nel contenuto. L\'endecasillabo di Caproni contiene la tensione del Novecento. La tradizione è uno strumento vivo, non un museo.'},
      'poet-chiarezza':{label:'Poetica',title:'Chiarezza espressiva',text:'La poesia deve essere comprensibile — non perché è facile ma perché ha trovato le parole giuste. «Le parole trite» (Saba) sono quelle logorate dall\'uso quotidiano: amore, morte, madre, padre, donna, città. Sono le più difficili perché le più cariche di significato umano sedimentato. Usarle senza essere banali: questa è la sfida.'},
      'poet-onesta':{label:'Poetica',title:'Poesia onesta',text:'Il concetto chiave di Saba: «la poesia onesta». Onesta vuol dire coerenza tra vita e scrittura, rifiuto della maschera retorica, denuncia dei propri fantasmi senza abbellirli. La psicanalisi entra nella poesia di Saba come strumento di autoconoscenza: il padre assente, la madre ebrea separata, la scissione identitaria triestina.'},
      'saba-canzoniere':{label:'Saba',title:'Il Canzoniere',text:'Il Canzoniere è l\'opera di una vita: Saba lavora sulla raccolta dal 1900 fino alla morte. La struttura è pensata come un unico libro autobiografico diviso in sezioni (Casa e campagna, Trieste e una donna, Il piccolo Berto, Autobiografia, Parole). È tra i libri di poesia più letti del Novecento italiano.'},
      'saba-psicanalisi':{label:'Saba',title:'Psicanalisi e scissione',text:'Saba si psicanalizza con il dottor Edoardo Weiss (allievo di Freud) negli anni Venti. L\'esperienza alimenta la sua scrittura: il padre tedesco assente, la madre ebrea che non vuole, la balia cattolica. La scissione identitaria è al centro della poetica: il tema del doppio, dell\'io diviso, attraversa tutto il Canzoniere.'},
      'test-amai':{label:'Testi Saba',title:'Amai e A mia moglie',text:'Amai: «Amai trite parole che non uno osava.» Il manifesto della poetica antinovecentista: le parole logorate dall\'uso sono le più preziose. A mia moglie (1909): la moglie paragonata a una serie di animali domestici (gallina, giovenca, cagna, rondine). Non è un insulto: è la celebrazione della vita animale come pienezza.'},
      'test-capra':{label:'Testi Saba',title:'La capra e Trieste',text:'La capra (1909): una capra legata al palo bela con voce umana. «Ebbi compagnia. E mi doleva così / che mi scorsi / nel lamento il lamento / eterno, ecc.» Trieste: la città come corpo amato ma difficile. Città vecchia: la classe operaia di Trieste come comunità umana. I grandi temi di Saba si distillano in immagini quotidiane.'},
      caproni:{label:'Caproni',title:'Giorgio Caproni',text:'Giorgio Caproni (1912–1990) è il poeta del viaggio e della sparizione. Il passaggio d\'Enea (1956) porta il mito nell\'atmosfera genovese dei caruggi. Usa il metro tradizionale — ottave, sonetti, canzoni — con una tensione modernissima. Il conte di Kevenhüller (1986) è il suo capolavoro tardo: caccia al niente, verso brevissimo secco.'},
      pavese:{label:'Pavese',title:'Cesare Pavese',text:'Cesare Pavese (1908–1950) in Lavorare stanca (1936) inventa il «verso-frase»: lungo, piano, narrativo, che racconta il paesaggio collinare come mito personale. Le Langhe piemontesi diventano il Sud interiore di Pavese: come il Sud di Quasimodo, ma percorso non con il lirismo ermetico ma con la prosa della narrazione.'},
      'contr-chiarezza':{label:'Vs Ermetismo',title:'Chiarezza vs Oscurità',text:'Ermetismo: l\'analogia assoluta senza spiegazione. Antinovecentismo: il racconto, la storia, il soggetto che riconosce sé stesso. Ermetismo: il verso brevissimo come lampo. Antinovecentismo: il verso medio o lungo che respira. Non c\'è un vincitore: sono due modi diversi di fare poesia nell\'Italia del Novecento.'},
      'contr-eredita':{label:'Vs Ermetismo',title:'Eredità postbellica',text:'Dopo il 1945, la linea antinovecentista si fonde con la domanda di impegno civile. Quasimodo lascia l\'Ermetismo per una poesia più accessibile. La linea antinovecentista prepara la poesia civile e il Neorealismo letterario. Pier Paolo Pasolini recupera il dialetto e la chiarezza narrativa contro l\'oscurità accademica.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
