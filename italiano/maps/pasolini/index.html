  <script>
    const NODES={
      root:{label:'Autore',title:'Pier Paolo Pasolini',text:'Pier Paolo Pasolini (1922–1975) è poeta, romanziere, regista e polemista. Dal Friuli della madre alle borgate romane, fa del sottoproletariato la riserva di vitalità autentica minacciata dall\'omologazione consumistica. Eretico permanente («corsaro»), viene assassinato a Ostia nel 1975 in circostanze mai chiarite.'},
      vita:{label:'Categoria',title:'Vita',text:'Nasce a Bologna nel 1922, legatissimo alla madre friulana. Pubblica le Poesie a Casarsa a vent\'anni. Nel 1949, espulso dal PCI per uno scandalo, fugge a Roma e si stabilisce nelle borgate. Romanziere, poeta, regista. Assassinato all\'Idroscalo di Ostia la notte tra il 1° e il 2 novembre 1975.'},
      ideologia:{label:'Categoria',title:'Ideologia',text:'Il sottoproletariato come ultima riserva di vitalità autentica; la critica all\'omologazione del consumismo (il «nuovo fascismo»); la posizione di eretico permanente verso ogni potere. La «mutazione antropologica» degli italiani prodotta dalla televisione e dai consumi.'},
      poetica:{label:'Categoria',title:'Poetica',text:'Il dialetto (friulano, poi romanesco) come lingua affettiva e di resistenza. La poesia come azione politica e corpo: la parola pesa, brucia, denuncia. Il «corsaro-luterano», eretico verso tutti. Il cinema come continuazione della poetica con altri mezzi.'},
      opere:{label:'Categoria',title:'Opere',text:'Poesie a Casarsa (1942, dialetto), Le ceneri di Gramsci (1957, poemetto), Ragazzi di vita (1955) e Una vita violenta (1959, romanzi delle borgate), Scritti corsari (1975, saggistica). Il cinema da Accattone (1961) a Salò (1975). Petrolio (incompiuto, postumo 1992).'},
      testi:{label:'Categoria',title:'Testi',text:'Le strofe centrali de Le ceneri di Gramsci (il conflitto ragione/corpo, «con te e contro di te») e l\'articolo delle lucciole degli Scritti corsari (la scomparsa delle lucciole, il «nuovo fascismo», la mutazione antropologica) sono i testi chiave.'},
      confronti:{label:'Categoria',title:'Confronti',text:'Pasolini vs Ungaretti: poesia come azione politica/corpo vs illuminazione interiore. Pasolini vs D\'Annunzio: intellettuale totale e scandaloso, ma contro il potere vs al servizio del potere. Pasolini e il Neorealismo: dentro e oltre, perché trasfigura il popolo in mito.'},
      'vita-friuli':{label:'Vita',title:'Friuli e la madre',text:'Pasolini è legatissimo alla madre Susanna Colussi, friulana e maestra. In Friuli pubblica le Poesie a Casarsa (1942) in dialetto e insegna alle scuole medie, avvicinandosi al PCI e al mondo contadino. Il dialetto friulano è la lingua materna, affettiva, pre-ideologica.'},
      'vita-roma':{label:'Vita',title:'Roma, borgate, morte',text:'Nel 1949, espulso dal PCI e licenziato per uno scandalo sessuale, fugge a Roma con la madre e si stabilisce nelle borgate. Diventa romanziere, poeta, regista, polemista. La notte tra il 1° e il 2 novembre 1975 viene assassinato all\'Idroscalo di Ostia, in circostanze mai del tutto chiarite.'},
      'id-omologazione':{label:'Ideologia',title:'Omologazione',text:'La critica più potente: il consumismo (TV, pubblicità, merci) annulla le differenze culturali regionali e di classe, producendo una massa uniforme. È un «nuovo fascismo» più totalitario di quello storico perché agisce in profondità, sulle coscienze, realizzando ciò che la dittatura non aveva ottenuto.'},
      'id-sottoproletariato':{label:'Ideologia',title:'Sottoproletariato',text:'Le borgate romane e il mondo contadino friulano rappresentano una vitalità corporea e culturale autentica, pre-borghese e pre-consumistica. Pasolini vi vede l\'ultima riserva di autenticità da salvare. Non solo miseria da redimere, ma valore da difendere dall\'omologazione.'},
      'poet-dialetto':{label:'Poetica',title:'Dialetto e lingua-madre',text:'Il friulano delle Poesie a Casarsa è lingua materna, affettiva, pre-ideologica. Il romanesco dei romanzi dà voce al sottoproletariato dall\'interno. Per Pasolini il dialetto non è folklore ma resistenza culturale: la lingua che il consumismo non ha ancora omologato.'},
      'poet-corsaro':{label:'Poetica',title:'Corsaro e luterano',text:'Pasolini è eretico verso tutto: sinistra ufficiale, destra, borghesia, Chiesa. Sempre «contro», sempre scomodo. I titoli Scritti corsari e Lettere luterane dichiarano questa posizione di profezia e scandalo. Il cinema (da Accattone a Salò) è la «continuazione della poetica con altri mezzi».'},
      'opere-ceneri':{label:'Opere',title:'Le ceneri di Gramsci',text:'Poemetto del 1957, in terzine dantesche, ambientato davanti alla tomba di Gramsci nel cimitero acattolico di Roma. Il tema è il conflitto tra la ragione marxista e l\'attrazione viscerale per il sottoproletariato: «con te e contro di te». Gramsci è figura paterna e politica.'},
      'opere-ragazzi':{label:'Opere',title:'Ragazzi di vita e Scritti corsari',text:'Ragazzi di vita (1955): le borgate romane viste dall\'interno, il dialetto romanesco fatto lingua letteraria, processo per oscenità. Scritti corsari (1975): la raccolta di articoli con la critica all\'omologazione, alla TV, al «nuovo fascismo» dei consumi. Il testamento ideologico.'},
      'testi-ceneri':{label:'Testi',title:'Strofe da Le ceneri di Gramsci',text:'Nelle strofe centrali, all\'alba di maggio davanti alla tomba di Gramsci, Pasolini confessa la sua pietà e il suo amore «con te e contro di te». Lo stile è denso, fisico, sensoriale (odore d\'erba, crepuscolo sui tigli): la parola pesa e brucia, all\'opposto dell\'astrazione ermetica.'},
      'testi-lucciole':{label:'Testi',title:'L\'articolo delle lucciole',text:'Dagli Scritti corsari (1975). La scomparsa delle lucciole, dovuta all\'inquinamento, è metafora della fine di un mondo autentico. Pasolini distingue il fascismo «vecchio» dal «nuovo fascismo» dei consumi, che ha realizzato una «mutazione antropologica»: ha omologato le coscienze.'},
      'conf-ungaretti':{label:'Confronti',title:'Pasolini vs Ungaretti',text:'I due poli della poesia del Novecento: Ungaretti porta la parola verso l\'illuminazione e il silenzio (parola essenziale, mistero); Pasolini la riporta nella storia, nel corpo, nella polemica civile (parola densa, prosastica, che pesa). Astrazione contro impegno.'},
      'conf-dannunzio':{label:'Confronti',title:'Pasolini vs D\'Annunzio',text:'Entrambi intellettuali «totali» (poeti, romanzieri, figure pubbliche) e scandalosi, che fanno della propria vita un\'opera pubblica. Ma per ragioni opposte: D\'Annunzio celebra il potere e il superuomo (scandalo come esibizione estetica); Pasolini combatte il potere in nome degli ultimi (scandalo come denuncia etica).'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
