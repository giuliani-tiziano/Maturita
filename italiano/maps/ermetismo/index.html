  <script>
    const NODES={
      root:{label:'Corrente',title:'Ermetismo',text:'L\'Ermetismo è la corrente poetica italiana degli anni Venti-Quaranta, fiorentina per ambiente. La parola è assoluta, nuda, privata del contesto narrativo: illumina per analogia. L\'oscurità è scelta estetica e morale (resistenza al fascismo). Ungaretti è il maestro, Quasimodo e Luzi i maggiori esponenti. Influenza tutta la poesia italiana del secondo Novecento.'},
      origini:{label:'Categoria',title:'Origini',text:'Il termine «ermetismo» viene usato da Francesco Flora nel 1936 in senso critico: poesia chiusa in sé stessa come Ermete Trismegisto. Ma il movimento è già vivo dagli anni Venti. Carlo Bo nel saggio Letteratura come vita (1938) ne dà la migliore definizione: la poesia non descrive la vita, è la vita stessa.'},
      poetica:{label:'Categoria',title:'Poetica',text:'La parola è assoluta: vale per sé, non come veicolo di significato narrativo. L\'illuminazione sostituisce la spiegazione: la poesia rivela per bagliori, non per sillogismi. L\'analogia assoluta (senza «come», senza termine di paragone esplicito) accosta elementi distanti. Il verso è breve, nudo, senza punteggiatura.'},
      ungaretti:{label:'Categoria',title:'Ungaretti',text:'Giuseppe Ungaretti (1888–1970) è il maestro dell\'Ermetismo. L\'allegria (1916, poi riveduta) nasce dalle trincee del Carso: la parola ridotta all\'essenziale come risposta alla morte. «M\'illumino d\'immenso» (Mattina): due parole, un\'intera poetica. Il Porto sepolto è l\'immagine del mistero che la poesia cerca.'},
      quasimodo:{label:'Categoria',title:'Quasimodo',text:'Salvatore Quasimodo (1901–1968) è il poeta del Sud come mito interiore. Acque e terre (1930) e Ed è subito sera (1942) sono le raccolte ermetiche. «Ed è subito sera» — quattro parole, una metafora della condizione umana. Nobel per la letteratura 1959. Dopo la guerra si sposta verso una poesia più civile.'},
      luzi:{label:'Categoria',title:'Luzi e riviste',text:'Mario Luzi (1914–2005) è il poeta della contemplazione del tempo. La barca (1935) è la prima raccolta, una delle più belle dell\'Ermetismo. Le riviste Solaria e Campo di Marte (Firenze) sono i laboratori del movimento. Frontespizio è la rivista cattolica vicina all\'Ermetismo.'},
      influenze:{label:'Categoria',title:'Influenze',text:'Il Simbolismo francese (Mallarmé, Rimbaud) è la principale influenza: oscurità come valore, analogia come strumento. I Vociani (Ungaretti è in contatto diretto) forniscono il precedente italiano. L\'Ermetismo lascia una linea orfica che attraversa tutta la poesia italiana del secondo Novecento.'},
      'orig-carlo-bo':{label:'Origini',title:'Carlo Bo',text:'Il saggio Letteratura come vita (1938) di Carlo Bo è il testo teorico più importante dell\'Ermetismo. «La letteratura non è uno specchio della vita, è la vita stessa.» La poesia non descrive l\'esperienza: è l\'esperienza, nella sua forma più essenziale e irriducibile. Bo intende la letteratura come impegno esistenziale totale.'},
      'orig-flora':{label:'Origini',title:'Flora conia il termine',text:'Francesco Flora usa il termine «ermetismo» nel 1936 in senso critico-negativo: poesia chiusa in sé come la filosofia di Ermete Trismegisto, inaccessibile, elitaria. Ma il movimento accetta il termine e lo trasforma: l\'oscurità è una scelta di resistenza alla banalità del fascismo culturale.'},
      'poet-parola':{label:'Poetica',title:'Parola assoluta',text:'La parola ermetica non è simbolo di qualcos\'altro: è sé stessa, nella sua massima densità semantica e sonora. L\'illuminazione è il momento in cui la parola rivela il mistero dell\'esistenza attraverso un lampo di senso improvviso. «M\'illumino d\'immenso»: la parola come flash fotogr

afico dell\'infinito.'},
      'poet-oscurita':{label:'Poetica',title:'Oscurità consapevole',text:'L\'oscurità ermetica non è oscurità per incompetenza: è scelta. La poesia deve essere difficile perché l\'esperienza autentica è difficile. Nel contesto del fascismo, l\'oscurità è anche resistenza culturale: la poesia che si rifiuta di essere compresa dalla propaganda. Il verso breve e nudo (senza punteggiatura, senza sintassi narrativa) è la forma della parola assoluta.'},
      'ung-allegria':{label:'Ungaretti',title:'L\'allegria',text:'La prima raccolta (Il porto sepolto, 1916; poi L\'allegria di naufragi, 1919; poi L\'allegria, 1931). Nasce dalle trincee del Carso: la guerra riduce l\'uomo all\'essenziale — la vita, la morte, la parola. «Veglio / una notte intera / accanto / a un compagno / massacrato»: il verso breve come ritmo del respiro nella trincea.'},
      'ung-porto':{label:'Ungaretti',title:'Porto sepolto',text:'Il porto di Alessandria d\'Egitto dove Ungaretti è cresciuto: senza nome, sepolto, misterioso. La poesia è l\'operazione con cui il porto sommerso viene portato alla luce — non spiegato ma evocato. Il mistero non si risolve: si illumina per un istante e poi si reimmerge nell\'oscurità. Questa è la poetica di Ungaretti.'},
      'quasi-acque':{label:'Quasimodo',title:'Acque e terre',text:'Prima raccolta (1930), con la famosa Ed è subito sera. Il paesaggio siciliano diventa mito interiore: non documentazione geografica ma proiezione della condizione umana. La Sicilia di Quasimodo è un\'isola dell\'anima, un luogo di solitudine e bellezza impossibile.'},
      'quasi-sud':{label:'Quasimodo',title:'Il Sud come mito',text:'«Ed è subito sera» — quattro parole che raccontano la brevità della vita e la velocità con cui la luce scompare. Il Sud di Quasimodo non è il Sud sociologico del Verismo: è un paesaggio interiore, un mito personale fatto di acque, terre, silenzi e abbandono. Nobel per la letteratura nel 1959.'},
      'luzi-barca':{label:'Luzi',title:'La barca',text:'Prima raccolta di Luzi (1935), considerata uno dei testi fondativi dell\'Ermetismo. La barca è l\'immagine dell\'esistenza in viaggio su un mare oscuro. Luzi è il poeta della contemplazione: non l\'illuminazione istantanea di Ungaretti ma una meditazione lenta sul tempo, sulla fede, sul senso del vivere.'},
      'luzi-riviste':{label:'Luzi',title:'Solaria e Campo di Marte',text:'Solaria (Firenze, 1926–1936) e Campo di Marte (1938–1939) sono le riviste del laboratorio ermetico fiorentino. Solaria apre la letteratura italiana alla narrativa europea (Kafka, Joyce, Proust). Campo di Marte è il punto più alto dell\'Ermetismo come programma. Frontespizio (1929–1938) è la rivista cattolica vicina al movimento.'},
      'infl-mallarme':{label:'Influenze',title:'Mallarmé e Simbolismo',text:'L\'Ermetismo è il figlio italiano del Simbolismo francese. Da Mallarmé: l\'oscurità come scelta estetica, la poesia che suggerisce senza spiegare, il verso come unità ritmica autonoma. Da Rimbaud: il sregolamento dei sensi come metodo conoscitivo. Da Baudelaire: le corrispondenze come trama segreta del reale.'},
      'infl-eredita':{label:'Influenze',title:'Eredità nel Novecento',text:'L\'Ermetismo lascia una «linea orfica» che attraversa la poesia italiana del secondo Novecento: Bigongiari, Parronchi, Sereni, parte di Pavese. Anche la poesia civile del dopoguerra si misura con l\'Ermetismo (Quasimodo stesso). La parola assoluta è diventata un riferimento ineliminabile per tutti i poeti italiani successivi.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
