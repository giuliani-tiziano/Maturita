  <script>
    const NODES = {
      root: { label:'Corrente', title:'Naturalismo', text:'Il Naturalismo è il movimento letterario francese del secondo Ottocento fondato da Zola. Applica il metodo scientifico positivista alla narrativa: l\'autore osserva, documenta, «sperimenta». L\'uomo è prodotto dell\'ereditarietà e dell\'ambiente sociale. Influenza direttamente il Verismo italiano.' },
      contesto: { label:'Categoria', title:'Contesto storico', text:'Il Naturalismo nasce dall\'incontro tra il Positivismo filosofico (Comte, Spencer) e la scienza sperimentale (Claude Bernard). La Rivoluzione industriale crea le condizioni sociali che diventano il soggetto principale: masse operaie, bidonville, industria, miseria urbana.' },
      poetica: { label:'Categoria', title:'Poetica', text:'Zola nel Romanzo sperimentale (1880) teorizza il romanziere come «scienziato». Determinismo: l\'uomo è governato da ereditarietà e ambiente. Impersonalità assoluta: l\'autore scompare. Il romanzo è documento sociale e laboratorio clinico insieme.' },
      zola: { label:'Categoria', title:'Émile Zola', text:'Zola (1840–1902) è il teorico e massimo esponente. Il ciclo Rougon-Macquart (20 romanzi, 1871–1893) studia una famiglia attraverso 5 generazioni. J\'accuse (1898) lo coinvolge nell\'affaire Dreyfus: lo scrittore come voce civile.' },
      stile: { label:'Categoria', title:'Stile', text:'Il linguaggio mimetico riproduce quello dei personaggi: argot operaio, lessico tecnico, dialetti. Zola conduce inchieste dirette (scende nelle miniere, visita i mercati). La narrazione oggettiva esclude giudizi morali: i fatti parlano da soli.' },
      temi: { label:'Categoria', title:'Temi', text:'Miseria urbana, degradazione, alcolismo, prostituzione — l\'altra faccia della modernità borghese. Lotta di classe e condizioni operaie. Ereditarietà biologica come destino. Per la prima volta la classe operaia entra nei romanzi come protagonista con complessità e dignità.' },
      influenze: { label:'Categoria', title:'Influenze', text:'I Fratelli Goncourt (Germinie Lacerteux, 1865) sono i precursori. Flaubert è il modello stilistico. Il Verismo italiano è l\'erede diretto: Verga e Capuana adattano il Naturalismo al Sud immobile con un pessimismo più radicale, senza fiducia nel progresso.' },
      'contesto-positivismo': { label:'Contesto', title:'Positivismo', text:'Auguste Comte fonda il positivismo: il metodo scientifico si applica a tutto il sapere. Claude Bernard nell\'Introduzione allo studio della medicina sperimentale (1865) fornisce il modello: osservazione, ipotesi, sperimentazione. Zola lo traduce direttamente in estetica letteraria.' },
      'contesto-industria': { label:'Contesto', title:'Rivoluzione industriale', text:'L\'industrializzazione crea le città-fabbrica, le periferie misere, il proletariato urbano. Questi nuovi ambienti diventano il laboratorio del Naturalismo: miseria, lavoro minorile, alcolismo, prostituzione sono soggetti che nessuna letteratura aveva affrontato con metodo scientifico.' },
      'poetica-romanzo': { label:'Poetica', title:'Romanzo sperimentale', text:'Testo teorico di Zola (1880). Il romanziere parte da fatti osservati, immagina un meccanismo, lo «sperimenta» attraverso i personaggi e registra i risultati. È documento e laboratorio insieme. La differenza con Verga: Zola crede nel progresso e nella riforma; Verga è radicalmente pessimista.' },
      'poetica-determinismo': { label:'Poetica', title:'Determinismo', text:'L\'uomo è governato da tre fattori: ereditarietà biologica (istinti, malattie, temperamento), ambiente sociale (classe, luogo, lavoro) e momento storico. Il libero arbitrio è un\'illusione borghese. Da qui il taglio scientifico-documentario dei romanzi: ogni comportamento ha una causa identificabile.' },
      'zola-rougon': { label:'Zola', title:'Rougon-Macquart', text:'20 romanzi (1871–1893) che seguono due rami di una famiglia attraverso 5 generazioni. Ogni romanzo esplora un ambiente: minatori (Germinal), prostituzione (Nana), grandi magazzini (Au Bonheur des Dames), borsa (L\'Argent). Il ciclo è storia sociale e studio clinico dell\'ereditarietà insieme.' },
      'zola-germinal': { label:'Zola', title:'Germinal e J\'accuse', text:'Germinal (1885): uno sciopero nelle miniere del nord Francia. La sconfitta è totale ma nel finale il germoglio cresce sottoterra. J\'accuse (1898): lettera aperta per la difesa di Dreyfus (ufficiale ebreo falsamente accusato di tradimento). Zola rischia la prigione: il romanziere come coscienza civile.' },
      'stile-lingua': { label:'Stile', title:'Linguaggio mimetico', text:'Il testo imita il linguaggio dei personaggi: argot operaio, terminologia tecnica, dialetti regionali. Zola compie inchieste dirette — scende nelle miniere, visita i mercati, frequenta i quartieri operai — per raccogliere il lessico reale. Nessuna concessione alla lingua letteraria.' },
      'stile-impersonalita': { label:'Stile', title:'Narrazione oggettiva', text:'L\'autore si cancella: nessun commento diretto, nessuna valutazione esplicita. I fatti parlano da soli. La tecnica del «documento»: ogni romanzo è preceduto da un dossier di ricerca empirica. Il ciclo romanzesco (serie di romanzi su un unico universo) permette uno studio sistematico dell\'ambiente.' },
      'temi-miseria': { label:'Temi', title:'Miseria urbana', text:'Parigi è il grande laboratorio: periferie operaie, quartieri malfamati, l\'altra faccia della modernità borghese. L\'Assommoir (1877) mostra la degradazione dell\'operaio attraverso l\'alcolismo. Nana (1880) quella della prostituta. La miseria non è fatalità romantica: è prodotto di un sistema economico.' },
      'temi-classe': { label:'Temi', title:'Classe operaia', text:'Per la prima volta la classe operaia entra nei romanzi come protagonista con complessità e dignità, non come sfondo pittoresco. Zola documenta le condizioni di lavoro nelle miniere, nelle fabbriche, nei grandi magazzini. L\'ereditarietà biologica aggrava la condizione sociale: la trappola è genetica e strutturale insieme.' },
      'influenze-verismo': { label:'Influenze', title:'Verismo italiano', text:'Il Verismo è l\'adattamento italiano del Naturalismo. Verga e Capuana conoscono Zola ma lo rielaborano: il contesto è il Sud arretrato, non la Francia industriale. Il pessimismo è assoluto (nessuna fiducia nel progresso), la regressione del narratore è più radicale, il fatalismo storico è senza rimedio.' },
      'influenze-goncourt': { label:'Influenze', title:'Fratelli Goncourt', text:'Edmond e Jules de Goncourt pubblicano Germinie Lacerteux (1865), il primo romanzo naturalista su una donna del popolo. Nel Journal documentano la vita culturale parigina per decenni. Sono precursori di Zola: meno sistematici nel programma, più raffinati nello stile. L\'Accademia Goncourt esiste ancora oggi.' }
    };
    function showNode(key) {
      const n = NODES[key]; if (!n) return;
      document.getElementById('tip-label').textContent = n.label;
      document.getElementById('tip-title').textContent = n.title;
      document.getElementById('tip-text').textContent = n.text;
      document.getElementById('map-overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeTip() {
      document.getElementById('map-overlay').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });
  </script>
  <script src="../../js/main.js"></script>
</body>
