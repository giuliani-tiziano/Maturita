  <script>
    const NODES = {
      root:{label:'Corrente',title:'Verismo',text:'Il Verismo è la declinazione italiana del Naturalismo francese, nata nell\'Italia post-unitaria. A differenza di Zola, non crede nel progresso: i vinti sono sconfitti senza rimedio. Verga è il massimo esponente. Il metodo è l\'impersonalità radicale, la regressione del narratore e il discorso indiretto libero.'},
      contesto:{label:'Categoria',title:'Contesto',text:'L\'Italia post-unitaria è un paese profondamente diviso: Nord industriale vs Sud agrario arcaico. La delusione risorgimentale alimenta il pessimismo. La Questione meridionale — il Sud immobile, povero, analfabeto — diventa il soggetto privilegiato dei veristi. Capuana è il teorico; Verga l\'artista maggiore.'},
      poetica:{label:'Categoria',title:'Poetica',text:'L\'impersonalità verghiana non è metodo scientifico (come in Zola) ma conseguenza filosofica del pessimismo: poiché la realtà è immutabile, il giudizio morale è vuoto. La regressione del narratore immerge il testo nel punto di vista dei personaggi. Il Discorso Indiretto Libero (DIL) ne è il principale strumento stilistico.'},
      verga:{label:'Categoria',title:'Giovanni Verga',text:'Verga (1840–1922) è il fondatore del Verismo. Dopo romanzi mondani a Milano, la svolta nel 1878 con Rosso Malpelo. Il Ciclo dei Vinti — I Malavoglia (1881) e Mastro-don Gesualdo (1889) — è l\'opera maggiore. Dal 1893 silenzio letterario e ritorno a Catania.'},
      testi:{label:'Categoria',title:'Testi chiave',text:'Rosso Malpelo (1878) inaugura il Verismo: narratore collettivo, logica circolare, straniamento. La fiumana del progresso (prefazione ai Malavoglia) è il manifesto ideologico del Ciclo dei Vinti. L\'addio di \'Ntoni chiude il romanzo con l\'ideale dell\'ostrica rovesciato. La roba mostra l\'ossessione per i beni materiali.'},
      vinti:{label:'Categoria',title:'I Vinti',text:'La «fiumana del progresso» trascina tutti — senza distinzione di classe o merito. I vinti sono i detriti lasciati sulla riva. Non c\'è salvezza attraverso l\'adattamento: chi si stacca dalla propria radice (l\'ideale dell\'ostrica) viene divorato. Il pessimismo è cosmico, non socialmente correttivo come in Zola.'},
      confronto:{label:'Categoria',title:'Vs Naturalismo',text:'Stesso metodo (impersonalità, ciclo romanzesco) ma ragioni e risultati opposti. Zola crede nel progresso e nella riforma sociale; Verga è radicalmente pessimista. Zola descrive la Francia industriale in trasformazione; Verga il Sud immobile e arcaico. Zola ottimista darwiniano; Verga fatalista conservatore.'},
      'contesto-italia':{label:'Contesto',title:'Italia post-unitaria',text:'L\'Unità d\'Italia (1861) non risolve la frattura Nord-Sud. La delusione risorgimentale alimenta il realismo disincantato dei veristi. Il Mezzogiorno — povero, rurale, analfabeta — è il laboratorio di Verga. La Questione meridionale non era una questione politica per lui: era una legge naturale immodificabile.'},
      'contesto-capuana':{label:'Contesto',title:'Luigi Capuana',text:'Luigi Capuana (1839–1915) è il teorico del Verismo italiano. Il suo romanzo Giacinta (1879) è tra i primi veristi. Scrive saggi critici fondamentali (Studi sulla letteratura contemporanea) che acclimatano il Naturalismo francese in Italia. Rimane più fiducioso di Verga nel potenziale scientifico e riformatore della letteratura.'},
      'poetica-impersonalita':{label:'Poetica',title:'Impersonalità radicale',text:'L\'autore non si vede, non si sente, non giudica. Il testo sembra essersi fatto da sé. La regressione del narratore: l\'autore si immerge nella logica, nel linguaggio e nella mentalità dei personaggi — anche quando sono circolari, superstiziosi, primitivi. Il Discorso Indiretto Libero (DIL) fonde la voce del narratore con quella del personaggio senza virgolette né verba dicendi.'},
      'poetica-straniamento':{label:'Poetica',title:'Straniamento',text:'Tecnica narrativa che presenta fatti ovvi come se fossero inspiegabili, e fatti inspiegabili come ovvi. In Rosso Malpelo: la prima riga è un esempio perfetto di logica circolare del narratore collettivo (i capelli rossi = cattivo carattere: dato per scontato come fosse un fatto naturale). Lo straniamento defamiliarizza la realtà e ne svela la crudeltà.'},
      'verga-svolta':{label:'Verga',title:'Svolta verista 1878',text:'Dopo romanzi mondani (Eva 1873, Eros 1875), la pubblicazione di Rosso Malpelo nel 1878 è la svolta definitiva. Vita dei campi (1880) raccoglie le prime novelle veriste (Rosso Malpelo, La lupa, Fantasticheria, Cavalleria rusticana). Novelle rusticane (1883) approfondisce il tema della roba e dell\'ossessione per i beni materiali.'},
      'verga-ciclo':{label:'Verga',title:'Ciclo dei Vinti',text:'I Malavoglia (1881): la famiglia di pescatori di Aci Trezza perde la casa del nespolo. Il ciclo è previsto in 5 romanzi ma si ferma al secondo: Mastro-don Gesualdo (1889) racconta l\'ascesa e la rovinosa solitudine di un ex manovale arricchito. Il ciclo resta incompiuto: il silenzio di Verga è parte del sistema.'},
      'testi-malpelo':{label:'Testi',title:'Rosso Malpelo',text:'Da Vita dei campi (1878). Il testo che inaugura il Verismo verghiano. Prima riga: «Malpelo si chiamava così perché aveva i capelli rossi; e aveva i capelli rossi perché era un ragazzo malizioso e cattivo.» Logica circolare del narratore collettivo. Lo straniamento mostra l\'esclusione come fatto naturale. Malpelo muore nelle miniere: nessuna redenzione.'},
      'testi-fiumana':{label:'Testi',title:'La fiumana del progresso',text:'Prefazione ai Malavoglia (1881). Manifesto ideologico del Ciclo dei Vinti. «La fiumana del progresso» è uno spettacolo grandioso da lontano e devastante da vicino. I vinti sono i detriti lasciati sulla riva. Lo scrittore non ha il diritto di giudicare né di compiangere: «deve scomparire».'},
      'vinti-fiumana':{label:'I Vinti',title:'Fiumana del progresso',text:'Il progresso — economico, industriale, sociale — travolge tutti. I vinti non sono i più cattivi o i più deboli: sono semplicemente quelli che si trovano sulla riva sbagliata. Non c\'è salvezza attraverso la virtù o il talento. La sconfitta è strutturale, non individuale. La fiumana è cieca.'},
      'vinti-ostrica':{label:'I Vinti',title:'Ideale dell\'ostrica',text:'Da Fantasticheria (1880): l\'unica strategia di sopravvivenza per i deboli è restare attaccati al proprio ambiente natale come l\'ostrica allo scoglio. Chi si stacca viene divorato dal «pesce vorace». Non è esaltazione della povertà: è una legge biologica della sopravvivenza. \'Ntoni la viola e si perde.'},
      'confronto-pessimismo':{label:'Vs Naturalismo',title:'Pessimismo assoluto',text:'Zola crede nel progresso e nella riforma sociale: la letteratura può contribuire a migliorare le condizioni delle classi lavoratrici. Verga non crede in nessun riscatto: la realtà è immutabile per legge naturale. Non c\'è rimedio al destino dei vinti. Il pessimismo verghiano è filosofico e assoluto, non socialmente correttivo.'},
      'confronto-sud':{label:'Vs Naturalismo',title:'Sud arcaico',text:'Zola descrive la Francia industriale in trasformazione, con masse operaie, fabbriche, scioperi, modernità. Verga descrive il Sud siciliano immobile: pesca, agricoltura, superstizioni, strutture sociali feudali. Non c\'è industrializzazione, non c\'è classe operaia in senso moderno. L\'arretratezza non è transitoria: è strutturale.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
