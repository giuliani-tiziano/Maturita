  <script>
    const NODES={
      root:{label:'Corrente',title:'Estetismo',text:'L\'Estetismo è il movimento letterario inglese di fine Ottocento che fa della bellezza l\'unico valore assoluto. L\'arte non ha scopo morale né sociale: esiste per sé stessa. La vita va vissuta come un\'opera d\'arte. Walter Pater è il teorico, Oscar Wilde è la figura più rappresentativa. In Italia viene assorbito da D\'Annunzio.'},
      origini:{label:'Categoria',title:'Origini',text:'Walter Pater teorizza nel saggio Il Rinascimento (1873) che l\'arte sia la sola esperienza piena: «bruciare sempre di questa dura gemma-fiamma». Il motto dell\'art pour l\'art viene dall\'estetica francese di Théophile Gautier. L\'Estetismo è la radicalizzazione inglese del Decadentismo.'},
      principi:{label:'Categoria',title:'Principi',text:'La bellezza è l\'unico valore: non la verità, non il bene. L\'arte è superiore alla natura — la natura imita l\'arte, non il contrario (Wilde). L\'artificio vale più dell\'autenticità. La vita va vissuta con la massima intensità estetica. Il piacere è la sola filosofia seria.'},
      dandy:{label:'Categoria',title:'Dandy',text:'Il dandy è la figura centrale dell\'Estetismo: un uomo che fa dell\'eleganza una forma di protesta contro la mediocrità borghese. L\'eleganza è una filosofia, non una vanità. George Brummell (1778–1840) è il primo dandy storico. Baudelaire teorizza il dandy come artista del quotidiano.'},
      wilde:{label:'Categoria',title:'Oscar Wilde',text:'Oscar Wilde (1854–1900) è la figura emblematica dell\'Estetismo. Il ritratto di Dorian Gray (1890), Salomé, il teatro brillante, gli aforismi paradossali. La vita come gioco estetico. La prigione (condannato per «oscenità» nel 1895) e De Profundis come rovesciamento: la sofferenza come conoscenza.'},
      huysmans:{label:'Categoria',title:'Huysmans',text:'Joris-Karl Huysmans (1848–1907) scrive Controcorrente (A rebours, 1884), il «breviario del decadentismo» (Wilde). Il protagonista Des Esseintes si rinchiude in una villa solitaria costruendo un mondo interamente artificiale: la natura è sostituita da oggetti d\'arte, profumi sintetici, pietre preziose. L\'Estetismo al suo limite estremo.'},
      italia:{label:'Categoria',title:'In Italia',text:'In Italia l\'Estetismo si traduce in D\'Annunzio: Andrea Sperelli ne Il piacere (1889) è il dandy italiano che vive secondo la formula «fare della propria vita un\'opera d\'arte». Il superomismo estetico è la versione italiana del dandy inglese. L\'Art Nouveau e il Modernismo raccolgono l\'eredità dell\'Estetismo nel XX secolo.'},
      'orig-pater':{label:'Origini',title:'Walter Pater',text:'Walter Pater (1839–1894) nel saggio Il Rinascimento (1873) scrive: «Bruciare sempre di questa dura gemma-fiamma, mantenere questo estatico senso — è il successo nella vita.» L\'esperienza estetica intensa è il fine dell\'esistenza. Pater è il fondatore teorico dell\'Estetismo inglese.'},
      'orig-artpourlart':{label:'Origini',title:'L\'art pour l\'art',text:'Il motto «l\'arte per l\'arte» nasce in Francia con Théophile Gautier (prefazione a Mademoiselle de Maupin, 1835): l\'arte non ha scopo utilitaristico, morale o sociale. È fine a sé stessa. Pater e Wilde radicalizzano il principio: non solo l\'arte è fine a sé stessa, ma la vita stessa va vissuta esteticamente.'},
      'princ-bellezza':{label:'Principi',title:'Bellezza come unico valore',text:'Non la verità (come per i positivisti) né il bene (come per i moralisti): solo la bellezza. L\'arte è superiore alla natura: «La natura non è la grande madre che ci ha generati. È nostra creazione» (Wilde). L\'artificio — il cristallo, la musica, il verso raffinato — vale più dell\'autenticità grezza.'},
      'princ-vita':{label:'Principi',title:'Vita come opera d\'arte',text:'Il principio supremo dell\'Estetismo: trasformare l\'esistenza in un\'opera d\'arte perfetta. Ogni momento deve essere vissuto con la massima intensità ed eleganza. D\'Annunzio incarna questo principio nella vita italiana: le imprese militari, le case-museo, gli amori pubblici sono capitoli di un romanzo biografico.'},
      'dandy-figura':{label:'Dandy',title:'Figura del dandy',text:'Il dandy non è un vanitoso: è un filosofo dell\'eleganza. La cura ossessiva dell\'abito e dei modi è una protesta contro la mediocrità borghese e la brutalità industriale. Il dandy dice: «Io scelgo come essere al mondo, non come produrre.» L\'eleganza è un atto di libertà.'},
      'dandy-brummell':{label:'Dandy',title:'Brummell e Baudelaire',text:'George «Beau» Brummell (1778–1840) è il primo dandy storico, amico del futuro re Giorgio IV, celebre per l\'eleganza estrema. Baudelaire teorizza il dandy come artista del quotidiano nel saggio Il pittore della vita moderna (1863). Il dandy è il personaggio con cui l\'uomo moderno resiste alla modernità.'},
      'wilde-dorian':{label:'Oscar Wilde',title:'Il ritratto di Dorian Gray',text:'Romanzo (1890). Dorian Gray vende l\'anima perché la sua bellezza fisica resti eterna: il ritratto invecchia al posto suo. Il paradosso estetico: la bellezza fisica preservata mentre la corruzione spirituale si accumula nel ritratto. Alla fine Dorian distrugge il ritratto e muore: la bellezza non può essere separata dalla verità.'},
      'wilde-paradosso':{label:'Oscar Wilde',title:'Paradosso e aforisma',text:'«L\'unica maniera di liberarsi da una tentazione è cedervi.» «La verità raramente è pura e non è mai semplice.» «Posso resistere a tutto eccetto alla tentazione.» Wilde usa il paradosso come strumento di critica sociale: ribalta i luoghi comuni borghesi per rivelare la loro ipocrisia. De Profundis (1905, postumo) è il capolavoro della conversione dal paradosso alla verità.'},
      'huysm-rebours':{label:'Huysmans',title:'Controcorrente',text:'A rebours (Controcorrente, 1884) è il «breviario del decadentismo» definito da Wilde. Des Esseintes, aristocratico nevrotico, abbandona il mondo e si costruisce una villa-rifugio dove tutto è artificiale: colori artificiali, suoni artificiali, profumi sintetici, pesci rari. La realtà è sostituita dall\'arte.'},
      'huysm-artificiale':{label:'Huysmans',title:'Mondo artificiale',text:'L\'arte imita la natura: fin qui è normale. Ma nell\'Estetismo estremo la natura imita l\'arte (Wilde) e infine la natura viene sostituita dall\'arte. Des Esseintes preferisce i fiori artificiali ai fiori veri, le descrizioni di paesi stranieri al viaggio reale. La realtà è sempre deludente rispetto all\'immaginazione.'},
      'italia-dann':{label:'In Italia',title:'D\'Annunzio',text:'Il piacere (1889) è il romanzo in cui D\'Annunzio presenta Andrea Sperelli, il dandy italiano che vive secondo la formula «fare della propria vita un\'opera d\'arte». Il superomismo estetico è la versione italiana dell\'Estetismo inglese contaminato con il superuomo nietzscheano. D\'Annunzio incarna il personaggio che ha creato.'},
      'italia-eredita':{label:'In Italia',title:'Art Nouveau e Modernismo',text:'L\'Estetismo confluisce nell\'Art Nouveau (fine Ottocento): la curva organica, l\'ornamento totale, la fusione tra arte e vita quotidiana. Il Modernismo letterario del primo Novecento eredita il rifiuto borghese e la cura formale. La moda, il design, l\'architettura del XX secolo devono molto alla rivoluzione estetica dell\'Estetismo.'}
    };
    function showNode(key){const n=NODES[key];if(!n)return;document.getElementById('tip-label').textContent=n.label;document.getElementById('tip-title').textContent=n.title;document.getElementById('tip-text').textContent=n.text;document.getElementById('map-overlay').classList.add('show');document.body.style.overflow='hidden';}
    function closeTip(){document.getElementById('map-overlay').classList.remove('show');document.body.style.overflow='';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
  </script>
