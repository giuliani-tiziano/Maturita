  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Beppe Fenoglio', text: 'Beppe Fenoglio (1922–1963) nasce e muore ad Alba. Resistenza nelle Langhe (1943-45). Esordio con Einaudi nel 1952. Muore a 40 anni lasciando opere incompiute. Anti-retorica resistenziale, influenza anglosassone (Hemingway, Conrad), lingua «fenogliana» ibrida. Una questione privata è il capolavoro.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce il 1° marzo 1922 ad Alba (Cuneo). Formazione letteraria anglosassone (Shakespeare, Hemingway, Conrad) al liceo. Resistenza nelle Langhe 1943-45 (Garibaldi poi Badogliane). Esordio con Einaudi 1952. La malora (1954). Primavera di bellezza (1959). Muore il 18 febbraio 1963 a 40 anni.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Anti-retorica: partigiani con paura ed errori, nessun eroe convenzionale. Influenza anglosassone: Hemingway (iceberg, dialogo per ellissi), Conrad (avventura morale). Il «fenogliano»: italiano + dialetto piemontese + calchi inglesi + arcaismi. Le Langhe come paesaggio morale (come Hardy il Wessex).' },
      opere: { label: 'Categoria', title: 'Opere', text: 'I ventitre giorni della città di Alba (1952): esordio, ironia tragicomica. La malora (1954): vita contadina. Primavera di bellezza (1959): 8 settembre 1943. Una questione privata (1963, postumo): il capolavoro — Milton/Fulvia/Fulvio. Il partigiano Johnny (1968, postumo): due versioni, Lorenzo Mondo curatore.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'I ventitre giorni (incipit): ironia sul periodo di 23 giorni, neve che sopravanza la storia. Una questione privata (incipit): nebbia = incertezza su Fulvia, villa evanescente già memoria. Partigiano Johnny: dialogo hemingwayano («Vengono. Quanti? Tanti.»), fenomenologia dell\'azione, stelle indifferenti.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Fenoglio vs Calvino: immersione diretta vs straniamento Pin bambino; anti-retorico asciutto vs simbolico-letterario; Hemingway+Conrad vs Stevenson+Ariosto. Fenoglio vs Pavese: Langhe come paesaggio morale concreto vs mito/nostalgia; Resistenza come presente vs sfondo già passato; Hemingway vs Anderson.' },
      'vita-alba': { label: 'Vita', title: 'Alba 1922 — morte 1963', text: 'Nasce il 1° marzo 1922 ad Alba, Cuneo, nel cuore delle Langhe. Figlio di un salumiere. Muore il 18 febbraio 1963, a soli 40 anni, stroncato da un tumore ai polmoni mentre lavora a Una questione privata e Il partigiano Johnny. La morte prematura lascia un\'opera incompiuta che diventa essa stessa simbolo.' },
      'vita-resistenza': { label: 'Vita', title: 'Resistenza nelle Langhe 1943-45', text: 'Dopo l\'8 settembre 1943 si unisce alla Resistenza. Prima nelle Brigate Garibaldi (comuniste), poi nelle Brigate Badogliane (monarchiche). Questa doppia esperienza alimenta la complessità morale delle sue narrazioni. Il «fatto di Alba» (23 giorni, ottobre-novembre 1945) è il nucleo del primo racconto.' },
      'poetica-antiretorica': { label: 'Poetica', title: 'Anti-retorica resistenziale', text: 'La Resistenza viene spesso raccontata in chiave celebrativa. Fenoglio rompe questo schema: i suoi partigiani hanno paura, commettono errori, dubitano. Nessun eroe convenzionale, nessun martirologio glorioso. La guerra partigiana è avventura morale — come Conrad — non epopea.' },
      'poetica-anglosassone': { label: 'Poetica', title: 'Influenza anglosassone', text: 'Hemingway: il principio dell\'iceberg (tutto ciò che non viene detto pesa quanto ciò che viene detto), dialoghi asciutti per ellissi. Conrad: l\'avventura come prova morale; ciò che conta non è la vittoria ma come si affronta la prova. Shakespeare: grandezza tragica e linguaggio aulico.' },
      'poetica-langhe': { label: 'Poetica', title: 'Le Langhe come paesaggio morale', text: 'Come Thomas Hardy ha costruito il suo «Wessex» (Inghilterra rurale del Dorset), Fenoglio costruisce le sue Langhe come territorio narrativo con propria logica morale. Non sfondo pittoresco: le colline, i borghi, il Tanaro, i vigneti partecipano attivamente alla narrazione. Il paesaggio condiziona la guerra e la vita.' },
      'opere-ventitre': { label: 'Opere', title: 'I ventitre giorni (1952)', text: 'La prima raccolta con Einaudi: racconti sulla Resistenza nelle Langhe. Il titolo ricorda la liberazione di Alba (10 ottobre 1945) e il suo abbandono dopo 23 giorni. Tono tragicomico: né celebrativo né sentimentale. I partigiani entrano ed escono da Alba senza combattere. La gente di Alba serba rancore: la Resistenza non sempre capita né apprezzata.' },
      'opere-questione': { label: 'Opere', title: 'Una questione privata (1963)', text: 'IL CAPOLAVORO di Fenoglio, postumo 1963. Milton (partigiano) cerca di sapere se Fulvia — la ragazza che ama — ha avuto una relazione con Fulvio, suo compagno. La questione privata (amore) si svolge mentre imperversa la guerra: le due dimensioni si intensificano a vicenda. Calvino (prefazione 1968): «aveva quello che tutti cercavano».' },
      'testi-incipit23': { label: 'Testi', title: 'Incipit I ventitre giorni', text: '«Se li fossero tenuti più a lungo, il mondo ne avrebbe certo saputo qualcosa»: ironia che relativizza l\'episodio. «Senza combattere, come c\'erano entrati»: simmetria tragicomica. «La gente di Alba le serba rancore»: il punto di vista della gente comune, non dei partigiani. Neve finale = il tempo naturale sopravanza la storia.' },
      'testi-incipitq': { label: 'Testi', title: 'Incipit Una questione privata', text: 'La nebbia fisica è anche nebbia mentale: Milton non la vede eppure la fissa «come se lo sforzo potesse farle uno strappo». La villa appare «evanescente, quasi irreale»: già memoria, non realtà presente. «Non venuto per vedere la villa ma per rivederla»: Milton è prigioniero del passato. La Calvino prefazione 1968.' },
      'testi-johnny': { label: 'Testi', title: 'Brano Partigiano Johnny', text: '«Vengono. — Quanti? — Non so. Tanti.»: dialogo hemingwayano di tre battute che contengono tutto. «Pensò: sarà dura. Poi smise di pensare e cominciò a correre»: la fenomenologia dell\'azione sotto pressione. Stelle «limpide e gelide»: natura indifferente. Verbi d\'azione concreti: nessuna introspezione esibita.' },
      'confronti-calvino': { label: 'Confronti', title: 'Fenoglio vs Calvino', text: 'Resistenza: immersione diretta (Fenoglio) vs straniamento del bambino Pin (Calvino). Tono: anti-retorico asciutto (Fenoglio) vs simbolico-letterario con filtro fiaba (Calvino). Influenza: Hemingway+Conrad (Fenoglio) vs Stevenson+Ariosto+Neorealismo (Calvino). Lingua: fenogliano ibrido vs italiano letterario.' },
      'confronti-pavese': { label: 'Confronti', title: 'Fenoglio vs Pavese', text: 'Langhe: paesaggio morale concreto che partecipa all\'azione (Fenoglio) vs mito e nostalgia simbolica del ritorno (Pavese). Resistenza: materia diretta e presente vivo (Fenoglio) vs sfondo già passato e mitizzato (Pavese). Stile: Hemingway — azione, dialogo (Fenoglio) vs Anderson, Dos Passos — dialogo interiore (Pavese).' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>

  <script src="../../../js/main.js"></script>
</body>
