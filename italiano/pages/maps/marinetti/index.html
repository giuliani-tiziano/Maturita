  <script>
    const NODES = {
      root: { label: 'Autore', title: 'F.T. Marinetti', text: 'Filippo Tommaso Marinetti (1876–1944) nasce ad Alessandria d\'Egitto. Fonda il Futurismo con il Manifesto del 1909 su Le Figaro. Codifica il paroliberismo nel 1912. Zang Tumb Tuum (1914) è il capolavoro. Nel 1919 partecipa ai Fasci con Mussolini. Nel 1929 è nell\'Accademia d\'Italia. Muore a Bellagio nel 1944.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce il 22 dicembre 1876 ad Alessandria d\'Egitto. Fonda la rivista Poesia a Milano nel 1905. Il 20 febbraio 1909 pubblica il Manifesto su Le Figaro. Interviene nella Grande Guerra (1915-18). Nel 1919 partecipa ai Fasci. Nel 1929 è nell\'Accademia d\'Italia. Muore il 2 dicembre 1944 a Bellagio.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Antipassatismo: musei = cimiteri, bruciare il passato. Velocità e macchina: auto da corsa > Nike di Samotracia. Guerra: sola igiene del mondo. Parole in libertà: abolire sintassi (infiniti), punteggiatura (segni matematici), aggettivi; onomatopee; analogie distanti; tavola visiva.' },
      manifesto: { label: 'Categoria', title: 'Il Manifesto', text: 'Manifesto del Futurismo (1909, Le Figaro): 11 punti; la strategia mediatica come atto artistico. Manifesto tecnico della letteratura futurista (1912): codifica del paroliberismo (infiniti, segni matematici, abolizione sintassi e punteggiatura).' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Mafarka il futurista (1909): romanzo, processato per oscenità. Zang Tumb Tuum (1914): il capolavoro del paroliberismo, la battaglia di Adrianopoli, ZANG TUMB TUUUUMB. Arte dei rumori di Russolo (1913): musica futurista.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Marinetti vs D\'Annunzio: distruzione della tradizione vs ornamento estetico; paroliberismo vs raffinatezza metrica; fascismo rivoluzionario vs cortigianeria. Futurismo vs Crepuscolarismo: eroico e veloce vs malinconico e dimesso; modernità esaltata vs indifferente.' },
      'vita-alessandria': { label: 'Vita', title: 'Alessandria 1876 · Fasci 1919', text: 'Nasce il 22 dicembre 1876 ad Alessandria d\'Egitto da genitori italiani borghesi. L\'infanzia cosmopolita (Egitto, Francia, Italia) gli dà l\'apertura internazionale che distinguerà il Futurismo. Nel 1919 partecipa alla fondazione dei Fasci di Combattimento con Mussolini. Nel 1929 entra nell\'Accademia d\'Italia, paradosso per il nemico dei musei. Muore il 2 dicembre 1944 a Bellagio.' },
      'vita-poesia': { label: 'Vita', title: 'Rivista Poesia 1905', text: 'Fonda a Milano nel 1905 la rivista Poesia, che diventa il laboratorio delle idee che porteranno al Manifesto del Futurismo. La rivista gli dà i contatti internazionali necessari per pubblicare su Le Figaro — la scelta strategica che darà al Futurismo la massima diffusione europea.' },
      'poetica-antipassatismo': { label: 'Poetica', title: 'Antipassatismo', text: 'Principio fondamentale: rottura totale con il passato culturale. I musei sono «cimiteri», le biblioteche «dormitori». Il passato è un cadavere che soffoca il presente. Non è nostalgia romantica del passato perduto: è distruzione gioiosa. «Noi vogliamo demolire i musei, le biblioteche» (punto 10 del Manifesto).' },
      'poetica-velocita': { label: 'Poetica', title: 'Velocità e macchina', text: 'La velocità è il valore estetico supremo della modernità. L\'automobile da corsa — con il suo rombo e la sua potenza meccanica — è più bella della Nike di Samotracia (punto 4). Non è provocazione: è nuova estetica. Il confronto è deliberatamente scandaloso: il prodotto industriale del presente contro il capolavoro artistico dell\'antichità.' },
      'poetica-parolibero': { label: 'Poetica', title: 'Parole in libertà', text: 'Il Manifesto tecnico (1912) codifica: abolire la sintassi (usare solo infiniti), abolire la punteggiatura (sostituirla con segni matematici: + × ÷ =), abolire gli aggettivi, usare onomatopee per i suoni, analogie distanti senza «come», tavola parolibera (pagina come campo visivo). ZANG TUMB TUMB è l\'onomatopea del cannone.' },
      'manifesto-1909': { label: 'Manifesto', title: 'Manifesto del Futurismo 1909', text: 'Pubblicato il 20 febbraio 1909 su Le Figaro di Parigi: la scelta mediatica più importante. 11 punti: punto 4 (auto > Nike), punto 7 (bellezza nella lotta), punto 9 (guerra igiene del mondo), punto 10 (demolire musei), punto 11 (cantare le folle). La pubblicazione su Le Figaro è già un atto futurista: letteratura come happening mediatico.' },
      'manifesto-1912': { label: 'Manifesto', title: 'Manifesto tecnico 1912', text: 'Completa il Manifesto del 1909 con la codifica tecnica del paroliberismo: abolire sintassi (infiniti), punteggiatura (segni matematici), aggettivi (sostantivi nudi); onomatopee; analogie distanti; tavola visiva. È il passaggio dall\'ideologia alla tecnica: come scrivere futurista in pratica.' },
      'opere-mafarka': { label: 'Opere', title: 'Mafarka il futurista 1909', text: 'Romanzo scritto in francese (1909) e tradotto in italiano. Ambientato in un\'Africa immaginaria, racconta le gesta del condottiero Mafarka-el-Bar. Tono epico, violento, sessualità esibita. Processato per oscenità in Italia — successo di pubbliche relazioni per Marinetti, che trasforma il processo in ribalta mediatica.' },
      'opere-zang': { label: 'Opere', title: 'Zang Tumb Tuum 1914', text: 'Il capolavoro del paroliberismo: la battaglia di Adrianopoli del 1912. ZANG TUMB TUUUUMB = onomatopea del cannone. Sintassi abolita: solo infiniti e sostantivi nudi. Segni matematici: + × ÷ = al posto dei connettivi. croc-croc (passi nel fango), glu-glu (acqua palude). La pagina come partitura visiva.' },
      'opere-arti': { label: 'Opere', title: 'Futurismo nelle arti', text: 'Il Futurismo coinvolge tutte le arti: Umberto Boccioni (pittura/scultura: simultaneità del movimento), Giacomo Balla (scomposizione del movimento), Luigi Russolo (Arte dei rumori, 1913: gli intonarumori). La proliferazione dei manifesti artistici è essa stessa un gesto futurista: quantità e velocità come valori.' },
      'confronti-dannunzio': { label: 'Confronti', title: 'Marinetti vs D\'Annunzio', text: 'D\'Annunzio usa la tradizione come ornamento estetico; Marinetti la vuole distruggere. D\'Annunzio raffina la metrica; Marinetti la abolisce. D\'Annunzio è cortigiano verso i potenti; Marinetti è radicalmente antiborghese (almeno all\'inizio). D\'Annunzio nazionalismo aristocratico; Marinetti fascismo rivoluzionario.' },
      'confronti-crepuscolare': { label: 'Confronti', title: 'Futurismo vs Crepuscolarismo', text: 'Risposte opposte alla stessa crisi (la modernità industriale): il Futurismo la esalta con tono eroico e veloce; il Crepuscolarismo la subisce con malinconia dimessa e grigia. Modernità: esaltata come valore supremo (Futurismo) vs fonte di grigio squallore (Gozzano, Corazzini). Forma: sperimentazione radicale vs tono dimesso tradizionale.' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>

  <script src="../../../js/main.js"></script>
