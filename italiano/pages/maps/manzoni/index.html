  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Alessandro Manzoni', text: 'Alessandro Manzoni (1785–1873) nasce e muore a Milano. Dopo una formazione illuminista, vive una conversione religiosa nel 1810 che orienta tutta la sua opera successiva. Esponente del Romanticismo cattolico-liberale italiano, autore de I Promessi Sposi, primo grande romanzo storico italiano, fondato sul "vero" storico e sulla fede nella Provvidenza.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce nel 1785 a Milano, nipote di Cesare Beccaria. Trascorre un periodo a Parigi, dove si forma alla cultura illuminista e giansenista. Nel 1810 vive una conversione religiosa che lo porta dal deismo/scetticismo al cattolicesimo, esperienza fondamentale per tutta la sua opera successiva. Muore nel 1873 a Milano.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Romanticismo cattolico-liberale: il romanzo storico unisce "vero" storico (documentazione rigorosa) e "verosimile" (vicende inventate ma plausibili). La Provvidenza agisce nella storia dando senso al dolore senza annullare la libertà umana. La questione della lingua si risolve con la scelta del fiorentino dell\'uso come lingua nazionale. Il narratore commenta i fatti e ne trae il "sugo della storia".' },
      opere: { label: 'Categoria', title: 'Opere', text: 'I Promessi Sposi (1827, ed. definitiva 1840-42): romanzo storico ambientato nella Lombardia spagnola del 1628-30. Adelchi (1822): tragedia sulla caduta del regno longobardo, celebre per il coro "Dagli atrii muscosi". Inni Sacri (1812-15): poesia religiosa popolare. Odi civili: Marzo 1821 e Il cinque maggio (su Napoleone). Del romanzo storico (1850): riflessione critica sul genere.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'Il cinque maggio: sulla morte di Napoleone, sospende il giudizio storico-umano («Ai posteri / l\'ardua sentenza») per concentrarsi sulla sua conversione religiosa. Coro dell\'Adelchi: il popolo italico oppresso da dominazioni successive. Addio ai monti: Lucia lascia il paese natale. La conversione dell\'Innominato: episodio centrale dei Promessi Sposi.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Manzoni vs Verga: Provvidenza che dà senso al dolore (Manzoni) vs "fiumana del progresso" che travolge i deboli senza giustizia (Verga). Manzoni vs Walter Scott: protagonisti popolani vs personaggi storici di rango. Manzoni vs Leopardi: fede e carità cristiana vs materialismo e "social catena" laica, ma entrambi propongono una forma di solidarietà come risposta al dolore.' },
      'vita-milano': { label: 'Vita', title: 'Milano 1785 · formazione illuminista', text: 'Manzoni nasce nel 1785 a Milano, nipote del celebre giurista illuminista Cesare Beccaria. Trascorre un periodo importante a Parigi, dove entra in contatto con gli ambienti dell\'Illuminismo e del giansenismo, che influenzeranno la sua formazione intellettuale e morale prima della conversione religiosa.' },
      'vita-conversione': { label: 'Vita', title: 'Conversione religiosa 1810', text: 'Nel 1810 Manzoni vive una conversione che lo porta dal deismo/scetticismo religioso a un cattolicesimo profondo e personale. Da questo momento la fede diventa il fondamento di tutta la sua riflessione: la Provvidenza, la carità, il senso del dolore umano. Da qui nascono gli Inni Sacri e, in seguito, I Promessi Sposi.' },
      'poetica-romanticismo': { label: 'Poetica', title: 'Romanticismo cattolico-liberale', text: 'Manzoni applica al romanzo storico una distinzione fondamentale: il "vero" storico (fatti, personaggi e contesti rigorosamente documentati: editti spagnoli, cronache della peste) e il "verosimile" (vicende e personaggi inventati ma plausibili nel contesto). Questa fusione fonda il romanzo storico moderno italiano.' },
      'poetica-provvidenza': { label: 'Poetica', title: 'Provvidenza', text: 'Per Manzoni la storia è governata da un disegno provvidenziale: Dio agisce attraverso le vicende umane, anche dolorose, senza però annullare la libertà delle persone. Il dolore degli umili (Renzo, Lucia, l\'Innominato) trova così un senso superiore, che non cancella la sofferenza ma la inserisce in un ordine più ampio.' },
      'poetica-lingua': { label: 'Poetica', title: 'Questione della lingua', text: 'Manzoni risolve la questione della lingua scegliendo il fiorentino dell\'uso (parlato dalle persone colte di Firenze) come modello per una lingua nazionale comprensibile a tutti gli italiani. Il "sugo della storia" è la morale/insegnamento che il narratore, onnisciente e partecipe, trae dalla vicenda per il lettore.' },
      'opere-promessisposi': { label: 'Opere', title: 'I Promessi Sposi (1827 / 1840-42)', text: 'Primo grande romanzo storico italiano, ambientato nella Lombardia spagnola del 1628-30. Renzo Tramaglino e Lucia Mondella, ostacolati da don Rodrigo, vivono vicende separate (il rapimento di Lucia da parte dell\'Innominato, che si converte; i tumulti milanesi per Renzo) fino al ricongiungimento dopo la peste del 1630. Temi: Provvidenza, critica del potere, dignità degli umili, fede e carità.' },
      'opere-tragedie': { label: 'Opere', title: 'Adelchi · Inni Sacri · odi civili', text: 'Adelchi (1822): tragedia sulla caduta del regno longobardo sotto Carlo Magno; il celebre coro "Dagli atrii muscosi" descrive il popolo italico oppresso da dominazioni successive. Inni Sacri (1812-15): poesia religiosa popolare, fede come fondamento di una nuova comunità. Odi civili: Marzo 1821 (speranza patriottica) e Il cinque maggio (morte di Napoleone).' },
      'testi-cinquemaggio': { label: 'Testi', title: 'Il cinque maggio', text: 'Ode sulla morte di Napoleone (1821). Manzoni non giudica l\'imperatore né come eroe né come tiranno, ma sospende il giudizio storico-umano («Ai posteri / l\'ardua sentenza») per concentrarsi sulla sua conversione religiosa finale, in cui vede il vero senso provvidenziale di una vita straordinaria.' },
      'testi-coro': { label: 'Testi', title: "Coro dell'Adelchi", text: '«Dagli atrii muscosi, dai fori cadenti...»: il coro dell\'atto III dell\'Adelchi descrive il popolo italico, oppresso prima dai Romani, poi dai Longobardi, infine dai Franchi. I veri "vinti" della storia sono sempre gli umili, indipendentemente da chi vince le guerre tra potenti.' },
      'testi-addio': { label: 'Testi', title: "Addio ai monti / conversione dell'Innominato", text: 'Addio ai monti: Lucia, in fuga dal suo paese natale sul lago di Como, saluta con commozione i luoghi della sua infanzia. La conversione dell\'Innominato: il potente signore feudale, dopo l\'incontro con Lucia e con il cardinale Borromeo, vive una crisi e una conversione religiosa che lo portano a liberarla — episodio centrale del romanzo.' },
      'confronti-verga': { label: 'Confronti', title: 'Manzoni vs Verga', text: 'In Manzoni la storia è governata dalla Provvidenza, che dà senso anche al dolore degli umili (Renzo e Lucia trovano una nuova vita). In Verga la "fiumana del progresso" travolge senza pietà chi resta indietro: i "vinti" del Ciclo sono condannati senza appello, senza alcuna giustizia superiore. Anche il narratore cambia: onnisciente e commentatore in Manzoni, impersonale e "regredito" in Verga.' },
      'confronti-leopardi': { label: 'Confronti', title: 'Manzoni vs Leopardi', text: 'Visioni del mondo opposte: provvidenziale (Manzoni) vs materialistica (Leopardi). Ma entrambi, da prospettive diverse, teorizzano una forma di solidarietà tra gli uomini come risposta al dolore: la carità cristiana manzoniana e la "social catena" laica leopardiana.' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>
