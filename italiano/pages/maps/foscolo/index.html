  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Ugo Foscolo', text: 'Ugo Foscolo (1778–1827) nasce a Zante e muore in esilio a Turnham Green, Londra. Combatte con Napoleone, ma resta deluso dal Trattato di Campoformio (1797). Figura di cerniera tra Neoclassicismo e Romanticismo: forme classiche, contenuti soggettivi e disperati. Opere principali: Ortis, Sonetti, Dei Sepolcri.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce nel 1778 a Zante (isola greca). Studia e si forma a Venezia. Combatte con l\'esercito napoleonico, ma il Trattato di Campoformio (1797), che cede Venezia all\'Austria, lo delude profondamente. Vive tra Milano, Firenze e Bologna. Nel 1815 si rifiuta di giurare fedeltà all\'Austria e va in esilio: prima in Svizzera, poi in Inghilterra, dove muore nel 1827 a Turnham Green.' },
      poetica: { label: 'Categoria', title: 'Poetica', text: 'Materialismo eroico: la materia è tutto, ma l\'uomo può opporsi al nulla con illusioni vitali (patria, amore, bellezza, poesia/gloria). Funzione eternatrice della poesia: la parola poetica può rendere eterna la memoria, vincendo simbolicamente la morte. Foscolo è figura di cerniera tra Neoclassicismo (forme, miti) e Romanticismo/Preromanticismo (titanismo, sensibilità soggettiva).' },
      opere: { label: 'Categoria', title: 'Opere', text: 'Le ultime lettere di Jacopo Ortis: romanzo epistolare, il protagonista si suicida per delusione politica e amore infelice, spesso accostato al Werther di Goethe. I Sonetti (A Zacinto, Alla sera, In morte del fratello Giovanni). Dei Sepolcri (1807): carme sulla funzione civile e affettiva delle tombe, scritto in risposta all\'editto di Saint-Cloud. Le Grazie (incompiuto).' },
      testi: { label: 'Categoria', title: 'Testi', text: 'A Zacinto: Foscolo si paragona a Ulisse, ma — a differenza dell\'eroe omerico — non potrà mai fare ritorno alla sua isola natale («Né più mai toccherò le sacre sponde»). Alla sera: la sera come immagine di pace e di morte vissuta senza angoscia. In morte del fratello Giovanni: ispirato a Catullo, lega il lutto familiare al tema dell\'esilio.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Foscolo vs Leopardi: per Foscolo le illusioni vanno difese attivamente; per Leopardi sono necessarie ma destinate a dissolversi con la ragione. Foscolo vs Alfieri: condividono il titanismo e l\'insofferenza per ogni costrizione, la tensione verso la libertà individuale.' },
      'vita-zante': { label: 'Vita', title: 'Zante 1778 · gioventù veneziana', text: 'Foscolo nasce nel 1778 a Zante, isola greca dell\'Adriatico allora possedimento veneziano: da qui il suo legame con la civiltà classica greca, che richiamerà spesso nelle sue opere (es. il mito di Ulisse in A Zacinto). Si trasferisce poi a Venezia, dove completa la sua formazione letteraria e si avvicina alle idee illuministe e rivoluzionarie.' },
      'vita-esilio': { label: 'Vita', title: 'Campoformio 1797 · esilio 1815-27', text: 'Foscolo aveva creduto nelle promesse di Napoleone come liberatore d\'Italia, ma il Trattato di Campoformio (1797) cede Venezia all\'Austria: una delusione politica che segna profondamente la sua opera (vedi Ortis). Nel 1815, dopo la caduta di Napoleone, Foscolo rifiuta di giurare fedeltà all\'Austria e sceglie l\'esilio: Svizzera, poi Inghilterra, dove muore in povertà nel 1827 a Turnham Green.' },
      'poetica-illusioni': { label: 'Poetica', title: 'Materialismo eroico', text: 'Per Foscolo la materia è tutto ciò che esiste: non c\'è vita ultraterrena, né Provvidenza. Ma di fronte al nulla, l\'uomo può e deve opporre delle "illusioni" che danno senso e dignità all\'esistenza: la patria, l\'amore, la bellezza, la poesia/gloria. Sono illusioni consapevoli, ma indispensabili e da difendere attivamente — da qui l\'aggettivo "eroico".' },
      'poetica-eternatrice': { label: 'Poetica', title: 'Funzione eternatrice della poesia', text: 'La poesia, per Foscolo, ha il potere di rendere eterna la memoria di chi non c\'è più (un eroe, un caro estinto, una civiltà), vincendo simbolicamente il tempo e la morte. È questo il tema centrale dei Sepolcri: le tombe e la poesia che le celebra creano un legame ideale tra le generazioni, i vivi e i morti.' },
      'poetica-titanismo': { label: 'Poetica', title: 'Titanismo / tra Neoclassicismo e Romanticismo', text: 'Foscolo è una figura di cerniera: usa forme e miti classici (l\'armonia, la mitologia greca, il sonetto) tipici del Neoclassicismo, ma li riempie di contenuti soggettivi, passionali, disperati — l\'esilio, la delusione politica, la ribellione titanica contro un destino ostile — tipici del Romanticismo e del Preromanticismo.' },
      'opere-ortis': { label: 'Opere', title: 'Le ultime lettere di Jacopo Ortis', text: 'Romanzo epistolare il cui protagonista, Jacopo Ortis, si toglie la vita per la delusione politica seguita al Trattato di Campoformio e per l\'amore infelice per Teresa. Spesso accostato a I dolori del giovane Werther di Goethe per la forma epistolare e il tema del suicidio romantico, ma con una più forte componente politica e patriottica.' },
      'opere-sepolcri': { label: 'Opere', title: 'Dei Sepolcri (1807)', text: 'Carme in endecasillabi sciolti, scritto in risposta all\'editto napoleonico di Saint-Cloud (che imponeva sepolture anonime fuori dalle città). Foscolo difende il valore civile e affettivo delle tombe: esse mantengono vivo il legame tra i vivi e i morti, custodiscono la memoria degli uomini illustri e ispirano alle nuove generazioni grandi imprese.' },
      'testi-zacinto': { label: 'Testi', title: 'A Zacinto', text: 'Sonetto in cui Foscolo si paragona a Ulisse: come l\'eroe omerico, è in viaggio lontano dalla patria; ma a differenza di Ulisse, lui non potrà mai fare ritorno a Zacinto. «Né più mai toccherò le sacre sponde / ove il mio corpo fanciulletto giacque, / Zacinto mia». L\'isola natale diventa il simbolo di una patria perduta per sempre.' },
      'testi-sera': { label: 'Testi', title: 'Alla sera', text: 'Sonetto in cui la sera viene invocata come immagine di pace e quiete, anticipazione della morte vissuta senza angoscia, anzi quasi con sollievo: un momento in cui le passioni e gli affanni («il reo tempo») si placano, offrendo al poeta un rifugio temporaneo dal "nulla eterno".' },
      'testi-fratello': { label: 'Testi', title: 'In morte del fratello Giovanni', text: 'Sonetto ispirato al carme di Catullo per il fratello morto. Foscolo lega il lutto privato (il suicidio del fratello Giovanni) al tema dell\'esilio: lontano dalla famiglia e dalla patria, può solo "piangere" sulla tomba del fratello in un sonetto, non potendovi recarsi fisicamente.' },
      'confronti-leopardi': { label: 'Confronti', title: 'Foscolo vs Leopardi', text: 'Entrambi riflettono sul ruolo delle illusioni nella vita umana, ma con esiti diversi: per Foscolo le illusioni (patria, amore, bellezza, gloria) hanno valore oggettivo e vanno difese attivamente con un atteggiamento "eroico"; per Leopardi sono necessarie alla felicità ma la ragione, sviluppandosi storicamente, le dissolve in modo inesorabile (pessimismo storico).' },
      'confronti-alfieri': { label: 'Confronti', title: 'Foscolo vs Alfieri', text: 'Foscolo eredita da Alfieri il titanismo: la ribellione dell\'individuo contro un destino ostile, l\'insofferenza per ogni costrizione (politica, sociale, morale), la tensione verso una libertà che sa di essere comunque sconfitta. Entrambi rappresentano l\'eroe romantico come figura tragica e solitaria.' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>

  <script src="../../../js/main.js"></script>
