  <script>
    const NODES = {
      root: { label: 'Autore', title: 'Salvatore Quasimodo', text: 'Salvatore Quasimodo (1901–1968) nasce a Modica (Sicilia). Nobel 1959, secondo italiano dopo Carducci. Due fasi: ermetica (1930-1942, parola pura, Sicilia come mito) e civile (1945-1968, testimonianza bellica, io→noi). La Seconda Guerra Mondiale è lo spartiacque assoluto.' },
      vita: { label: 'Categoria', title: 'Vita', text: 'Nasce a Modica nel 1901. Firenze e la rivista Solaria nel 1929. Acque e terre (esordio, 1930). Cattedra al Conservatorio di Milano nel 1940. La guerra trasforma la poetica (1942-45). Nobel nel 1959. Muore a Napoli nel 1968.' },
      ermetica: { label: 'Categoria', title: 'Fase ermetica', text: 'Prima fase (1930-1942): parola pura (massimo con minimo), analogia ermetica (senza «come»), Sicilia come mito dell\'infanzia, tempo e solitudine come condizione ontologica. Raccolte: Acque e terre (1930), Oboe sommerso (1932), Lirici greci (1940).' },
      civile: { label: 'Categoria', title: 'Fase civile', text: 'Seconda fase (1945-1968): poesia di testimonianza bellica, denuncia, io→noi collettivo, immagini bibliche (Salmo 137, Caino e Abele), versi più ampi. Raccolta chiave: Giorno dopo giorno (1947), con Alle fronde dei salici e Uomo del mio tempo.' },
      testi: { label: 'Categoria', title: 'Testi', text: 'Ed è subito sera (3 versi, fase ermetica): ognuno=universale, trafitto=ambiguità, subito=velocità tempo. Vento a Tindari: apostrofe, Sicilia come mito, analogia. Alle fronde dei salici: Salmo 137, piede straniero, silenzio per voto. Uomo del mio tempo: pietra e fionda, Caino e Abele, scienza allo sterminio.' },
      confronti: { label: 'Categoria', title: 'Confronti', text: 'Quasimodo vs Ungaretti: brevità come risultato vs sistema; guerra collettiva vs biografica; Sicilia=mito vs Alessandria=energia. Quasimodo vs Montale: analogia→interiore vs correlativo oggettivo; impegno civile esplicito vs resistenza al cattivo impegno.' },
      'vita-modica': { label: 'Vita', title: 'Modica 1901 · Nobel 1959', text: 'Nasce il 20 agosto 1901 a Modica (Ragusa, Sicilia), figlio di un capostazione. Nel 1959 riceve il Nobel, secondo italiano dopo Carducci (1906). La motivazione: «per la sua poetica lirica, che con ardente classicità esprime le tragiche esperienze della vita ai nostri tempi».' },
      'vita-milano': { label: 'Vita', title: 'Firenze e Milano', text: 'Nel 1929 si trasferisce a Firenze dove entra in contatto con la rivista Solaria e con Elio Vittorini (suo cognato). Questo ambiente è decisivo per la formazione ermetica. Nel 1940 ottiene la cattedra di Letteratura italiana al Conservatorio Giuseppe Verdi di Milano, che occuperà fino alla morte.' },
      'erm-parolapura': { label: 'Fase ermetica', title: 'Parola pura — massimo con minimo', text: 'Il principio dell\'ermetismo: fare il massimo con il minimo di parole. Ed è subito sera — tre versi, diciassette parole, infinità di significato — è il caso-limite. L\'oscurità non è gratuita: è fedeltà alla natura dell\'esperienza interiore che non si traduce in prosa. Silenzio e non-detto pesano quanto le parole.' },
      'erm-sicilia': { label: 'Fase ermetica', title: 'Sicilia come mito', text: 'La Sicilia non è sfondo realistico ma mito dell\'infanzia perduta. Solo da Milano, in esilio volontario, diventa il luogo assoluto. Il ritorno sarebbe deludente: non si torna nel mito, si torna nella realtà geografica. Tindari è apostrofata come persona («ti so», «m\'assali»): il luogo diventa soggetto vivo.' },
      'erm-solitudine': { label: 'Fase ermetica', title: 'Tempo e solitudine', text: 'La solitudine in Quasimodo non è biografica ma ontologica: «Ognuno sta solo sul cuor della terra» — il pronome universalizza. Il tempo è rapido e inesorabile: «ed è subito sera». Non c\'è tragedia romantica: c\'è constatazione asciutta della condizione umana. La vita è breve non per colpa ma per natura.' },
      'civ-guerra': { label: 'Fase civile', title: 'La guerra — spartiacque', text: 'La Seconda Guerra Mondiale divide la carriera in due fasi incompatibili. La domanda di Alle fronde dei salici — «E come potevano noi cantare / con il piede straniero sopra il cuore» — è il momento della rottura. La parola pura ermetica diventa moralmente impossibile di fronte all\'orrore bellico.' },
      'civ-denuncia': { label: 'Fase civile', title: 'Poesia d\'accusa', text: 'La poesia diventa testimonianza storica e denuncia. L\'io poetico diventa collettivo (io→noi). I versi si allungano — l\'urgenza non si contiene in frammenti. Immagini bibliche: Salmo 137 (Alle fronde dei salici), Caino e Abele (Uomo del mio tempo). Tono diretto di accusa: «Sei ancora quello della pietra e della fionda».' },
      'testi-sera': { label: 'Testi', title: 'Ed è subito sera', text: 'Da Acque e terre (1930). Tre versi: endecasillabo + novenario + senario tronco (i versi si accorciano: la vita si contrae). «Ognuno» = solitudine universale, non autobiografica. «Trafitto da un raggio di sole» = ambiguità: la vita è bella e si ferisce allo stesso tempo. «Subito sera» = la vita finisce prima di capirla.' },
      'testi-salici': { label: 'Testi', title: 'Alle fronde dei salici', text: 'Da Giorno dopo giorno (1945). Domanda retorica: come cantare con l\'occupazione? «Piede straniero sopra il cuore» = occupazione nazista. «Crocifisso sul palo del telegrafo» = martire sacro+moderno. Riferimento al Salmo 137 (ebrei a Babilonia che appendono le cetre ai salici). «Per voto» = silenzio come atto sacro.' },
      'testi-uomo': { label: 'Testi', title: 'Uomo del mio tempo', text: 'Da Giorno dopo giorno (1946). «Pietra e fionda» = violenza primordiale dell\'umanità. «Carlinga» = aereo da guerra del XX secolo. «Scienza esatta persuasa allo sterminio» = paradosso illuminista. «Andiamo ai campi» = Caino e Abele (Genesi 4): il ciclo eterno della violenza fraterna. Finale ai figli: spezzare il ciclo dimenticando.' },
      'confronti-ungaretti': { label: 'Confronti', title: 'Quasimodo vs Ungaretti', text: 'Brevità: risultato di processo ermetico (Quasimodo) vs sistema strutturale (Ungaretti). Guerra: Seconda Guerra/collettiva (Quasimodo) vs Prima Guerra/autobiografica/Carso (Ungaretti). Radici: Sicilia come mito lontano e perduto (Quasimodo) vs Alessandria come fonte di energia e contrasto (Ungaretti).' },
      'confronti-montale': { label: 'Confronti', title: 'Quasimodo vs Montale', text: 'Natura: analogia ermetica — diventa interiore senza mediazione (Quasimodo) vs correlativo oggettivo — l\'oggetto concreto veicola l\'emozione senza diventare simbolo (Montale). Impegno: poesia civile esplicita e denuncia diretta (Quasimodo) vs resistenza al «cattivo impegno» — la poesia non deve fare propaganda (Montale).' }
    };

    function showNode(key) {
      const node = NODES[key];
      if (!node) return;
      document.getElementById('tip-label').textContent = node.label || '';
      document.getElementById('tip-title').textContent = node.title || '';
      document.getElementById('tip-text').textContent = node.text || '';
      document.getElementById('map-overlay').classList.add('show');
    }
    function closeTip() { document.getElementById('map-overlay').classList.remove('show'); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTip(); });
  </script>

  <script src="../../../js/main.js"></script>
